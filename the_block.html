// Dispatcher.
function drawEnemy(e) {
  // Sprite atlas wins per-frame whenever it has the requested anim. Falls
  // through to the per-type procedural drawer below when the atlas is
  // missing or doesn't have a frame for the current animState.
  if (SPRITES[e.type] && drawSpriteCharacter(e)) return;
  switch (e.type) {
    case "tank":      return drawTank(e);
    case "lamplight": return drawLamplight(e);
    case "slice":     return drawSlice(e);
    case "chains":    return drawChains(e);
    case "shade":     return drawShade(e);
    case "dojo":      return drawDojo(e);
    case "rig":       return drawRig(e);
    case "baron":     return drawBaron(e);
    case "razor":     return drawRazor(e);
    case "volt":      return drawVolt(e);
    case "blackwell": return drawBlackwell(e);
    default:          return drawRunner(e);
  }
}

function drawEnemyHpPip(sx, by, e) {
  const bw = 18, bh = 2;
  const bx = sx - bw / 2;
  X.fillStyle = "#000";
  X.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
  X.fillStyle = "#3a1010";
  X.fillRect(bx, by, bw, bh);
  const pct = e.hp / e.hpMax;
  X.fillStyle = pct < 0.3 ? "#ff5050" : (pct < 0.6 ? "#ff9c40" : "#e8c04a");
  X.fillRect(bx, by, Math.max(0, Math.round(bw * pct)), bh);
}

// ---------- Particles (hit feedback) ----------
let particles = [];

function spawnSparkle(x, y) {
  particles.push({ kind: "sparkle", x, y, life: 0, max: 0.18 });
}
// Single colored spark used for telegraphs (chains spin, rig pound, lamplight charge).
// Uses the petal renderer so it fades cleanly with no special draw code.
function spawnSpark(x, y, color) {
  const c = color || "#a08560";
  const dx = (Math.random() - 0.5) * 6;
  const dy = (Math.random() - 0.5) * 4;
  particles.push({
    kind: "petal", x: x + dx, y: y + dy,
    vx: dx * 8, vy: dy * 8 - 4,
    life: 0, max: 0.30,
    core: c, edge: c,
  });
}
function spawnDmgNumber(x, y, n) {
  particles.push({ kind: "dmg", x, y, vy: -28, life: 0, max: 0.55, text: String(n) });
}
// Parry sparkle: a radial burst keyed by tier. PERFECT is bandana yellow, GOOD
// is olive, LATE is grey. Multiple petals at once for the impact frame.
function spawnParrySparkle(x, y, tier) {
  const tone =
    tier === "perfect" ? { core: "rgba(255,240,180,1)", edge: "rgba(255,215,106,0.9)", n: 8, r: 14 } :
    tier === "good"    ? { core: "rgba(220,225,200,1)", edge: "rgba(125,141,79,0.9)",  n: 6, r: 11 } :
                         { core: "rgba(220,220,220,1)", edge: "rgba(140,140,140,0.9)", n: 4, r: 8  };
  for (let i = 0; i < tone.n; i++) {
    const ang = (i / tone.n) * Math.PI * 2;
    const dx = Math.cos(ang) * tone.r;
    const dy = Math.sin(ang) * tone.r * 0.6;
    particles.push({
      kind: "petal", x: x + dx, y: y + dy,
      vx: dx * 4, vy: dy * 4,
      life: 0, max: 0.32,
      core: tone.core, edge: tone.edge,
    });
  }
}
function spawnParryWord(x, y, text, color) {
  particles.push({
    kind: "word", x, y, vy: -22, life: 0, max: 0.85,
    text, color, scale: 1,
  });
}
// Milestone words for big combo counts (used in Phase 2.5 polish).
function spawnMilestone(x, y, text) {
  particles.push({ kind: "word", x, y, vy: -16, life: 0, max: 1.0, text, color: "#e8c04a", scale: 1.4 });
}
// Boss speech: short quoted line that floats above the boss. Used by the
// mid-fight dialog system that pulls from content/boss_dialog.json.
function spawnBossSpeech(x, y, text, color) {
  particles.push({
    kind: "speech", x, y, vy: -10, life: 0, max: 2.4,
    text, color: color || "#fff",
  });
}

// Pick a random midfight or taunt line for a given boss, with built-in
// cooldown so the boss doesn't spam lines. Falls back to a default
// minimal pool if BOSS_DIALOG isn't loaded or the array is empty.
const BOSS_FALLBACK_TAUNT = ["Stay down.", "Try again.", "Quietly."];
const BOSS_FALLBACK_MIDFIGHT = ["Still here?", "Walk away.", "Last chance."];

function bossSay(boss, beat) {
  if (!boss || boss.dead) return;
  const now = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  boss._lastSpoke = boss._lastSpoke || 0;
  if (now - boss._lastSpoke < 2.5) return;   // cooldown
  const pool =
    (BOSS_DIALOG && BOSS_DIALOG[boss.type] && Array.isArray(BOSS_DIALOG[boss.type][beat])
      && BOSS_DIALOG[boss.type][beat].length > 0)
        ? BOSS_DIALOG[boss.type][beat]
        : (beat === "taunt" ? BOSS_FALLBACK_TAUNT : BOSS_FALLBACK_MIDFIGHT);
  const line = pool[Math.floor(Math.random() * pool.length)];
  if (!line || line === "...") return;   // skip silent-Blackwell entries
  boss._lastSpoke = now;
  // Color-coded per boss for instant recognition.
  const color =
    boss.type === "baron"     ? "#cfa040" :
    boss.type === "razor"     ? "#cfd0d6" :
    boss.type === "volt"      ? "#4a8ad0" :
    boss.type === "blackwell" ? "#f4c860" :
    boss.type === "kane"      ? "#e8c04a" : "#fff";
  spawnBossSpeech(boss.x, boss.y - 50, line, color);
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    if (p.kind === "dmg") {
      p.y += p.vy * dt;
      p.vy += 50 * dt;
    } else if (p.kind === "petal") {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.88; p.vy *= 0.88;
    } else if (p.kind === "word") {
      p.y += p.vy * dt;
      p.vy *= 0.93;
    }
    if (p.life >= p.max) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.max;
    if (p.kind === "sparkle") {
      const r = (1 - t) * 7;
      const a = (1 - t).toFixed(2);
      X.fillStyle = "rgba(255,240,180," + a + ")";
      X.fillRect(p.x - r, p.y - 1, r * 2, 2);
      X.fillRect(p.x - 1, p.y - r, 2, r * 2);
      X.fillStyle = "rgba(255,255,255," + a + ")";
      X.fillRect(p.x - 1, p.y - 1, 2, 2);
    } else if (p.kind === "dmg") {
      const a = (1 - t).toFixed(2);
      X.fillStyle = "rgba(255,255,255," + a + ")";
      X.font = "bold 9px ui-monospace, monospace";
      X.textAlign = "center";
      X.textBaseline = "alphabetic";
      X.fillText(p.text, Math.round(p.x), Math.round(p.y));
    } else if (p.kind === "petal") {
      const a = 1 - t;
      const r = 2 + (1 - t) * 1.5;
      X.fillStyle = p.edge.replace(/0\.\d+\)/, a.toFixed(2) + ")");
      X.fillRect(Math.round(p.x - r), Math.round(p.y - r), r * 2, r * 2);
      X.fillStyle = p.core.replace(/1\)$/, (a * 0.9).toFixed(2) + ")");
      X.fillRect(Math.round(p.x - 1), Math.round(p.y - 1), 2, 2);
    } else if (p.kind === "word") {
      // Pop on first 25%, hold, then fade.
      const pop = t < 0.18 ? (t / 0.18) : 1;
      const fade = t > 0.6 ? (1 - (t - 0.6) / 0.4) : 1;
      const sz = Math.round(13 * (p.scale || 1) * (1 + (1 - pop) * 0.4));
      X.font = "bold " + sz + "px ui-monospace, monospace";
      X.textAlign = "center";
      X.textBaseline = "alphabetic";
      // Drop shadow.
      X.fillStyle = "rgba(0,0,0," + (0.7 * fade).toFixed(2) + ")";
      X.fillText(p.text, Math.round(p.x) + 1, Math.round(p.y) + 1);
      X.fillStyle = p.color.startsWith("#") ? p.color : p.color;
      X.globalAlpha = fade;
      X.fillText(p.text, Math.round(p.x), Math.round(p.y));
      X.globalAlpha = 1;
    } else if (p.kind === "speech") {
      // Boss midfight / taunt line. Quoted text in a small black panel
      // anchored above the boss, fades in/out.
      const inT  = Math.min(1, t / 0.18);
      const outT = Math.min(1, (1 - t) / 0.18);
      const a    = Math.min(inT, outT);
      X.font = "bold 10px ui-monospace, monospace";
      X.textAlign = "center";
      X.textBaseline = "alphabetic";
      const txt = '"' + p.text + '"';
      const w = X.measureText(txt).width + 14;
      const h = 16;
      X.globalAlpha = a;
      X.fillStyle = "rgba(0,0,0,0.78)";
      X.fillRect(Math.round(p.x - w / 2), Math.round(p.y - h), w, h);
      X.fillStyle = p.color;
      X.fillRect(Math.round(p.x - w / 2), Math.round(p.y - h), w, 1);
      X.fillStyle = "#fff";
      X.fillText(txt, Math.round(p.x), Math.round(p.y - 3));
      X.globalAlpha = 1;
    }
  }
}

// ---------- Hit resolution ----------
let hitstopFrames = 0;
let flashFrames = 0;
let flashColor = "rgba(255,255,255,0.85)";
let shakeFrames = 0;
let shakeMag = 0;
// Slow-motion state: while slowmoFrames > 0, updatePlaying() multiplies dt
// by SLOWMO_RATE so action plays back at ~40% speed for impact reads (KO,
// big special hits). Tied to wall-clock frames, not slowed dt, so duration
// stays consistent regardless of how slow it's playing.
let slowmoFrames = 0;
const SLOWMO_RATE = 0.4;

function boxOverlap(a, b) {
  return Math.abs(a.cx - b.cx) < a.hw + b.hw &&
         Math.abs(a.cy - b.cy) < a.hd + b.hd;
}

// Per-difficulty config. Three independent dials:
//   damageTakenMul: multiplier on damage the player takes per hit
//   enemyHpMul:     multiplier on every enemy's max HP at spawn (boss HP
//                   scales by sqrt of this so cinematic HP bars stay readable)
//   enemyAggrMul:   multiplier on enemy aiCooldown after each attack
//                   (lower = more aggressive, attacks cycle faster)
function difficultyConfig() {
  switch (save.settings.difficulty) {
    case "story":  return { damageTakenMul: 0.5, enemyHpMul: 0.75, enemyAggrMul: 1.4 };
    case "hard":   return { damageTakenMul: 1.5, enemyHpMul: 1.20, enemyAggrMul: 0.8 };
    case "brutal": return { damageTakenMul: 2.0, enemyHpMul: 1.40, enemyAggrMul: 0.6 };
    default:       return { damageTakenMul: 1.0, enemyHpMul: 1.00, enemyAggrMul: 1.0 };
  }
}
// Backwards-compat shim for callers still using the old name.
function difficultyDamageMul() { return difficultyConfig().damageTakenMul; }

function applyHit(target, hb, attacker) {
  if (target.dead) return;
  if (player && target === player) {
    // Difficulty: pre-scale this hit's damage on the player.
    // Variant: if the attacker is a named variant enemy, apply their damageMul.
    let dmg = hb.damage * difficultyDamageMul();
    if (attacker && attacker.damageMul && attacker.damageMul !== 1) {
      dmg *= attacker.damageMul;
    }
    hb = Object.assign({}, hb, { damage: Math.max(1, Math.round(dmg)) });
  }

  // DOJO deflection: if the target's guard window is active and the attacker is
  // the player, the hit is parried back. No damage; player gets pushed back and
  // the dojo immediately counters.
  if (target.type === "dojo" && target.guardActive && attacker === player) {
    deflectHit(target, hb, attacker);
    return;
  }

  // Boss midfight dialog: fires when HP crosses 75% / 50% / 25% thresholds.
  // Tracked via target._spokeAt set so each threshold only fires once.
  if (target.isBoss && !target.dead && attacker === player) {
    const beforeFrac = target.hp / target.hpMax;
    const afterFrac  = (target.hp - hb.damage) / target.hpMax;
    target._spokeAt = target._spokeAt || {};
    for (const thresh of [0.75, 0.5, 0.25]) {
      if (beforeFrac > thresh && afterFrac <= thresh && !target._spokeAt[thresh]) {
        target._spokeAt[thresh] = true;
        bossSay(target, "midfight");
        break;
      }
    }
  }
  // Boss taunts when they land a hit on the player.
  if (target === player && attacker && attacker.isBoss && !attacker.dead) {
    bossSay(attacker, "taunt");
  }
  // Variant grunt — fires once per enemy lifetime when first hit by the player.
  if (target !== player && attacker === player && target.dialogGrunt && !target._grunted) {
    target._grunted = true;
    spawnBossSpeech(target.x, target.y - 38, target.dialogGrunt, "#bbb");
  }
  target.hp -= hb.damage;
  // TANK super-armor: shrugs off hitstun until staggerN hits land in a row.
  // Tracks via staggerCount which resets when the tank attacks.
  let absorbHitstun = false;
  if (target.staggerN && target.staggerN > 1 && !hb.launcher) {
    target.staggerCount = (target.staggerCount || 0) + 1;
    if (target.staggerCount < target.staggerN) absorbHitstun = true;
    else target.staggerCount = 0;
  }

  // Brief post-hit immunity so simultaneous enemies don't all stack onto one frame
  // and so the victim's attack-cancel doesn't immediately re-eat the next active frame.
  // Short enough that player chain combos still land (chain gaps >=10f).
  target.iframes = 4;
  // Launcher juggle achievement: hit a target while it's already airborne.
  if (target !== player && attacker === player && target.airborne) {
    unlockAchievement("launcher_juggle");
  }
  // Player taking damage breaks parry chain but retains 40% meter.
  if (player && target === player) {
    player.parryChain = 0;
    player.parryChainTimer = 0;
    player.parryMeter = Math.floor(player.parryMeter * 0.4);
    player.comboHits = 0;
    player.comboTimer = 0;
  }
  // Cancel the victim's own attack (no trades).
  if (target.attacking && !absorbHitstun) {
    target.attacking = false;
    target.attackName = null;
    target.attackFrame = 0;
    if (target.hitboxes) target.hitboxes.length = 0;
    target.attackHits = null;
  }
  // Knockback away from the hitbox center on world X.
  const dir = (target.x < hb.cx) ? -1 : 1;
  if (!absorbHitstun) {
    target.knockX = dir * hb.knockback;
    target.knockY = 0;
    target.hitstun = 8;
  } else {
    // Light recoil only.
    target.knockX = dir * hb.knockback * 0.2;
  }
  // Launcher pops the victim into the air for juggle followups.
  if (hb.launcher && target.z !== undefined) {
    target.vz = hb.launcher;
    target.airborne = true;
    target.hitstun = 0;
    target.knockX = dir * (hb.knockback * 0.5);
    if (target.staggerCount !== undefined) target.staggerCount = 0;
  }
  if (target.hp <= 0) {
    target.dead = true;
    target.deathTimer = 0;
    target.knockX = dir * (hb.knockback + 30);
    target.hitstun = 0;
    target.airborne = false;
    if (target === player) { vibrate(120); playSfx("ko"); }
    else if (target.isBoss) { vibrate([30, 30, 60]); playSfx("ko"); }
    else { vibrate(20); playSfx("ko"); }
    // Variant KO line — only fires for named variants.
    if (target !== player && target.dialogKod) {
      spawnBossSpeech(target.x, target.y - 38, target.dialogKod, "#aaa");
    }
    // Achievement triggers — enemy KO'd by player.
    if (target !== player && attacker === player) {
      save.totalKOs = (save.totalKOs || 0) + 1;
      if (save.totalKOs >= 100) unlockAchievement("100_kos");
      if (save.totalKOs >= 500) unlockAchievement("500_kos");
      if (target.isBoss) {
        if (target.type === "baron") unlockAchievement("first_boss");
        if (target.type === "razor") unlockAchievement("razor_down");
        if (target.type === "volt")  unlockAchievement("volt_down");
        if (target.type === "blackwell") unlockAchievement("find_blackwell");
      }
    }
    // Brief slow-motion on KO for impact feel. Boss KO gets longer drag.
    // dt is multiplied by SLOWMO_RATE while slowmoFrames > 0; uses the same
    // unscaled-hitstop-style global counter so it doesn't pile up.
    if (target.isBoss) slowmoFrames = Math.max(slowmoFrames, 18);
    else if (target === player) slowmoFrames = Math.max(slowmoFrames, 14);
    else slowmoFrames = Math.max(slowmoFrames, 9);
    // Music ducks during slow-mo so the SFX punch lands clean.
    duckMusic(0.35, slowmoFrames / 60 + 0.1);
  } else {
    playSfx(hb.damage >= 14 ? "hit_heavy" : "hit");
  }
  // Hit flash: target's sprite renders white-silhouette overlay for a few
  // frames so impacts read clearly even on a busy screen.
  target.hitFlash = absorbHitstun ? 2 : 4;
  // Scaled hit feel: hitstop and shake grow with damage and combo count, capped
  // at +50%% by 10 hits. Heavy single hits already feel punchier (high base hitstop)
  // and 10+ hit combos add noticeable rumble.
  const combo = (player && attacker === player) ? player.comboHits : 0;
  const comboMul = 1 + Math.min(0.5, combo * 0.05);
  const baseHs = hb.hitstop || 3;
  const scaledHs = Math.round(baseHs * comboMul);
  if (hitstopFrames < scaledHs) hitstopFrames = scaledHs;

  // Screen shake — tier by damage. Big hits rumble; combo extends duration.
  const shakeBase = Math.min(7, Math.max(2, Math.round(hb.damage / 4)));
  const shakeBoost = Math.min(3, Math.floor(combo / 5));
  // Atlas's power-character bonus: his attacks (atk1-atk3 + heavy + special)
  // get +60%% shake duration / +50%% magnitude / extra dust burst at the
  // impact point. Makes 'shove / slap / smash / uppercut / Foundation
  // Stone' read as heavy hits the way they should.
  const atlasBonus = (attacker && attacker.char === "atlas") ? 1.6 : 1;
  const atlasMagBonus = (attacker && attacker.char === "atlas") ? 1.5 : 1;
  if (shakeFrames < (shakeBase + shakeBoost * 2) * atlasBonus) shakeFrames = (shakeBase + shakeBoost * 2) * atlasBonus;
  if (shakeMag    < (shakeBase * 0.6 + shakeBoost) * atlasMagBonus) shakeMag = (shakeBase * 0.6 + shakeBoost) * atlasMagBonus;
  // Atlas hit-dust burst — 3 brown specks at the impact point so every Atlas
  // strike kicks up debris from the floor. Reads as 'this man is heavy.'
  if (attacker && attacker.char === "atlas" && hb.damage >= 8 && typeof spawnSpark === "function") {
    const cx = target.x, cy = target.y;
    for (let i = 0; i < 4; i++) {
      spawnSpark(cx + (Math.random() - 0.5) * 14, cy - 2 + Math.random() * 4, "#5a4a36");
    }
    // Extra white impact spark on the strike itself.
    spawnSpark(cx, cy - 18, "#ffffff");
    spawnSpark(cx + dir * 4, cy - 18, "#ffe070");
  }

  // Combo accounting — only when the player is the attacker.
  if (player && attacker === player) {
    const before = player.comboHits;
    player.comboHits++;
    player.comboTimer = 1.4;
    player.hitsLanded++;
    player.damageDealt += hb.damage;
    if (player.comboHits > player.maxCombo) player.maxCombo = player.comboHits;
    // Achievement combo milestones.
    if (player.comboHits >= 5)  unlockAchievement("first_combo_5");
    if (player.comboHits >= 10) unlockAchievement("combo_10");
    if (player.comboHits >= 20) unlockAchievement("combo_20");
    if (player.comboHits >= 30) unlockAchievement("combo_30");
    // Milestone celebrations as the combo grows.
    const milestones = COMBO_MILESTONES;
    for (let i = 0; i < milestones.length; i++) {
      const m = milestones[i];
      if (before < m.n && player.comboHits >= m.n) {
        spawnMilestone(player.x, player.y - 56, m.text);
        if (shakeFrames < 12) shakeFrames = 12;
        if (shakeMag    < 4)  shakeMag    = 4;
        flashFrames = Math.max(flashFrames, 2);
        break;
      }
    }
  }
  // Visuals.
  const sxp = (target.x + hb.cx) / 2;
  const syp = target.y - 18;
  spawnSparkle(sxp, syp);
  spawnDmgNumber(sxp, syp - 6, hb.damage);
  // Bigger hits get extra spark petals.
  if (hb.damage >= 12) {
    for (let i = 0; i < 3; i++) {
      const ang = Math.random() * Math.PI * 2;
      particles.push({
        kind: "petal", x: sxp + Math.cos(ang) * 6, y: syp + Math.sin(ang) * 6,
        vx: Math.cos(ang) * 30, vy: Math.sin(ang) * 30,
        life: 0, max: 0.28,
        core: "rgba(255,240,180,1)", edge: "rgba(255,160,60,0.9)",
      });
    }
  }
}

// Resolve a throw: launch the grabbed enemy in the chosen direction with damage.
// Caller has already validated p.grabbing and pressed an attack input.
function resolveThrow(p, e, throwDir, throwVZ) {
  const d = ATTACK_DATA[p.char + "_throw"] || ATTACK_DATA.rio_throw;
  e.grabbedBy = null;
  p.grabbing = null;
  p.grabFrames = 0;
  e.hp -= d.damage;
  e.iframes = 6;
  e.attacking = false;
  e.attackName = null;
  if (e.hitboxes) e.hitboxes.length = 0;
  e.knockX = throwDir * d.knockback;
  e.knockY = 0;
  e.vz = throwVZ;
  e.airborne = throwVZ > 0;
  e.hitstun = 0;
  if (e.hp <= 0) {
    e.dead = true;
    e.deathTimer = 0;
  }
  if (hitstopFrames < d.hitstop) hitstopFrames = d.hitstop;
  spawnSparkle(e.x, e.y - 18);
  spawnDmgNumber(e.x, e.y - 22, d.damage);
  shakeFrames = Math.max(shakeFrames, 6);
  shakeMag = Math.max(shakeMag, 3);
  // Brief throw recovery on the player so they can't immediately grab again.
  startAttack(p, "throw");
}

// Resolve a parry: classify by parry frame, deal counter damage on PERFECT,
// stun the attacker on GOOD, just block on LATE. Updates chain meter and
// triggers visual feedback.
function resolveParry(p, hb, attacker) {
  const f = p.parryFrame;
  let tier;
  if      (f <= PARRY_PERFECT) tier = "PERFECT";
  else if (f <= PARRY_GOOD)    tier = "GOOD";
  else                         tier = "LATE";

  // Skip the parry window straight into cooldown so this attempt can't land twice.
  p.parryFrame = PARRY_ACTIVE + 1;
  p.parryChain++;
  p.parryChainTimer = PARRY_CHAIN_S;

  if (tier === "PERFECT") {
    playSfx("parry_perfect");
    p.parryMeter = Math.min(100, p.parryMeter + 30);
    p.parryPerfectCount++;
    // Achievement triggers.
    unlockAchievement("perfect_parry_1");
    if (p.parryPerfectCount >= 10) unlockAchievement("perfect_parry_10");
    if (attacker && attacker.type === "baron" && attacker.attackName === "haymaker") {
      unlockAchievement("parry_haymaker");
    }
    if (p.parryChain >= 2) p.hp = Math.min(p.hpMax, p.hp + PARRY_HEAL_HP);
    if (attacker && !attacker.dead) {
      const counterDmg = Math.round(hb.damage * PARRY_PERFECT_BONUS);
      attacker.hp -= counterDmg;
      attacker.iframes = 4;
      attacker.hitstun = 24;
      attacker.attacking = false;
      attacker.attackName = null;
      if (attacker.hitboxes) attacker.hitboxes.length = 0;
      attacker.attackHits = null;
      const dir = (attacker.x < p.x) ? -1 : 1;
      attacker.knockX = dir * 140;
      if (attacker.hp <= 0) {
        attacker.dead = true;
        attacker.deathTimer = 0;
        attacker.knockX = dir * 200;
      }
      spawnParrySparkle(p.x, p.y - 24, "perfect");
      spawnDmgNumber(attacker.x, attacker.y - 26, counterDmg);
    }
    spawnParryWord(p.x, p.y - 38, "PERFECT!", "#ffd76a");
    if (hitstopFrames < PARRY_PERFECT_HITSTOP) hitstopFrames = PARRY_PERFECT_HITSTOP;
    flashFrames = Math.max(flashFrames, 5);
  } else if (tier === "GOOD") {
    playSfx("parry_good");
    p.parryMeter = Math.min(100, p.parryMeter + 20);
    p.parryGoodCount++;
    if (attacker && !attacker.dead) {
      attacker.hitstun = 30;
      attacker.attacking = false;
      attacker.attackName = null;
      if (attacker.hitboxes) attacker.hitboxes.length = 0;
      attacker.attackHits = null;
      const dir = (attacker.x < p.x) ? -1 : 1;
      attacker.knockX = dir * 60;
    }
    spawnParrySparkle(p.x, p.y - 24, "good");
    spawnParryWord(p.x, p.y - 38, "GOOD", "#7d8d4f");
    if (hitstopFrames < 5) hitstopFrames = 5;
  } else {
    playSfx("parry_late");
    // LATE — block only, no counter, but builds a little meter.
    p.parryMeter = Math.min(100, p.parryMeter + 10);
    spawnParrySparkle(p.x, p.y - 24, "late");
    spawnParryWord(p.x, p.y - 38, "BLOCK", "#888");
    if (hitstopFrames < 3) hitstopFrames = 3;
  }
  // Mark this hitbox as having connected with the player so the same active
  // phase doesn't re-trigger on subsequent frames.
  if (hb.hits) hb.hits.add(p);
}

function resolveHits() {
  if (!player) return;
  // Player → enemies.
  if (player.hitboxes.length > 0 && !player.dead) {
    for (const hb of player.hitboxes) {
      for (const e of enemies) {
        if (e.dead) continue;
        if (e === player.grabbing) continue;        // can't hit what we're holding
        if (e.iframes > 0) continue;                // knockdown / getup invulnerability
        // Multi-hit: re-hit each target every hb.multiHit frames within the active
        // phase; otherwise default to the one-hit-per-attack rule.
        if (hb.multiHit) {
          if (!hb.lastHits) hb.lastHits = new Map();
          const last = hb.lastHits.get(e);
          if (last !== undefined && hb.owner.attackFrame - last < hb.multiHit) continue;
        } else {
          if (hb.hits && hb.hits.has(e)) continue;
        }
        let connected = false;
        for (const tb of e.hurtboxes) {
          if (boxOverlap(hb, tb)) { connected = true; break; }
        }
        if (connected) {
          if (hb.multiHit) {
            hb.lastHits.set(e, hb.owner.attackFrame);
          } else if (hb.hits) {
            hb.hits.add(e);
          }
          applyHit(e, hb, player);
        }
      }
    }
  }
  // Enemies → player. If the player has an active parry frame, resolve as a parry
  // (PERFECT / GOOD / LATE) instead of taking damage.
  if (player.iframes <= 0 && !player.dead && !player.dodging) {
    for (const e of enemies) {
      if (e.dead || e.hitboxes.length === 0) continue;
      for (const hb of e.hitboxes) {
        if (!hb.hits) hb.hits = new Set();
        if (hb.hits.has(player)) continue;
        let connected = false;
        for (const tb of player.hurtboxes) {
          if (boxOverlap(hb, tb)) { connected = true; break; }
        }
        if (!connected) continue;
        if (player.parryFrame >= 1 && player.parryFrame <= PARRY_ACTIVE) {
          resolveParry(player, hb, e);
        } else {
          hb.hits.add(player);
          applyHit(player, hb, e);
        }
        break;
      }
      if (player.iframes > 0 || player.hitstun > 0) break;
    }
  }
}

function cleanupEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].dead && enemies[i].deathTimer > 1.4) enemies.splice(i, 1);
  }
}

// ---------- Fixed-timestep loop ----------
const STEP = 1 / 60;          // 60Hz logical tick — combat frame counts depend on this.
const MAX_STEPS_PER_FRAME = 5; // spiral-of-death guard
let last = performance.now() / 1000;
let acc = 0;

function frame(nowMs) {
  const now = nowMs / 1000;
  let dt = now - last;
  last = now;
  if (dt > 0.25) dt = 0.25; // tab-resume / debugger pause: discard the gap
  if (!paused) acc += dt;

  let steps = 0;
  while (acc >= STEP && steps < MAX_STEPS_PER_FRAME) {
    update(STEP);
    acc -= STEP;
    steps++;
  }
  if (steps === MAX_STEPS_PER_FRAME) acc = 0;

  render();

  // FPS sampling
  fpsAccum += dt;
  fpsFrames++;
  if (fpsAccum >= 0.5) {
    fps = fpsFrames / fpsAccum;
    fpsAccum = 0;
    fpsFrames = 0;
  }
  if (DEV && debugEl.classList.contains("on")) {
    debugEl.textContent =
      "FPS " + fps.toFixed(0) +
      "\nstate " + STATE +
      "\nents " + entityCount() +
      "\nscale " + scale.toFixed(2);
  }

  requestAnimationFrame(frame);
}

// ---------- Update ----------
function update(dt) {
  stateTime += dt;
  pollGamepad();
  if (STATE === "title") updateTitle(dt);
  else if (STATE === "select") updateSelect(dt);
  else if (STATE === "playing") updatePlaying(dt);
  else if (STATE === "paused") updatePaused(dt);
  else if (STATE === "cinematic") updateCinematic(dt);
  else if (STATE === "bossIntro") updateBossIntro(dt);
  else if (STATE === "beat") updateBeat(dt);
  else if (STATE === "stageSelect") updateStageSelect(dt);
  else if (STATE === "achievementList") updateAchievementList(dt);
  else if (STATE === "controls") updateControls(dt);
  else if (STATE === "credits")  updateCredits(dt);
  else if (STATE === "victory") updateVictory(dt);
  else if (STATE === "gameover") updateGameOver(dt);
}

// ---------- Pause menu (Phase 4.4) ----------
const PAUSE_OPTIONS = [
  { id: "resume",       label: "RESUME"        },
  { id: "achievements", label: "ACHIEVEMENTS"  },
  { id: "diff",         label: "DIFFICULTY"    },
  { id: "vol",          label: "MASTER VOL"    },
  { id: "sfx",          label: "SFX VOL"       },
  { id: "muted",        label: "MUTED"         },
  { id: "flash",        label: "REDUCE FLASH"  },
  { id: "shake",        label: "REDUCE SHAKE"  },
  { id: "quit",         label: "QUIT TO TITLE" },
];
let pauseIdx = 0;

function updatePaused(dt) {
  if (consumePress("KeyP") || consumePress("Pause") || consumePress("Escape")) {
    setState("playing");
    saveSave();
    return;
  }
  if (consumePress("ArrowDown") || consumePress("KeyS")) {
    pauseIdx = (pauseIdx + 1) % PAUSE_OPTIONS.length; playSfx("menu");
  }
  if (consumePress("ArrowUp") || consumePress("KeyW")) {
    pauseIdx = (pauseIdx - 1 + PAUSE_OPTIONS.length) % PAUSE_OPTIONS.length; playSfx("menu");
  }
  const left  = consumePress("ArrowLeft")  || consumePress("KeyA");
  const right = consumePress("ArrowRight") || consumePress("KeyD");
  const enter = consumePress("Enter") || consumePress("Space");
  const opt = PAUSE_OPTIONS[pauseIdx];
  if (opt.id === "resume" && enter) {
    setState("playing"); saveSave(); return;
  }
  if (opt.id === "achievements" && enter) {
    setState("achievementList"); achievementListScroll = 0; return;
  }
  if (opt.id === "quit" && enter) {
    player = null; enemies = []; particles = []; projectiles = [];
    saveSave(); setState("title"); return;
  }
  if (opt.id === "diff" && (left || right || enter)) {
    const list = ["story", "normal", "hard", "brutal"];
    let i = list.indexOf(save.settings.difficulty);
    if (i < 0) i = 1;   // fall back to normal if save was set to a removed tier
    i = (i + (left ? -1 : 1) + list.length) % list.length;
    save.settings.difficulty = list[i];
    playSfx("menu_select");
  }
  if (opt.id === "vol" && (left || right)) {
    save.audio.master = clamp(save.audio.master + (left ? -0.1 : 0.1), 0, 1);
    applyMasterVolume();
    playSfx("menu");
  }
  if (opt.id === "sfx" && (left || right)) {
    save.audio.sfx = clamp(save.audio.sfx + (left ? -0.1 : 0.1), 0, 1);
    playSfx("menu");
  }
  if (opt.id === "muted" && (left || right || enter)) {
    save.audio.muted = !save.audio.muted;
    applyMasterVolume();
    if (!save.audio.muted) playSfx("menu_select");
  }
  if (opt.id === "flash" && (left || right || enter)) {
    save.settings.reduceFlash = !save.settings.reduceFlash; playSfx("menu");
  }
  if (opt.id === "shake" && (left || right || enter)) {
    save.settings.reduceShake = !save.settings.reduceShake; playSfx("menu");
  }
}

function renderPaused() {
  // Render the playing field underneath, dimmed.
  renderPlaying();
  X.fillStyle = "rgba(0,0,0,0.65)";
  X.fillRect(0, 0, W, H);
  // Frame.
  const px = 120, py = 60, pw = W - 240, ph = H - 120;
  X.fillStyle = "rgba(0,0,0,0.85)";
  X.fillRect(px, py, pw, ph);
  X.fillStyle = "#e8c04a";
  X.fillRect(px, py, pw, 1);
  X.fillRect(px, py + ph - 1, pw, 1);
  X.fillStyle = "#fff";
  X.font = "bold 18px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("PAUSED", W / 2, py + 18);

  X.font = "11px ui-monospace, monospace";
  X.textAlign = "left";
  for (let i = 0; i < PAUSE_OPTIONS.length; i++) {
    const opt = PAUSE_OPTIONS[i];
    const y = py + 50 + i * 16;
    if (i === pauseIdx) {
      X.fillStyle = "rgba(232,192,74,0.18)";
      X.fillRect(px + 16, y - 7, pw - 32, 14);
      X.fillStyle = "#e8c04a";
      X.fillText("›", px + 22, y);
    }
    X.fillStyle = i === pauseIdx ? "#fff" : "#aaa";
    X.fillText(opt.label, px + 38, y);
    // Right-side value.
    let valTxt = "";
    if (opt.id === "diff")  valTxt = save.settings.difficulty.toUpperCase();
    if (opt.id === "vol")   valTxt = volBarText(save.audio.master);
    if (opt.id === "sfx")   valTxt = volBarText(save.audio.sfx);
    if (opt.id === "muted") valTxt = save.audio.muted ? "ON"  : "OFF";
    if (opt.id === "flash") valTxt = save.settings.reduceFlash ? "ON" : "OFF";
    if (opt.id === "shake") valTxt = save.settings.reduceShake ? "ON" : "OFF";
    if (valTxt) {
      X.textAlign = "right";
      X.fillStyle = i === pauseIdx ? "#e8c04a" : "#888";
      X.fillText(valTxt, px + pw - 22, y);
      X.textAlign = "left";
    }
  }
  X.fillStyle = "#888";
  X.font = "9px ui-monospace, monospace";
  X.textAlign = "center";
  X.fillText("↑/↓ select   ←/→ adjust   ENTER toggle   P/ESC resume", W / 2, py + ph - 10);
}

function volBarText(v) {
  const blocks = Math.round(v * 10);
  let s = "";
  for (let i = 0; i < 10; i++) s += i < blocks ? "█" : "░";
  return s;
}

// ---------- Gamepad polling (Standard Mapping) ----------
const gpPrev = { buttons: {}, axes: { x: 0, y: 0 } };
function pollGamepad() {
  if (typeof navigator === "undefined" || !navigator.getGamepads) return;
  let gps;
  try { gps = navigator.getGamepads(); }
  catch (e) { return; }   // SecurityError on cross-origin iframes
  if (!gps) return;
  for (const gp of gps) {
    if (!gp || !gp.connected) continue;
    // Standard mapping: 0=A 1=B 2=X 3=Y 4=LB 5=RB 6=LT 7=RT 8=Back 9=Start 12-15 dpad.
    const map = [
      ["jump",     [0]],
      ["light",    [1, 2]],     // B / X both work as light for friendlier mapping
      ["heavy",    [3]],
      ["special",  [7]],
      ["grab",     [4]],
      ["parry",    [5, 6]],
      ["up",       [12]],
      ["down",     [13]],
      ["left",     [14]],
      ["right",    [15]],
    ];
    for (const [action, indices] of map) {
      let pressed = false;
      for (const i of indices) {
        const b = gp.buttons[i];
        if (b && b.pressed) { pressed = true; break; }
      }
      // Stick contributions for movement.
      if (action === "left"  && gp.axes[0] < -0.4) pressed = true;
      if (action === "right" && gp.axes[0] >  0.4) pressed = true;
      if (action === "up"    && gp.axes[1] < -0.4) pressed = true;
      if (action === "down"  && gp.axes[1] >  0.4) pressed = true;
      const wasPressed = !!gpPrev.buttons[action];
      gpPrev.buttons[action] = pressed;
      const codes = KEY[action] || [];
      for (const code of codes) {
        if (pressed && !wasPressed) keysPressed[code] = true;
        keys[code] = pressed || keys[code]; // keyboard hold can keep it true
      }
      if (!pressed && wasPressed) {
        // Only clear keys[] if the keyboard isn't also pressing this action.
        let kbPressed = false;
        for (const code of codes) {
          // No way to distinguish source — leave keys to keyboard up-handler.
        }
      }
    }
    // Start = pause.
    const startNow = !!(gp.buttons[9] && gp.buttons[9].pressed);
    if (startNow && !gpPrev.buttons.start) {
      if (STATE === "playing") { setState("paused"); playSfx("menu"); }
      else if (STATE === "paused") { setState("playing"); }
    }
    gpPrev.buttons.start = startNow;
    break; // first connected gamepad only
  }
}

// ---------- Character select (Phase 4.2) ----------
let selectIdx = 0;

function updateSelect(dt) {
  // Sync selectIdx to selectedChar on entry.
  const curIdx = CHAR_ORDER.indexOf(selectedChar);
  if (curIdx !== -1 && curIdx !== selectIdx) selectIdx = curIdx;

  // Left/right wraps and skips locked slots.
  function step(dir) {
    for (let i = 0; i < CHAR_ORDER.length; i++) {
      selectIdx = (selectIdx + dir + CHAR_ORDER.length) % CHAR_ORDER.length;
      if (save.unlocks[CHAR_ORDER[selectIdx]]) break;
    }
    selectedChar = CHAR_ORDER[selectIdx];
  }
  if (consumePress("ArrowLeft")  || consumePress("KeyA")) step(-1);
  if (consumePress("ArrowRight") || consumePress("KeyD")) step( 1);
  if (consumePress("Digit1") && save.unlocks.rio)   { selectedChar = "rio";   selectIdx = 0; }
  if (consumePress("Digit2") && save.unlocks.duke)  { selectedChar = "duke";  selectIdx = 1; }
  if (consumePress("Digit3") && save.unlocks.atlas) { selectedChar = "atlas"; selectIdx = 2; }
  if (consumePress("Escape")) { setState("title"); return; }
  if (consumePress("Enter") || consumePress("Space") || consumePress("NumpadEnter")) {
    if (save.unlocks[selectedChar]) enterPlaying();
  }
}

function renderSelect() {
  const bio = CHAR_BIOS[selectedChar];

  for (const stat of ["Speed", "Power", "Range"]) {
    X.fillStyle = "#aaa";
    X.fillText(stat.toUpperCase(), panelX, cy);

    X.fillRect(bx, by, bw, bh);
    X.fillStyle = accent;
    X.fillRect(bx, by, Math.round((bw / 5) * v), bh);

    X.fillStyle = "#0a0a0a";
    for (let i = 1; i < 5; i++) X.fillRect(bx + Math.round((bw / 5) * i), by, 1, bh);
    cy += 14;
  }

  // Signature.
  cy += 6;
  X.fillStyle = accent;
  X.font = "bold 11px ui-monospace, monospace";
  X.fillText("SIGNATURE  " + bio.signature, panelX, cy);
  cy += 12;
  X.fillStyle = "#aaa";

  for (const ln of wrapText(bio.sigDesc, 46)) {

  X.font = "9px ui-monospace, monospace";
  for (const ln of bio.bio) {
    X.fillText(ln, panelX, cy);

  const pipY = H - 26;

    const ck = CHAR_ORDER[i];

    X.fillStyle = locked ? "#444" : (i === selectIdx ? CHAR_BIOS[ck].accent : "#666");

  X.fillStyle = "#888";
  X.font = "9px ui-monospace, monospace";
  X.fillText("← / → to switch    ENTER to begin    ESC back", W / 2, 64);

// Word-wrap a single line into N-char-max chunks (whitespace-aware).
function wrapText(text, maxChars) {
  const words = String(text).split(/\s+/);
  const lines = [];
  let cur = "";
  for (const w of words) {
    if (!cur) { cur = w; continue; }
    if (cur.length + 1 + w.length <= maxChars) cur += " " + w;
    else { lines.push(cur); cur = w; }
  }
  if (cur) lines.push(cur);
  return lines;
}

// ---------- Kane QTE cinematic (Stage 10 finale) ----------
// ---------- Narrative beats ----------
// A beat is a short scripted moment used for: the opening cutscene before
// stage 1, the per-stage intro after each advanceStage, the stage-clear
// scene after each stage's last enemy is down, and the ending cinematic
// after the KANE QTE. All four use the same state machine and renderer.
//
// Each entry: { title, subtitle, lines, duration, background, onComplete }
//   title:    big heading at top (e.g. "STAGE 3 — RIVER ROW")
//   subtitle: smaller line under the title
//   lines:    [{ speaker?, text }] — typewriter-revealed in order
//   duration: total seconds; skippable with Enter / J / Space / Escape
//   background: 'stage' (current stage backdrop dimmed) or 'black' (full black)
//   onComplete: callback fired on completion or skip
//
// Lines are voiced lines from the protagonist by default. Add `speaker` to
// override (e.g., for narrator beats).

let beatState = null;

function beginBeat(cfg) {
  if (!cfg) return;
  // Compute typewriter timing.
  const lines = cfg.lines || [];
  const lineSlots = [];
  const intro = 0.5;
  const lineDur = (cfg.duration - intro - 0.5) / Math.max(1, lines.length);
  let cur = intro;
  for (const ln of lines) {
    lineSlots.push({
      text: ln.text,
      speaker: ln.speaker,
      startAt: cur,
      revealUntil: cur + lineDur * 0.7,
    });
    cur += lineDur;
  }
  beatState = {
    cfg,
    t: 0,
    lineSlots,
  };
  duckMusic(0.35, cfg.duration + 0.4);
  setState("beat");
}

function updateBeat(dt) {
  if (!beatState) { setState("playing"); return; }
  beatState.t += dt;
  if (consumePress("Enter") || consumePress("Space") || consumePress("KeyJ") ||
      consumePress("Escape")) {
    completeBeat();
    return;
  }
  if (beatState.t >= beatState.cfg.duration) {
    completeBeat();
  }
}

function completeBeat() {
  if (!beatState) return;
  const cb = beatState.cfg.onComplete;
  beatState = null;
  if (cb) cb();
  // If onComplete didn't change state, default to playing.
  if (STATE === "beat") setState("playing");
}

function renderBeat() {
  if (!beatState) return;
  const { cfg, t, lineSlots } = beatState;
  // Background.
  if (cfg.background === "black") {
    X.fillStyle = "#000";
    X.fillRect(0, 0, W, H);
  } else {
    drawCurrentStage();
    // Heavy vignette so the beat reads.
    X.fillStyle = "rgba(0,0,0,0.78)";
    X.fillRect(0, 0, W, H);
  }
  // Title bar.
  if (cfg.title) {
    X.fillStyle = "rgba(0,0,0,0.7)";
    X.fillRect(0, 50, W, 60);
    X.fillStyle = cfg.titleColor || "#e8c04a";
    X.font = "bold 26px ui-monospace, monospace";
    X.textAlign = "left";
    X.textBaseline = "top";
    X.fillText(cfg.title, 40, 60);
    if (cfg.subtitle) {
      X.fillStyle = "#aaa";
      X.font = "bold 10px ui-monospace, monospace";
      X.fillText(cfg.subtitle, 40, 92);
    }
  }
  // Dialog block.
  X.fillStyle = "rgba(0,0,0,0.85)";
  const dialogH = 30 + lineSlots.length * 22;
  X.fillRect(0, H - dialogH - 30, W, dialogH);
  X.font = "bold 13px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  let y = H - dialogH - 18;
  for (const line of lineSlots) {
    if (t < line.startAt) break;
    const reveal = Math.min(1, (t - line.startAt) / Math.max(0.15, line.revealUntil - line.startAt));
    const visible = line.text.substring(0, Math.ceil(line.text.length * reveal));
    if (line.speaker) {
      X.fillStyle = "#aaa";
      X.fillText(line.speaker + ":", 40, y);
      X.fillStyle = "#fff";
      X.fillText('"' + visible + '"', 40 + line.speaker.length * 8 + 16, y);
    } else {
      X.fillStyle = "#ffffff";
      X.fillText('"' + visible + '"', 40, y);
    }
    y += 22;
  }
  // Skip prompt.
  X.fillStyle = "#666";
  X.font = "bold 9px ui-monospace, monospace";
  X.textAlign = "right";
  X.fillText("ENTER / J — CONTINUE", W - 12, H - 14);
}

// silhouette, dialog lines with typewriter reveal. Skippable with Enter /
// Space / J. On complete, spawns the boss and resumes playing. Dialog from
// STORY.md so the in-game beats track the narrative doc.
const BOSS_INTRO = {
  baron: {
    title: "BARON",
    subtitle: "KANE'S ENFORCER  /  EX-COP  /  STAGE 3",
    lines: [
      "You don't have to do this.",

  },

    lines: [
      "Kane built me.",
      "So I owe him a building.",
    ],
    color: "#4a8ad0",
    duration: 5.0,
  },
};

let bossIntroState = null;

function beginBossIntro(bossKey) {
  const def = BOSS_INTRO[bossKey];
  if (!def) {
    // No intro for this boss type — just spawn directly.
    spawnStageBoss(bossKey);
    return;
  }
  // If boss_dialog.json has an intro pool for this boss, pick from it; else
  // fall back to the static lines hard-coded in BOSS_INTRO. Pool picks are
  // randomized so repeated playthroughs get different intro lines.
  let lines = def.lines;
  const pool = (typeof BOSS_DIALOG !== "undefined") &&
               BOSS_DIALOG && BOSS_DIALOG[bossKey] &&
               Array.isArray(BOSS_DIALOG[bossKey].intro) &&
               BOSS_DIALOG[bossKey].intro.length > 0 ? BOSS_DIALOG[bossKey].intro : null;
  if (pool) {
    // Pick up to 3 lines at random (without repeats) so the cutscene length
    // is similar to the hardcoded version.
    const pick = pool.slice();
    for (let i = pick.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pick[i], pick[j]] = [pick[j], pick[i]];
    }
    lines = pick.slice(0, Math.min(3, pick.length));
  }
  // Compute typewriter timing: each line gets a slice of the duration.
  const lineSlots = [];
  const lineDur = def.duration / (lines.length + 0.4);
  let cur = 0.6;   // initial pause
  for (const line of lines) {
    lineSlots.push({ text: line, startAt: cur, charsAt: cur, fullAt: cur + lineDur * 0.7 });
    cur += lineDur;
  }
  bossIntroState = {
    bossKey,
    def,
    t: 0,
    lineSlots,
  };
  // Pause music to add gravity. Restored when intro completes.
  duckMusic(0.3, def.duration + 0.5);
  setState("bossIntro");
}

function spawnStageBoss(bossKey) {
  bossSpawnedFor[currentStage] = true;
  const boss = makeEnemy(bossKey, 540, 300);
  enemies = enemies.concat([boss]);
  flashFrames = Math.max(flashFrames, 6);
  spawnParryWord(W / 2, H / 2 - 8, "BOSS", "#a83040");
}

function updateBossIntro(dt) {
  if (!bossIntroState) { setState("playing"); return; }
  bossIntroState.t += dt;
  // Skip on confirm.
  if (consumePress("Enter") || consumePress("Space") || consumePress("KeyJ")) {
    completeBossIntro();
    return;
  }
  if (consumePress("Escape")) {
    completeBossIntro();
    return;
  }
  if (bossIntroState.t >= bossIntroState.def.duration) {
    completeBossIntro();
  }
}

function completeBossIntro() {
  if (!bossIntroState) return;
  const bossKey = bossIntroState.bossKey;
  bossIntroState = null;
  setState("playing");
  spawnStageBoss(bossKey);
}

function renderBossIntro() {
  if (!bossIntroState) return;
  const { def, t, lineSlots, bossKey } = bossIntroState;
  drawCurrentStage();
  // Vignette.
  X.fillStyle = "rgba(0,0,0,0.78)";
  X.fillRect(0, 0, W, H);

  // Boss portrait on the right — silhouetted reuse of the in-game renderer.
  // We mock a stub entity at a fixed pose.
  const portraitX = W - 130, portraitY = H - 60;
  const stub = {
    x: portraitX, y: portraitY, z: 0,
    type: bossKey, isBoss: true, bossName: def.title,
    facing: -1,   // facing the player on the left
    animState: "idle", animTime: t * 0.6,
    attacking: false, dodging: false,
    hp: 100, hpMax: 100,
    iframes: 0, hitstun: 0, knockdownFrames: 0,
    vanishAlpha: 1, hitboxes: [], hurtboxes: [],
  };
  X.save();
  X.globalAlpha = 0.85;
  if (bossKey === "baron")    drawBaron(stub);
  else if (bossKey === "razor") drawRazor(stub);
  else if (bossKey === "volt")  drawVolt(stub);
  else if (bossKey === "blackwell") drawBlackwell(stub);
  X.globalAlpha = 1;
  X.restore();

  // Big title banner across the top.
  X.fillStyle = "rgba(0,0,0,0.7)";
  X.fillRect(0, 50, W, 70);
  // Title text — large, colored per boss.
  X.fillStyle = def.color;
  X.font = "bold 36px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText(def.title, 40, 60);
  // Subtitle.
  X.fillStyle = "#aaa";
  X.font = "bold 10px ui-monospace, monospace";
  X.fillText(def.subtitle, 40, 100);

  // Dialog lines with typewriter reveal at the bottom.
  X.fillStyle = "rgba(0,0,0,0.85)";
  X.fillRect(0, H - 110, W, 90);
  X.fillStyle = "#ffffff";
  X.font = "bold 13px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  // Stack visible lines.
  let y = H - 100;
  for (const line of lineSlots) {
    if (t < line.startAt) break;
    const reveal = Math.min(1, (t - line.charsAt) / Math.max(0.3, line.fullAt - line.charsAt));
    const visible = line.text.substring(0, Math.ceil(line.text.length * reveal));
    X.fillText('"' + visible + '"', 40, y);
    y += 22;
  }

  // Skip prompt.
  X.fillStyle = "#666";
  X.font = "bold 9px ui-monospace, monospace";
  X.textAlign = "right";
  X.fillText("ENTER / J — CONTINUE", W - 12, H - 14);
}

      { at: 9.0, key: "KeyK", label: "K", hit: false, fired: false,
        line: "Sit down. Sign the paper. Or I'll find someone in your life who will." },
      { at: 11.2, key: "KeyJ", label: "J", hit: false, fired: false,
        line: "...I see." },
    ],
    duration: 13.0,
  };
  enemies = [];
  projectiles = [];
  particles = [];
  // Strip music to bass-only for the duration so Kane's dialog has room.
  duckMusic(0.4, 13.5);
  setState("cinematic");
}

function updateCinematic(dt) {
  if (!cineState) { setState("victory"); return; }
  cineState.t += dt;
  for (const p of cineState.prompts) {
    if (p.fired) continue;
    if (cineState.t > p.at + 0.55) {
      p.fired = true;
      spawnParryWord(W / 2, H / 2 - 30, "MISS", "#666");
    } else if (cineState.t > p.at - 0.55) {
      if (consumePress(p.key)) {
        p.fired = true;
        p.hit = true;
        flashFrames = 5;
        shakeFrames = 10;
        shakeMag    = 4;
        spawnParryWord(W / 2, H / 2 - 30, "STRIKE!", "#ffd76a");
      }
    }
  }
  if (consumePress("Escape")) {
    cineState = null;
    if (typeof beginEndingCinematic === "function") beginEndingCinematic();
    else { finalizeRun(true); setState("victory"); }
    return;
  }
  if (cineState.t >= cineState.duration) {
    // Achievement check: all prompts hit?
    if (cineState.prompts.every(p => p.hit)) unlockAchievement("refuse_kane");
    cineState = null;
    if (typeof beginEndingCinematic === "function") beginEndingCinematic();
    else { finalizeRun(true); setState("victory"); }
  }
}

function renderCinematic() {
  drawCurrentStage();
  // Heavy vignette to focus attention on the duel.
  X.fillStyle = "rgba(0,0,0,0.55)";
  X.fillRect(0, 0, W, H);

  // Kane silhouette on the right; chosen character on the left.
  drawKaneSilhouette(W - 120, STAGE_BOT - 64);
  if (player) {
    const savedX = player.x, savedY = player.y;
    player.x = 200; player.y = STAGE_BOT - 4;
    drawCharacter(player);
    player.x = savedX; player.y = savedY;
  }

  // Caption.
  X.fillStyle = "rgba(0,0,0,0.7)";
  X.fillRect(0, 36, W, 24);
  X.fillStyle = "#e8c04a";
  X.font = "bold 14px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("VICTOR KANE", W / 2, 50);

  // Kane's dialog caption — fades in 0.6s before each prompt and out 0.6s
  // after. Typewriter reveal so the player reads what they're refusing.
  let activeLine = null, lineProgress = 0;
  for (const p of cineState.prompts) {
    if (!p.line) continue;
    const inWin = (cineState.t > p.at - 1.2) && (cineState.t < p.at + 1.0);
    if (inWin) {
      activeLine = p;
      const start = p.at - 1.2;
      lineProgress = Math.min(1, (cineState.t - start) / 0.9);
      break;
    }
  }
  if (activeLine) {
    const visible = activeLine.line.substring(0,
                     Math.ceil(activeLine.line.length * lineProgress));
    const dialogY = H - 80;
    X.fillStyle = "rgba(0,0,0,0.85)";
    X.fillRect(40, dialogY - 4, W - 80, 38);
    X.fillStyle = "#ffffff";
    X.font = "bold 12px ui-monospace, monospace";
    X.textAlign = "center";
    X.textBaseline = "top";
    // Wrap simply: split if too long.
    const maxChars = 70;
    if (visible.length <= maxChars) {
      X.fillText('"' + visible + '"', W / 2, dialogY + 4);
    } else {
      // Crude two-line wrap on nearest space.
      let split = visible.lastIndexOf(" ", maxChars);
      if (split < 0) split = maxChars;
      X.fillText('"' + visible.substring(0, split), W / 2, dialogY);
      X.fillText(visible.substring(split + 1) + '"', W / 2, dialogY + 14);
    }
  }

  // Active prompt button.
  const now = cineState.t;
  for (const p of cineState.prompts) {
    if (Math.abs(now - p.at) > 0.55 && !(p.fired && p.hit)) continue;
    const inWin = Math.abs(now - p.at) < 0.55;
    const closeness = inWin ? Math.max(0, 1 - Math.abs(now - p.at) / 0.55) : 0;
    const sz = Math.round(20 + closeness * 18);
    const cx = W / 2, cy = H / 2 + 30;
    // Plate.
    X.fillStyle = "rgba(0,0,0,0.55)";
    X.fillRect(cx - 26, cy - 22, 52, 44);
    // Ring shrinks toward the perfect time.
    if (inWin) {
      const r = 28 - closeness * 18;
      X.strokeStyle = "rgba(232,192,74," + closeness.toFixed(2) + ")";
      X.lineWidth = 2;
      X.beginPath(); X.arc(cx, cy, r, 0, Math.PI * 2); X.stroke();
      X.lineWidth = 1;
    }
    X.fillStyle = p.hit ? "#7d8d4f" : (p.fired ? "#666" : "#e8c04a");
    X.font = "bold " + sz + "px ui-monospace, monospace";
    X.fillText(p.label, cx, cy + 2);
    break;
  }

  // Progress timeline at the bottom.
  const tlX = 60, tlY = H - 28, tlW = W - 120, tlH = 4;
  X.fillStyle = "rgba(0,0,0,0.6)";
  X.fillRect(tlX - 2, tlY - 2, tlW + 4, tlH + 4);
  X.fillStyle = "#222";
  X.fillRect(tlX, tlY, tlW, tlH);
  X.fillStyle = "#e8c04a";
  X.fillRect(tlX, tlY, Math.round(tlW * (cineState.t / cineState.duration)), tlH);
  for (const p of cineState.prompts) {
    const px = tlX + Math.round(tlW * (p.at / cineState.duration));
    X.fillStyle = p.hit ? "#7d8d4f" : (p.fired ? "#666" : "#fff");
    X.fillRect(px - 1, tlY - 3, 2, tlH + 6);
  }
}

  // punch onscreen.

  X.fillRect(sx + 5, sy - 36, 3, 2);

function updateTitle(dt) {
  // Number keys jump straight into the character select panel pre-pointed at
  // the chosen slot.
  if (consumePress("Digit1") && save.unlocks.rio)   { selectedChar = "rio";   setState("select"); return; }
  if (consumePress("Digit2") && save.unlocks.duke)  { selectedChar = "duke";  setState("select"); return; }
  if (consumePress("Digit3") && save.unlocks.atlas) { selectedChar = "atlas"; setState("select"); return; }
  if (!save.unlocks[selectedChar]) selectedChar = "rio";
  // TAB or S opens stage select (if at least one stage has been cleared).
  const anyCleared = Object.keys(save.stageBests || {}).length > 0;
  if (anyCleared && (consumePress("Tab") || consumePress("KeyS"))) {
    setState("stageSelect");
    return;
  }
  // C opens the controls screen; V opens credits.
  if (consumePress("KeyC")) { setState("controls"); return; }
  if (consumePress("KeyV")) { setState("credits");  return; }
  if (consumePress("Enter") || consumePress("Space") || consumePress("NumpadEnter")) {
    setState("select");
  }
}

// ---------- Stage select ----------
// Title-screen sub-mode: pick any stage you've cleared at least once and
// jump into it with your last selectedChar. The full run from there
// continues normally (boss intros, stage clears, final Kane fight).
let stageSelectIdx = 0;

function updateStageSelect(dt) {
  const anyCleared = Object.keys(save.stageBests || {}).length > 0;
  if (!anyCleared) { setState("title"); return; }
  if (consumePress("Escape")) { setState("title"); return; }
  // Find cleared stages.
  const cleared = [];
  for (let i = 0; i < STAGES.length; i++) {
    if (save.stageBests[i]) cleared.push(i);
  }
  if (cleared.length === 0) { setState("title"); return; }
  stageSelectIdx = Math.max(0, Math.min(stageSelectIdx, cleared.length - 1));
  if (consumePress("ArrowLeft")  || consumePress("KeyA")) {
    stageSelectIdx = (stageSelectIdx - 1 + cleared.length) % cleared.length;
    playSfx("menu");
  }
  if (consumePress("ArrowRight") || consumePress("KeyD")) {
    stageSelectIdx = (stageSelectIdx + 1) % cleared.length;
    playSfx("menu");
  }
  if (consumePress("Enter") || consumePress("Space") || consumePress("NumpadEnter") || consumePress("KeyJ")) {
    const startStage = cleared[stageSelectIdx];
    enterPlayingAtStage(startStage);
    playSfx("menu_select");
    unlockAchievement("stage_select");
  }
}

function renderStageSelect() {
  // Drawn over a darkened block backdrop for context.
  drawStageBlock();
  X.fillStyle = "rgba(0,0,0,0.80)";
  X.fillRect(0, 0, W, H);
  // Title.
  X.fillStyle = "#e8c04a";
  X.font = "bold 24px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "top";
  X.fillText("STAGE SELECT", W / 2, 40);
  X.fillStyle = "#aaa";
  X.font = "bold 10px ui-monospace, monospace";
  X.fillText("PLAYING AS: " + selectedChar.toUpperCase(), W / 2, 70);
  // Cleared stages in a row of cards.
  const cleared = [];
  for (let i = 0; i < STAGES.length; i++) {
    if (save.stageBests[i]) cleared.push(i);
  }
  if (cleared.length === 0) {
    X.fillStyle = "#aaa";
    X.font = "bold 12px ui-monospace, monospace";
    X.fillText("(no stages cleared yet — beat stage 1 first)", W / 2, 140);
    return;
  }
  const cardW = 100, cardH = 80, gap = 18;
  const rowW = cleared.length * cardW + (cleared.length - 1) * gap;
  const startX = (W - rowW) / 2;
  const cardY = 110;
  for (let i = 0; i < cleared.length; i++) {
    const idx = cleared[i];
    const cx = startX + i * (cardW + gap);
    const selected = i === stageSelectIdx;
    // Card.
    X.fillStyle = selected ? "rgba(232,192,74,0.18)" : "rgba(0,0,0,0.55)";
    X.fillRect(cx, cardY, cardW, cardH);
    X.strokeStyle = selected ? "#e8c04a" : "#444";
    X.lineWidth = selected ? 2 : 1;
    X.strokeRect(cx + 0.5, cardY + 0.5, cardW - 1, cardH - 1);
    // Stage number big.
    X.fillStyle = selected ? "#e8c04a" : "#aaa";
    X.font = "bold 28px ui-monospace, monospace";
    X.textAlign = "center";
    X.fillText(String(idx + 1), cx + cardW / 2, cardY + 8);
    // Stage name.
    X.fillStyle = "#fff";
    X.font = "bold 9px ui-monospace, monospace";
    const name = STAGES[idx].name;
    X.fillText(name, cx + cardW / 2, cardY + 44);
    // Best combo for this stage.
    const bestCombo = save.bestComboPerStage[idx] || 0;
    if (bestCombo > 0) {
      X.fillStyle = "#7d8d4f";
      X.font = "bold 8px ui-monospace, monospace";
      X.fillText("BEST COMBO " + bestCombo, cx + cardW / 2, cardY + 56);
    }
    // Best time (mm:ss).
    const bestT = save.bestTimes[idx];
    if (bestT && bestT < Infinity) {
      const m = Math.floor(bestT / 60);
      const s = Math.floor(bestT - m * 60);
      const txt = "BEST TIME " + m + ":" + (s < 10 ? "0" + s : s);
      X.fillStyle = "#a8c8f4";
      X.font = "bold 8px ui-monospace, monospace";
      X.fillText(txt, cx + cardW / 2, cardY + 68);
    }
  }
  X.lineWidth = 1;
  // Help text.
  X.fillStyle = "#aaa";
  X.font = "bold 9px ui-monospace, monospace";
  X.textAlign = "center";
  X.fillText("←/→  PICK    ENTER  PLAY    ESC  BACK", W / 2, H - 28);
}

// ---------- Achievement list ----------
// Accessible from the pause menu. Shows every achievement with locked/
// unlocked state, rarity color, and description. Scroll with ↑/↓ or W/S.
// Escape returns to the pause menu.
let achievementListScroll = 0;

function updateAchievementList(dt) {
  if (consumePress("Escape") || consumePress("KeyP")) {
    setState("paused");
    return;
  }
  if (consumePress("ArrowDown") || consumePress("KeyS")) {
    achievementListScroll = Math.min(achievementListScroll + 1, Math.max(0, ACHIEVEMENTS.length - 8));
    playSfx("menu");
  }
  if (consumePress("ArrowUp") || consumePress("KeyW")) {
    achievementListScroll = Math.max(0, achievementListScroll - 1);
    playSfx("menu");
  }
}

function renderAchievementList() {
  // Dark backdrop.
  X.fillStyle = "rgba(10,10,16,0.96)";
  X.fillRect(0, 0, W, H);
  // Header.
  X.fillStyle = "#e8c04a";
  X.font = "bold 18px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "top";
  X.fillText("ACHIEVEMENTS", W / 2, 18);
  // Unlock count + progress bar.
  const total = ACHIEVEMENTS.length;
  const unlocked = ACHIEVEMENTS.filter(a => save.achievements[a.id]).length;
  X.fillStyle = "#aaa";
  X.font = "bold 10px ui-monospace, monospace";
  X.fillText(unlocked + " / " + total + " UNLOCKED", W / 2, 42);
  // Progress bar.
  const barW = 280, barX = (W - barW) / 2, barY = 58;
  X.fillStyle = "#1a1a22";
  X.fillRect(barX, barY, barW, 4);
  X.fillStyle = "#7d8d4f";
  X.fillRect(barX, barY, Math.round(barW * unlocked / Math.max(1, total)), 4);
  // List rows.
  const rowH = 30;
  const top = 80;
  const visible = 6;
  for (let i = 0; i < visible; i++) {
    const idx = achievementListScroll + i;
    if (idx >= ACHIEVEMENTS.length) break;
    const a = ACHIEVEMENTS[idx];
    const got = !!save.achievements[a.id];
    const y = top + i * rowH;
    const rarityColor =
      a.rarity === "legendary" ? "#ff8a40" :
      a.rarity === "rare"      ? "#a8c8f4" :
      a.rarity === "uncommon"  ? "#7d8d4f" :
                                 "#dcd6c4";
    // Row background.
    X.fillStyle = got ? "rgba(232,192,74,0.07)" : "rgba(0,0,0,0.55)";
    X.fillRect(60, y, W - 120, rowH - 4);
    // Rarity bar.
    X.fillStyle = got ? rarityColor : "#3a3a44";
    X.fillRect(60, y, 3, rowH - 4);
    // Name.
    X.fillStyle = got ? "#fff" : "#666";
    X.font = "bold 12px ui-monospace, monospace";
    X.textAlign = "left";
    X.textBaseline = "top";
    X.fillText(got ? a.name : "???",  74, y + 4);
    // Description.
    X.fillStyle = got ? "#aaa" : "#444";
    X.font = "bold 9px ui-monospace, monospace";
    X.fillText(got ? a.description : "(locked)", 74, y + 16);
    // Rarity tag at right.
    X.fillStyle = got ? rarityColor : "#444";
    X.font = "bold 9px ui-monospace, monospace";
    X.textAlign = "right";
    X.fillText(a.rarity.toUpperCase(), W - 70, y + 4);
  }
  // Scroll indicator.
  if (ACHIEVEMENTS.length > visible) {
    X.fillStyle = "#666";
    X.font = "bold 9px ui-monospace, monospace";
    X.textAlign = "center";
    if (achievementListScroll > 0) X.fillText("▲", W / 2, top - 12);
    if (achievementListScroll + visible < ACHIEVEMENTS.length) X.fillText("▼", W / 2, top + visible * rowH + 4);
  }
  // Help.
  X.fillStyle = "#888";
  X.font = "bold 9px ui-monospace, monospace";
  X.textAlign = "center";
  X.fillText("↑/↓  SCROLL    ESC  BACK", W / 2, H - 16);
}
