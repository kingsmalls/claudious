let stageClearTimer = 0;
// Side-scrolling section progression. After each wave clears, sectionUnlocked
// becomes true; when the player walks to the right edge, the screen
// transitions to the next section and the next wave spawns. Each wave of a
// stage is its own visual section so the player feels they're progressing
// across the neighborhood, not standing in one room.
let sectionUnlocked = false;
let sectionTransition = null;   // { t, dur, phase: 'out'|'in', onMid: () => void }
const SECTION_TRIGGER_X = 580;  // walk past this to advance after wave clears

function startSectionTransition(onMid) {
  if (sectionTransition) return;
  sectionTransition = { t: 0, dur: 1.0, phase: "out", onMid };
}

function updateSectionTransition(dt) {
  if (!sectionTransition) return;
  sectionTransition.t += dt;
  if (sectionTransition.phase === "out" && sectionTransition.t >= 0.5) {
    // Mid-transition: fire callback to swap waves / reset player.
    if (sectionTransition.onMid) sectionTransition.onMid();
    sectionTransition.phase = "in";
  }
  if (sectionTransition.t >= sectionTransition.dur) {
    sectionTransition = null;
  }
}

function renderSectionTransition() {
  if (!sectionTransition) return;
  const half = sectionTransition.dur / 2;
  const a = sectionTransition.phase === "out"
    ? Math.min(1, sectionTransition.t / half)
    : Math.max(0, 1 - (sectionTransition.t - half) / half);
  X.fillStyle = "rgba(0,0,0," + a.toFixed(2) + ")";
  X.fillRect(0, 0, W, H);
}

function spawnWave(stageIdx, waveIdx) {
  const stage = STAGES[stageIdx];
  if (!stage || !stage.waves[waveIdx]) return [];
  return stage.waves[waveIdx].map(([type, x, y]) => makeEnemy(type, x, y));
}

function enterPlaying() {
  player = makePlayer(selectedChar, 120, 300);
  currentStage = 0;
  currentWave = 0;
  waveDelay = 0;
  enemies = spawnWave(0, 0);
  particles = [];
  projectiles = [];
  hitstopFrames = 0;
  flashFrames = 0;
  shakeFrames = 0;
  shakeMag = 0;
  stageClearMessage = "";
  stageClearTimer = 0;
  bossSpawnedFor = {};
  sectionUnlocked = false;
  sectionTransition = null;
  // Reset tutorial overlay session state — if !save.tutorialDone, the tutorial
  // will appear on stage 1 again this run.
  tutorialDismissed = false;
  tutorialStart = 0;
  if (player) {
    player.stageStartTime = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
    player.achievementsUnlockedThisRun = 0;
  }
  setState("playing");
  // Opening cutscene runs once at the start of every fresh run.
  // Skippable; on completion the player is already in stage 1.
  if (typeof beginOpeningCutscene === "function") beginOpeningCutscene();
}

// Global tempo multiplier for gameplay. Frame-counted attack windows are
// intentionally NOT scaled — only dt-driven movement, AI, hazards, anim
// playback. 1.0 = original timing. Bumped to 1.6 to make the brawler feel
// brisker without breaking parry windows.
const GAME_TEMPO_MUL = 1.6;

function updatePlaying(dt) {
  dt *= GAME_TEMPO_MUL;
  if (consumePress("Escape")) {
    player = null;
    enemies = [];
    particles = [];
    projectiles = [];
    hitstopFrames = 0;
    flashFrames = 0;
    shakeFrames = 0;
    slowmoFrames = 0;
    stageClearTimer = 0;
    setState("title");
    return;
  }
  // Slow-motion: drag dt while a KO is being savored. Counter still ticks
  // in real wall-clock frames (decremented inside hitstop branch later) so
  // duration is stable regardless of the time-drag.
  if (slowmoFrames > 0) {
    dt *= SLOWMO_RATE;
    slowmoFrames--;
  }
  // P (or gamepad Start) toggles in-game pause. The pause menu opens with it.
  if (consumePress("KeyP") || consumePress("Pause")) {
    setState("paused");
    playSfx("menu");
    return;
  }
  if (hitstopFrames > 0) { hitstopFrames--; return; }
  // Accessibility: clamp flash and shake when the user has asked for less.
  if (save.settings.reduceFlash) flashFrames = Math.min(flashFrames, 1);
  if (save.settings.reduceShake) { shakeFrames = 0; shakeMag = 0; }
  if (flashFrames > 0)  flashFrames--;
  if (shakeFrames > 0)  shakeFrames--;

  if (stageClearTimer > 0) {
    stageClearTimer -= dt;
    if (stageClearTimer <= 0) advanceStage();
    if (player) updatePlayer(player, dt);
    return;
  }

  if (player) updatePlayer(player, dt);
  for (const e of enemies) updateEnemy(e, dt);
  resolveHits();
  applyStageHazards(dt);
  cleanupEnemies();
  updateProjectiles(dt);
  updateParticles(dt);

  // Game over when the player runs out of HP. Brief delay so the death
  // knockback plays out before the overlay locks the input.
  if (player && player.dead) {
    if (!player.deathTimerStarted) {
      player.deathTimerStarted = true;
      player.deathClock = 1.6;
      // Roll the run's stats into the save on death.
      finalizeRun(false);
    }
    player.deathClock -= dt;
    player.x += player.knockX * dt;
    player.knockX *= 0.86;
    if (player.deathClock <= 0) {
      setState("gameover");
      return;
    }
  }

  // Run section transition timer.
  updateSectionTransition(dt);
  // Chatter + achievement popups tick during play.
  updateChatter(dt);
  updateAchievementPopups(dt);

  // Wave / stage progression — multi-section: when a wave clears, unlock the
  // section so the player can walk to the right edge to advance. The right-
  // edge trigger fires startSectionTransition which fades to black, swaps
  // the wave, then fades back in with the player at the left edge.
  const stage = STAGES[currentStage];
  if (waveDelay > 0) {
    waveDelay -= dt;
    if (waveDelay <= 0) {
      // Wave is over. Unlock the section so the player can walk forward.
      sectionUnlocked = true;
    }
  } else if (enemies.length === 0 || enemies.every(e => e.dead)) {
    // Brief pause before unlocking so death animations land.
    waveDelay = 0.8;
  }

  // Detect the player walking past the right-edge trigger when unlocked.
  if (sectionUnlocked && !sectionTransition && player && !player.dead &&
      player.x > SECTION_TRIGGER_X) {
    // Choose what's next.
    const nextWaveIdx = currentWave + 1;
    const hasNextWave = stage && stage.waves[nextWaveIdx];
    const hasBoss = stage && stage.boss && !bossSpawnedFor[currentStage];
    const hasFinal = stage && stage.finalQte;
    if (hasNextWave) {
      sectionUnlocked = false;
      startSectionTransition(() => {
        currentWave = nextWaveIdx;
        enemies = spawnWave(currentStage, currentWave);
        particles = [];
        projectiles = [];
        if (player) { player.x = 120; player.vx = 0; player.knockX = 0; }
      });
    } else if (hasBoss) {
      sectionUnlocked = false;
      startSectionTransition(() => {
        if (player) { player.x = 120; player.vx = 0; player.knockX = 0; }
        beginBossIntro(stage.boss);
      });
    } else if (hasFinal) {
      sectionUnlocked = false;
      startSectionTransition(() => {
        beginKaneCinematic();
      });
    } else {
      // No more waves and no boss — stage is cleared.
      sectionUnlocked = false;
      beginStageClear();
    }
  }
}

// Per-run boss-spawn flags. Reset on enterPlaying.
let bossSpawnedFor = {};

function beginStageClear() {
  vibrate(40);
  playSfx("stage_clear");
  if (player) {
    player.stagesClearedThisRun++;
    // Update per-stage best combo.
    const prev = save.bestComboPerStage[currentStage] || 0;
    if (player.maxCombo > prev) {
      save.bestComboPerStage[currentStage] = player.maxCombo;
    }
    if (player.maxCombo > save.bestCombo) save.bestCombo = player.maxCombo;
    save.stagesCleared = Math.max(save.stagesCleared, player.stagesClearedThisRun);
    // Mark this stage as cleared so it shows up in stage-select.
    save.stageBests[currentStage] = true;
    // Tutorial flag — first stage 1 clear, never show again.
    if (currentStage === 0) save.tutorialDone = true;
    // Atlas unlocks after clearing 3 stages in any run.
    if (player.stagesClearedThisRun >= 3) save.unlocks.atlas = true;
    // Achievement triggers on stage clear.
    if (currentStage === 0) {
      unlockAchievement("first_stage");
      if (player.damageTaken === 0) unlockAchievement("no_damage_block");
    }
    // Stage-flag achievement triggers.
    if (!player.dodgeUsedThisStage)  unlockAchievement("no_dodge_all");
    if (!player.specialUsedThisStage) unlockAchievement("no_special_all");
    // Check for all-10-cleared.
    const allCleared = Array.from({length: 10}, (_, i) => i)
                            .every(i => save.stageBests[i]);
    if (allCleared) unlockAchievement("all_stages_clear");
    // Best-time per stage. Lower is better.
    if (player.stageStartTime) {
      const now = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
      const elapsed = now - player.stageStartTime;
      const prevBest = save.bestTimes[currentStage] || Infinity;
      if (elapsed < prevBest) save.bestTimes[currentStage] = elapsed;
    }
    // Reset per-stage flags for the next stage.
    player.dodgeUsedThisStage = false;
    player.specialUsedThisStage = false;
    player.backAtkThisStage = 0;
    saveSave();
  }
  // Show the narrative stage-clear beat instead of the legacy text overlay.
  // The beat's onComplete sets a short stageClearTimer so advanceStage runs
  // right after. If no narrative line is configured, falls back to legacy.
  if (typeof beginStageClearBeat === "function") beginStageClearBeat();
  else {
    const stage = STAGES[currentStage];
    stageClearMessage = stage ? "STAGE CLEAR — " + stage.name : "STAGE CLEAR";
    stageClearTimer = 2.4;
  }
}

function advanceStage() {
  currentStage++;
  currentWave = 0;
  waveDelay = 0;
  stageClearMessage = "";
  enemies = [];
  particles = [];
  projectiles = [];
  sectionUnlocked = false;
  sectionTransition = null;
  if (currentStage >= STAGES.length) {
    // End of currently-built stages. Phase 4.1 extends to 10.
    finalizeRun(true);
    setState("victory");
    return;
  }
  // Swap music to the new stage's theme.
  if (typeof startMusic === "function") startMusic(themeForStage(currentStage));
  // Stage intro beat: per-character line about the new location. Skippable.
  if (typeof beginStageIntroBeat === "function") beginStageIntroBeat();
  // Reset hazard timers so they don't fire instantly on a fresh stage.
  taxiState.car = null; taxiState.warnTimer = 0; taxiState.spawnTimer = 6;
  trainState.car = null; trainState.warnTimer = 0; trainState.spawnTimer = 5;
  fallingState.drops.length = 0; fallingState.spawnTimer = 2.5;
  spikesState.phase = 0;
  windState.phase = 0; windState.dir = 1;
  freewayCars.length = 0; freewayCarSpawnTimer = 0;
  enemies = spawnWave(currentStage, 0);
  if (player) {
    player.x = 120;
    player.y = 300;
    player.vx = 0; player.vy = 0;
    player.stageStartTime = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  }
}

// Compute the run's final score, update char-specific high score, persist.
function finalizeRun(victorious) {
  if (!player) return;
  const score = (player.damageDealt | 0)
              + player.maxCombo * 50
              + player.parryPerfectCount * 25
              + player.parryGoodCount * 10
              + player.stagesClearedThisRun * 1000
              + (victorious ? 5000 : 0);
  player.score = score;
  if (score > (save.highScores[player.char] || 0)) {
    save.highScores[player.char] = score;
  }
  save.runs++;
  if (victorious) {
    // Per-character victory achievement + cross-character tracking.
    save.charsVictorious[player.char] = true;
    if (player.char === "rio")   unlockAchievement("rio_run");
    if (player.char === "duke")  unlockAchievement("duke_run");
    if (player.char === "atlas") unlockAchievement("atlas_run");
    // All three completed?
    if (save.charsVictorious.rio && save.charsVictorious.duke && save.charsVictorious.atlas) {
      unlockAchievement("all_chars_clear");
    }
    // Brutal-clear achievement.
    if (save.settings.difficulty === "brutal") unlockAchievement("brutal_clear");
  }
  saveSave();
}

function applyStageHazards(dt) {
  const stage = STAGES[currentStage];
  if (!stage || !stage.hazard || !player || player.dead) return;
  if (stage.hazard === "water") {
    if (player.y >= RIVER_WATER_TOP - 2 && player.iframes <= 0 && !player.dodging) {
      player.y = RIVER_WATER_TOP - 4;
      applyHit(player, {
        cx: player.x, cy: player.y,
        hw: 6, hd: 6, damage: 4, knockback: 40, hitstop: 2,
        hits: new Set(),
      }, null);
      spawnSparkle(player.x, RIVER_WATER_TOP);
    }
  } else if (stage.hazard === "molten") {
    // Stepping past STAGE_TOP into the back lane near the molten line burns.
    if (player.y <= STAGE_TOP + 6 && player.iframes <= 0 && !player.dodging) {
      player.y = STAGE_TOP + 8;
      applyHit(player, {
        cx: player.x, cy: player.y,
        hw: 6, hd: 6, damage: 5, knockback: 60, hitstop: 2,
        hits: new Set(),
      }, null);
      // Ember particles.
      for (let i = 0; i < 3; i++) {
        const ang = -Math.PI / 2 + (Math.random() - 0.5) * 1.5;
        particles.push({
          kind: "petal", x: player.x, y: STAGE_TOP - 2,
          vx: Math.cos(ang) * 40, vy: Math.sin(ang) * 60,
          life: 0, max: 0.4,
          core: "rgba(255,200,90,1)", edge: "rgba(255,80,30,0.9)",
        });
      }
    }
  } else if (stage.hazard === "cars") {
    updateFreewayHazard(dt);
  } else if (stage.hazard === "taxi") {
    updateTaxiHazard(dt);
  } else if (stage.hazard === "train") {
    updateTrainHazard(dt);
  } else if (stage.hazard === "lanterns") {
    updateFallingHazard(dt, "lantern");
  } else if (stage.hazard === "glass") {
    updateFallingHazard(dt, "glass");
  } else if (stage.hazard === "spikes") {
    updateSpikesHazard(dt);
  } else if (stage.hazard === "wind") {
    updateWindHazard(dt);
  }
}

// ---------- Stage 1 hazard: a single taxi sweeps the curb strip ----------
// The block has a road at the bottom edge. Every ~10 seconds a car blasts
// past on the curb. Damages the player only if they're on the lowest sliver
// of the play area. Telegraphed by headlights flashing 1 second ahead.
let taxiState = { car: null, warnTimer: 0, spawnTimer: 8 };
function updateTaxiHazard(dt) {
  taxiState.spawnTimer -= dt;
  if (taxiState.spawnTimer <= 0 && !taxiState.car && taxiState.warnTimer <= 0) {
    taxiState.warnTimer = 1.0;   // 1s warning
    taxiState.spawnDir = Math.random() < 0.5 ? 1 : -1;
  }
  if (taxiState.warnTimer > 0) {
    taxiState.warnTimer -= dt;
    if (taxiState.warnTimer <= 0) {
      taxiState.car = {
        x: taxiState.spawnDir > 0 ? -80 : W + 80,
        y: STAGE_BOT + 6,
        vx: taxiState.spawnDir * 360,
        dir: taxiState.spawnDir,
        color: ["#cfa040", "#a83040", "#3a4a64"][Math.floor(Math.random() * 3)],
      };
      taxiState.spawnTimer = 9 + Math.random() * 6;
    }
  }
  if (taxiState.car) {
    const c = taxiState.car;
    const wasAlive = !c.scored;
    c.x += c.vx * dt;
    if (c.x < -160 || c.x > W + 160) {
      // Taxi just left the screen without hitting the player. If the
      // player was in the curb zone but dodged/iframed it, count it.
      if (wasAlive && taxiState.nearMiss) {
        c.scored = true;
        player.taxiDodgesThisRun = (player.taxiDodgesThisRun || 0) + 1;
        if (player.taxiDodgesThisRun >= 3) unlockAchievement("dodge_taxi");
        taxiState.nearMiss = false;
      }
      taxiState.car = null; return;
    }
    // Track near-miss: player was in the curb lane AND had iframes/dodge.
    if (player && !player.dead && Math.abs(player.x - (c.x + 30)) < 50 &&
        player.y > STAGE_BOT - 8 && (player.iframes > 0 || player.dodging)) {
      taxiState.nearMiss = true;
    }
    // Hit if player is at the curb edge.
    if (player && !player.dead && player.iframes <= 0 && !player.dodging &&
        player.y > STAGE_BOT - 8) {
      if (Math.abs(player.x - (c.x + 30)) < 32) {
        applyHit(player, {
          cx: c.x + 30, cy: c.y,
          hw: 30, hd: 8, damage: 16, knockback: 220, hitstop: 7,
          hits: new Set(),
        }, null);
        shakeFrames = Math.max(shakeFrames, 12);
      }
    }
  }
}

// ---------- Stage 2 hazard: a subway train roars through the middle lane ----
// Heavy telegraph (rumble particles + warning honk SFX) for ~1.5s before the
// train passes through. Hits anyone in the middle lane.
let trainState = { car: null, warnTimer: 0, spawnTimer: 7 };
function updateTrainHazard(dt) {
  trainState.spawnTimer -= dt;
  if (trainState.spawnTimer <= 0 && !trainState.car && trainState.warnTimer <= 0) {
    trainState.warnTimer = 1.4;
    trainState.spawnDir = Math.random() < 0.5 ? 1 : -1;
    if (audioCtx) playSfx("menu_select");   // approximation of warning honk
  }
  if (trainState.warnTimer > 0) {
    trainState.warnTimer -= dt;
    // Rumble particles + small shake during warning.
    if (Math.random() < 0.35) {
      spawnSpark((Math.random() * W), STAGE_TOP + 30 + Math.random() * 30, "#3a4050");
    }
    if (shakeFrames < 2) shakeFrames = 2;
    if (trainState.warnTimer <= 0) {
      trainState.car = {
        x: trainState.spawnDir > 0 ? -200 : W + 200,
        y: (STAGE_TOP + STAGE_BOT) / 2 - 6,
        vx: trainState.spawnDir * 540,
        dir: trainState.spawnDir,
      };
      trainState.spawnTimer = 8 + Math.random() * 5;
    }
  }
  if (trainState.car) {
    const c = trainState.car;
    c.x += c.vx * dt;
    if (c.x < -260 || c.x > W + 260) {
      // Train cleared without hitting anyone. Award dodge achievement.
      if (player && !player.dead && !trainState.hitThisPass) {
        unlockAchievement("dodge_train");
      }
      trainState.car = null; trainState.hitThisPass = false; return;
    }
    if (player && !player.dead && player.iframes <= 0 && !player.dodging) {
      const inLane = Math.abs(player.y - c.y) < 16;
      const inX = player.x > c.x - 12 && player.x < c.x + 200;
      if (inLane && inX) {
        applyHit(player, {
          cx: player.x, cy: player.y,
          hw: 12, hd: 14, damage: 22, knockback: 260, hitstop: 8,
          hits: new Set(),
        }, null);
        shakeFrames = Math.max(shakeFrames, 14);
        trainState.hitThisPass = true;
      }
    }
    if (shakeFrames < 4) shakeFrames = 4;
  }
}

// ---------- Stage 4 + 6 hazard: falling objects (lanterns / glass) ----------
// Spawns a target shadow on the ground; after 0.8s the object lands at that
// spot dealing damage. Players see the shadow and can move out.
let fallingState = { drops: [], spawnTimer: 2.5 };
function updateFallingHazard(dt, kind) {
  fallingState.spawnTimer -= dt;
  if (fallingState.spawnTimer <= 0) {
    fallingState.spawnTimer = (kind === "glass" ? 1.6 : 2.4) + Math.random() * 1.5;
    fallingState.drops.push({
      kind,
      // Bias spawn near the player so it actually threatens.
      x: player ? clamp(player.x + (Math.random() - 0.5) * 80, STAGE_LEFT_PAD, W - STAGE_RIGHT_PAD) : W / 2,
      y: 0,
      targetY: STAGE_TOP + 30 + Math.random() * (STAGE_BOT - STAGE_TOP - 30),
      warn: 0.85,
      damage: kind === "glass" ? 14 : 12,
    });
  }
  for (let i = fallingState.drops.length - 1; i >= 0; i--) {
    const d = fallingState.drops[i];
    d.warn -= dt;
    if (d.warn > 0) {
      // Telegraph: sparkle on the ground spot.
      if (Math.random() < 0.5) {
        spawnSpark(d.x + (Math.random() - 0.5) * 12, d.targetY,
                   d.kind === "glass" ? "#cfd0e8" : "#e8c04a");
      }
      continue;
    }
    // Hit window: 0.15 second active impact.
    if (d.warn > -0.15) {
      if (player && !player.dead && player.iframes <= 0 && !player.dodging) {
        if (Math.abs(player.x - d.x) < 14 && Math.abs(player.y - d.targetY) < 14) {
          applyHit(player, {
            cx: d.x, cy: d.targetY,
            hw: 14, hd: 14, damage: d.damage, knockback: 120, hitstop: 6,
            hits: new Set(),
          }, null);
        }
      }
      // Burst.
      if (Math.abs(d.warn + 0.0) < 0.05) {
        for (let j = 0; j < 8; j++) {
          spawnSpark(d.x + (Math.random() - 0.5) * 18, d.targetY + (Math.random() - 0.5) * 10,
                     d.kind === "glass" ? "#cfd0e8" : "#ff8a40");
        }
        if (shakeFrames < 4) shakeFrames = 4;
      }
    } else {
      fallingState.drops.splice(i, 1);
    }
  }
}

// ---------- Stage 5 hazard: spike walls pulse on/off near both edges --------
// Both side edges (left and right) get spike strips that extend periodically.
// Touch one while it's extended = damage + knockback inward.
let spikesState = { phase: 0 };
function updateSpikesHazard(dt) {
  spikesState.phase += dt;
  // 2.6s cycle: 1.4s armed, 1.2s safe.
  const armed = (spikesState.phase % 2.6) < 1.4;
  if (!armed) return;
  // Edge zones.
  const leftZone  = STAGE_LEFT_PAD + 24;
  const rightZone = W - STAGE_RIGHT_PAD - 24;
  if (player && !player.dead && player.iframes <= 0 && !player.dodging) {
    if (player.x < leftZone || player.x > rightZone) {
      applyHit(player, {
        cx: player.x, cy: player.y,
        hw: 6, hd: 6, damage: 6, knockback: 140, hitstop: 4,
        hits: new Set(),
      }, null);
    }
  }
}

// ---------- Stage 9 hazard: rooftop wind gusts push everyone horizontally ----
// Wind direction reverses every ~4 seconds. Visible by drifting dust particles.
// Mild force (~30 px/s) — annoying, not lethal.
let windState = { phase: 0, dir: 1 };
function updateWindHazard(dt) {
  windState.phase += dt;
  if (windState.phase > 4) { windState.phase = 0; windState.dir *= -1; }
  const force = 30 * windState.dir;
  if (player && !player.dead && !player.dodging) {
    player.x += force * dt;
    player.x = clamp(player.x, STAGE_LEFT_PAD, W - STAGE_RIGHT_PAD);
  }
  for (const e of enemies) {
    if (!e.dead && !e.airborne) {
      e.x += force * 0.5 * dt;
      e.x = clamp(e.x, STAGE_LEFT_PAD, W - STAGE_RIGHT_PAD);
    }
  }
  // Drifting dust particle once in a while.
  if (Math.random() < 0.4) {
    const py = STAGE_TOP + Math.random() * (STAGE_BOT - STAGE_TOP);
    spawnSpark(windState.dir > 0 ? -4 : W + 4, py, "#9a9a9a");
  }
}

// ---------- Stage hazard renderers ----------
// Called by the per-stage drawBg or right after to draw the active hazard
// world objects (taxi car, train body, falling drops shadow + body, spike strips).
function drawStageHazards() {
  const stage = STAGES[currentStage];
  if (!stage || !stage.hazard) return;
  if (stage.hazard === "taxi" && taxiState.car) {
    const c = taxiState.car;
    // Body.
    X.fillStyle = c.color;
    X.fillRect(c.x, c.y, 60, 12);
    // Windows.
    X.fillStyle = "#0a0a10";
    X.fillRect(c.x + 8, c.y + 2, 10, 6);
    X.fillRect(c.x + 36, c.y + 2, 14, 6);
    // Headlights.
    X.fillStyle = "#fff8c0";
    if (c.dir > 0) X.fillRect(c.x + 56, c.y + 4, 4, 3);
    else           X.fillRect(c.x,       c.y + 4, 4, 3);
    // Wheels.
    X.fillStyle = "#0a0a10";
    X.fillRect(c.x + 8,  c.y + 11, 8, 3);
    X.fillRect(c.x + 44, c.y + 11, 8, 3);
  }
  if (stage.hazard === "taxi" && taxiState.warnTimer > 0) {
    // Headlight beam telegraph: a faint colored stripe at the curb edge.
    const blink = Math.floor(taxiState.warnTimer * 6) & 1;
    if (blink) {
      X.fillStyle = "rgba(255,248,192,0.35)";
      X.fillRect(0, STAGE_BOT + 6, W, 12);
    }
  }
  if (stage.hazard === "train" && trainState.car) {
    const c = trainState.car;
    // Long train body.
    X.fillStyle = "#3a3550";
    X.fillRect(c.x, c.y, 200, 22);
    // Window stripe.
    X.fillStyle = "#7a8aa0";
    for (let wx = c.x + 8; wx < c.x + 200; wx += 24) {
      X.fillRect(wx, c.y + 6, 14, 6);
    }
    // Speedlines.
    X.fillStyle = "rgba(180,200,220,0.4)";
    for (let i = 0; i < 5; i++) {
      X.fillRect(c.x - c.dir * (20 + i * 14), c.y + 4 + i * 4, 12, 1);
    }
  }
  if (stage.hazard === "train" && trainState.warnTimer > 0) {
    // Rumble flicker on the screen edges.
    const blink = Math.floor(trainState.warnTimer * 8) & 1;
    if (blink) {
      X.fillStyle = "rgba(168,48,64,0.20)";
      X.fillRect(0, (STAGE_TOP + STAGE_BOT) / 2 - 18, W, 36);
    }
  }
  if (stage.hazard === "lanterns" || stage.hazard === "glass") {
    for (const d of fallingState.drops) {
      if (d.warn > 0) {
        // Ground shadow telegraph — pulses based on warn timer.
        const t = 1 - d.warn / 0.85;
        const r = 6 + t * 8;
        X.fillStyle = "rgba(0,0,0,0.45)";
        X.beginPath(); X.ellipse(d.x, d.targetY, r, r * 0.4, 0, 0, Math.PI * 2); X.fill();
      } else if (d.warn > -0.15) {
        // Object body during impact frames.
        if (d.kind === "lantern") {
          X.fillStyle = "#a83040";
          X.fillRect(d.x - 5, d.targetY - 8, 10, 12);
          X.fillStyle = "#e8c04a";
          X.fillRect(d.x - 3, d.targetY - 6, 6, 8);
        } else {
          // Glass.
          X.fillStyle = "#cfd0e8";
          X.fillRect(d.x - 4, d.targetY - 4, 8, 8);
          X.fillStyle = "#fff";
          X.fillRect(d.x - 1, d.targetY - 3, 2, 2);
        }
      }
    }
  }
  if (stage.hazard === "spikes") {
    const armed = (spikesState.phase % 2.6) < 1.4;
    const t = (spikesState.phase % 2.6) / 1.4;
    const ext = armed ? Math.min(1, t * 4) : Math.max(0, 1 - (t - 1) * 4);
    if (ext > 0) {
      X.fillStyle = "#7a3030";
      // Left spikes.
      for (let y = STAGE_TOP + 4; y < STAGE_BOT; y += 10) {
        X.beginPath();
        X.moveTo(STAGE_LEFT_PAD - 4,         y);
        X.lineTo(STAGE_LEFT_PAD + 22 * ext,  y + 4);
        X.lineTo(STAGE_LEFT_PAD - 4,         y + 8);
        X.closePath(); X.fill();
      }
      // Right spikes.
      for (let y = STAGE_TOP + 4; y < STAGE_BOT; y += 10) {
        X.beginPath();
        X.moveTo(W - STAGE_RIGHT_PAD + 4,         y);
        X.lineTo(W - STAGE_RIGHT_PAD - 22 * ext,  y + 4);
        X.lineTo(W - STAGE_RIGHT_PAD + 4,         y + 8);
        X.closePath(); X.fill();
      }
    }
  }
  if (stage.hazard === "wind") {
    // Indicator at top: arrow showing wind direction this cycle.
    const arrowDir = windState.dir;
    X.fillStyle = "rgba(168,180,200,0.55)";
    X.font = "bold 14px ui-monospace, monospace";
    X.textAlign = "left";
    X.textBaseline = "top";
    X.fillText(arrowDir > 0 ? "→ WIND →" : "← WIND ←", W / 2 - 36, 6);
  }
}

// FREEWAY hazard: cars pulse across the play strip. Spawns from off-screen at
// random intervals; collides with the player as a heavy hit; despawns past
// the far edge.
let freewayCarSpawnTimer = 0;
function updateFreewayHazard(dt) {
  freewayCarSpawnTimer -= dt;
  if (freewayCarSpawnTimer <= 0) {
    freewayCarSpawnTimer = 1.6 + Math.random() * 1.6;
    const dir = Math.random() < 0.5 ? 1 : -1;
    const lane = STAGE_TOP + 6 + Math.floor(Math.random() * 3) * 26;
    const colors = ["#a83040", "#3a4060", "#7a3030", "#cfa040", "#3a6b66"];
    freewayCars.push({
      x: dir > 0 ? -64 : W + 8,
      y: lane,
      vx: dir * (180 + Math.random() * 60),
      dir,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
  for (let i = freewayCars.length - 1; i >= 0; i--) {
    const c = freewayCars[i];
    c.x += c.vx * dt;
    if (c.x < -120 || c.x > W + 120) { freewayCars.splice(i, 1); continue; }
    // Collision with player.
    if (player && !player.dead && player.iframes <= 0 && !player.dodging) {
      if (player.x > c.x - 4 && player.x < c.x + 60 &&
          Math.abs(player.y - (c.y + 7)) < 14) {
        applyHit(player, {
          cx: c.x + 28, cy: c.y + 7,
          hw: 28, hd: 7, damage: 18, knockback: 200, hitstop: 7,
          hits: new Set(),
        }, null);
        shakeFrames = Math.max(shakeFrames, 12);
        shakeMag    = Math.max(shakeMag, 5);
      }
    }
  }
}

  X.font = "10px ui-monospace, monospace";

  X.textBaseline = "middle";

    "playing as       " + (player.char || "rio").toUpperCase(),
    "difficulty       " + (save.settings.difficulty || "normal").toUpperCase(),
    "score            " + player.score,
    "max combo        " + player.maxCombo,

// Tutorial overlay state — tracks lifetime + dismissed flag for this session.
let tutorialDismissed = false;
let tutorialStart = 0;

function drawTutorialOverlay() {
  // Initialize timer on first call.
  if (tutorialStart === 0) tutorialStart = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  const now = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  const elapsed = now - tutorialStart;
  // Dismiss after 16 seconds OR after the player lands at least one hit.
  if (elapsed > 16 || (player && player.damageDealt > 0)) {
    tutorialDismissed = true;
  }
  if (tutorialDismissed) return;

  // Soft fade-in over first 0.4s, fade-out over last 0.5s.
  const fadeIn = Math.min(1, elapsed / 0.4);
  const fadeOut = Math.min(1, (16 - elapsed) / 0.5);
  const a = Math.min(fadeIn, fadeOut);

  // Tips list — cycles through the controls. Each tip stays visible ~2.5s.
  const tips = [
    { key: "WASD or ←↑↓→",       label: "MOVE  (double-tap to RUN)" },
    { key: "SPACE",               label: "JUMP   (DOWN+SPACE to DODGE)" },
    { key: "J or F",              label: "LIGHT ATTACK  (chain three for combo)" },
    { key: "K or G",              label: "HEAVY  (launches enemies — followup mid-air)" },
    { key: "I or E",              label: "PARRY  (tap right before a hit lands)" },
    { key: "L or R",              label: "SPECIAL  (costs HP — Rio's Sunset Spin / Duke's Rolling Thunder / Atlas's Foundation Stone)" },
    { key: "U or Q",              label: "GRAB  (then J/F to throw)" },
    { key: "P",                   label: "PAUSE  (also: difficulty, audio, accessibility)" },
  ];
  const tipsPerCycle = tips.length;
  const cycleDur = 14;   // total before fade-out
  const slot = Math.min(tipsPerCycle - 1, Math.floor((elapsed / cycleDur) * tipsPerCycle));
  const tip = tips[slot];

  // Panel.
  const panelW = 460, panelH = 38, panelX = (W - panelW) / 2, panelY = 64;
  X.globalAlpha = a * 0.9;
  X.fillStyle = "rgba(0,0,0,0.75)";
  X.fillRect(panelX, panelY, panelW, panelH);
  X.fillStyle = "#e8c04a";
  X.fillRect(panelX, panelY, panelW, 2);
  X.fillRect(panelX, panelY + panelH - 2, panelW, 2);
  // Key cap.
  const keyTxt = tip.key;
  X.fillStyle = "#e8c04a";
  X.font = "bold 12px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "middle";
  X.fillText(keyTxt, panelX + 12, panelY + panelH / 2);
  // Label.
  X.fillStyle = "#fff";
  X.font = "bold 11px ui-monospace, monospace";
  X.fillText(tip.label, panelX + 12 + keyTxt.length * 8 + 16, panelY + panelH / 2);
  // Title strip above.
  X.font = "bold 9px ui-monospace, monospace";
  X.fillStyle = "rgba(232,192,74," + a.toFixed(2) + ")";
  X.textAlign = "center";
  X.fillText("CONTROLS — LAND A HIT TO DISMISS", W / 2, panelY - 6);
  // Progress dots below.
  const dotY = panelY + panelH + 4;
  for (let i = 0; i < tipsPerCycle; i++) {
    X.fillStyle = i === slot ? "#e8c04a" : "rgba(170,170,170,0.55)";
    X.fillRect(W / 2 - tipsPerCycle * 3 + i * 6, dotY, 4, 2);
  }
  X.globalAlpha = 1;
}

function renderPlaying() {
  // Screen shake — translate the world layer (not the HUD) by a damped jitter.
  let shakeX = 0, shakeY = 0;
  if (shakeFrames > 0) {
    const t = shakeFrames;
    shakeX = (Math.sin(t * 13.1) * shakeMag) | 0;
    shakeY = (Math.cos(t * 11.7) * shakeMag * 0.6) | 0;
  }
  if (shakeX || shakeY) X.translate(shakeX, shakeY);

  drawCurrentStage();
  // Depth-sort: deeper (lower world Y) renders first so closer entities cover them.
  const drawables = [];
  if (player) drawables.push({ y: player.y, draw: () => drawCharacter(player) });
  for (const e of enemies) drawables.push({ y: e.y, draw: () => drawEnemy(e) });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();
  drawProjectiles();
  drawParticles();
  if (DEV && debugEl.classList.contains("on")) drawDebugBoxes();

  if (shakeX || shakeY) X.translate(-shakeX, -shakeY);

  // Screen flash sits behind HUD so HUD stays readable through the brightest moment.
  if (flashFrames > 0) {
    const a = Math.min(0.85, flashFrames / 5);
    X.fillStyle = "rgba(255,255,255," + a.toFixed(2) + ")";
    X.fillRect(0, 0, W, H);
  }

  drawHUD();

  // Tutorial overlay — first run only, stage 1, dismisses on first attack
  // landed or after 14 seconds. Stays out of the way at the top center.
  if (!save.tutorialDone && currentStage === 0 && player && !player.dead) {
    drawTutorialOverlay();
  }

  // GO arrow — when the section is unlocked, point the player toward the
  // right edge. Pulses to draw the eye.
  if (sectionUnlocked && !sectionTransition && player && !player.dead) {
    const t = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
    const pulse = 0.55 + 0.45 * Math.sin(t * 4);
    const arrowX = W - 32 + Math.sin(t * 6) * 3;
    const arrowY = (STAGE_TOP + STAGE_BOT) / 2;
    X.fillStyle = "rgba(0,0,0,0.55)";
    X.fillRect(arrowX - 22, arrowY - 12, 30, 24);
    X.fillStyle = "rgba(232,192,74," + pulse.toFixed(2) + ")";
    // Arrow chevron pointing right.
    for (let i = 0; i < 10; i++) {
      X.fillRect(arrowX - i, arrowY - 8 + i, 2, 1);
      X.fillRect(arrowX - i, arrowY + 8 - i, 2, 1);
    }
    X.fillStyle = "rgba(232,192,74," + pulse.toFixed(2) + ")";
    X.font = "bold 9px ui-monospace, monospace";
    X.textAlign = "center";
    X.textBaseline = "top";
    X.fillText("GO →", arrowX - 8, arrowY + 14);
  }

  // NPC chatter overlay — stage barks from offscreen.
  drawChatter();
  // Achievement popup overlay — appears top-right when one unlocks.
  drawAchievementPopup();

  // Section-transition fade overlay (outside of stage-clear timer).
  renderSectionTransition();

  // Stage clear / interlude overlay.
  if (stageClearTimer > 0 && stageClearMessage) {
    const pop = Math.min(1, (2.4 - stageClearTimer) * 4);
    const fade = Math.min(1, stageClearTimer / 0.6);
    X.fillStyle = "rgba(0,0,0," + (0.55 * fade).toFixed(2) + ")";
    X.fillRect(0, H/2 - 26, W, 52);
    X.fillStyle = "rgba(232,192,74," + fade.toFixed(2) + ")";
    X.font = "bold " + Math.round(22 * pop) + "px ui-monospace, monospace";
    X.textAlign = "center";
    X.textBaseline = "middle";
    X.fillText(stageClearMessage, W / 2, H / 2);
  }

  // Stage label badge in top-right.
  const stage = STAGES[currentStage];
  if (stage) {
    X.fillStyle = "rgba(0,0,0,0.55)";
    X.fillRect(W - 132, 24, 124, 14);
    X.fillStyle = "#888";
    X.font = "bold 8px ui-monospace, monospace";
    X.textAlign = "left";
    X.textBaseline = "top";
    X.fillText("STAGE " + (currentStage + 1) + " — " + stage.name, W - 128, 27);
  }

  X.fillStyle = "#888";
  X.font = "9px ui-monospace, monospace";
  X.textAlign = "right";
  X.textBaseline = "top";
  X.fillText("ESC : title", W - 6, 4);
}

// ---------- Boot ----------
requestAnimationFrame((t) => { last = t / 1000; frame(t); });
</script>
</body>
</html>
