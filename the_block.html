<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>THE BLOCK</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    color: #ddd;
    font-family: ui-monospace, "Menlo", "Consolas", monospace;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    -ms-interpolation-mode: nearest-neighbor;
  }
  #debug {
    position: fixed;
    top: 6px;
    left: 8px;
    font-size: 11px;
    color: #6f6;
    text-shadow: 1px 1px 0 #000;
    pointer-events: none;
    white-space: pre;
    display: none;
  }
  #debug.on { display: block; }
  #orient {
    position: fixed;
    inset: 0;
    background: #000;
    color: #ddd;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    font-size: 14px;
    z-index: 10;
  }
  #orient.on { display: flex; }
</style>
</head>
<body>
  <div id="wrap"><canvas id="c" width="640" height="360"></canvas></div>
  <div id="debug"></div>
  <div id="orient">Rotate your device to landscape.</div>
<script>
"use strict";

// ---------- Build flags ----------
const DEV = true;

// ---------- Canvas / context ----------
const W = 640;
const H = 360;
const C = document.getElementById("c");
/** Global render context; named X per project convention. */
let X = C.getContext("2d", { alpha: false });
X.imageSmoothingEnabled = false;

// ---------- State machine ----------
// title | select | intro | playing | gameover | victory | credits | interlude | bonus
let STATE = "title";
let stateTime = 0;

function setState(next) {
  STATE = next;
  stateTime = 0;
}

// ---------- Input ----------
const keys = Object.create(null);
const keysPressed = Object.create(null); // edge-triggered, cleared each frame after consumption

function keyName(e) {
  // Normalize a few common ones; KeyboardEvent.code is layout-independent.
  return e.code || e.key;
}

window.addEventListener("keydown", (e) => {
  const k = keyName(e);
  if (!keys[k]) keysPressed[k] = true;
  keys[k] = true;
  if (k === "F3") { toggleDebug(); e.preventDefault(); return; }
  if (k === "Tab" || k === "F5") return; // let browser handle reload, etc.
  // Prevent page scroll on game keys
  if (k === "Space" || k.startsWith("Arrow")) e.preventDefault();
});

window.addEventListener("keyup", (e) => {
  keys[keyName(e)] = false;
});

window.addEventListener("blur", () => {
  for (const k in keys) keys[k] = false;
});

function consumePress(k) {
  if (keysPressed[k]) { keysPressed[k] = false; return true; }
  return false;
}

// ---------- Action bindings ----------
// WASD / arrows for movement; right-hand row JKLU for combat; I = parry.
const KEY = {
  left:    ["KeyA", "ArrowLeft"],
  right:   ["KeyD", "ArrowRight"],
  up:      ["KeyW", "ArrowUp"],
  down:    ["KeyS", "ArrowDown"],
  jump:    ["Space"],
  light:   ["KeyJ"],
  heavy:   ["KeyK"],
  special: ["KeyL"],
  grab:    ["KeyU"],
  parry:   ["KeyI"],
};

function actionHeld(a) {
  const ks = KEY[a];
  for (let i = 0; i < ks.length; i++) if (keys[ks[i]]) return true;
  return false;
}
function actionPressed(a) {
  const ks = KEY[a];
  for (let i = 0; i < ks.length; i++) if (consumePress(ks[i])) return true;
  return false;
}

// Double-tap → run, tracked per side.
let lastTapLeft = -999;
let lastTapRight = -999;
const DOUBLE_TAP_WINDOW = 0.28;

// ---------- Pause / visibility ----------
let paused = false;
document.addEventListener("visibilitychange", () => {
  paused = document.hidden;
});

// ---------- Resize / scale ----------
let scale = 1;
let isMobile = (typeof matchMedia === "function") &&
               matchMedia("(pointer: coarse)").matches;

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const sx = vw / W;
  const sy = vh / H;
  let s = Math.min(sx, sy);
  if (!isMobile) s = Math.max(1, Math.floor(s)); // integer scale on desktop
  scale = s;
  C.style.width = (W * s) + "px";
  C.style.height = (H * s) + "px";
  // After CSS resize, re-disable smoothing on the (still-640x360) backing buffer.
  X.imageSmoothingEnabled = false;
  // Orientation guard on mobile only.
  const orient = document.getElementById("orient");
  if (isMobile && vw < vh) orient.classList.add("on");
  else orient.classList.remove("on");
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", resize);
resize();

// ---------- Debug overlay ----------
const debugEl = document.getElementById("debug");
function toggleDebug() {
  if (!DEV) return;
  debugEl.classList.toggle("on");
}
let fps = 0;
let fpsAccum = 0;
let fpsFrames = 0;

function entityCount() {
  return (player ? 1 : 0) + enemies.length + particles.length;
}

// ---------- Stage geometry (2.5D plane) ----------
// World X is horizontal screen pixels. World Y is depth (also pixels — lower y = back).
// Z is jump height; screen Y of a feet-anchored sprite is (worldY - z).
const STAGE_TOP = 232;     // back of play strip
const STAGE_BOT = 340;     // front of play strip
const STAGE_LEFT_PAD = 12; // sprite half-width clamp
const STAGE_RIGHT_PAD = 12;
const GRAVITY = 620;       // px / s^2

// ---------- Frame-data driven attacks ----------
// Frames are 60Hz fixed-step ticks. Hitboxes are world-space:
//   fwd  forward distance from attacker center along facing
//   hw   half-width on world X (horizontal)
//   hd   half-depth on world Y (depth axis)
//   lo,hi  vertical Z range above ground (for jump-over)
// chainLight / chainHeavy : name of follow-up attack on respective input
// launcher : sets victim's vz on hit (juggle-able)
// pushSelf : forward velocity (px/s) the attacker carries while active
// airOnly  : usable only while z > 0
const ATTACK_DATA = {
  // --- Rio: boxer-trained, fast 3-hit combo + heavy uppercut launcher ---
  // Depth tolerance (hd) is intentionally generous — beat-em-ups auto-forgive depth
  // alignment. Tight hd makes the genre feel finicky.
  rio_atk1: {
    startup: 4, active: 3, recovery: 9,
    damage: 5, knockback: 80, hitstop: 4,
    hit: { fwd: 18, hw: 11, hd: 12, lo: 0, hi: 36 },
    chainLight: "atk2", chainHeavy: "heavy",
  },
  rio_atk2: {
    startup: 5, active: 4, recovery: 11,
    damage: 7, knockback: 95, hitstop: 5,
    hit: { fwd: 20, hw: 12, hd: 13, lo: 0, hi: 36 },
    chainLight: "atk3", chainHeavy: "heavy",
    pushSelf: 30,
  },
  rio_atk3: {
    startup: 7, active: 5, recovery: 18,
    damage: 11, knockback: 160, hitstop: 7,
    hit: { fwd: 22, hw: 13, hd: 14, lo: 0, hi: 40 },
    pushSelf: 40,
  },
  rio_heavy: {
    startup: 9, active: 4, recovery: 22,
    damage: 13, knockback: 50, hitstop: 8,
    hit: { fwd: 12, hw: 11, hd: 14, lo: 0, hi: 52 },
    launcher: 220,
  },
  rio_jump_atk: {
    startup: 3, active: 8, recovery: 6,
    damage: 9, knockback: 90, hitstop: 5,
    hit: { fwd: 12, hw: 12, hd: 12, lo: 0, hi: 60 },
    airOnly: true,
  },
  // Back attack — elbow strike behind, fired by light + back-direction held.
  rio_back_atk: {
    startup: 3, active: 3, recovery: 8,
    damage: 6, knockback: 100, hitstop: 5,
    // Negative fwd = the hitbox sits BEHIND the attacker (relative to facing).
    hit: { fwd: -14, hw: 11, hd: 12, lo: 0, hi: 36 },
    backwardHit: true,
  },
  // Sunset Spin — Rio's signature special. Multi-hit AOE around her culminating
  // in a rising double-fist uppercut. Costs HP per spec.
  rio_special: {
    startup: 5, active: 18, recovery: 14,
    damage: 6, knockback: 110, hitstop: 5,
    hit: { fwd: 0, hw: 22, hd: 16, lo: 0, hi: 56 },
    multiHit: 5,        // re-hit each target every 5 frames during active
    hpCost: 10,
    signature: "sunset_spin",
    finalLauncher: 200, // last hit (frame >= startup+active-3) launches
  },
  // Throw — runs when player completes a grab and presses direction + light.
  // Damage applies to the grabbed target only (resolveThrow handles it).
  rio_throw: {
    startup: 4, active: 1, recovery: 12,
    damage: 14, knockback: 240, hitstop: 8,
    hit: { fwd: 16, hw: 14, hd: 14, lo: 0, hi: 50 },
    launcher: 80,
    isThrow: true,
  },
  // Free counter-special when parry meter is full. Same shape across characters
  // so the meter UI is universal; per-character flavor lives in renderers.
  rio_counter: {
    startup: 3, active: 6, recovery: 14,
    damage: 22, knockback: 200, hitstop: 10,
    hit: { fwd: 24, hw: 18, hd: 16, lo: 0, hi: 60 },
    launcher: 140,
    counterSpecial: true,
  },
};

// ---------- Parry tuning (12-frame window, 18-frame cooldown) ----------
const PARRY_ACTIVE   = 12;        // frames the parry window stays open
const PARRY_TOTAL    = 30;        // active + 18-frame cooldown
const PARRY_PERFECT  = 3;         // frames 1-3
const PARRY_GOOD     = 7;         // frames 4-7
// frames 8-12 = LATE
const PARRY_CHAIN_S  = 1.5;       // seconds chain stays alive
const PARRY_HEAL_HP  = 3;         // perfect-parry heal at chain >= 2
const PARRY_PERFECT_BONUS = 1.75; // counter damage multiplier
const PARRY_PERFECT_HITSTOP = 14; // extended hitstop reads as slow-mo

// ---------- Player ----------
let player = null;

function makePlayer(charKey, x, y) {
  return {
    char: charKey,
    x, y, z: 0,
    vx: 0, vy: 0, vz: 0,
    facing: 1,
    animState: "idle",
    animTime: 0,
    running: false,
    walkSpeed: 78,   // Rio: speed 5 of 5 in stat tier
    runSpeed: 148,
    jumpVel: 210,
    attacking: false,
    attackName: null,
    attackFrame: 0,
    hp: 100, hpMax: 100,
    iframes: 0,
    hitstun: 0,
    knockX: 0, knockY: 0,
    dead: false,
    dodging: false,
    dodgeFrame: 0,
    comboHits: 0,         // hits landed within the current combo window (HUD)
    comboTimer: 0,        // seconds remaining before combo resets
    parryFrame: 0,        // 1-12 active window, 13-30 cooldown, 0 = idle
    parryChain: 0,        // consecutive successful parries
    parryChainTimer: 0,   // seconds remaining in chain window
    parryMeter: 0,        // 0-100 — at 100, next ATK fires free counter-special
    grabbing: null,       // enemy currently held in grab
    grabFrames: 0,        // frames since grab started; 0 = not grabbing
    hurtboxes: [],
    hitboxes: [],
    attackHits: null,     // Set of victims hit by the current attack (no double-hit)
  };
}

// Closest enemy within grab range (24 px) on the side we're facing.
function findGrabTarget(p) {
  let best = null, bestDist = 24;
  for (const e of enemies) {
    if (e.dead || e.airborne || e.grabbedBy) continue;
    const dx = e.x - p.x;
    if (Math.sign(dx || p.facing) !== p.facing) continue;
    const d = Math.hypot(dx, e.y - p.y);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  return best;
}

function startAttack(p, name) {
  p.attacking = true;
  p.attackName = name;
  p.attackFrame = 0;
  p.vx = 0; p.vy = 0;
  p.hitboxes.length = 0;
  p.attackHits = new Set();
}

function startDodge(p) {
  p.dodging = true;
  p.dodgeFrame = 0;
  p.iframes = 14;
  p.attacking = false;
  p.attackName = null;
  p.hitboxes.length = 0;
  p.vx = -p.facing * 220;
  p.vy = 0;
  p.animState = "dodge";
  p.animTime = 0;
}

function advanceAttack(p) {
  const d = ATTACK_DATA[p.char + "_" + p.attackName];
  if (!d) { p.attacking = false; p.attackName = null; return; }
  const total = d.startup + d.active + d.recovery;
  if (p.attackFrame > d.startup && p.attackFrame <= d.startup + d.active) {
    const h = d.hit;
    if (p.hitboxes.length === 0) {
      p.hitboxes.push({
        cx: 0, cy: 0,
        hw: h.hw, hd: h.hd, lo: h.lo, hi: h.hi,
        damage: d.damage,
        knockback: d.knockback,
        hitstop: d.hitstop,
        launcher: d.launcher || 0,
        multiHit: d.multiHit || 0,
        lastHits: d.multiHit ? new Map() : null,
        facing: p.facing,
        owner: p,
        hits: p.attackHits,
        backwardHit: d.backwardHit || false,
      });
    }
    const hb = p.hitboxes[0];
    hb.cx = p.x + p.facing * h.fwd;
    hb.cy = p.y;
    hb.facing = p.facing;
    // Final-frames launcher upgrade for moves that pop the victim only on the
    // last beat of a multi-hit string (Sunset Spin's uppercut).
    if (d.finalLauncher && p.attackFrame > d.startup + d.active - 3) {
      hb.launcher = d.finalLauncher;
    }
    if (d.pushSelf && p.z <= 0) p.x += p.facing * d.pushSelf * STEP;
  } else {
    p.hitboxes.length = 0;
  }
  if (p.attackFrame >= total) {
    p.attacking = false;
    p.attackName = null;
    p.hitboxes.length = 0;
    p.attackHits = null;
  }
}

function updatePlayer(p, dt) {
  if (p.iframes > 0) p.iframes--;

  // Hitstun: knocked-back movement, no input, no attack progress.
  if (p.hitstun > 0) {
    p.hitstun--;
    p.x += p.knockX * dt;
    p.y += p.knockY * dt;
    p.knockX *= 0.82; p.knockY *= 0.82;
    if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
    if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
    if (p.y < STAGE_TOP) p.y = STAGE_TOP;
    if (p.y > STAGE_BOT) p.y = STAGE_BOT;
    p.animState = "hurt";
    p.animTime += dt;
    p.hitboxes.length = 0;
    p.hurtboxes.length = 0;
    p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
    return;
  }

  const grounded = p.z <= 0;
  // Capture pre-movement facing for back-attack detection. Movement input
  // can flip facing this same tick (left held while facing right), so the
  // back-direction check must use the facing BEFORE that flip.
  const facingBeforeInput = p.facing;

  // Combo-window timer ticks down whenever no fresh hit lands this frame.
  if (p.comboTimer > 0) {
    p.comboTimer -= dt;
    if (p.comboTimer <= 0) { p.comboTimer = 0; p.comboHits = 0; }
  }

  // Parry: tick frame counter through the active window then the 18f cooldown.
  if (p.parryFrame > 0) {
    p.parryFrame++;
    if (p.parryFrame > PARRY_TOTAL) p.parryFrame = 0;
  }

  // Parry chain timeout: if no fresh parry within 1.5s, retain 60% meter.
  if (p.parryChainTimer > 0) {
    p.parryChainTimer -= dt;
    if (p.parryChainTimer <= 0) {
      p.parryChainTimer = 0;
      p.parryChain = 0;
      p.parryMeter = Math.floor(p.parryMeter * 0.6);
    }
  }

  // Counter-special at full meter: intercepts the next light/heavy press.
  if (p.parryMeter >= 100 && grounded && !p.attacking) {
    if (actionPressed("light") || actionPressed("heavy")) {
      startAttack(p, "counter");
      p.parryMeter = 0;
      p.parryChain = 0;
      p.parryChainTimer = 0;
      flashFrames = Math.max(flashFrames, 4);
    }
  }

  // Parry input — independent of attacks. Gated by hitstun, dodge, in-progress
  // parry/cooldown, and grounded state.
  if (grounded && !p.attacking && !p.dodging && p.parryFrame === 0) {
    if (actionPressed("parry")) {
      p.parryFrame = 1;
    }
  }

  // Dodge: locks input and motion to a backward slide with iframes.
  if (p.dodging) {
    p.dodgeFrame++;
    p.x += p.vx * dt;
    p.vx *= 0.85;
    p.animState = "dodge";
    p.animTime += dt;
    if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
    if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
    p.hitboxes.length = 0;
    p.hurtboxes.length = 0;
    p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
    if (p.dodgeFrame >= 14) p.dodging = false;
    return;
  }

  const locked = p.attacking && grounded;

  // Movement input (suppressed during grounded attack lock).
  let ix = 0, iy = 0;
  if (!locked) {
    if (actionHeld("left"))  ix -= 1;
    if (actionHeld("right")) ix += 1;
    if (actionHeld("up"))    iy -= 1;
    if (actionHeld("down"))  iy += 1;
  }

  // Double-tap → run; releasing direction stops it.
  if (actionPressed("left")) {
    if (stateTime - lastTapLeft < DOUBLE_TAP_WINDOW) p.running = true;
    lastTapLeft = stateTime;
  }
  if (actionPressed("right")) {
    if (stateTime - lastTapRight < DOUBLE_TAP_WINDOW) p.running = true;
    lastTapRight = stateTime;
  }
  if (ix === 0) p.running = false;

  if (!locked) {
    if (ix !== 0 || iy !== 0) {
      const mag = Math.hypot(ix, iy) || 1;
      const speed = p.running ? p.runSpeed : p.walkSpeed;
      p.vx = (ix / mag) * speed;
      p.vy = (iy / mag) * speed;
      if (ix !== 0) p.facing = ix > 0 ? 1 : -1;
    } else if (p.z <= 0) {
      // Air control: preserve horizontal velocity once airborne.
      p.vx = 0; p.vy = 0;
    }
  }

  // Jump / dodge — both bound to the jump key. Down + jump = dodge.
  if (!locked && grounded && actionPressed("jump")) {
    if (actionHeld("down")) {
      startDodge(p);
    } else {
      p.vz = p.jumpVel;
    }
  }

  // Grab — while holding an enemy, the player rides them and can throw.
  if (p.grabbing) {
    p.grabFrames++;
    const e = p.grabbing;
    // Position the grabbed enemy in front of the player.
    e.x = p.x + p.facing * 14;
    e.y = p.y;
    e.z = 4; // lifted slightly off the ground
    e.facing = -p.facing;
    e.hitboxes.length = 0;
    e.attacking = false;
    e.attackName = null;
    // Player can throw with attack inputs. Direction held = direction of throw.
    let threw = false;
    if (actionPressed("light") || actionPressed("heavy")) {
      let throwDir = p.facing;
      if (actionHeld("left"))  throwDir = -1;
      if (actionHeld("right")) throwDir = 1;
      // Up/down add a vertical component handled by resolveThrow.
      const throwVZ = actionHeld("up") ? 200 : (actionHeld("down") ? 0 : 80);
      resolveThrow(p, e, throwDir, throwVZ);
      threw = true;
    }
    // Auto-release after 60 frames.
    if (!threw && p.grabFrames > 60) {
      e.grabbedBy = null;
      e.iframes = 8;
      p.grabbing = null;
      p.grabFrames = 0;
    }
    // Build hurtboxes for both — player vulnerable, enemy not.
    p.hurtboxes.length = 0;
    p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
    e.hurtboxes.length = 0;
    if (threw) return;
    p.animState = "grab";
    p.animTime += dt;
    return;
  }

  // Detect "back direction held" relative to facing AS OF THIS TICK'S START.
  const backHeld = (facingBeforeInput === 1 && actionHeld("left")) ||
                   (facingBeforeInput === -1 && actionHeld("right"));

  // Attack inputs.
  // - airborne + light  = jump_atk
  // - grounded + back+light = back_atk
  // - grounded + light  = atk1, or chain to next light attack
  // - grounded + heavy  = heavy, or chain finisher from a light
  // - grounded + special = sunset spin (Rio); HP-costing AOE
  // - grounded + grab    = grab if adjacent enemy
  if (actionPressed("light")) {
    if (!grounded && !p.attacking) {
      startAttack(p, "jump_atk");
    } else if (grounded) {
      if (p.attacking) {
        const cur = ATTACK_DATA[p.char + "_" + p.attackName];
        if (cur && cur.chainLight && p.attackFrame >= cur.startup) {
          startAttack(p, cur.chainLight);
        }
      } else if (backHeld) {
        // Snap facing back so the elbow hits where the enemy actually was.
        p.facing = facingBeforeInput;
        startAttack(p, "back_atk");
      } else {
        startAttack(p, "atk1");
      }
    }
  }
  if (actionPressed("heavy") && grounded) {
    if (p.attacking) {
      const cur = ATTACK_DATA[p.char + "_" + p.attackName];
      if (cur && cur.chainHeavy && p.attackFrame >= cur.startup) {
        startAttack(p, cur.chainHeavy);
      }
    } else {
      startAttack(p, "heavy");
    }
  }
  if (actionPressed("special") && grounded && !p.attacking) {
    const sp = ATTACK_DATA[p.char + "_special"];
    if (sp && (p.hp - (sp.hpCost || 0)) > 0) {
      p.hp -= sp.hpCost || 0;
      startAttack(p, "special");
    }
  }
  if (actionPressed("grab") && grounded && !p.attacking) {
    const target = findGrabTarget(p);
    if (target) {
      target.grabbedBy = p;
      target.iframes = 4;
      target.attacking = false;
      target.hitstun = 0;
      target.airborne = false;
      target.knockdownFrames = 0;
      p.grabbing = target;
      p.grabFrames = 0;
      p.animState = "grab";
    }
  }

  if (p.attacking) {
    p.attackFrame++;
    advanceAttack(p);
  }

  // Integrate motion. Air control: keep horizontal velocity from jump.
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.z += p.vz * dt;
  if (p.z > 0 || p.vz > 0) p.vz -= GRAVITY * dt;
  if (p.z < 0) { p.z = 0; p.vz = 0; }

  if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
  if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
  if (p.y < STAGE_TOP) p.y = STAGE_TOP;
  if (p.y > STAGE_BOT) p.y = STAGE_BOT;

  // Animation state selection.
  let next;
  if (p.attacking) next = p.attackName;
  else if (p.z > 0) next = "jump";
  else if (ix !== 0 || iy !== 0) next = p.running ? "run" : "walk";
  else next = "idle";
  if (next !== p.animState) { p.animState = next; p.animTime = 0; }
  else p.animTime += dt;

  // Rebuild hurtbox each tick (torso column, world coords).
  p.hurtboxes.length = 0;
  p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
}

// ---------- Rio: procedural fillRect rendering ----------
const RIO_COLORS = {
  skin:       "#8a5235",
  skinDark:   "#6b3f2a",
  hair:       "#1a1410",
  jacket:     "#7d8d4f",
  jacketDark: "#5a6b3a",
  tank:       "#0a0a10",
  pants:      "#1a1a22",
  pantsDark:  "#0e0e15",
  boot:       "#0a0a10",
  wraps:      "#dcd6c4",
  bandanaHi:  "#ffd76a",
  bandana:    "#e8c04a",
  bandanaDark:"#b89426",
};

// Bandana renderer: 7w x 3h block (hi / mid / shadow rows). Camera-side wrist anchor.
// During the punch arc, trails two fading ghosts behind the wrist for motion.
function drawBandana(sx, torsoY, f, atkReach, armSwing, k) {
  // Anchor wrist x in screen space, on the camera-side wrist.
  let wx, wy;
  if (atkReach > 0) {
    // Punching: ride the front-arm fist forward.
    wy = torsoY + 6;
    wx = (f > 0) ? sx + 4 + atkReach - 1 : sx - 3 - atkReach - 6;
    // Trailing ghosts (only when arm is meaningfully extended).
    if (atkReach > 4) {
      const trailDir = -f;
      X.fillStyle = "rgba(232,192,74,0.55)";
      X.fillRect(wx + trailDir * 4, wy + 1, 6, 2);
      X.fillStyle = "rgba(232,192,74,0.28)";
      X.fillRect(wx + trailDir * 8, wy + 1, 5, 2);
    }
  } else {
    // Idle/walk: bandana hangs at hip-line on the front-arm wrist.
    wy = torsoY + 11 - Math.round(armSwing);
    wx = (f > 0) ? sx + 5 : sx - 11;
  }
  // Body — 7 wide, 3 tall.
  X.fillStyle = k.bandanaHi;
  X.fillRect(wx, wy, 7, 1);
  X.fillStyle = k.bandana;
  X.fillRect(wx, wy + 1, 7, 1);
  X.fillStyle = k.bandanaDark;
  X.fillRect(wx, wy + 2, 7, 1);
  // Two-pixel knot tail dangling on the camera-out side.
  X.fillStyle = k.bandana;
  if (atkReach > 0) {
    // Pointing forward during punch.
    if (f > 0) X.fillRect(wx + 7, wy + 1, 2, 1);
    else       X.fillRect(wx - 2, wy + 1, 2, 1);
  } else {
    if (f > 0) X.fillRect(wx + 7, wy + 2, 2, 1);
    else       X.fillRect(wx - 2, wy + 2, 2, 1);
  }
}

// Sunset Spin renderer — Rio's signature special. The spin shows a sweeping
// bandana arc with phase-fading ghosts; the finish is a rising double-fist
// uppercut that plays for the last 3 active frames + recovery.
function drawSunsetSpin(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const k  = RIO_COLORS;
  const d  = ATTACK_DATA.rio_special;
  const fr = p.attackFrame;
  const inSpin    = fr > d.startup && fr <= d.startup + d.active - 3;
  const inFinish  = fr >  d.startup + d.active - 3 && fr <= d.startup + d.active;
  const inWindup  = fr <= d.startup;

  // Drop shadow.
  X.fillStyle = "rgba(0,0,0,0.4)";
  X.beginPath(); X.ellipse(sx, p.y, 12, 3.5, 0, 0, Math.PI * 2); X.fill();

  if (inSpin) {
    const t = (fr - d.startup) / (d.active - 3);
    const ang0 = t * Math.PI * 4; // two full revolutions across spin window
    // Bandana swept around in a wide arc — six fading ghosts.
    for (let i = 0; i < 6; i++) {
      const ang = ang0 - i * 0.42;
      const a = (1 - i / 6) * 0.78;
      const rx = sx + Math.cos(ang) * 18;
      const ry = sy - 22 + Math.sin(ang) * 9;
      X.fillStyle = "rgba(255,215,106," + a.toFixed(2) + ")";
      X.fillRect(Math.round(rx) - 3, Math.round(ry) - 1, 7, 2);
      X.fillStyle = "rgba(232,192,74," + (a * 0.7).toFixed(2) + ")";
      X.fillRect(Math.round(rx) - 3, Math.round(ry) + 1, 7, 1);
    }
    // Compact body — squashed silhouette mid-spin.
    X.fillStyle = k.boot;
    X.fillRect(sx - 6, sy - 4, 12, 4);
    X.fillStyle = k.pants;
    X.fillRect(sx - 6, sy - 18, 12, 14);
    X.fillStyle = k.tank;
    X.fillRect(sx - 7, sy - 32, 14, 14);
    X.fillStyle = k.jacket;
    X.fillRect(sx - 7, sy - 32, 14, 9);
    X.fillStyle = k.skin;
    X.fillRect(sx - 6, sy - 44, 12, 12);
    X.fillStyle = k.hair;
    X.fillRect(sx - 5, sy - 46, 10, 4);
    X.fillRect(sx - 4, sy - 47, 8, 1);
    return;
  }

  if (inFinish) {
    // Rising double-fist uppercut. Body lifts 3 px per frame for 3 frames.
    const rise = (fr - (d.startup + d.active - 3)) * 3;
    const yB = sy - rise;
    X.fillStyle = k.pants;
    X.fillRect(sx - 6, yB - 18, 5, 14);
    X.fillRect(sx + 1, yB - 18, 5, 14);
    X.fillStyle = k.boot;
    X.fillRect(sx - 6, yB - 4, 5, 4);
    X.fillRect(sx + 1, yB - 4, 5, 4);
    X.fillStyle = k.tank;
    X.fillRect(sx - 7, yB - 32, 14, 14);
    X.fillStyle = k.jacket;
    X.fillRect(sx - 7, yB - 32, 14, 9);
    // Both fists straight up.
    X.fillStyle = k.skin;
    X.fillRect(sx - 8, yB - 46 - rise, 3, 14 + rise);
    X.fillRect(sx + 5, yB - 46 - rise, 3, 14 + rise);
    X.fillStyle = k.wraps;
    X.fillRect(sx - 8, yB - 49 - rise, 3, 3);
    X.fillRect(sx + 5, yB - 49 - rise, 3, 3);
    // Bandana flying off the rising left wrist.
    X.fillStyle = k.bandanaHi;
    X.fillRect(sx + 5, yB - 47 - rise, 6, 1);
    X.fillStyle = k.bandana;
    X.fillRect(sx + 5, yB - 46 - rise, 6, 2);
    X.fillStyle = k.bandanaDark;
    X.fillRect(sx + 5, yB - 44 - rise, 6, 1);
    // Head.
    X.fillStyle = k.skin;
    X.fillRect(sx - 6, yB - 44, 12, 12);
    X.fillStyle = k.hair;
    X.fillRect(sx - 5, yB - 46, 10, 4);
    X.fillStyle = "#fff";
    X.fillRect(sx + 1, yB - 38, 2, 1);
    return;
  }

  // Windup: low stance with bandana drawn back.
  X.fillStyle = k.pants;
  X.fillRect(sx - 6, sy - 18, 5, 14);
  X.fillRect(sx + 1, sy - 18, 5, 14);
  X.fillStyle = k.boot;
  X.fillRect(sx - 6, sy - 4, 5, 4);
  X.fillRect(sx + 1, sy - 4, 5, 4);
  X.fillStyle = k.tank;
  X.fillRect(sx - 7, sy - 30, 14, 14);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 7, sy - 30, 14, 9);
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, sy - 42, 12, 12);
  X.fillStyle = k.hair;
  X.fillRect(sx - 5, sy - 44, 10, 4);
  // Bandana low.
  X.fillStyle = k.bandana;
  X.fillRect(sx + 5, sy - 18, 5, 2);
}

// Phase-aware envelope: ramps 0→peak through startup, holds peak through
// active, ramps peak→0 through recovery. Used by attack renderers.
function attackEnvelope(p, peak) {
  if (!p.attacking) return 0;
  const d = ATTACK_DATA[p.char + "_" + p.attackName];
  if (!d) return 0;
  const fr = p.attackFrame;
  if (fr <= d.startup) return peak * (fr / d.startup);
  if (fr <= d.startup + d.active) return peak;
  const r = (fr - d.startup - d.active) / d.recovery;
  return Math.max(0, peak * (1 - r));
}

function drawRio(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const f  = p.facing;
  const t  = p.animTime;
  const k  = RIO_COLORS;

  // ---- Sunset Spin: dedicated render — bandana sweeps in a wide arc, ending in
  //      a rising double-fist uppercut. Multi-hit AOE, costs HP.
  if (p.attacking && p.attackName === "special") {
    drawSunsetSpin(p);
    return;
  }

  // ---- Grab: holding the enemy in front of Rio. ----
  if (p.grabbing) {
    const sxG = Math.round(p.x);
    const syG = Math.round(p.y - p.z);
    const fg  = p.facing;
    // Drop shadow.
    X.fillStyle = "rgba(0,0,0,0.4)";
    X.beginPath(); X.ellipse(sxG, p.y, 11, 3, 0, 0, Math.PI * 2); X.fill();
    // Body — feet braced, arms reaching forward.
    X.fillStyle = k.pants;
    X.fillRect(sxG - 7, syG - 18, 5, 14);
    X.fillRect(sxG + 2, syG - 18, 5, 14);
    X.fillStyle = k.boot;
    X.fillRect(sxG - 7, syG - 4, 5, 4);
    X.fillRect(sxG + 2, syG - 4, 5, 4);
    X.fillStyle = k.tank;
    X.fillRect(sxG - 7, syG - 32, 14, 14);
    X.fillStyle = k.jacket;
    X.fillRect(sxG - 7, syG - 32, 14, 9);
    // Both arms forward.
    X.fillStyle = k.skin;
    if (fg > 0) X.fillRect(sxG + 4, syG - 26, 9, 3);
    else        X.fillRect(sxG - 13, syG - 26, 9, 3);
    if (fg > 0) X.fillRect(sxG + 4, syG - 22, 9, 3);
    else        X.fillRect(sxG - 13, syG - 22, 9, 3);
    X.fillStyle = k.wraps;
    if (fg > 0) X.fillRect(sxG + 11, syG - 26, 3, 3);
    else        X.fillRect(sxG - 13, syG - 26, 3, 3);
    if (fg > 0) X.fillRect(sxG + 11, syG - 22, 3, 3);
    else        X.fillRect(sxG - 13, syG - 22, 3, 3);
    // Bandana on near wrist.
    X.fillStyle = k.bandana;
    if (fg > 0) X.fillRect(sxG + 9, syG - 21, 5, 2);
    else        X.fillRect(sxG - 13, syG - 21, 5, 2);
    // Head.
    X.fillStyle = k.skin;
    X.fillRect(sxG - 6, syG - 44, 12, 12);
    X.fillStyle = k.hair;
    X.fillRect(sxG - 5, syG - 46, 10, 4);
    X.fillStyle = "#fff";
    X.fillRect(sxG + (fg > 0 ? 1 : -3), syG - 38, 2, 1);
    return;
  }

  // ---- Parry: guard pose with a glow ring on the active window. ----
  if (p.parryFrame >= 1 && p.parryFrame <= PARRY_ACTIVE) {
    const sxP = Math.round(p.x);
    const syP = Math.round(p.y - p.z);
    // Ring of bandana-yellow energy that contracts as the window closes.
    const r = 22 + (p.parryFrame / PARRY_ACTIVE) * 10;
    const a = 1 - (p.parryFrame / PARRY_ACTIVE) * 0.7;
    X.strokeStyle = "rgba(255,215,106," + a.toFixed(2) + ")";
    X.lineWidth = 2;
    X.beginPath(); X.arc(sxP, syP - 22, r, 0, Math.PI * 2); X.stroke();
    X.lineWidth = 1;
  }

  // ---- Dodge: backward roll, compact silhouette, motion trail ----
  if (p.dodging) {
    const groundY = Math.round(p.y);
    // Faint trail showing where she was.
    X.fillStyle = "rgba(125,141,79,0.30)";
    X.fillRect(sx + f * 6,  groundY - 14, 8, 12);
    X.fillStyle = "rgba(125,141,79,0.18)";
    X.fillRect(sx + f * 12, groundY - 12, 7, 10);
    // Drop shadow.
    X.fillStyle = "rgba(0,0,0,0.4)";
    X.beginPath();
    X.ellipse(sx, groundY, 11, 3, 0, 0, Math.PI * 2);
    X.fill();
    // Compact rolling ball — jacket-on-pants oval.
    X.fillStyle = k.pants;
    X.fillRect(sx - 8, groundY - 14, 16, 12);
    X.fillStyle = k.jacket;
    X.fillRect(sx - 8, groundY - 14, 16, 6);
    X.fillStyle = k.jacketDark;
    X.fillRect(sx - 8, groundY - 8, 16, 1);
    // Hair ridge on the rolled-over side.
    X.fillStyle = k.hair;
    X.fillRect(sx - 6, groundY - 16, 12, 2);
    // Bandana pip stays visible during the roll.
    X.fillStyle = k.bandana;
    X.fillRect(sx - f * 7, groundY - 9, 4, 2);
    return;
  }

  // Per-state animation deltas.
  let armSwing = 0, legSwingL = 0, legSwingR = 0, bodyBob = 0;
  if (p.animState === "walk") {
    const s = Math.sin(t * 9);
    legSwingL =  s * 1.5;
    legSwingR = -s * 1.5;
    armSwing  = -s * 1.2;
    bodyBob   =  Math.abs(s) * 0.6;
  } else if (p.animState === "run") {
    const s = Math.sin(t * 15);
    legSwingL =  s * 2.5;
    legSwingR = -s * 2.5;
    armSwing  = -s * 2;
    bodyBob   =  Math.abs(s) * 1.2;
  } else if (p.animState === "idle") {
    bodyBob = Math.sin(t * 2) * 0.5;
  } else if (p.animState === "jump") {
    legSwingL = -2; legSwingR = -2;
    armSwing  = -1;
  } else if (p.animState === "hurt") {
    bodyBob = -2;
  }

  // Per-attack visuals.
  // atkReach   pixels of forward fist extension
  // atkArm     "front" or "rear" — which side of the body extends
  // atkYBias   y-offset of the punching arm vs neutral arm height
  // atkUp      rising offset for the uppercut
  // atkKick    pixels of forward foot extension for jump_atk
  // atkSpin    extra body torque for hooking attacks
  let atkReach = 0, atkArm = "front", atkYBias = 0, atkUp = 0, atkKick = 0, atkSpin = 0;
  if (p.attacking) {
    const name = p.attackName;
    if (name === "atk1") {
      atkReach = attackEnvelope(p, 14);
      atkArm = "front"; atkYBias = 0;
    } else if (name === "atk2") {
      atkReach = attackEnvelope(p, 19);
      atkArm = "rear"; atkYBias = -1;
      atkSpin = attackEnvelope(p, 1);
    } else if (name === "atk3") {
      atkReach = attackEnvelope(p, 17);
      atkArm = "front"; atkYBias = 1;
      atkSpin = attackEnvelope(p, 2);
    } else if (name === "heavy") {
      atkReach = attackEnvelope(p, 9);
      atkArm = "front";
      atkUp = attackEnvelope(p, 14);
      // crouch during startup, rise through active.
      const d = ATTACK_DATA.rio_heavy;
      if (p.attackFrame <= d.startup) bodyBob = -(p.attackFrame / d.startup) * 3;
      else bodyBob = 0.5;
    } else if (name === "jump_atk") {
      atkKick = attackEnvelope(p, 14);
    } else if (name === "back_atk") {
      // Backward elbow — rear arm whips behind. Reach is negative-fwd in data.
      atkReach = attackEnvelope(p, 12);
      atkArm = "rear-back";
    } else if (name === "throw" || name === "counter") {
      // Throw recovery / counter-special: front arm extended hard.
      atkReach = attackEnvelope(p, 18);
      atkArm = "front";
      atkYBias = -1;
    }
  }

  // Drop shadow on the ground (always at p.y, not p.y-z).
  X.fillStyle = "rgba(0,0,0,0.4)";
  const shY = Math.round(p.y);
  X.beginPath();
  X.ellipse(sx, shY, 11 - p.z * 0.04, 3, 0, 0, Math.PI * 2);
  X.fill();

  const bob = -bodyBob;
  const headY = sy - 44 + bob;
  const torsoY = sy - 32 + bob;

  // Legs (in front of torso visually because feet are at sy).
  X.fillStyle = k.pants;
  X.fillRect(sx - 6, sy - 18, 5, 14);
  X.fillRect(sx + 1, sy - 18, 5, 14);
  X.fillStyle = k.pantsDark;
  // Suggest leg motion with a 1px shaded band.
  X.fillRect(sx - 6, sy - 12 + Math.round(legSwingL), 5, 1);
  X.fillRect(sx + 1, sy - 12 + Math.round(legSwingR), 5, 1);
  // Boots.
  X.fillStyle = k.boot;
  X.fillRect(sx - 6, sy - 4, 5, 4);
  X.fillRect(sx + 1, sy - 4, 5, 4);
  // Waistband.
  X.fillStyle = k.pantsDark;
  X.fillRect(sx - 6, sy - 19, 12, 2);

  // Torso: black tank base then olive cropped jacket on top half.
  X.fillStyle = k.tank;
  X.fillRect(sx - 7, torsoY, 14, 14);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 7, torsoY, 14, 9);
  X.fillStyle = k.jacketDark;
  X.fillRect(sx - 7, torsoY + 9, 14, 1);

  // Arms — front and back. Position keyed off body midline.
  // Front arm = camera-side. Rear arm = back.
  const frontArmX = (f > 0) ? sx + 6 : sx - 9;
  const backArmX  = (f > 0) ? sx - 9 : sx + 6;

  // Rear arm — forward extension on cross (atk2). Backward whip on back_atk.
  if (atkArm === "rear" && atkReach > 0) {
    const ay = torsoY + 4 + atkYBias;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 4, ay, atkReach + 3, 3);
    else       X.fillRect(sx - 4 - atkReach - 3, ay, atkReach + 3, 3);
    X.fillStyle = k.wraps;
    if (f > 0) X.fillRect(sx + 4 + atkReach, ay, 3, 3);
    else       X.fillRect(sx - 4 - atkReach - 3, ay, 3, 3);
  } else if (atkArm === "rear-back" && atkReach > 0) {
    // Backward elbow — extends opposite to facing.
    const ay = torsoY + 5;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx - 4 - atkReach - 3, ay, atkReach + 3, 3);
    else       X.fillRect(sx + 4, ay, atkReach + 3, 3);
    // Elbow visualised as a small block at the joint.
    X.fillStyle = k.skinDark;
    if (f > 0) X.fillRect(sx - 4 - atkReach - 3, ay + 3, 2, 2);
    else       X.fillRect(sx + 6 + atkReach, ay + 3, 2, 2);
  } else {
    X.fillStyle = k.skin;
    X.fillRect(backArmX, torsoY + 1 + Math.round(armSwing), 3, 11);
    X.fillStyle = k.wraps;
    X.fillRect(backArmX, torsoY + 12 + Math.round(armSwing), 3, 3);
  }

  // Front arm — extends on jab/hook/heavy. Heavy rises with atkUp.
  if (atkArm === "front" && (atkReach > 0 || atkUp > 0)) {
    const reach = atkReach;
    const ay = torsoY + 4 + atkYBias - Math.round(atkUp);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 4, ay, reach + 3, 3);
    else       X.fillRect(sx - 4 - reach - 3, ay, reach + 3, 3);
    X.fillStyle = k.wraps;
    if (f > 0) X.fillRect(sx + 4 + reach, ay, 3, 3);
    else       X.fillRect(sx - 4 - reach - 3, ay, 3, 3);
    // For uppercut, draw a vertical forearm rising along atkUp height.
    if (atkUp > 2) {
      X.fillStyle = k.skin;
      X.fillRect((f > 0) ? sx + 4 + reach - 1 : sx - 4 - reach - 2, ay, 3, Math.round(atkUp));
    }
  } else {
    X.fillStyle = k.skin;
    X.fillRect(frontArmX, torsoY + 1 - Math.round(armSwing), 3, 11);
    X.fillStyle = k.wraps;
    X.fillRect(frontArmX, torsoY + 12 - Math.round(armSwing), 3, 3);
  }

  // Yellow bandana on the camera-side wrist (the "front" arm). Always visible.
  // The bandana follows the punching arc; for a cross (atk2) the punching arm
  // is the rear, so the front-side bandana stays at hip-line and an extra fluttering
  // accent appears on the extending rear wrist.
  if (atkArm === "front") {
    drawBandana(sx, torsoY, f, atkReach + atkUp, armSwing, k);
  } else {
    drawBandana(sx, torsoY, f, 0, armSwing, k);
    if (atkReach > 4) {
      const ay = torsoY + 6 + atkYBias;
      X.fillStyle = k.bandana;
      if (f > 0) X.fillRect(sx + 4 + atkReach - 1, ay, 5, 2);
      else       X.fillRect(sx - 4 - atkReach - 4, ay, 5, 2);
    }
  }

  // Front kick for jump_atk — extending leg forward.
  if (atkKick > 0) {
    X.fillStyle = k.pants;
    if (f > 0) X.fillRect(sx + 4, sy - 12, atkKick, 4);
    else       X.fillRect(sx - 4 - atkKick, sy - 12, atkKick, 4);
    X.fillStyle = k.boot;
    if (f > 0) X.fillRect(sx + 4 + atkKick - 3, sy - 12, 4, 5);
    else       X.fillRect(sx - 4 - atkKick, sy - 12, 4, 5);
  }

  // Head.
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, headY, 12, 12);
  X.fillStyle = k.skinDark;
  X.fillRect(sx - 6, headY + 6, 1, 6);
  X.fillRect(sx + 5, headY + 6, 1, 6);
  // Locs on top.
  X.fillStyle = k.hair;
  X.fillRect(sx - 5, headY - 2, 10, 4);
  X.fillRect(sx - 4, headY - 3, 8, 1);
  // Eye dot, direction-indicating.
  X.fillStyle = "#fff";
  if (f > 0) X.fillRect(sx + 1, headY + 6, 2, 1);
  else       X.fillRect(sx - 3, headY + 6, 2, 1);
  // Gold hoop earring on camera-facing side.
  X.fillStyle = k.bandana;
  if (f > 0) X.fillRect(sx + 5, headY + 9, 1, 1);
  else       X.fillRect(sx - 6, headY + 9, 1, 1);
}

// ---------- HUD ----------
function drawHUD() {
  // Top strip
  X.fillStyle = "rgba(0,0,0,0.55)";
  X.fillRect(0, 0, W, 22);

  // HP bar — Rio.
  const barX = 8, barY = 6, barW = 140, barH = 10;
  X.fillStyle = "#222";
  X.fillRect(barX, barY, barW, barH);
  const pct = player ? Math.max(0, player.hp / player.hpMax) : 0;
  X.fillStyle = "#7d8d4f";          // jacket olive
  X.fillRect(barX, barY, Math.round(barW * pct), barH);
  X.fillStyle = "#e8c04a";          // bandana yellow rail
  X.fillRect(barX, barY, barW, 1);

  // Parry meter + chain count (bottom right). Pulses "READY" at full.
  if (player) drawParryHUD();
  // Combo counter (center-top under HP).
  if (player && player.comboHits >= 2) drawComboCounter();

  X.fillStyle = "#e8c04a";
  X.font = "bold 9px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText("RIO", barX, barY - 6);
}

// Parry meter + chain counter, anchored bottom-right. Pulses READY at 100%.
function drawParryHUD() {
  const p = player;
  const x0 = W - 122;
  const y0 = H - 26;
  // Frame plate.
  X.fillStyle = "rgba(0,0,0,0.55)";
  X.fillRect(x0 - 4, y0 - 2, 122, 22);
  // Label.
  X.fillStyle = "#aaa";
  X.font = "bold 8px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText("PARRY", x0, y0);
  // Chain count.
  if (p.parryChain > 0) {
    X.fillStyle = "#e8c04a";
    X.font = "bold 9px ui-monospace, monospace";
    X.textAlign = "right";
    X.fillText("x" + p.parryChain, x0 + 110, y0);
  }
  // Meter bar.
  const mx = x0, my = y0 + 10, mw = 110, mh = 6;
  X.fillStyle = "#222";
  X.fillRect(mx, my, mw, mh);
  const pct = p.parryMeter / 100;
  // Color ramps from olive to bandana yellow to white as it fills.
  const grad = pct < 0.5 ? "#5a6b3a" : (pct < 1 ? "#e8c04a" : "#fff");
  X.fillStyle = grad;
  X.fillRect(mx, my, Math.round(mw * pct), mh);
  // Tick marks at 50 / 75.
  X.fillStyle = "#000";
  X.fillRect(mx + Math.round(mw * 0.5), my, 1, mh);
  X.fillRect(mx + Math.round(mw * 0.75), my, 1, mh);
  // Top rail.
  X.fillStyle = "#e8c04a";
  X.fillRect(mx, my, mw, 1);
  // READY pulse at full.
  if (p.parryMeter >= 100) {
    const pulse = 0.55 + 0.45 * Math.sin(stateTime * Math.PI * 6);
    X.fillStyle = "rgba(255,255,255," + pulse.toFixed(2) + ")";
    X.font = "bold 9px ui-monospace, monospace";
    X.textAlign = "center";
    X.fillText("READY", mx + mw / 2, my - 1);
  }
}

// Compact combo counter under the HP bar — fades quickly when comboTimer expires.
function drawComboCounter() {
  const p = player;
  const fade = Math.min(1, p.comboTimer / 0.4);
  const cx = W / 2;
  const cy = 30;
  X.font = "bold 18px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "alphabetic";
  X.fillStyle = "rgba(0,0,0," + (0.7 * fade).toFixed(2) + ")";
  X.fillText(p.comboHits + " HIT", cx + 1, cy + 1);
  X.fillStyle = "rgba(232,192,74," + fade.toFixed(2) + ")";
  X.fillText(p.comboHits + " HIT", cx, cy);
}

// ---------- DEV: hitbox / hurtbox visualizer ----------
function drawDebugBoxes() {
  X.lineWidth = 1;
  function drawFootprint(b, color) {
    X.strokeStyle = color;
    X.strokeRect(Math.round(b.cx - b.hw) + 0.5,
                 Math.round(b.cy - b.hd) + 0.5,

  if (player) {

    X.fillStyle = "#fff";
    X.fillRect(Math.round(player.x), Math.round(player.y), 1, 1);
  }
  for (const e of enemies) {
    for (const b of e.hurtboxes) drawFootprint(b, "rgba(0,255,128,0.55)");
    for (const b of e.hitboxes)  drawFootprint(b, "rgba(255,160,0,0.95)");

  X.strokeStyle = "rgba(120,160,255,0.5)";
  X.strokeRect(0.5, STAGE_TOP + 0.5, W - 1, STAGE_BOT - STAGE_TOP);
}

// ---------- Enemies ----------
let enemies = [];

const RUNNER_ATK = {
  startup: 6, active: 4, recovery: 14,
  damage: 8,
  knockback: 70,
  hitstop: 3,
  hit: { fwd: 14, hw: 9, hd: 11, lo: 0, hi: 32 },
};

function makeRunner(x, y) {
  return {
    type: "runner",
    x, y, z: 0,
    vx: 0, vy: 0, vz: 0,
    airborne: false,
    knockdownFrames: 0,
    facing: -1,
    animState: "idle",
    animTime: 0,
    walkSpeed: 56,
    runSpeed: 110,
    hp: 26, hpMax: 26,
    attacking: false,
    attackName: null,
    attackFrame: 0,
    iframes: 0,
    hitstun: 0,
    knockX: 0, knockY: 0,
    aiCooldown: 0.5 + Math.random() * 0.7,
    fleeing: false,
    dead: false,
    deathTimer: 0,
    grabbedBy: null,
    hitboxes: [],
    hurtboxes: [],
    attackHits: null,
  };
}

function updateRunner(e, dt) {
  if (e.dead) {
    e.deathTimer += dt;
    e.x += e.knockX * dt;
    e.knockX *= 0.86;
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
    if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
    return;
  }

  // Held in a grab — position is driven entirely by the player.
  if (e.grabbedBy) {
    e.animState = "grabbed";
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    return;
  }

  if (e.iframes > 0) e.iframes--;

  // Airborne (juggled by a launcher) — gravity, no AI, vulnerable.
  if (e.airborne) {
    e.vz -= GRAVITY * dt;
    e.z += e.vz * dt;
    e.x += e.knockX * dt;
    e.knockX *= 0.94;
    if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
    if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
    if (e.z <= 0) {
      e.z = 0; e.vz = 0;
      e.airborne = false;
      e.knockdownFrames = 28;
      e.iframes = Math.max(e.iframes, 28);
    }
    e.animState = "air";
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    e.hurtboxes.push({ cx: e.x, cy: e.y, hw: 8, hd: 5, lo: e.z, hi: e.z + 30 });
    return;
  }

  // Knockdown — lying on ground, getup countdown.
  if (e.knockdownFrames > 0) {
    e.knockdownFrames--;
    e.animState = "down";
    e.animTime += dt;
    e.x += e.knockX * dt;
    e.knockX *= 0.6;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    e.hurtboxes.push({ cx: e.x, cy: e.y, hw: 9, hd: 6, lo: 0, hi: 12 });
    return;
  }

  if (e.hitstun > 0) {
    e.hitstun--;
    e.x += e.knockX * dt;
    e.y += e.knockY * dt;
    e.knockX *= 0.82; e.knockY *= 0.82;
    if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
    if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
    if (e.y < STAGE_TOP) e.y = STAGE_TOP;
    if (e.y > STAGE_BOT) e.y = STAGE_BOT;
    e.animState = "hurt";
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    e.hurtboxes.push({ cx: e.x, cy: e.y, hw: 8, hd: 5, lo: 0, hi: 30 });
    return;
  }

  e.aiCooldown -= dt;

  // "Runs at low HP" — flee threshold 30%.
  if (!e.fleeing && e.hp < e.hpMax * 0.3) e.fleeing = true;

  if (player && !player.dead) {
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.hypot(dx, dy) || 0.0001;

    if (e.attacking) {
      e.attackFrame++;
      const d = RUNNER_ATK;
      // Persistent hitbox across active frames so the attack hits at most once
      // (hits Set is shared via e.attackHits).
      if (e.attackFrame > d.startup && e.attackFrame <= d.startup + d.active) {
        if (e.hitboxes.length === 0) {
          e.hitboxes.push({
            cx: 0, cy: 0,
            hw: d.hit.hw, hd: d.hit.hd,
            lo: d.hit.lo, hi: d.hit.hi,
            damage: d.damage,
            knockback: d.knockback,
            hitstop: d.hitstop,
            facing: e.facing,
            owner: e,
            hits: e.attackHits,
          });
        }
        const hb = e.hitboxes[0];
        hb.cx = e.x + e.facing * d.hit.fwd;
        hb.cy = e.y;
        hb.facing = e.facing;
      } else {
        e.hitboxes.length = 0;
      }
      if (e.attackFrame >= d.startup + d.active + d.recovery) {
        e.attacking = false;
        e.attackName = null;
        e.hitboxes.length = 0;
        e.attackHits = null;
        e.aiCooldown = 0.55 + Math.random() * 0.55;
      }
      e.animState = "atk";
    } else if (e.fleeing) {
      // Run away on the X axis at runSpeed.
      const fleeDir = (player.x > e.x) ? -1 : 1;
      e.facing = fleeDir;
      e.vx = fleeDir * e.runSpeed;
      e.vy = (e.y < STAGE_TOP + 20) ? 30 : (e.y > STAGE_BOT - 20 ? -30 : 0);
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.animState = "walk";
    } else {
      // Approach until in attack range.
      const range = 24;
      if (Math.abs(dx) > 1) e.facing = dx > 0 ? 1 : -1;
      if (dist > range) {
        const speed = e.walkSpeed;
        e.vx = (dx / dist) * speed;
        e.vy = (dy / dist) * speed;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.animState = "walk";
      } else {
        e.vx = 0; e.vy = 0;
        e.animState = "idle";
        if (e.aiCooldown <= 0) {
          e.attacking = true;
          e.attackName = "swipe";
          e.attackFrame = 0;
          e.attackHits = new Set();
        }
      }
    }
    e.animTime += dt;
  } else {
    e.animState = "idle";
    e.animTime += dt;
  }

  if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
  if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
  if (e.y < STAGE_TOP) e.y = STAGE_TOP;
  if (e.y > STAGE_BOT) e.y = STAGE_BOT;

  e.hurtboxes.length = 0;
  e.hurtboxes.push({ cx: e.x, cy: e.y, hw: 8, hd: 5, lo: 0, hi: 30 });
}

// ---------- RUNNER renderer ----------
const RUNNER_COLORS = {
  hoodie:     "#36363f",
  hoodieDark: "#23232a",
  pants:      "#2f3a4a",
  pantsDark:  "#1f2838",
  shoe:       "#d4cfb8",
  skin:       "#caa07c",
  hoodShadow: "#0c0a12",
};

function drawRunner(e) {
  const sx = Math.round(e.x);
  const sy = Math.round(e.y - e.z);
  const f  = e.facing;
  const k  = RUNNER_COLORS;
  const t  = e.animTime;

  // Drop shadow — at world y (ground), shrinks with elevation.
  X.fillStyle = "rgba(0,0,0," + (0.4 - Math.min(0.25, e.z * 0.004)).toFixed(2) + ")";
  X.beginPath();
  X.ellipse(sx, e.y, Math.max(4, 9 - e.z * 0.06), 3, 0, 0, Math.PI * 2);
  X.fill();

  if (e.dead || e.animState === "down") {
    // Lying on the ground, hood down. While knocked down (alive) the body
    // breathes faintly so it reads as "alive but recovering".
    const breathe = e.dead ? 0 : Math.round(Math.sin(t * 6) * 0.5);
    X.fillStyle = k.hoodie;
    X.fillRect(sx - 13, sy - 6 + breathe, 26, 5);
    X.fillStyle = k.pants;
    X.fillRect(sx + (f > 0 ? -13 : 1), sy - 2, 12, 4);
    X.fillStyle = k.shoe;
    X.fillRect(sx + (f > 0 ? -13 : 9), sy - 1, 4, 3);
    X.fillStyle = k.hoodShadow;
    X.fillRect(sx + (f > 0 ? 7 : -13), sy - 5 + breathe, 6, 4);
    if (!e.dead && e.iframes > 0 && (e.iframes & 4)) {
      X.fillStyle = "rgba(255,255,255,0.4)";
      X.fillRect(sx - 13, sy - 6, 26, 5);
    }
    if (!e.dead && e.hp < e.hpMax) drawEnemyHpPip(sx, sy - 12, e);
    return;
  }

  if (e.animState === "air") {
    // Limbs flail outward — body stretched across.
    X.fillStyle = k.hoodie;
    X.fillRect(sx - 7, sy - 24, 14, 14);   // torso
    X.fillStyle = k.pants;
    X.fillRect(sx - 6, sy - 10, 5, 10);    // leg up
    X.fillRect(sx + 1, sy - 12, 5, 12);
    X.fillStyle = k.hoodie;
    X.fillRect(sx - 11, sy - 22, 4, 3);    // arm flailing left
    X.fillRect(sx + 7,  sy - 26, 4, 3);    // arm flailing right
    X.fillStyle = k.hoodieDark;
    X.fillRect(sx - 6, sy - 32, 12, 8);    // hood/head
    X.fillStyle = k.hoodShadow;
    X.fillRect(sx - 4, sy - 28, 8, 3);
    if (e.hp < e.hpMax) drawEnemyHpPip(sx, sy - 38, e);
    return;
  }

  let armSwing = 0, legSwing = 0, bob = 0;
  if (e.animState === "walk") {
    const s = Math.sin(t * 11);
    legSwing = s * 1.5;
    armSwing = -s * 1.2;
    bob = Math.abs(s) * 0.5;
  } else if (e.animState === "hurt") {
    bob = -2;
  } else if (e.animState === "atk") {
    bob = Math.sin(t * 18) * 0.4;
  }

  const torsoY = sy - 30 - bob;
  const headY  = sy - 38 - bob;

  // Pants + shoes.
  X.fillStyle = k.pants;
  X.fillRect(sx - 5, sy - 16 + Math.round(legSwing > 0 ? 0 : 1), 4, 12);
  X.fillRect(sx + 1, sy - 16 + Math.round(legSwing > 0 ? 1 : 0), 4, 12);
  X.fillStyle = k.pantsDark;
  X.fillRect(sx - 5, sy - 12, 4, 1);
  X.fillRect(sx + 1, sy - 12, 4, 1);
  X.fillStyle = k.shoe;
  X.fillRect(sx - 5, sy - 4, 4, 4);
  X.fillRect(sx + 1, sy - 4, 4, 4);

  // Hoodie torso.
  X.fillStyle = k.hoodie;
  X.fillRect(sx - 7, torsoY, 14, 14);
  X.fillStyle = k.hoodieDark;
  X.fillRect(sx - 7, torsoY + 13, 14, 1);
  X.fillStyle = k.hoodShadow;
  X.fillRect(sx - 6, torsoY + 8, 12, 1); // hoodie pocket seam

  // Arms.
  let atkReach = 0;
  if (e.attacking) {
    const d = RUNNER_ATK;
    if (e.attackFrame <= d.startup) atkReach = (e.attackFrame / d.startup) * 10;
    else if (e.attackFrame <= d.startup + d.active) atkReach = 10;
    else atkReach = Math.max(0, 10 - (e.attackFrame - d.startup - d.active));
  }
  // Back arm.
  const backArmX = (f > 0) ? sx - 9 : sx + 7;
  X.fillStyle = k.hoodie;
  X.fillRect(backArmX, torsoY + 1 + Math.round(armSwing), 2, 11);
  // Front arm.
  if (atkReach > 0) {
    const ay = torsoY + 4;
    const armX = (f > 0) ? sx + 5 : sx - 5 - atkReach - 3;
    X.fillStyle = k.hoodie;
    X.fillRect(armX, ay, atkReach + 3, 3);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 5 + atkReach, ay, 3, 3);
    else       X.fillRect(sx - 5 - atkReach - 3, ay, 3, 3);
  } else {
    const frontArmX = (f > 0) ? sx + 7 : sx - 9;
    X.fillStyle = k.hoodie;
    X.fillRect(frontArmX, torsoY + 1 - Math.round(armSwing), 2, 11);
  }

  // Hood — wraps the head, comes to a peak.
  X.fillStyle = k.hoodie;
  X.fillRect(sx - 6, headY, 12, 10);
  X.fillRect(sx - 4, headY - 2, 8, 2);
  X.fillRect(sx - 3, headY - 4, 6, 2);
  X.fillStyle = k.hoodieDark;
  X.fillRect(sx - 6, headY + 9, 12, 1);
  // Inside-the-hood face shadow with two pale eye dots.
  X.fillStyle = k.hoodShadow;
  X.fillRect(sx - 4, headY + 4, 8, 4);
  X.fillStyle = "#bababa";
  if (f > 0) {
    X.fillRect(sx + 1, headY + 5, 1, 1);
    X.fillRect(sx - 2, headY + 5, 1, 1);
  } else {
    X.fillRect(sx - 3, headY + 5, 1, 1);
    X.fillRect(sx,     headY + 5, 1, 1);
  }

  // Hurt flash — full white silhouette while iframes are fresh.
  if (e.iframes > 6) {
    X.fillStyle = "rgba(255,255,255,0.7)";
    X.fillRect(sx - 7, headY - 4, 14, 50);
  }

  if (e.hp < e.hpMax) drawEnemyHpPip(sx, headY - 8, e);
}

function drawEnemyHpPip(sx, by, e) {
  const bw = 18, bh = 2;
  const bx = sx - bw / 2;
  X.fillStyle = "#000";
  X.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
  X.fillStyle = "#3a1010";
  X.fillRect(bx, by, bw, bh);
  const pct = e.hp / e.hpMax;
  X.fillStyle = pct < 0.3 ? "#ff5050" : (pct < 0.6 ? "#ff9c40" : "#e8c04a");
  X.fillRect(bx, by, Math.max(0, Math.round(bw * pct)), bh);
}

// ---------- Particles (hit feedback) ----------
let particles = [];

function spawnSparkle(x, y) {
  particles.push({ kind: "sparkle", x, y, life: 0, max: 0.18 });
}
function spawnDmgNumber(x, y, n) {
  particles.push({ kind: "dmg", x, y, vy: -28, life: 0, max: 0.55, text: String(n) });
}
// Parry sparkle: a radial burst keyed by tier. PERFECT is bandana yellow, GOOD
// is olive, LATE is grey. Multiple petals at once for the impact frame.
function spawnParrySparkle(x, y, tier) {
  const tone =
    tier === "perfect" ? { core: "rgba(255,240,180,1)", edge: "rgba(255,215,106,0.9)", n: 8, r: 14 } :
    tier === "good"    ? { core: "rgba(220,225,200,1)", edge: "rgba(125,141,79,0.9)",  n: 6, r: 11 } :
                         { core: "rgba(220,220,220,1)", edge: "rgba(140,140,140,0.9)", n: 4, r: 8  };
  for (let i = 0; i < tone.n; i++) {
    const ang = (i / tone.n) * Math.PI * 2;
    const dx = Math.cos(ang) * tone.r;
    const dy = Math.sin(ang) * tone.r * 0.6;
    particles.push({
      kind: "petal", x: x + dx, y: y + dy,
      vx: dx * 4, vy: dy * 4,
      life: 0, max: 0.32,
      core: tone.core, edge: tone.edge,
    });
  }
}
function spawnParryWord(x, y, text, color) {
  particles.push({
    kind: "word", x, y, vy: -22, life: 0, max: 0.85,
    text, color, scale: 1,
  });
}
// Milestone words for big combo counts (used in Phase 2.5 polish).
function spawnMilestone(x, y, text) {
  particles.push({ kind: "word", x, y, vy: -16, life: 0, max: 1.0, text, color: "#e8c04a", scale: 1.4 });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    if (p.kind === "dmg") {
      p.y += p.vy * dt;
      p.vy += 50 * dt;
    } else if (p.kind === "petal") {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.88; p.vy *= 0.88;
    } else if (p.kind === "word") {
      p.y += p.vy * dt;
      p.vy *= 0.93;
    }
    if (p.life >= p.max) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.max;
    if (p.kind === "sparkle") {
      const r = (1 - t) * 7;
      const a = (1 - t).toFixed(2);
      X.fillStyle = "rgba(255,240,180," + a + ")";
      X.fillRect(p.x - r, p.y - 1, r * 2, 2);
      X.fillRect(p.x - 1, p.y - r, 2, r * 2);
      X.fillStyle = "rgba(255,255,255," + a + ")";
      X.fillRect(p.x - 1, p.y - 1, 2, 2);
    } else if (p.kind === "dmg") {
      const a = (1 - t).toFixed(2);
      X.fillStyle = "rgba(255,255,255," + a + ")";
      X.font = "bold 9px ui-monospace, monospace";
      X.textAlign = "center";
      X.textBaseline = "alphabetic";
      X.fillText(p.text, Math.round(p.x), Math.round(p.y));
    } else if (p.kind === "petal") {
      const a = 1 - t;
      const r = 2 + (1 - t) * 1.5;
      X.fillStyle = p.edge.replace(/0\.\d+\)/, a.toFixed(2) + ")");
      X.fillRect(Math.round(p.x - r), Math.round(p.y - r), r * 2, r * 2);
      X.fillStyle = p.core.replace(/1\)$/, (a * 0.9).toFixed(2) + ")");
      X.fillRect(Math.round(p.x - 1), Math.round(p.y - 1), 2, 2);
    } else if (p.kind === "word") {
      // Pop on first 25%, hold, then fade.
      const pop = t < 0.18 ? (t / 0.18) : 1;
      const fade = t > 0.6 ? (1 - (t - 0.6) / 0.4) : 1;
      const sz = Math.round(13 * (p.scale || 1) * (1 + (1 - pop) * 0.4));
      X.font = "bold " + sz + "px ui-monospace, monospace";
      X.textAlign = "center";
      X.textBaseline = "alphabetic";
      // Drop shadow.
      X.fillStyle = "rgba(0,0,0," + (0.7 * fade).toFixed(2) + ")";
      X.fillText(p.text, Math.round(p.x) + 1, Math.round(p.y) + 1);
      X.fillStyle = p.color.startsWith("#") ? p.color : p.color;
      X.globalAlpha = fade;
      X.fillText(p.text, Math.round(p.x), Math.round(p.y));
      X.globalAlpha = 1;
    }
  }
}

// ---------- Hit resolution ----------
let hitstopFrames = 0;
let flashFrames = 0;
let flashColor = "rgba(255,255,255,0.85)";
let shakeFrames = 0;
let shakeMag = 0;

function boxOverlap(a, b) {
  return Math.abs(a.cx - b.cx) < a.hw + b.hw &&
         Math.abs(a.cy - b.cy) < a.hd + b.hd;
}

function applyHit(target, hb, attacker) {
  if (target.dead) return;
  target.hp -= hb.damage;
  // Brief post-hit immunity so simultaneous enemies don't all stack onto one frame
  // and so the victim's attack-cancel doesn't immediately re-eat the next active frame.
  // Short enough that player chain combos still land (chain gaps >=10f).
  target.iframes = 4;
  // Player taking damage breaks parry chain but retains 40% meter.
  if (player && target === player) {
    player.parryChain = 0;
    player.parryChainTimer = 0;
    player.parryMeter = Math.floor(player.parryMeter * 0.4);
    player.comboHits = 0;
    player.comboTimer = 0;
  }
  // Cancel the victim's own attack (no trades).
  if (target.attacking) {
    target.attacking = false;
    target.attackName = null;
    target.attackFrame = 0;
    if (target.hitboxes) target.hitboxes.length = 0;
    target.attackHits = null;
  }
  // Knockback away from the hitbox center on world X.
  const dir = (target.x < hb.cx) ? -1 : 1;
  target.knockX = dir * hb.knockback;
  target.knockY = 0;
  target.hitstun = 8;
  // Launcher pops the victim into the air for juggle followups.
  if (hb.launcher && target.z !== undefined) {
    target.vz = hb.launcher;
    target.airborne = true;
    target.hitstun = 0;
    target.knockX = dir * (hb.knockback * 0.5);
  }
  if (target.hp <= 0) {
    target.dead = true;
    target.deathTimer = 0;
    target.knockX = dir * (hb.knockback + 30);
    target.hitstun = 0;
    target.airborne = false;
  }
  if (hitstopFrames < (hb.hitstop || 3)) hitstopFrames = hb.hitstop || 3;
  // Combo accounting — only when the player is the attacker.
  if (player && attacker === player) {
    player.comboHits++;
    player.comboTimer = 1.4;
  }
  // Visuals.
  const sxp = (target.x + hb.cx) / 2;
  const syp = target.y - 18;
  spawnSparkle(sxp, syp);
  spawnDmgNumber(sxp, syp - 6, hb.damage);
}

// Resolve a throw: launch the grabbed enemy in the chosen direction with damage.
// Caller has already validated p.grabbing and pressed an attack input.
function resolveThrow(p, e, throwDir, throwVZ) {
  const d = ATTACK_DATA[p.char + "_throw"] || ATTACK_DATA.rio_throw;
  e.grabbedBy = null;
  p.grabbing = null;
  p.grabFrames = 0;
  e.hp -= d.damage;
  e.iframes = 6;
  e.attacking = false;
  e.attackName = null;
  if (e.hitboxes) e.hitboxes.length = 0;
  e.knockX = throwDir * d.knockback;
  e.knockY = 0;
  e.vz = throwVZ;
  e.airborne = throwVZ > 0;
  e.hitstun = 0;
  if (e.hp <= 0) {
    e.dead = true;
    e.deathTimer = 0;
  }
  if (hitstopFrames < d.hitstop) hitstopFrames = d.hitstop;
  spawnSparkle(e.x, e.y - 18);
  spawnDmgNumber(e.x, e.y - 22, d.damage);
  shakeFrames = Math.max(shakeFrames, 6);
  shakeMag = Math.max(shakeMag, 3);
  // Brief throw recovery on the player so they can't immediately grab again.
  startAttack(p, "throw");
}

// Resolve a parry: classify by parry frame, deal counter damage on PERFECT,
// stun the attacker on GOOD, just block on LATE. Updates chain meter and
// triggers visual feedback.
function resolveParry(p, hb, attacker) {
  const f = p.parryFrame;
  let tier;
  if      (f <= PARRY_PERFECT) tier = "PERFECT";
  else if (f <= PARRY_GOOD)    tier = "GOOD";
  else                         tier = "LATE";

  // Skip the parry window straight into cooldown so this attempt can't land twice.
  p.parryFrame = PARRY_ACTIVE + 1;
  p.parryChain++;
  p.parryChainTimer = PARRY_CHAIN_S;

  if (tier === "PERFECT") {
    p.parryMeter = Math.min(100, p.parryMeter + 30);
    if (p.parryChain >= 2) p.hp = Math.min(p.hpMax, p.hp + PARRY_HEAL_HP);
    if (attacker && !attacker.dead) {
      const counterDmg = Math.round(hb.damage * PARRY_PERFECT_BONUS);
      attacker.hp -= counterDmg;
      attacker.iframes = 4;
      attacker.hitstun = 24;
      attacker.attacking = false;
      attacker.attackName = null;
      if (attacker.hitboxes) attacker.hitboxes.length = 0;
      attacker.attackHits = null;
      const dir = (attacker.x < p.x) ? -1 : 1;
      attacker.knockX = dir * 140;
      if (attacker.hp <= 0) {
        attacker.dead = true;
        attacker.deathTimer = 0;
        attacker.knockX = dir * 200;
      }
      spawnParrySparkle(p.x, p.y - 24, "perfect");
      spawnDmgNumber(attacker.x, attacker.y - 26, counterDmg);
    }
    spawnParryWord(p.x, p.y - 38, "PERFECT!", "#ffd76a");
    if (hitstopFrames < PARRY_PERFECT_HITSTOP) hitstopFrames = PARRY_PERFECT_HITSTOP;
    flashFrames = Math.max(flashFrames, 5);
  } else if (tier === "GOOD") {
    p.parryMeter = Math.min(100, p.parryMeter + 20);
    if (attacker && !attacker.dead) {
      attacker.hitstun = 30;
      attacker.attacking = false;
      attacker.attackName = null;
      if (attacker.hitboxes) attacker.hitboxes.length = 0;
      attacker.attackHits = null;
      const dir = (attacker.x < p.x) ? -1 : 1;
      attacker.knockX = dir * 60;
    }
    spawnParrySparkle(p.x, p.y - 24, "good");
    spawnParryWord(p.x, p.y - 38, "GOOD", "#7d8d4f");
    if (hitstopFrames < 5) hitstopFrames = 5;
  } else {
    // LATE — block only, no counter, but builds a little meter.
    p.parryMeter = Math.min(100, p.parryMeter + 10);
    spawnParrySparkle(p.x, p.y - 24, "late");
    spawnParryWord(p.x, p.y - 38, "BLOCK", "#888");
    if (hitstopFrames < 3) hitstopFrames = 3;
  }
  // Mark this hitbox as having connected with the player so the same active
  // phase doesn't re-trigger on subsequent frames.
  if (hb.hits) hb.hits.add(p);
}

function resolveHits() {
  if (!player) return;
  // Player → enemies.
  if (player.hitboxes.length > 0 && !player.dead) {
    for (const hb of player.hitboxes) {
      for (const e of enemies) {
        if (e.dead) continue;
        if (e === player.grabbing) continue;        // can't hit what we're holding
        if (e.iframes > 0) continue;                // knockdown / getup invulnerability
        // Multi-hit: re-hit each target every hb.multiHit frames within the active
        // phase; otherwise default to the one-hit-per-attack rule.
        if (hb.multiHit) {
          if (!hb.lastHits) hb.lastHits = new Map();
          const last = hb.lastHits.get(e);
          if (last !== undefined && hb.owner.attackFrame - last < hb.multiHit) continue;
        } else {
          if (hb.hits && hb.hits.has(e)) continue;
        }
        let connected = false;
        for (const tb of e.hurtboxes) {
          if (boxOverlap(hb, tb)) { connected = true; break; }
        }
        if (connected) {
          if (hb.multiHit) {
            hb.lastHits.set(e, hb.owner.attackFrame);
          } else if (hb.hits) {
            hb.hits.add(e);
          }
          applyHit(e, hb, player);
        }
      }
    }
  }
  // Enemies → player. If the player has an active parry frame, resolve as a parry
  // (PERFECT / GOOD / LATE) instead of taking damage.
  if (player.iframes <= 0 && !player.dead && !player.dodging) {
    for (const e of enemies) {
      if (e.dead || e.hitboxes.length === 0) continue;
      for (const hb of e.hitboxes) {
        if (!hb.hits) hb.hits = new Set();
        if (hb.hits.has(player)) continue;
        let connected = false;
        for (const tb of player.hurtboxes) {
          if (boxOverlap(hb, tb)) { connected = true; break; }
        }
        if (!connected) continue;
        if (player.parryFrame >= 1 && player.parryFrame <= PARRY_ACTIVE) {
          resolveParry(player, hb, e);
        } else {
          hb.hits.add(player);
          applyHit(player, hb, e);
        }
        break;
      }
      if (player.iframes > 0 || player.hitstun > 0) break;
    }
  }
}

function cleanupEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].dead && enemies[i].deathTimer > 1.4) enemies.splice(i, 1);
  }
}

// ---------- Fixed-timestep loop ----------
const STEP = 1 / 60;          // 60Hz logical tick — combat frame counts depend on this.
const MAX_STEPS_PER_FRAME = 5; // spiral-of-death guard
let last = performance.now() / 1000;
let acc = 0;

function frame(nowMs) {
  const now = nowMs / 1000;
  let dt = now - last;
  last = now;
  if (dt > 0.25) dt = 0.25; // tab-resume / debugger pause: discard the gap
  if (!paused) acc += dt;

  let steps = 0;
  while (acc >= STEP && steps < MAX_STEPS_PER_FRAME) {
    update(STEP);
    acc -= STEP;
    steps++;
  }
  if (steps === MAX_STEPS_PER_FRAME) acc = 0;

  render();

  // FPS sampling
  fpsAccum += dt;
  fpsFrames++;
  if (fpsAccum >= 0.5) {
    fps = fpsFrames / fpsAccum;
    fpsAccum = 0;
    fpsFrames = 0;
  }
  if (DEV && debugEl.classList.contains("on")) {
    debugEl.textContent =
      "FPS " + fps.toFixed(0) +
      "\nstate " + STATE +
      "\nents " + entityCount() +
      "\nscale " + scale.toFixed(2);
  }

  requestAnimationFrame(frame);
}

// ---------- Update ----------
function update(dt) {
  stateTime += dt;
  if (STATE === "title") updateTitle(dt);
  else if (STATE === "playing") updatePlaying(dt);
  // Other states declared in the machine but not yet reachable.
}

function updateTitle(dt) {
  if (consumePress("Enter") || consumePress("Space") || consumePress("NumpadEnter")) {
    enterPlaying();
  }
}

function enterPlaying() {
  player = makePlayer("rio", 120, 300);
  enemies = [
    makeRunner(440, 280),
    makeRunner(520, 320),
  ];
  particles = [];
  hitstopFrames = 0;
  flashFrames = 0;
  shakeFrames = 0;
  shakeMag = 0;
  setState("playing");
}

function updatePlaying(dt) {
  if (consumePress("Escape")) {
    player = null;
    enemies = [];
    particles = [];
    hitstopFrames = 0;
    flashFrames = 0;
    shakeFrames = 0;
    setState("title");
    return;
  }
  if (hitstopFrames > 0) { hitstopFrames--; return; }
  if (flashFrames > 0)  flashFrames--;
  if (shakeFrames > 0)  shakeFrames--;
  if (player) updatePlayer(player, dt);
  for (const e of enemies) updateRunner(e, dt);
  resolveHits();
  cleanupEnemies();
  updateParticles(dt);
}

// ---------- Render ----------
function render() {
  X.fillStyle = "#000";
  X.fillRect(0, 0, W, H);
  if (STATE === "title") renderTitle();
  else if (STATE === "playing") renderPlaying();
}

function renderTitle() {
  // Title block
  X.fillStyle = "#e8c04a"; // bandana yellow — Rio's signature, used as title accent
  X.fillRect(W / 2 - 140, H / 2 - 60, 280, 4);
  X.fillRect(W / 2 - 140, H / 2 + 18, 280, 4);

  X.fillStyle = "#fff";
  X.font = "bold 36px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("THE BLOCK", W / 2, H / 2 - 22);

  X.fillStyle = "#aaa";
  X.font = "12px ui-monospace, monospace";
  X.fillText("a beat-em-up", W / 2, H / 2 + 4);

  // Press-start prompt — pulses on a 1Hz sine.
  const pulse = 0.55 + 0.45 * Math.sin(stateTime * Math.PI * 2);
  X.fillStyle = "rgba(255,255,255," + pulse.toFixed(3) + ")";
  X.font = "14px ui-monospace, monospace";
  X.fillText("PRESS ENTER", W / 2, H / 2 + 56);
}

function renderPlaying() {
  // Screen shake — translate the world layer (not the HUD) by a damped jitter.
  let shakeX = 0, shakeY = 0;
  if (shakeFrames > 0) {
    const t = shakeFrames;
    shakeX = (Math.sin(t * 13.1) * shakeMag) | 0;
    shakeY = (Math.cos(t * 11.7) * shakeMag * 0.6) | 0;
  }
  if (shakeX || shakeY) X.translate(shakeX, shakeY);

  drawStage1();
  // Depth-sort: deeper (lower world Y) renders first so closer entities cover them.
  const drawables = [];
  if (player) drawables.push({ y: player.y, draw: () => drawRio(player) });
  for (const e of enemies) drawables.push({ y: e.y, draw: () => drawRunner(e) });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();
  drawParticles();
  if (DEV && debugEl.classList.contains("on")) drawDebugBoxes();

  if (shakeX || shakeY) X.translate(-shakeX, -shakeY);

  // Screen flash sits behind HUD so HUD stays readable through the brightest moment.
  if (flashFrames > 0) {
    const a = Math.min(0.85, flashFrames / 5);
    X.fillStyle = "rgba(255,255,255," + a.toFixed(2) + ")";
    X.fillRect(0, 0, W, H);
  }

  drawHUD();

  X.fillStyle = "#888";
  X.font = "9px ui-monospace, monospace";
  X.textAlign = "right";
  X.textBaseline = "top";
  X.fillText("ESC : title", W - 6, 4);
}

// ---------- Boot ----------
requestAnimationFrame((t) => { last = t / 1000; frame(t); });
</script>
</body>
</html>
