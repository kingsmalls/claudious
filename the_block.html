// Default attack name per enemy type — what the AI swings.
const ENEMY_DEFAULT_ATTACK = {
  runner: "swipe", tank: "slam", lamplight: "shot",
  slice: "lunge", chains: "swing", shade: "strike",
  dojo: "counter", rig: "strike", baron: "jab",
  razor: "slash", volt: "strike", blackwell: "punch",
};

function makeEnemy(type, x, y) {
  const stats = ENEMY_STATS[type] || ENEMY_STATS.runner;
  // Difficulty: scale enemy HP at spawn so the toughness curve matches the
  // tier the player chose. Bosses scale slightly less so cinematic-feel HP
  // bars stay readable across difficulty.
  const cfg = (typeof difficultyConfig === "function") ? difficultyConfig() : null;
  const hpMul = cfg ? (stats.isBoss ? Math.sqrt(cfg.enemyHpMul) : cfg.enemyHpMul) : 1;
  const aggrMul = cfg ? cfg.enemyAggrMul : 1;
  // Variant promotion: 25%% chance a non-boss enemy spawns as a named
  // sub-type from content/enemy_variants.json. Applies stat multipliers
  // and stores dialog lines for use on hurt / KO.
  let variant = null;
  if (!stats.isBoss && ENEMY_VARIANTS[type] && Array.isArray(ENEMY_VARIANTS[type]) &&
      ENEMY_VARIANTS[type].length > 0 && Math.random() < 0.25) {
    variant = ENEMY_VARIANTS[type][Math.floor(Math.random() * ENEMY_VARIANTS[type].length)];
  }
  const vHp     = variant && typeof variant.hp_mul     === "number" ? variant.hp_mul     : 1;
  const vSpeed  = variant && typeof variant.speed_mul  === "number" ? variant.speed_mul  : 1;
  const vDmg    = variant && typeof variant.damage_mul === "number" ? variant.damage_mul : 1;
  const scaledHp = Math.max(1, Math.round(stats.hp * hpMul * vHp));
  return {
    type, x, y, z: 0,
    isBoss: !!stats.isBoss,
    bossName: stats.bossName || null,
    bossPatternStep: 0,
    vx: 0, vy: 0, vz: 0,
    airborne: false,
    knockdownFrames: 0,
    facing: -1,
    animState: "idle",
    animTime: 0,
    walkSpeed: stats.walkSpeed * vSpeed,
    runSpeed:  stats.runSpeed  * vSpeed,
    hp: scaledHp, hpMax: scaledHp,
    aggrMul,
    damageMul: vDmg,
    variantName: variant ? variant.name : null,
    variantSubtitle: variant ? variant.subtitle : null,
    dialogGrunt: variant ? variant.dialog_grunt : null,
    dialogKod:   variant ? variant.dialog_kod   : null,
    range: stats.range,
    hurtHw: stats.hurtHw, hurtHd: stats.hurtHd, hurtHi: stats.hurtHi,
    staggerN: stats.staggerN || 1,
    staggerCount: 0,
    attacking: false,
    attackName: null,
    attackFrame: 0,
    iframes: 0,
    hitstun: 0,
    knockX: 0, knockY: 0,
    aiCooldown: 0.5 + Math.random() * 0.7,
    fleeing: false,
    dead: false,
    deathTimer: 0,
    grabbedBy: null,
    // Type-specific scratch state.
    vanishTimer: type === "shade" ? 1.6 + Math.random() : 0,
    vanishAlpha: 1,
    vanishing: false,
    guardActive: type === "dojo",
    guardTimer: type === "dojo" ? 0 : 0,
    hitboxes: [],
    hurtboxes: [],
    attackHits: null,
  };
}

// Backwards-compat alias used by old call sites.
function makeRunner(x, y) { return makeEnemy("runner", x, y); }

// Single dispatcher for every enemy type. The framework branches (dead /
// grabbed / airborne / knockdown / hitstun) are common; the AI choice
// branches by e.type.
function updateEnemy(e, dt) {
  if (e.dead) {
    e.deathTimer += dt;
    e.x += e.knockX * dt;
    e.knockX *= 0.86;
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
    if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
    return;
  }
  if (e.grabbedBy) {
    e.animState = "grabbed";
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    return;
  }
  if (e.iframes > 0) e.iframes--;

  if (e.airborne) {
    e.vz -= GRAVITY * dt;
    e.z += e.vz * dt;
    e.x += e.knockX * dt;
    e.knockX *= 0.94;
    if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
    if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
    if (e.z <= 0) {
      e.z = 0; e.vz = 0;
      e.airborne = false;
      e.knockdownFrames = 28;
      e.iframes = Math.max(e.iframes, 28);
    }
    e.animState = "air";
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    e.hurtboxes.push({ cx: e.x, cy: e.y, hw: e.hurtHw, hd: e.hurtHd, lo: e.z, hi: e.z + e.hurtHi });
    return;
  }
  if (e.knockdownFrames > 0) {
    e.knockdownFrames--;
    e.animState = "down";
    e.animTime += dt;
    e.x += e.knockX * dt;
    e.knockX *= 0.6;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    e.hurtboxes.push({ cx: e.x, cy: e.y, hw: e.hurtHw + 1, hd: e.hurtHd + 1, lo: 0, hi: 12 });
    return;
  }
  if (e.hitstun > 0) {
    e.hitstun--;
    e.x += e.knockX * dt;
    e.y += e.knockY * dt;
    e.knockX *= 0.82; e.knockY *= 0.82;
    if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
    if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
    if (e.y < STAGE_TOP) e.y = STAGE_TOP;
    if (e.y > STAGE_BOT) e.y = STAGE_BOT;
    e.animState = "hurt";
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    e.hurtboxes.push({ cx: e.x, cy: e.y, hw: e.hurtHw, hd: e.hurtHd, lo: 0, hi: e.hurtHi });
    return;
  }

  e.aiCooldown -= dt;

  // Per-type "passive" behavior (vanish countdowns, guard cycles, etc.).
  if (e.type === "shade") updateShadeVanish(e, dt);
  else if (e.type === "dojo") updateDojoGuard(e, dt);

  // Drive an in-progress attack to completion (frame data lookup is by name).
  if (e.attacking) {
    advanceEnemyAttack(e);
    e.animState = "atk";
    e.animTime += dt;
  } else if (player && !player.dead) {
    runEnemyAI(e, dt);
  } else {
    e.animState = "idle";
    e.animTime += dt;
  }

  if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
  if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
  if (e.y < STAGE_TOP) e.y = STAGE_TOP;
  if (e.y > STAGE_BOT) e.y = STAGE_BOT;

  e.hurtboxes.length = 0;
  e.hurtboxes.push({
    cx: e.x, cy: e.y,
    hw: e.hurtHw, hd: e.hurtHd, lo: 0, hi: e.hurtHi,
  });
}

// Keep the old name for compatibility (the dispatcher in updatePlaying calls it).
const updateRunner = updateEnemy;

// Step the active attack: position the persistent hitbox each tick, expire on
// recovery end. Spawns a projectile on the active frame for shooter enemies.
function advanceEnemyAttack(e) {
  e.attackFrame++;
  const d = ENEMY_ATK[e.type + "_" + e.attackName];
  if (!d) {
    e.attacking = false; e.attackName = null;
    e.hitboxes.length = 0; e.attackHits = null;
    return;
  }

  // Self-push for dashing attacks (slice's lunge).
  if (d.pushSelf && e.attackFrame > d.startup && e.attackFrame <= d.startup + d.active) {
    e.x += e.facing * d.pushSelf * STEP;
  }

  // Charged-shot telegraph: glow particles around the wind-up.
  if (d.chargedShot && e.attackFrame > 4 && e.attackFrame < d.startup &&
      (e.attackFrame & 3) === 0) {
    spawnSpark(e.x + (Math.random() - 0.5) * 14, e.y - 22 + (Math.random() - 0.5) * 12, "#ffd76a");
  }

  // Shockwave telegraph: ground rumble particles during startup.
  if (d.shockwave && e.attackFrame > d.startup - 8 && e.attackFrame < d.startup &&
      (e.attackFrame & 1) === 0) {
    spawnSpark(e.x + (Math.random() - 0.5) * 30, e.y + 2, "#a08560");
  }

  // Multi-hit: clear the per-attack consumed-hits set every multiHit frames so
  // the same target can be hit again as the active window continues (chains spin).
  if (d.multiHit && e.attackFrame > d.startup &&
      ((e.attackFrame - d.startup - 1) % d.multiHit) === 0 && e.attackHits) {
    e.attackHits.clear();
  }

  // Spawn projectile on first active frame. Hipfire's bullet_fan fires three
  // bullets across the active window with vertical spread to read as a fan.
  if (d.spawnsProjectile === "bullet_fan") {
    const fanFrames = [d.startup + 1, d.startup + Math.floor(d.active / 2) + 1, d.startup + d.active];
    const yOffsets = [-30, -36, -22]; // gut / chest / knee spread
    const idx = fanFrames.indexOf(e.attackFrame);
    if (idx >= 0) {
      spawnProjectile("bullet", e.x + e.facing * 12, e.y + yOffsets[idx], e.facing, e);
    }
  } else if (d.spawnsProjectile && e.attackFrame === d.startup + 1) {
    spawnProjectile(d.spawnsProjectile, e.x + e.facing * 12, e.y - 22, e.facing, e);
  }

  // Shockwave AOE: when active phase begins, emit a burst of particles on
  // both sides of the attacker to read as a ground shake.
  if (d.shockwave && e.attackFrame === d.startup + 1) {
    for (let i = 0; i < 14; i++) {
      const dx = (Math.random() * 2 - 1) * 32;
      const dz = Math.random() * 6;
      spawnSpark(e.x + dx, e.y + 2 - dz, "#a08560");
    }
    if (shakeFrames < 10) shakeFrames = 10;
  }

  if (d.hit && e.attackFrame > d.startup && e.attackFrame <= d.startup + d.active) {
    if (e.hitboxes.length === 0) {
      e.hitboxes.push({
        cx: 0, cy: 0,
        hw: d.hit.hw, hd: d.hit.hd,
        lo: d.hit.lo, hi: d.hit.hi,
        damage: d.damage,
        knockback: d.knockback,
        hitstop: d.hitstop,
        facing: e.facing,
        owner: e,
        hits: e.attackHits,
      });
    }
    const hb = e.hitboxes[0];
    // Centered hitboxes (fwd === 0) sit on the attacker's body — chains_spin,
    // rig_pound. Forward-facing hitboxes (fwd > 0) extend ahead like normal.
    hb.cx = e.x + e.facing * d.hit.fwd;
    hb.cy = e.y;
    hb.facing = e.facing;
  } else {
    e.hitboxes.length = 0;
  }
  if (e.attackFrame >= d.startup + d.active + d.recovery) {
    const finishedName = e.attackName;
    e.attacking = false;
    e.attackName = null;
    e.hitboxes.length = 0;
    e.attackHits = null;
    e.aiCooldown = (0.55 + Math.random() * 0.55) * (e.aggrMul || 1);
    // Post-attack behavior hooks: schedule retreat / next-move state.
    if (e.type === "runner" && finishedName === "swipe") {
      // Runner backpedals briefly so the next encounter resets — hit-and-run.
      e.runnerRetreat = 0.45;
    } else if (e.type === "slice" && finishedName === "lunge") {
      // Slice always backs out after a lunge so it never sits in player range.
      e.sliceRetreat = 0.35;
    } else if (e.type === "shade" && finishedName === "strike") {
      // Shade re-engages vanish sooner to keep the teleport pressure up.
      e.vanishTimer = Math.min(e.vanishTimer, 1.1);
    }
  }
}

function startEnemyAttack(e, name) {
  e.attacking = true;
  e.attackName = name;
  e.attackFrame = 0;
  e.attackHits = new Set();
  e.vx = 0; e.vy = 0;
}

function runEnemyAI(e, dt) {
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy) || 0.0001;
  if (Math.abs(dx) > 1) e.facing = dx > 0 ? 1 : -1;

  switch (e.type) {
    case "runner": runRunnerAI(e, dx, dy, dist, dt); break;
    case "tank":   runTankAI(e, dx, dy, dist, dt); break;
    case "slice":  runSliceAI(e, dx, dy, dist, dt); break;
    case "rig":    runRigAI(e, dx, dy, dist, dt); break;
    case "shade":  runShadeAI(e, dx, dy, dist, dt); break;
    case "dojo":   runDojoAI(e, dx, dy, dist, dt); break;
    case "chains": runChainsAI(e, dx, dy, dist, dt); break;
    case "baron":     runBaronAI(e, dx, dy, dist, dt); break;
    case "razor":     runRazorAI(e, dx, dy, dist, dt); break;
    case "volt":      runVoltAI(e, dx, dy, dist, dt); break;
    case "blackwell": runBlackwellAI(e, dx, dy, dist, dt); break;
    case "lamplight": {
      // Five-attack rotation by distance:
      //   < 30 px         -> melee (whip / coat_kick alternating)
      //   30 - 70 px      -> hipfire fan (area denial as player closes)
      //   70 - 110 px     -> ideal range (shot / charged rotation)
      //   > 110 px        -> walk forward to close to ideal range
      const meleeRange = 30, fanRange = 70, idealMin = 70, idealMax = 110;
      if (dist < meleeRange) {
        // Close range — alternate pistol-whip and coat-flare kick.
        e.vx = 0; e.vy = 0;
        e.animState = "idle";
        if (e.aiCooldown <= 0) {
          e.lampMelee = (e.lampMelee || 0) + 1;
          const atk = (e.lampMelee % 2 === 0) ? "coat_kick" : "whip";
          startEnemyAttack(e, atk);
        }
      } else if (dist < fanRange) {
        // Mid-close — back up a touch but spray the hipfire fan to deny ground.
        const back = -Math.sign(dx || 1);
        e.vx = back * e.walkSpeed * 0.6;
        e.x += e.vx * dt;
        e.animState = "walk";
        if (e.aiCooldown <= 0) {
          startEnemyAttack(e, "hipfire");
        }
      } else if (dist > idealMax) {
        // Too far — walk forward to ideal range.
        e.vx = (dx / dist) * e.walkSpeed * 0.6;
        e.vy = (dy / dist) * e.walkSpeed * 0.6;
        e.x += e.vx * dt; e.y += e.vy * dt;
        e.animState = "walk";
      } else {
        // Ideal range — shot / charged rotation (charged every 4th).
        e.vx = 0; e.vy = 0;
        e.animState = "idle";
        if (e.aiCooldown <= 0) {
          e.lampShots = (e.lampShots || 0) + 1;
          const atk = (e.lampShots % 4 === 0) ? "charged" : "shot";
          startEnemyAttack(e, atk);
        }
      }
      break;
    }
    default: approachOrAttack(e, dx, dy, dist, dt); break;
  }
  e.animTime += dt;
}

function approachOrAttack(e, dx, dy, dist, dt) {
  if (dist > e.range) {
    const speed = e.walkSpeed;
    e.vx = (dx / dist) * speed;
    e.vy = (dy / dist) * speed;
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.animState = "walk";
  } else {
    e.vx = 0; e.vy = 0;
    e.animState = "idle";
    if (e.aiCooldown <= 0) {
      startEnemyAttack(e, ENEMY_DEFAULT_ATTACK[e.type]);
    }
  }
}

// ---------- Per-minion AI signatures ----------
// Each function gives the minion a real fighting style instead of the generic
// approach-and-swipe. Boss AIs already had this; minions now do too.

// RUNNER: hit-and-run with multi-attack pattern. Cycles swipe / tackle / kick
// instead of just one swipe. At low HP, panicked flee.
function runRunnerAI(e, dx, dy, dist, dt) {
  if (!e.fleeing && e.hp < e.hpMax * 0.3) e.fleeing = true;
  if (e.fleeing) {
    // Cornered: if player is close OR runner is jammed against the stage
    // edge, drop the flee and swing back. Otherwise he becomes uncatchable
    // (especially against slow characters like Atlas) and the wave never
    // clears because he can't be reached.
    const atEdge = (e.x <= STAGE_LEFT_PAD + 4) || (e.x >= W - STAGE_RIGHT_PAD - 4);
    const playerClose = dist < e.range + 8;
    if (atEdge || playerClose) {
      // Turn and fight — desperate-mook mode.
      e.vx = 0; e.vy = 0;
      e.facing = (player.x > e.x) ? 1 : -1;
      e.animState = "idle";
      if (e.aiCooldown <= 0) {
        startEnemyAttack(e, "swipe");
      }
      return;
    }
    const fleeDir = (player.x > e.x) ? -1 : 1;
    e.facing = fleeDir;
    e.vx = fleeDir * e.walkSpeed * 1.2;   // was runSpeed — too fast to catch
    e.vy = (e.y < STAGE_TOP + 20) ? 30 : (e.y > STAGE_BOT - 20 ? -30 : 0);
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    return;
  }
  if (e.runnerRetreat > 0) {
    e.runnerRetreat -= dt;
    const back = -Math.sign(dx || 1);
    e.facing = -back;
    e.vx = back * e.runSpeed;
    e.x += e.vx * dt;
    e.animState = "walk";
    return;
  }
  if (dist > e.range) {
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
  } else {
    e.vx = 0; e.vy = 0;
    e.animState = "idle";
    if (e.aiCooldown <= 0) {
      const pattern = (e.hp < e.hpMax * 0.6)
        ? ["swipe", "tackle", "swipe", "kick", "tackle"]
        : ["swipe", "swipe", "kick", "swipe", "tackle"];
      const atk = pattern[(e.bossPatternStep = (e.bossPatternStep || 0) + 1) % pattern.length];
      startEnemyAttack(e, atk);
    }
  }
}

// TANK: super-armored heavy with multi-attack rotation. Closes distance with
// shoulder charges at mid-range; alternates slam / grab / charge at point-
// blank. Phase 2 (under 50%) compresses the cycle so attacks chain faster.
function runTankAI(e, dx, dy, dist, dt) {
  if (dist > e.range + 24) {
    // At long range, sometimes shoulder-charge to close the gap.
    if (e.aiCooldown <= 0 && Math.random() < 0.4) {
      startEnemyAttack(e, "charge");
      return;
    }
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    return;
  }
  e.vx = 0; e.vy = 0;
  e.animState = "idle";
  if (e.aiCooldown <= 0) {
    const pattern = (e.hp < e.hpMax * 0.5)
      ? ["slam", "grab", "slam", "charge", "grab", "slam"]
      : ["slam", "slam", "grab", "slam", "charge"];
    const atk = pattern[(e.bossPatternStep = (e.bossPatternStep || 0) + 1) % pattern.length];
    startEnemyAttack(e, atk);
    if (atk === "slam") e.tankTelegraph = 14;
  }
  if (e.tankTelegraph > 0) {
    e.tankTelegraph--;
    if ((e.tankTelegraph & 1) === 0) {
      spawnSpark(e.x + (Math.random() - 0.5) * 24, e.y + 2, "#5a4a36");
    }
  }
}

// SLICE: hit-and-run knife with three move types. Lunges in, flurries with
// rapid slashes, occasionally pulls a backstab if the player turns away.
// Always retreats after a hit. Phase 2 leans into flurry + backstab.
function runSliceAI(e, dx, dy, dist, dt) {
  if (e.sliceRetreat > 0) {
    e.sliceRetreat -= dt;
    const back = -Math.sign(dx || 1);
    e.facing = -back;
    e.vx = back * e.runSpeed * 1.1;
    e.x += e.vx * dt;
    e.animState = "walk";
    return;
  }
  if (dist > e.range) {
    e.vx = (dx / dist) * e.runSpeed * 0.9;
    e.vy = (dy / dist) * e.runSpeed * 0.9;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    return;
  }
  e.vx = 0; e.vy = 0;
  e.animState = "idle";
  if (e.aiCooldown <= 0) {
    const pattern = (e.hp < e.hpMax * 0.5)
      ? ["lunge", "flurry", "backstab", "flurry", "lunge", "backstab"]
      : ["lunge", "lunge", "flurry", "lunge", "flurry"];
    const atk = pattern[(e.bossPatternStep = (e.bossPatternStep || 0) + 1) % pattern.length];
    startEnemyAttack(e, atk);
  }
}

// CHAINS: alternates a long-reach swing and a 360° spin. The spin covers both
// sides — players can't sidestep through it; have to jump or back off.
function runChainsAI(e, dx, dy, dist, dt) {
  if (dist > e.range) {
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    return;
  }
  e.vx = 0; e.vy = 0;
  e.animState = "idle";
  if (e.aiCooldown <= 0) {
    // Phase 2 mixes the 360° spin in more aggressively.
    const pattern = (e.hp < e.hpMax * 0.5)
      ? ["swing", "spin", "swing", "spin", "swing"]
      : ["swing", "swing", "spin", "swing", "swing"];
    const atk = pattern[(e.bossPatternStep = (e.bossPatternStep || 0) + 1) % pattern.length];
    startEnemyAttack(e, atk);
  }
}

// RIG: strike + pound + ranged tool throw. Throws the wrench when player is
// at mid-range, ground-pound AOE at close range. Phase 2 adds more pounds.
function runRigAI(e, dx, dy, dist, dt) {
  // At mid-range, Rig will sometimes wrecking-ball charge to close the gap
  // instead of just walking. The shoulder-charge has pushSelf so it both
  // moves him AND hits if you're in the way.
  if (dist > e.range) {
    if (dist > 50 && dist < 110 && e.aiCooldown <= 0 && Math.random() < 0.35) {
      startEnemyAttack(e, "charge");
      return;
    }
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    return;
  }
  e.vx = 0; e.vy = 0;
  e.animState = "idle";
  if (e.aiCooldown <= 0) {
    // Six-attack rotation. Pound is the AOE finisher and overhead is the
    // big single-target. Phase 2 (under 50% HP) leans on clap + overhead +
    // pound combos for more pressure.
    const pattern = (e.hp < e.hpMax * 0.5)
      ? ["strike", "boot_kick", "clap", "overhead", "pound", "clap", "strike", "overhead", "pound"]
      : ["strike", "boot_kick", "strike", "clap", "boot_kick", "overhead", "strike", "pound"];
    const atk = pattern[(e.bossPatternStep = (e.bossPatternStep || 0) + 1) % pattern.length];
    startEnemyAttack(e, atk);
  }
}

// SHADE: pattern cycle around vanish/reappear gimmick. The vanish itself
// is driven by updateShadeVanish; this AI picks which attack fires when
// Shade is solid and within range. Strike at distance, sweep at close
// range (low chop), backstab automatically after reappear.
function runShadeAI(e, dx, dy, dist, dt) {
  if (dist > e.range) {
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    return;
  }
  e.vx = 0; e.vy = 0;
  e.animState = "idle";
  if (e.aiCooldown <= 0) {
    // Six-attack rotation. Backstab auto-fires after reappear (handled
    // elsewhere). Phantom-clone is the big "every Nth" deception; cyclone
    // and twin_blade are mid-tier; strike/sweep are the basic poke pair.
    // Phase 2 (under 50% HP) leans on the cyclone + twin_blade + phantom
    // for more pressure.
    const pattern = (e.hp < e.hpMax * 0.5)
      ? ["strike", "cyclone", "sweep", "twin_blade", "cyclone",
         "phantom", "twin_blade", "strike", "phantom"]
      : ["strike", "sweep", "strike", "cyclone",
         "sweep", "twin_blade", "strike", "phantom"];
    const atk = pattern[(e.bossPatternStep = (e.bossPatternStep || 0) + 1) % pattern.length];
    startEnemyAttack(e, atk);
  }
}

// DOJO: martial artist with four kicks. Cycles counter / roundhouse /
// flying_knee with the parry-strike as the default. Phase 2 introduces
// more aggressive kick chains.
function runDojoAI(e, dx, dy, dist, dt) {
  if (dist > e.range) {
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    return;
  }
  e.vx = 0; e.vy = 0;
  e.animState = "idle";
  if (e.aiCooldown <= 0) {
    const pattern = (e.hp < e.hpMax * 0.5)
      ? ["counter", "roundhouse", "flying_knee", "roundhouse",
         "counter", "flying_knee"]
      : ["counter", "roundhouse", "counter", "flying_knee", "roundhouse"];
    const atk = pattern[(e.bossPatternStep = (e.bossPatternStep || 0) + 1) % pattern.length];
    startEnemyAttack(e, atk);
  }
}

// SHADE: pulse-vanish and reposition behind the player.
function updateShadeVanish(e, dt) {
  e.vanishTimer -= dt;
  if (e.vanishing) {
    e.vanishAlpha -= dt * 4;
    if (e.vanishAlpha <= 0) {
      // Reappear behind the player on the opposite side.
      e.vanishAlpha = 0;
      if (player) {
        const side = (player.x > W / 2) ? -1 : 1;
        e.x = clamp(player.x + side * 70, STAGE_LEFT_PAD, W - STAGE_RIGHT_PAD);
        e.y = clamp(player.y, STAGE_TOP, STAGE_BOT);
        // Smoke trail at reappear point.
        for (let i = 0; i < 6; i++) {
          spawnSpark(e.x + (Math.random() - 0.5) * 14, e.y - 18 + (Math.random() - 0.5) * 12, "#3a3550");
        }
        // Backstab: queue an immediate strike so reappear-from-behind has bite.
        e.shadeBackstabIn = 0.20;
      }
      e.vanishing = false;
      e.vanishAlpha = 0.05;
    }
  } else {
    if (e.vanishAlpha < 1) e.vanishAlpha = Math.min(1, e.vanishAlpha + dt * 4);
    if (e.vanishTimer <= 0 && !e.attacking && e.hitstun === 0) {
      e.vanishing = true;
      e.vanishTimer = 2.0 + Math.random() * 1.4;
    }
  }
  // If a backstab was scheduled, fire when window expires (and we're visible).
  if (e.shadeBackstabIn > 0 && !e.vanishing) {
    e.shadeBackstabIn -= dt;
    if (e.shadeBackstabIn <= 0 && !e.attacking && e.hitstun === 0) {
      startEnemyAttack(e, "materialise");
    }
  }
}

// DOJO: short guard windows. While guardActive, incoming player hits are
// deflected by deflectHit() and the dojo immediately counters.
function updateDojoGuard(e, dt) {
  e.guardTimer = (e.guardTimer || 0) + dt;
  // 1.0s guard / 1.4s open cycle.
  e.guardActive = (e.guardTimer % 2.4) < 1.0;
}

function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }

// RAZOR: fast slasher. Strings 1-2 quick slashes, occasionally dashes through.
// Phase 2 (<40%% HP) starts throwing knives.
function runRazorAI(e, dx, dy, dist, dt) {
  if (Math.abs(dx) > 1) e.facing = dx > 0 ? 1 : -1;
  const phase2 = e.hp < e.hpMax * 0.4;
  if (dist > e.range) {
    e.vx = (dx / dist) * e.runSpeed;
    e.vy = (dy / dist) * e.runSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
  } else if (e.aiCooldown <= 0) {
    const pattern = phase2
      ? ["slash", "throw", "dash", "slash", "slash", "throw"]
      : ["slash", "slash", "dash", "slash"];
    const atk = pattern[e.bossPatternStep % pattern.length];
    e.bossPatternStep++;
    startEnemyAttack(e, atk);
  } else {
    e.vx = 0; e.vy = 0;
    e.animState = "idle";
  }
}

// VOLT: heavy cyber striker. Mixes melee, an uppercut launcher, and a shock-wave.
function runVoltAI(e, dx, dy, dist, dt) {
  if (Math.abs(dx) > 1) e.facing = dx > 0 ? 1 : -1;
  const phase2 = e.hp < e.hpMax * 0.5;
  if (dist > e.range) {
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    // Sometimes shock-wave at long range.
    if (dist > 90 && e.aiCooldown <= 0 && Math.random() < 0.6) {
      startEnemyAttack(e, "shock");
    }
  } else if (e.aiCooldown <= 0) {
    const pattern = phase2
      ? ["strike", "uppercut", "strike", "shock", "uppercut"]
      : ["strike", "strike", "uppercut", "shock"];
    const atk = pattern[e.bossPatternStep % pattern.length];
    e.bossPatternStep++;
    startEnemyAttack(e, atk);
  } else {
    e.vx = 0; e.vy = 0;
    e.animState = "idle";
  }
}

// BLACKWELL: Kane's enforcer. Heavy super-armored attacks with a charge.
function runBlackwellAI(e, dx, dy, dist, dt) {
  if (Math.abs(dx) > 1) e.facing = dx > 0 ? 1 : -1;
  const phase2 = e.hp < e.hpMax * 0.5;
  if (dist > e.range) {
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.animState = "walk";
    if (dist > 70 && e.aiCooldown <= 0 && Math.random() < 0.4) {
      startEnemyAttack(e, "charge");
    }
  } else if (e.aiCooldown <= 0) {
    // Phase 1: hook + knee + charge + overhead + throat_lift.
    // Phase 2: adds earthquake AOE and JUGGERNAUT special. The patterns
    // mix VFX-heavy moves (concrete-breaker charge, apocalypse overhead,
    // earthquake stomp) so every couple of attacks something visually
    // distinctive happens.
    const pattern = phase2
      ? ["punch", "knee", "throat_lift", "overhead", "earthquake",
         "charge", "special", "punch", "knee", "earthquake",
         "overhead", "throat_lift"]
      : ["punch", "knee", "punch", "charge", "knee",
         "punch", "overhead", "throat_lift"];
    const atk = pattern[e.bossPatternStep % pattern.length];
    e.bossPatternStep++;
    startEnemyAttack(e, atk);
  } else {
    e.vx = 0; e.vy = 0;
    e.animState = "idle";
  }
}

// BARON: methodical pattern jab → jab → cross → haymaker → jab → cross.
// Phase 2 (HP < 50%) compresses the pattern and shortens cooldowns.
function runBaronAI(e, dx, dy, dist, dt) {
  if (Math.abs(dx) > 1) e.facing = dx > 0 ? 1 : -1;
  const phase2 = e.hp < e.hpMax * 0.5;

  if (dist > e.range) {
    e.vx = (dx / dist) * e.walkSpeed;
    e.vy = (dy / dist) * e.walkSpeed;
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.animState = "walk";
  } else {
    e.vx = 0; e.vy = 0;
    e.animState = "idle";
    if (e.aiCooldown <= 0) {
      const pattern = phase2
        ? ["jab", "cross", "jab", "haymaker", "cross", "haymaker"]
        : ["jab", "jab", "cross", "haymaker", "jab", "cross"];
      const atk = pattern[e.bossPatternStep % pattern.length];
      e.bossPatternStep++;
      startEnemyAttack(e, atk);
      // Cooldowns set when the attack ends in advanceEnemyAttack; for telegraphed
      // haymakers we reduce the post-cooldown so the player gets a window.
    }
  }
}

// Dojo deflect — player's incoming hit bounces; player gets pushed back, the
// dojo immediately starts a counter swing. No damage to dojo.
function deflectHit(d, hb, attacker) {
  if (attacker !== player) return;
  // Shove the player back.
  const dir = (player.x < d.x) ? -1 : 1;
  player.knockX = dir * 80;
  player.hitstun = 6;
  player.attacking = false;
  player.attackName = null;
  if (player.hitboxes) player.hitboxes.length = 0;
  player.attackHits = null;
  // Spark + word.
  spawnParrySparkle(d.x - dir * 12, d.y - 18, "good");
  spawnParryWord(d.x, d.y - 30, "DEFLECT", "#a8c8f4");
  if (hitstopFrames < 5) hitstopFrames = 5;
  // Counter immediately.
  startEnemyAttack(d, "counter");
  if (hb.hits) hb.hits.add(d);   // mark as consumed so this frame doesn't keep retriggering
}

// ---------- Projectiles (LAMPLIGHT bullets, bottle throws, etc.) ----------
function spawnProjectile(kind, x, y, dir, owner) {
  const def =
    kind === "bullet" ? { speed: 280, damage: 9,  knockback: 60,  hitstop: 4, w: 5, h: 2, color: "#ffd76a" } :
    kind === "bottle" ? { speed: 180, damage: 6,  knockback: 40,  hitstop: 3, w: 4, h: 5, color: "#7fa8a4", arc: -160 } :
    kind === "knife"  ? { speed: 240, damage: 12, knockback: 80,  hitstop: 5, w: 8, h: 3, color: "#cfd0d6" } :
    kind === "shock"  ? { speed: 200, damage: 14, knockback: 120, hitstop: 6, w: 14, h: 10, color: "#a8d4ff" } :
    kind === "heavy_bullet" ? { speed: 220, damage: 18, knockback: 140, hitstop: 7, w: 9, h: 4, color: "#ff8a40" } :
    kind === "wrench" ? { speed: 180, damage: 14, knockback: 110, hitstop: 6, w: 10, h: 5, color: "#a8a4a0", arc: -80 } :
                        { speed: 200, damage: 5,  knockback: 40,  hitstop: 3, w: 4, h: 4, color: "#fff" };
  projectiles.push({
    kind, x, y, vx: dir * def.speed, vy: 0, vz: def.arc || 0, z: 0,
    life: 0, maxLife: 1.6,
    damage: def.damage, knockback: def.knockback, hitstop: def.hitstop,
    w: def.w, h: def.h, color: def.color,
    facing: dir, owner,
  });
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life += dt;
    p.x += p.vx * dt;
    p.z += p.vz * dt;
    if (p.kind === "bottle") p.vz -= 240 * dt;
    if (p.z < -2) { projectiles.splice(i, 1); continue; }
    if (p.x < -8 || p.x > W + 8 || p.life > p.maxLife) { projectiles.splice(i, 1); continue; }
    // Hit player if any.
    if (player && !player.dead && player.iframes <= 0 && !player.dodging) {
      // Box overlap on x and depth.
      if (Math.abs(p.x - player.x) < player.hurtboxes[0]?.hw + p.w / 2 + 2 &&
          Math.abs(p.y - player.y) < player.hurtboxes[0]?.hd + 6) {
        // Player parry intercepts projectile.
        if (player.parryFrame >= 1 && player.parryFrame <= PARRY_ACTIVE) {
          resolveParry(player, {
            cx: p.x, cy: p.y, hw: p.w, hd: p.h,
            damage: p.damage, knockback: p.knockback, hitstop: p.hitstop,
            hits: new Set(),
          }, p.owner);
        } else {
          applyHit(player, {
            cx: p.x, cy: p.y, hw: p.w, hd: p.h,
            damage: p.damage, knockback: p.knockback, hitstop: p.hitstop,
            hits: new Set(),
          }, p.owner);
        }
        projectiles.splice(i, 1);
      }
    }
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    const sx = Math.round(p.x), sy = Math.round(p.y - p.z);
    if (p.kind === "bullet") {
      // Tracer streak with a glowing core.
      X.fillStyle = "rgba(255,215,106,0.45)";
      X.fillRect(sx - p.facing * 8, sy - 1, 8, 2);
      X.fillStyle = p.color;
      X.fillRect(sx - 2, sy - 1, p.w, p.h);
      X.fillStyle = "rgba(255,255,255,1)";
      X.fillRect(sx, sy, 2, 1);
    } else if (p.kind === "bottle") {
      X.fillStyle = p.color;
      X.fillRect(sx - 2, sy - 3, 4, 5);
      X.fillStyle = "#a8d4d0";
      X.fillRect(sx - 1, sy - 4, 2, 1);
    } else if (p.kind === "knife") {
      // Spinning blade — drawn as cross-shape rotated by life.
      const ang = p.life * 18 * (p.facing > 0 ? 1 : -1);
      const cs = Math.cos(ang), sn = Math.sin(ang);
      X.fillStyle = "#cfd0d6";
      for (let i = -3; i <= 3; i++) {
        X.fillRect(Math.round(sx + cs * i), Math.round(sy + sn * i), 2, 2);
      }
      X.fillStyle = "#ffffff";
      X.fillRect(sx, sy, 2, 1);
    } else if (p.kind === "shock") {
      // Pulsing electric ball with arcs.
      const pulse = 0.6 + 0.4 * Math.sin(p.life * 24);
      X.fillStyle = "rgba(168,212,255," + pulse.toFixed(2) + ")";
      X.fillRect(sx - 7, sy - 5, 14, 10);
      X.fillStyle = "rgba(255,255,255,0.9)";
      X.fillRect(sx - 2, sy - 1, 4, 2);
      // Side arcs.
      X.fillStyle = "rgba(168,212,255,0.7)";
      X.fillRect(sx - 11, sy - 1, 4, 1);
      X.fillRect(sx + 7,  sy - 1, 4, 1);
    } else if (p.kind === "heavy_bullet") {
      // Charged shot: chunky orange tracer with hot core and a flame trail.
      X.fillStyle = "rgba(255,138,64,0.55)";
      X.fillRect(sx - p.facing * 14, sy - 2, 14, 4);
      X.fillStyle = p.color;
      X.fillRect(sx - 4, sy - 2, p.w, p.h);
      X.fillStyle = "rgba(255,240,180,1)";
      X.fillRect(sx - 1, sy - 1, 3, 2);
    } else {
      X.fillStyle = p.color;
      X.fillRect(sx - p.w / 2, sy - p.h / 2, p.w, p.h);
    }
  }
}

// ---------- RUNNER renderer ----------
const RUNNER_COLORS = {
  hoodie:     "#36363f",
  hoodieDark: "#23232a",
  pants:      "#2f3a4a",
  pantsDark:  "#1f2838",
  shoe:       "#d4cfb8",
  skin:       "#caa07c",
  hoodShadow: "#0c0a12",
};

function drawRunner(e) {
  const sx = Math.round(e.x);
  const sy = Math.round(e.y - e.z);
  const f  = e.facing;
  const k  = RUNNER_COLORS;
  const t  = e.animTime;

  // Drop shadow — at world y (ground), shrinks with elevation.
  X.fillStyle = "rgba(0,0,0," + (0.4 - Math.min(0.25, e.z * 0.004)).toFixed(2) + ")";
  X.beginPath();
  X.ellipse(sx, e.y, Math.max(4, 9 - e.z * 0.06), 3, 0, 0, Math.PI * 2);
  X.fill();

  if (e.dead || e.animState === "down") {
    // Lying on the ground, hood down. While knocked down (alive) the body
    // breathes faintly so it reads as "alive but recovering".
    const breathe = e.dead ? 0 : Math.round(Math.sin(t * 6) * 0.5);
    X.fillStyle = k.hoodie;
    X.fillRect(sx - 13, sy - 6 + breathe, 26, 5);
    X.fillStyle = k.pants;
    X.fillRect(sx + (f > 0 ? -13 : 1), sy - 2, 12, 4);
    X.fillStyle = k.shoe;
    X.fillRect(sx + (f > 0 ? -13 : 9), sy - 1, 4, 3);
    X.fillStyle = k.hoodShadow;
    X.fillRect(sx + (f > 0 ? 7 : -13), sy - 5 + breathe, 6, 4);
    if (!e.dead && e.iframes > 0 && (e.iframes & 4)) {
      X.fillStyle = "rgba(255,255,255,0.4)";
      X.fillRect(sx - 13, sy - 6, 26, 5);
    }
    if (!e.dead && e.hp < e.hpMax) drawEnemyHpPip(sx, sy - 12, e);
    return;
  }

  if (e.animState === "air") {
    // Limbs flail outward — body stretched across.
    X.fillStyle = k.hoodie;
    X.fillRect(sx - 7, sy - 24, 14, 14);   // torso
    X.fillStyle = k.pants;
    X.fillRect(sx - 6, sy - 10, 5, 10);    // leg up
    X.fillRect(sx + 1, sy - 12, 5, 12);
    X.fillStyle = k.hoodie;
    X.fillRect(sx - 11, sy - 22, 4, 3);    // arm flailing left
    X.fillRect(sx + 7,  sy - 26, 4, 3);    // arm flailing right
    X.fillStyle = k.hoodieDark;
    X.fillRect(sx - 6, sy - 32, 12, 8);    // hood/head
    X.fillStyle = k.hoodShadow;
    X.fillRect(sx - 4, sy - 28, 8, 3);
    if (e.hp < e.hpMax) drawEnemyHpPip(sx, sy - 38, e);
    return;
  }

  let armSwing = 0, legSwing = 0, bob = 0;
  if (e.animState === "walk") {
    const s = Math.sin(t * 11);
    legSwing = s * 1.5;
    armSwing = -s * 1.2;
    bob = Math.abs(s) * 0.5;
  } else if (e.animState === "hurt") {
    bob = -2;
  } else if (e.animState === "atk") {
    bob = Math.sin(t * 18) * 0.4;
  }

  const torsoY = sy - 30 - bob;
  const headY  = sy - 38 - bob;

  // Pants + shoes.
  X.fillStyle = k.pants;
  X.fillRect(sx - 5, sy - 16 + Math.round(legSwing > 0 ? 0 : 1), 4, 12);
  X.fillRect(sx + 1, sy - 16 + Math.round(legSwing > 0 ? 1 : 0), 4, 12);
  X.fillStyle = k.pantsDark;
  X.fillRect(sx - 5, sy - 12, 4, 1);
  X.fillRect(sx + 1, sy - 12, 4, 1);
  X.fillStyle = k.shoe;
  X.fillRect(sx - 5, sy - 4, 4, 4);
  X.fillRect(sx + 1, sy - 4, 4, 4);

  // Hoodie torso.
  X.fillStyle = k.hoodie;
  X.fillRect(sx - 7, torsoY, 14, 14);
  X.fillStyle = k.hoodieDark;
  X.fillRect(sx - 7, torsoY + 13, 14, 1);
  X.fillStyle = k.hoodShadow;
  X.fillRect(sx - 6, torsoY + 8, 12, 1); // hoodie pocket seam

  // Arms.
  let atkReach = 0;
  if (e.attacking) {
    const d = ENEMY_ATK.runner_swipe;
    if (e.attackFrame <= d.startup) atkReach = (e.attackFrame / d.startup) * 10;
    else if (e.attackFrame <= d.startup + d.active) atkReach = 10;
    else atkReach = Math.max(0, 10 - (e.attackFrame - d.startup - d.active));
  }
  // Back arm.
  const backArmX = (f > 0) ? sx - 9 : sx + 7;
  X.fillStyle = k.hoodie;
  X.fillRect(backArmX, torsoY + 1 + Math.round(armSwing), 2, 11);
  // Front arm.
  if (atkReach > 0) {
    const ay = torsoY + 4;
    const armX = (f > 0) ? sx + 5 : sx - 5 - atkReach - 3;
    X.fillStyle = k.hoodie;
    X.fillRect(armX, ay, atkReach + 3, 3);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 5 + atkReach, ay, 3, 3);
    else       X.fillRect(sx - 5 - atkReach - 3, ay, 3, 3);
  } else {
    const frontArmX = (f > 0) ? sx + 7 : sx - 9;
    X.fillStyle = k.hoodie;
    X.fillRect(frontArmX, torsoY + 1 - Math.round(armSwing), 2, 11);
  }

  // Hood — wraps the head, comes to a peak.
  X.fillStyle = k.hoodie;
  X.fillRect(sx - 6, headY, 12, 10);
  X.fillRect(sx - 4, headY - 2, 8, 2);
  X.fillRect(sx - 3, headY - 4, 6, 2);
  X.fillStyle = k.hoodieDark;
  X.fillRect(sx - 6, headY + 9, 12, 1);
  // Inside-the-hood face shadow with two pale eye dots.
  X.fillStyle = k.hoodShadow;
  X.fillRect(sx - 4, headY + 4, 8, 4);
  X.fillStyle = "#bababa";
  if (f > 0) {
    X.fillRect(sx + 1, headY + 5, 1, 1);
    X.fillRect(sx - 2, headY + 5, 1, 1);
  } else {
    X.fillRect(sx - 3, headY + 5, 1, 1);
    X.fillRect(sx,     headY + 5, 1, 1);
  }

  // Hurt flash — full white silhouette while iframes are fresh.
  if (e.iframes > 6) {
    X.fillStyle = "rgba(255,255,255,0.7)";
    X.fillRect(sx - 7, headY - 4, 14, 50);
  }

  if (e.hp < e.hpMax) drawEnemyHpPip(sx, headY - 8, e);
}

      const phase = (e.attackFrame - d.startup) / d.active;
      // Draw chain links along an arc in front.
      for (let i = 0; i < 7; i++) {
        const t = i / 6;
        const arc = Math.sin(phase * Math.PI) * 14;
        const lx = sx + f * (8 + t * 22);
        const ly = sy - 24 + Math.sin(phase * Math.PI + t * 1.4) * arc - t * 4;
        X.fillStyle = (i % 2) ? k.chain : k.chainDk;
        X.fillRect(Math.round(lx), Math.round(ly), 2, 2);
      }
      // Spiked end.
      X.fillStyle = k.metal;
      const ex = sx + f * 30;
      const ey = sy - 28 + Math.sin(phase * Math.PI + 1.4) * 14;
      X.fillRect(Math.round(ex), Math.round(ey), 4, 4);
    }
  } else {
    // Coiled at hip.
    X.fillStyle = k.chain;
    X.fillRect(sx + (f > 0 ? 5 : -8), sy - 16, 3, 6);
  }
  if (e.iframes > 6) { X.fillStyle = "rgba(255,255,255,0.65)"; X.fillRect(sx - 8, sy - 50, 16, 52); }
  if (e.hp < e.hpMax) drawEnemyHpPip(sx, sy - 50, e);
}

};

function drawBaron(e) {
  const sx = Math.round(e.x);
  const sy = Math.round(e.y - e.z);
  const f  = e.facing;
  const k  = BARON_COLORS;
  const t  = e.animTime;

  X.fillStyle = "rgba(0,0,0,0.5)";
  X.beginPath(); X.ellipse(sx, e.y, 13, 4, 0, 0, Math.PI*2); X.fill();

  if (e.dead || e.animState === "down") {
    X.fillStyle = k.suit; X.fillRect(sx - 16, sy - 8, 32, 7);
    X.fillStyle = k.tie;  X.fillRect(sx + (f>0?-3:1), sy - 6, 3, 5);
    if (!e.dead && e.hp < e.hpMax) drawEnemyHpPip(sx, sy - 14, e);
    return;
  }

  let bob = 0, swing = 0;
  if (e.animState === "walk") { const s = Math.sin(t * 6); swing = s * 1.0; bob = Math.abs(s) * 0.6; }
  else if (e.animState === "idle") bob = Math.sin(t * 1.6) * 0.4;

  // Per-attack envelope.
  let atkReach = 0, atkArm = "front", atkUp = 0;
  if (e.attacking) {
    if (e.attackName === "jab")       { atkReach = attackEnvelope(e, 16); atkArm = "front"; }
    else if (e.attackName === "cross") { atkReach = attackEnvelope(e, 20); atkArm = "rear"; }
    else if (e.attackName === "haymaker") {
      atkReach = attackEnvelope(e, 22);
      atkArm = "front";
      atkUp   = attackEnvelope(e, 8);
      // Crouch then telegraph during startup.
      const d = ENEMY_ATK.baron_haymaker;
      if (e.attackFrame <= d.startup) bob = -(e.attackFrame / d.startup) * 4;
    }
  }

  const torsoY = sy - 36 - bob;
  const headY  = sy - 50 - bob;

  // Trousers + shoes.
  X.fillStyle = k.pants;
  X.fillRect(sx - 7, sy - 22, 6, 18);
  X.fillRect(sx + 1, sy - 22, 6, 18);
  X.fillStyle = k.shoe;
  X.fillRect(sx - 8, sy - 4, 7, 4);
  X.fillRect(sx + 1, sy - 4, 7, 4);

  // Suit jacket — wide shoulders, tan.
  X.fillStyle = k.suit;
  X.fillRect(sx - 11, torsoY, 22, 18);
  X.fillStyle = k.suitDk;
  X.fillRect(sx - 11, torsoY + 17, 22, 1);
  X.fillStyle = k.suitHi;
  X.fillRect(sx - 11, torsoY, 22, 1);

  // Vest under the jacket.
  X.fillStyle = k.vest;
  X.fillRect(sx - 5, torsoY + 1, 10, 12);
  X.fillStyle = k.vestDk;
  X.fillRect(sx - 5, torsoY + 12, 10, 1);

  // Shirt collar peek.
  X.fillStyle = k.shirt;
  X.fillRect(sx - 3, torsoY, 6, 3);

  // Tie down the front.
  X.fillStyle = k.tie;
  X.fillRect(sx - 1, torsoY + 2, 2, 11);
  X.fillStyle = k.tieDk;
  X.fillRect(sx - 1, torsoY + 12, 2, 1);

  // Arms — suit fabric to elbow, skin + brass knuckles at the fist.
  const frontArmX = (f > 0) ? sx + 9 : sx - 13;
  const backArmX  = (f > 0) ? sx - 13 : sx + 9;

  // Rear arm — extends on cross / haymaker.
  if (atkArm === "rear" && atkReach > 0) {
    const ay = torsoY + 6;
    X.fillStyle = k.suit;
    if (f > 0) X.fillRect(sx + 6, ay, atkReach + 4, 4);
    else        X.fillRect(sx - 6 - atkReach - 4, ay, atkReach + 4, 4);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 6 + atkReach, ay, 4, 4);
    else        X.fillRect(sx - 6 - atkReach - 4, ay, 4, 4);
    // Brass knuckles glint.
    X.fillStyle = k.brass;
    if (f > 0) X.fillRect(sx + 6 + atkReach + 4, ay, 3, 4);
    else        X.fillRect(sx - 6 - atkReach - 7, ay, 3, 4);
    X.fillStyle = k.brassHi;
    if (f > 0) X.fillRect(sx + 6 + atkReach + 6, ay, 1, 1);
    else        X.fillRect(sx - 6 - atkReach - 7, ay, 1, 1);
  } else {
    X.fillStyle = k.suit;
    X.fillRect(backArmX, torsoY + 1 + Math.round(swing), 4, 14);
    X.fillStyle = k.skin;
    X.fillRect(backArmX, torsoY + 14 + Math.round(swing), 4, 3);
    X.fillStyle = k.brass;
    X.fillRect(backArmX, torsoY + 16 + Math.round(swing), 4, 2);
  }

  // Front arm.
  if (atkArm === "front" && (atkReach > 0 || atkUp > 0)) {
    const ay = torsoY + 6 - Math.round(atkUp);
    X.fillStyle = k.suit;
    if (f > 0) X.fillRect(sx + 6, ay, atkReach + 4, 4);
    else        X.fillRect(sx - 6 - atkReach - 4, ay, atkReach + 4, 4);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 6 + atkReach, ay, 4, 4);
    else        X.fillRect(sx - 6 - atkReach - 4, ay, 4, 4);
    // Brass knuckles glint with a hot highlight on impact frame.
    X.fillStyle = k.brass;
    if (f > 0) X.fillRect(sx + 6 + atkReach + 4, ay, 3, 4);
    else        X.fillRect(sx - 6 - atkReach - 7, ay, 3, 4);
    X.fillStyle = k.brassHi;
    if (f > 0) X.fillRect(sx + 6 + atkReach + 6, ay, 1, 2);
    else        X.fillRect(sx - 6 - atkReach - 7, ay, 1, 2);
  } else {
    X.fillStyle = k.suit;
    X.fillRect(frontArmX, torsoY + 1 - Math.round(swing), 4, 14);
    X.fillStyle = k.skin;
    X.fillRect(frontArmX, torsoY + 14 - Math.round(swing), 4, 3);
    X.fillStyle = k.brass;
    X.fillRect(frontArmX, torsoY + 16 - Math.round(swing), 4, 2);
  }

  // Telegraph for haymaker — bright outline on the brass knuckles during startup.
  if (e.attacking && e.attackName === "haymaker") {
    const d = ENEMY_ATK.baron_haymaker;
    if (e.attackFrame <= d.startup) {
      const t2 = e.attackFrame / d.startup;
      X.fillStyle = "rgba(255,200,80," + t2.toFixed(2) + ")";
      const ay = torsoY + 6 - Math.round(atkUp);
      if (f > 0) X.fillRect(sx + 14 + atkReach, ay - 1, 4, 6);
      else        X.fillRect(sx - 18 - atkReach, ay - 1, 4, 6);
    }
  }

  // Head — slick-back grey hair, mustache.
  X.fillStyle = k.skin;
  X.fillRect(sx - 7, headY, 14, 14);
  X.fillStyle = k.skinDk;
  X.fillRect(sx - 7, headY + 7, 1, 7);
  X.fillRect(sx + 6, headY + 7, 1, 7);
  X.fillStyle = k.hair;
  X.fillRect(sx - 7, headY - 1, 14, 4);
  X.fillStyle = k.hairDk;
  X.fillRect(sx - 7, headY + 2, 14, 1);
  // Mustache.
  X.fillStyle = k.hairDk;
  X.fillRect(sx - 3, headY + 9, 6, 1);
  // Eyes.
  X.fillStyle = "#fff";
  if (f > 0) X.fillRect(sx + 1, headY + 6, 2, 1);
  else       X.fillRect(sx - 3, headY + 6, 2, 1);

  if (e.iframes > 6) { X.fillStyle = "rgba(255,255,255,0.65)"; X.fillRect(sx - 12, headY - 2, 24, 50); }
}

// ---- BLACKWELL: Kane's enforcer. Massive build, dark tactical gear. ----
