<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>THE BLOCK</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    color: #ddd;
    font-family: ui-monospace, "Menlo", "Consolas", monospace;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    -ms-interpolation-mode: nearest-neighbor;
  }
  #debug {
    position: fixed;
    top: 6px;
    left: 8px;
    font-size: 11px;
    color: #6f6;
    text-shadow: 1px 1px 0 #000;
    pointer-events: none;
    white-space: pre;
    display: none;
  }
  #debug.on { display: block; }
  #orient {
    position: fixed;
    inset: 0;
    background: #000;
    color: #ddd;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    font-size: 14px;
    z-index: 10;
  }
  #orient.on { display: flex; }
</style>
</head>
<body>
  <div id="wrap"><canvas id="c" width="640" height="360"></canvas></div>
  <div id="debug"></div>
  <div id="orient">Rotate your device to landscape.</div>
<script>
"use strict";

// ---------- Build flags ----------
const DEV = true;

// ---------- Canvas / context ----------
const W = 640;
const H = 360;
const C = document.getElementById("c");
/** Global render context; named X per project convention. */
let X = C.getContext("2d", { alpha: false });
X.imageSmoothingEnabled = false;

// ---------- State machine ----------
// title | select | intro | playing | gameover | victory | credits | interlude | bonus
let STATE = "title";
let stateTime = 0;

function setState(next) {
  STATE = next;
  stateTime = 0;
}

// ---------- Input ----------
const keys = Object.create(null);
const keysPressed = Object.create(null); // edge-triggered, cleared each frame after consumption

function keyName(e) {
  // Normalize a few common ones; KeyboardEvent.code is layout-independent.
  return e.code || e.key;
}

window.addEventListener("keydown", (e) => {
  const k = keyName(e);
  if (!keys[k]) keysPressed[k] = true;
  keys[k] = true;
  if (k === "F3") { toggleDebug(); e.preventDefault(); return; }
  if (k === "Tab" || k === "F5") return; // let browser handle reload, etc.
  // Prevent page scroll on game keys
  if (k === "Space" || k.startsWith("Arrow")) e.preventDefault();
});

window.addEventListener("keyup", (e) => {
  keys[keyName(e)] = false;
});

window.addEventListener("blur", () => {
  for (const k in keys) keys[k] = false;
});

function consumePress(k) {
  if (keysPressed[k]) { keysPressed[k] = false; return true; }
  return false;
}

// ---------- Action bindings ----------
// WASD / arrows for movement; right-hand row JKLU for combat.
const KEY = {
  left:    ["KeyA", "ArrowLeft"],
  right:   ["KeyD", "ArrowRight"],
  up:      ["KeyW", "ArrowUp"],
  down:    ["KeyS", "ArrowDown"],
  jump:    ["Space"],
  light:   ["KeyJ"],
  heavy:   ["KeyK"],
  special: ["KeyL"],
  grab:    ["KeyU"],
};

function actionHeld(a) {
  const ks = KEY[a];
  for (let i = 0; i < ks.length; i++) if (keys[ks[i]]) return true;
  return false;
}
function actionPressed(a) {
  const ks = KEY[a];
  for (let i = 0; i < ks.length; i++) if (consumePress(ks[i])) return true;
  return false;
}

// Double-tap → run, tracked per side.
let lastTapLeft = -999;
let lastTapRight = -999;
const DOUBLE_TAP_WINDOW = 0.28;

// ---------- Pause / visibility ----------
let paused = false;
document.addEventListener("visibilitychange", () => {
  paused = document.hidden;
});

// ---------- Resize / scale ----------
let scale = 1;
let isMobile = (typeof matchMedia === "function") &&
               matchMedia("(pointer: coarse)").matches;

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const sx = vw / W;
  const sy = vh / H;
  let s = Math.min(sx, sy);
  if (!isMobile) s = Math.max(1, Math.floor(s)); // integer scale on desktop
  scale = s;
  C.style.width = (W * s) + "px";
  C.style.height = (H * s) + "px";
  // After CSS resize, re-disable smoothing on the (still-640x360) backing buffer.
  X.imageSmoothingEnabled = false;
  // Orientation guard on mobile only.
  const orient = document.getElementById("orient");
  if (isMobile && vw < vh) orient.classList.add("on");
  else orient.classList.remove("on");
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", resize);
resize();

// ---------- Debug overlay ----------
const debugEl = document.getElementById("debug");
function toggleDebug() {
  if (!DEV) return;
  debugEl.classList.toggle("on");
}
let fps = 0;
let fpsAccum = 0;
let fpsFrames = 0;

function entityCount() {
  return (player ? 1 : 0);
}

// ---------- Stage geometry (2.5D plane) ----------
// World X is horizontal screen pixels. World Y is depth (also pixels — lower y = back).
// Z is jump height; screen Y of a feet-anchored sprite is (worldY - z).
const STAGE_TOP = 232;     // back of play strip
const STAGE_BOT = 340;     // front of play strip
const STAGE_LEFT_PAD = 12; // sprite half-width clamp
const STAGE_RIGHT_PAD = 12;
const GRAVITY = 620;       // px / s^2

// ---------- Frame-data driven attacks ----------
// Frames are 60Hz fixed-step ticks. ox is forward offset from player center.
// w/h are screen-rect dimensions; depth is the y-axis thickness for 2.5D collisions later.
const ATTACK_DATA = {
  rio_atk1: {
    startup: 4, active: 3, recovery: 9,
    damage: 5,
    hit: { ox: 14, oy: -28, w: 22, h: 12, depth: 14 },
  },
};

// ---------- Player ----------
let player = null;

function makePlayer(charKey, x, y) {
  return {
    char: charKey,
    x, y, z: 0,
    vx: 0, vy: 0, vz: 0,
    facing: 1,
    animState: "idle",
    animTime: 0,
    running: false,
    walkSpeed: 78,   // Rio: speed 5 of 5 in stat tier
    runSpeed: 148,
    jumpVel: 210,
    attacking: false,
    attackName: null,
    attackFrame: 0,
    hp: 100, hpMax: 100,
    hurtboxes: [],
    hitboxes: [],
  };
}

function startAttack(p, name) {
  p.attacking = true;
  p.attackName = name;
  p.attackFrame = 0;
  p.vx = 0; p.vy = 0;
  p.hitboxes.length = 0;
}

function advanceAttack(p) {
  const d = ATTACK_DATA[p.char + "_" + p.attackName];
  if (!d) { p.attacking = false; p.attackName = null; return; }
  const total = d.startup + d.active + d.recovery;
  p.hitboxes.length = 0;
  if (p.attackFrame > d.startup && p.attackFrame <= d.startup + d.active) {
    const h = d.hit;
    p.hitboxes.push({
      x: p.x + p.facing * h.ox - h.w / 2,
      y: p.y + h.oy,
      w: h.w, h: h.h,
      depth: h.depth,
      damage: d.damage,
    });
  }
  if (p.attackFrame >= total) {
    p.attacking = false;
    p.attackName = null;
    p.hitboxes.length = 0;
  }
}

function updatePlayer(p, dt) {
  const grounded = p.z <= 0;
  const locked = p.attacking && grounded;

  // Movement input (suppressed during grounded attack lock).
  let ix = 0, iy = 0;
  if (!locked) {
    if (actionHeld("left"))  ix -= 1;
    if (actionHeld("right")) ix += 1;
    if (actionHeld("up"))    iy -= 1;
    if (actionHeld("down"))  iy += 1;
  }

  // Double-tap → run; releasing stops it.
  if (actionPressed("left")) {
    if (stateTime - lastTapLeft < DOUBLE_TAP_WINDOW) p.running = true;
    lastTapLeft = stateTime;
  }
  if (actionPressed("right")) {
    if (stateTime - lastTapRight < DOUBLE_TAP_WINDOW) p.running = true;
    lastTapRight = stateTime;
  }
  if (ix === 0) p.running = false;

  if (!locked) {
    if (ix !== 0 || iy !== 0) {
      const mag = Math.hypot(ix, iy) || 1;
      const speed = p.running ? p.runSpeed : p.walkSpeed;
      p.vx = (ix / mag) * speed;
      p.vy = (iy / mag) * speed;
      if (ix !== 0) p.facing = ix > 0 ? 1 : -1;
    } else {
      p.vx = 0; p.vy = 0;
    }
  }

  if (!locked && grounded && actionPressed("jump")) {
    p.vz = p.jumpVel;
  }

  if (!locked && grounded && actionPressed("light")) {
    startAttack(p, "atk1");
  }

  if (p.attacking) {
    p.attackFrame++;
    advanceAttack(p);
  }

  // Integrate motion. Air control: keep horizontal velocity from jump.
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.z += p.vz * dt;
  if (p.z > 0 || p.vz > 0) p.vz -= GRAVITY * dt;
  if (p.z < 0) { p.z = 0; p.vz = 0; }

  if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
  if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
  if (p.y < STAGE_TOP) p.y = STAGE_TOP;
  if (p.y > STAGE_BOT) p.y = STAGE_BOT;

  // Animation state selection.
  let next;
  if (p.attacking) next = p.attackName;
  else if (p.z > 0) next = "jump";
  else if (ix !== 0 || iy !== 0) next = p.running ? "run" : "walk";
  else next = "idle";
  if (next !== p.animState) { p.animState = next; p.animTime = 0; }
  else p.animTime += dt;

  // Rebuild hurtbox each tick (torso column).
  p.hurtboxes.length = 0;
  p.hurtboxes.push({
    x: p.x - 9, y: p.y - 36, w: 18, h: 32, depth: 10,
  });
}

// ---------- Rio: procedural fillRect rendering ----------
const RIO_COLORS = {
  skin:       "#8a5235",
  skinDark:   "#6b3f2a",
  hair:       "#1a1410",
  jacket:     "#7d8d4f",
  jacketDark: "#5a6b3a",
  tank:       "#0a0a10",
  pants:      "#1a1a22",
  pantsDark:  "#0e0e15",
  boot:       "#0a0a10",
  wraps:      "#dcd6c4",
  bandanaHi:  "#ffd76a",
  bandana:    "#e8c04a",
  bandanaDark:"#b89426",
};

// Bandana renderer: 7w x 3h block (hi / mid / shadow rows). Camera-side wrist anchor.
// During the punch arc, trails two fading ghosts behind the wrist for motion.
function drawBandana(sx, torsoY, f, atkReach, armSwing, k) {
  // Anchor wrist x in screen space, on the camera-side wrist.
  let wx, wy;
  if (atkReach > 0) {
    // Punching: ride the front-arm fist forward.
    wy = torsoY + 6;
    wx = (f > 0) ? sx + 4 + atkReach - 1 : sx - 3 - atkReach - 6;
    // Trailing ghosts (only when arm is meaningfully extended).
    if (atkReach > 4) {
      const trailDir = -f;
      X.fillStyle = "rgba(232,192,74,0.55)";
      X.fillRect(wx + trailDir * 4, wy + 1, 6, 2);
      X.fillStyle = "rgba(232,192,74,0.28)";
      X.fillRect(wx + trailDir * 8, wy + 1, 5, 2);
    }
  } else {
    // Idle/walk: bandana hangs at hip-line on the front-arm wrist.
    wy = torsoY + 11 - Math.round(armSwing);
    wx = (f > 0) ? sx + 5 : sx - 11;
  }
  // Body — 7 wide, 3 tall.
  X.fillStyle = k.bandanaHi;
  X.fillRect(wx, wy, 7, 1);
  X.fillStyle = k.bandana;
  X.fillRect(wx, wy + 1, 7, 1);
  X.fillStyle = k.bandanaDark;
  X.fillRect(wx, wy + 2, 7, 1);
  // Two-pixel knot tail dangling on the camera-out side.
  X.fillStyle = k.bandana;
  if (atkReach > 0) {
    // Pointing forward during punch.
    if (f > 0) X.fillRect(wx + 7, wy + 1, 2, 1);
    else       X.fillRect(wx - 2, wy + 1, 2, 1);
  } else {
    if (f > 0) X.fillRect(wx + 7, wy + 2, 2, 1);
    else       X.fillRect(wx - 2, wy + 2, 2, 1);
  }
}

function drawRio(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const f  = p.facing;
  const t  = p.animTime;
  const k  = RIO_COLORS;

  // Per-state animation deltas.
  let armSwing = 0, legSwingL = 0, legSwingR = 0, bodyBob = 0;
  if (p.animState === "walk") {
    const s = Math.sin(t * 9);
    legSwingL =  s * 1.5;
    legSwingR = -s * 1.5;
    armSwing  = -s * 1.2;
    bodyBob   =  Math.abs(s) * 0.6;
  } else if (p.animState === "run") {
    const s = Math.sin(t * 15);
    legSwingL =  s * 2.5;
    legSwingR = -s * 2.5;
    armSwing  = -s * 2;
    bodyBob   =  Math.abs(s) * 1.2;
  } else if (p.animState === "idle") {
    bodyBob = Math.sin(t * 2) * 0.5;
  } else if (p.animState === "jump") {
    legSwingL = -2; legSwingR = -2;
    armSwing  = -1;
  }

  // Attack arm-extension envelope (in pixels of forward reach).
  let atkReach = 0;
  if (p.attacking && p.attackName === "atk1") {
    const d = ATTACK_DATA.rio_atk1;
    if (p.attackFrame <= d.startup) {
      atkReach = (p.attackFrame / d.startup) * 14;
    } else if (p.attackFrame <= d.startup + d.active) {
      atkReach = 14;
    } else {
      const r = (p.attackFrame - d.startup - d.active) / d.recovery;
      atkReach = Math.max(0, 14 * (1 - r));
    }
  }

  // Drop shadow on the ground (always at p.y, not p.y-z).
  X.fillStyle = "rgba(0,0,0,0.4)";
  const shY = Math.round(p.y);
  X.beginPath();
  X.ellipse(sx, shY, 11 - p.z * 0.04, 3, 0, 0, Math.PI * 2);
  X.fill();

  const bob = -bodyBob;
  const headY = sy - 44 + bob;
  const torsoY = sy - 32 + bob;

  // Legs (in front of torso visually because feet are at sy).
  X.fillStyle = k.pants;
  X.fillRect(sx - 6, sy - 18, 5, 14);
  X.fillRect(sx + 1, sy - 18, 5, 14);
  X.fillStyle = k.pantsDark;
  // Suggest leg motion with a 1px shaded band.
  X.fillRect(sx - 6, sy - 12 + Math.round(legSwingL), 5, 1);
  X.fillRect(sx + 1, sy - 12 + Math.round(legSwingR), 5, 1);
  // Boots.
  X.fillStyle = k.boot;
  X.fillRect(sx - 6, sy - 4, 5, 4);
  X.fillRect(sx + 1, sy - 4, 5, 4);
  // Waistband.
  X.fillStyle = k.pantsDark;
  X.fillRect(sx - 6, sy - 19, 12, 2);

  // Torso: black tank base then olive cropped jacket on top half.
  X.fillStyle = k.tank;
  X.fillRect(sx - 7, torsoY, 14, 14);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 7, torsoY, 14, 9);
  X.fillStyle = k.jacketDark;
  X.fillRect(sx - 7, torsoY + 9, 14, 1);

  // Arms — front and back.
  // Identify front arm (camera-side) vs back arm.
  const frontArmX = (f > 0) ? sx + 6 : sx - 9;
  const backArmX  = (f > 0) ? sx - 9 : sx + 6;
  const frontWristX = frontArmX;
  const backWristX  = backArmX;

  // Back arm (drawn first).
  X.fillStyle = k.skin;
  X.fillRect(backArmX, torsoY + 1 + Math.round(armSwing), 3, 11);
  X.fillStyle = k.wraps;
  X.fillRect(backWristX, torsoY + 12 + Math.round(armSwing), 3, 3);

  // Front arm — extended during attack.
  if (atkReach > 0) {
    const ay = torsoY + 4;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 4, ay, atkReach + 3, 3);
    else       X.fillRect(sx - 3 - atkReach - 3, ay, atkReach + 3, 3);
    X.fillStyle = k.wraps;
    if (f > 0) X.fillRect(sx + 4 + atkReach, ay, 3, 3);
    else       X.fillRect(sx - 3 - atkReach - 3, ay, 3, 3);
  } else {
    X.fillStyle = k.skin;
    X.fillRect(frontArmX, torsoY + 1 - Math.round(armSwing), 3, 11);
    X.fillStyle = k.wraps;
    X.fillRect(frontWristX, torsoY + 12 - Math.round(armSwing), 3, 3);
  }

  // Yellow bandana — Rio's left wrist signature. Spec: must always be visible.
  // Drawn on the camera-side (front) wrist regardless of facing, so it never hides
  // behind the body. During the punch arc it rides the extending fist with a 2-step
  // trailing ghost so the eye tracks it.
  drawBandana(sx, torsoY, f, atkReach, armSwing, k);

  // Head.
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, headY, 12, 12);
  X.fillStyle = k.skinDark;
  X.fillRect(sx - 6, headY + 6, 1, 6);
  X.fillRect(sx + 5, headY + 6, 1, 6);
  // Locs on top.
  X.fillStyle = k.hair;
  X.fillRect(sx - 5, headY - 2, 10, 4);
  X.fillRect(sx - 4, headY - 3, 8, 1);
  // Eye dot, direction-indicating.
  X.fillStyle = "#fff";
  if (f > 0) X.fillRect(sx + 1, headY + 6, 2, 1);
  else       X.fillRect(sx - 3, headY + 6, 2, 1);
  // Gold hoop earring on camera-facing side.
  X.fillStyle = k.bandana;
  if (f > 0) X.fillRect(sx + 5, headY + 9, 1, 1);
  else       X.fillRect(sx - 6, headY + 9, 1, 1);
}

// ---------- HUD ----------
function drawHUD() {
  // Top strip
  X.fillStyle = "rgba(0,0,0,0.55)";
  X.fillRect(0, 0, W, 22);

  // HP bar — Rio.
  const barX = 8, barY = 6, barW = 140, barH = 10;
  X.fillStyle = "#222";
  X.fillRect(barX, barY, barW, barH);
  const pct = player ? Math.max(0, player.hp / player.hpMax) : 0;
  X.fillStyle = "#7d8d4f";          // jacket olive
  X.fillRect(barX, barY, Math.round(barW * pct), barH);
  X.fillStyle = "#e8c04a";          // bandana yellow rail
  X.fillRect(barX, barY, barW, 1);

  X.fillStyle = "#e8c04a";
  X.font = "bold 9px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText("RIO", barX, barY - 6);

  // Bottom-right HUD slot reserved for combo / parry meter (Phase 2).
}

// ---------- DEV: hitbox / hurtbox visualizer ----------
function drawDebugBoxes() {
  if (!player) return;
  X.lineWidth = 1;
  // Hurtboxes (green)
  X.strokeStyle = "rgba(0,255,128,0.85)";
  for (let i = 0; i < player.hurtboxes.length; i++) {
    const b = player.hurtboxes[i];
    X.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
  }
  // Hitboxes (red)
  X.strokeStyle = "rgba(255,72,72,0.95)";
  for (let i = 0; i < player.hitboxes.length; i++) {
    const b = player.hitboxes[i];
    X.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
  }
  // Stage strip outline
  X.strokeStyle = "rgba(120,160,255,0.5)";
  X.strokeRect(0.5, STAGE_TOP + 0.5, W - 1, STAGE_BOT - STAGE_TOP);
  // Player anchor
  X.fillStyle = "#fff";
  X.fillRect(Math.round(player.x), Math.round(player.y), 1, 1);
}

// ---------- Stage 1 placeholder backdrop ----------
function drawStage1() {
  // Sky / building strip.
  X.fillStyle = "#11131c";
  X.fillRect(0, 0, W, 230);
  // Distant building band.
  X.fillStyle = "#1a1d2a";
  X.fillRect(0, 90, W, 120);
  // Window dots — fixed pattern, not animated.
  X.fillStyle = "#3b4360";
  for (let by = 110; by < 200; by += 14) {
    for (let bx = 20; bx < W; bx += 22) {
      if (((bx * 13 + by * 7) & 7) < 3) X.fillRect(bx, by, 3, 4);
    }
  }
  // Sidewalk back edge.
  X.fillStyle = "#2a2a36";
  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);
  // Pavement seams.
  X.fillStyle = "#1f1f29";
  for (let gx = 0; gx < W; gx += 80) X.fillRect(gx, STAGE_TOP, 1, STAGE_BOT - STAGE_TOP);
  X.fillRect(0, STAGE_TOP + 22, W, 1);
  X.fillRect(0, STAGE_TOP + 70, W, 1);
  // Curb at bottom.
  X.fillStyle = "#0e0e15";
  X.fillRect(0, STAGE_BOT, W, H - STAGE_BOT);
}

// ---------- Fixed-timestep loop ----------
const STEP = 1 / 60;          // 60Hz logical tick — combat frame counts depend on this.
const MAX_STEPS_PER_FRAME = 5; // spiral-of-death guard
let last = performance.now() / 1000;
let acc = 0;

function frame(nowMs) {
  const now = nowMs / 1000;
  let dt = now - last;
  last = now;
  if (dt > 0.25) dt = 0.25; // tab-resume / debugger pause: discard the gap
  if (!paused) acc += dt;

  let steps = 0;
  while (acc >= STEP && steps < MAX_STEPS_PER_FRAME) {
    update(STEP);
    acc -= STEP;
    steps++;
  }
  if (steps === MAX_STEPS_PER_FRAME) acc = 0;

  render();

  // FPS sampling
  fpsAccum += dt;
  fpsFrames++;
  if (fpsAccum >= 0.5) {
    fps = fpsFrames / fpsAccum;
    fpsAccum = 0;
    fpsFrames = 0;
  }
  if (DEV && debugEl.classList.contains("on")) {
    debugEl.textContent =
      "FPS " + fps.toFixed(0) +
      "\nstate " + STATE +
      "\nents " + entityCount() +
      "\nscale " + scale.toFixed(2);
  }

  requestAnimationFrame(frame);
}

// ---------- Update ----------
function update(dt) {
  stateTime += dt;
  if (STATE === "title") updateTitle(dt);
  else if (STATE === "playing") updatePlaying(dt);
  // Other states declared in the machine but not yet reachable.
}

function updateTitle(dt) {
  if (consumePress("Enter") || consumePress("Space") || consumePress("NumpadEnter")) {
    enterPlaying();
  }
}

function enterPlaying() {
  player = makePlayer("rio", 120, 300);
  setState("playing");
}

function updatePlaying(dt) {
  if (consumePress("Escape")) {
    player = null;
    setState("title");
    return;
  }
  if (player) updatePlayer(player, dt);
}

// ---------- Render ----------
function render() {
  X.fillStyle = "#000";
  X.fillRect(0, 0, W, H);
  if (STATE === "title") renderTitle();
  else if (STATE === "playing") renderPlaying();
}

function renderTitle() {
  // Title block
  X.fillStyle = "#e8c04a"; // bandana yellow — Rio's signature, used as title accent
  X.fillRect(W / 2 - 140, H / 2 - 60, 280, 4);
  X.fillRect(W / 2 - 140, H / 2 + 18, 280, 4);

  X.fillStyle = "#fff";
  X.font = "bold 36px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("THE BLOCK", W / 2, H / 2 - 22);

  X.fillStyle = "#aaa";
  X.font = "12px ui-monospace, monospace";
  X.fillText("a beat-em-up", W / 2, H / 2 + 4);

  // Press-start prompt — pulses on a 1Hz sine.
  const pulse = 0.55 + 0.45 * Math.sin(stateTime * Math.PI * 2);
  X.fillStyle = "rgba(255,255,255," + pulse.toFixed(3) + ")";
  X.font = "14px ui-monospace, monospace";
  X.fillText("PRESS ENTER", W / 2, H / 2 + 56);
}

function renderPlaying() {
  drawStage1();
  if (player) drawRio(player);
  drawHUD();
  if (DEV && debugEl.classList.contains("on")) drawDebugBoxes();

  X.fillStyle = "#888";
  X.font = "9px ui-monospace, monospace";
  X.textAlign = "right";
  X.textBaseline = "top";
  X.fillText("ESC : title", W - 6, 4);
}

// ---------- Boot ----------
requestAnimationFrame((t) => { last = t / 1000; frame(t); });
</script>
</body>
</html>
