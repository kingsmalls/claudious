    if (target.hitboxes) target.hitboxes.length = 0;
    target.attackHits = null;
  }
  // Knockback away from the hitbox center on world X.
  const dir = (target.x < hb.cx) ? -1 : 1;
  target.knockX = dir * hb.knockback;
  target.knockY = 0;
  target.hitstun = 8;
  // Launcher pops the victim into the air for juggle followups.
  if (hb.launcher && target.z !== undefined) {
    target.vz = hb.launcher;
    target.airborne = true;
    target.hitstun = 0;
    target.knockX = dir * (hb.knockback * 0.5);
  }
  if (target.hp <= 0) {
    target.dead = true;
    target.deathTimer = 0;
    target.knockX = dir * (hb.knockback + 30);
    target.hitstun = 0;
    target.airborne = false;
  }
  // Scaled hit feel: hitstop and shake grow with damage and combo count, capped
  // at +50%% by 10 hits. Heavy single hits already feel punchier (high base hitstop)
  // and 10+ hit combos add noticeable rumble.
  const combo = (player && attacker === player) ? player.comboHits : 0;
  const comboMul = 1 + Math.min(0.5, combo * 0.05);
  const baseHs = hb.hitstop || 3;
  const scaledHs = Math.round(baseHs * comboMul);
  if (hitstopFrames < scaledHs) hitstopFrames = scaledHs;

  // Screen shake — tier by damage. Big hits rumble; combo extends duration.
  const shakeBase = Math.min(7, Math.max(2, Math.round(hb.damage / 4)));
  const shakeBoost = Math.min(3, Math.floor(combo / 5));
  if (shakeFrames < shakeBase + shakeBoost * 2) shakeFrames = shakeBase + shakeBoost * 2;
  if (shakeMag    < shakeBase * 0.6 + shakeBoost) shakeMag    = shakeBase * 0.6 + shakeBoost;

  // Combo accounting — only when the player is the attacker.
  if (player && attacker === player) {
    const before = player.comboHits;
    player.comboHits++;
    player.comboTimer = 1.4;
    // Milestone celebrations as the combo grows.
    const milestones = COMBO_MILESTONES;
    for (let i = 0; i < milestones.length; i++) {
      const m = milestones[i];
      if (before < m.n && player.comboHits >= m.n) {
        spawnMilestone(player.x, player.y - 56, m.text);
        if (shakeFrames < 12) shakeFrames = 12;
        if (shakeMag    < 4)  shakeMag    = 4;
        flashFrames = Math.max(flashFrames, 2);
        break;
      }
    }
  }
  // Visuals.
  const sxp = (target.x + hb.cx) / 2;
  const syp = target.y - 18;
  spawnSparkle(sxp, syp);
  spawnDmgNumber(sxp, syp - 6, hb.damage);
  // Bigger hits get extra spark petals.
  if (hb.damage >= 12) {
    for (let i = 0; i < 3; i++) {
      const ang = Math.random() * Math.PI * 2;
      particles.push({
        kind: "petal", x: sxp + Math.cos(ang) * 6, y: syp + Math.sin(ang) * 6,
        vx: Math.cos(ang) * 30, vy: Math.sin(ang) * 30,
        life: 0, max: 0.28,
        core: "rgba(255,240,180,1)", edge: "rgba(255,160,60,0.9)",
      });
    }
  }
}

// Resolve a throw: launch the grabbed enemy in the chosen direction with damage.
// Caller has already validated p.grabbing and pressed an attack input.
function resolveThrow(p, e, throwDir, throwVZ) {
  const d = ATTACK_DATA[p.char + "_throw"] || ATTACK_DATA.rio_throw;
  e.grabbedBy = null;
  p.grabbing = null;
  p.grabFrames = 0;
  e.hp -= d.damage;
  e.iframes = 6;
  e.attacking = false;
  e.attackName = null;
  if (e.hitboxes) e.hitboxes.length = 0;
  e.knockX = throwDir * d.knockback;
  e.knockY = 0;
  e.vz = throwVZ;
  e.airborne = throwVZ > 0;
  e.hitstun = 0;
  if (e.hp <= 0) {
    e.dead = true;
    e.deathTimer = 0;
  }
  if (hitstopFrames < d.hitstop) hitstopFrames = d.hitstop;
  spawnSparkle(e.x, e.y - 18);
  spawnDmgNumber(e.x, e.y - 22, d.damage);
  shakeFrames = Math.max(shakeFrames, 6);
  shakeMag = Math.max(shakeMag, 3);
  // Brief throw recovery on the player so they can't immediately grab again.
  startAttack(p, "throw");
}

// Resolve a parry: classify by parry frame, deal counter damage on PERFECT,
// stun the attacker on GOOD, just block on LATE. Updates chain meter and
// triggers visual feedback.
function resolveParry(p, hb, attacker) {
  const f = p.parryFrame;
  let tier;
  if      (f <= PARRY_PERFECT) tier = "PERFECT";
  else if (f <= PARRY_GOOD)    tier = "GOOD";
  else                         tier = "LATE";

  // Skip the parry window straight into cooldown so this attempt can't land twice.
  p.parryFrame = PARRY_ACTIVE + 1;
  p.parryChain++;
  p.parryChainTimer = PARRY_CHAIN_S;

  if (tier === "PERFECT") {
    p.parryMeter = Math.min(100, p.parryMeter + 30);
    if (p.parryChain >= 2) p.hp = Math.min(p.hpMax, p.hp + PARRY_HEAL_HP);
    if (attacker && !attacker.dead) {
      const counterDmg = Math.round(hb.damage * PARRY_PERFECT_BONUS);
      attacker.hp -= counterDmg;
      attacker.iframes = 4;
      attacker.hitstun = 24;
      attacker.attacking = false;
      attacker.attackName = null;
      if (attacker.hitboxes) attacker.hitboxes.length = 0;
      attacker.attackHits = null;
      const dir = (attacker.x < p.x) ? -1 : 1;
      attacker.knockX = dir * 140;
      if (attacker.hp <= 0) {
        attacker.dead = true;
        attacker.deathTimer = 0;
        attacker.knockX = dir * 200;
      }
      spawnParrySparkle(p.x, p.y - 24, "perfect");
      spawnDmgNumber(attacker.x, attacker.y - 26, counterDmg);
    }
    spawnParryWord(p.x, p.y - 38, "PERFECT!", "#ffd76a");
    if (hitstopFrames < PARRY_PERFECT_HITSTOP) hitstopFrames = PARRY_PERFECT_HITSTOP;
    flashFrames = Math.max(flashFrames, 5);
  } else if (tier === "GOOD") {
    p.parryMeter = Math.min(100, p.parryMeter + 20);
    if (attacker && !attacker.dead) {
      attacker.hitstun = 30;
      attacker.attacking = false;
      attacker.attackName = null;
      if (attacker.hitboxes) attacker.hitboxes.length = 0;
      attacker.attackHits = null;
      const dir = (attacker.x < p.x) ? -1 : 1;
      attacker.knockX = dir * 60;
    }
    spawnParrySparkle(p.x, p.y - 24, "good");
    spawnParryWord(p.x, p.y - 38, "GOOD", "#7d8d4f");
    if (hitstopFrames < 5) hitstopFrames = 5;
  } else {
    // LATE — block only, no counter, but builds a little meter.
    p.parryMeter = Math.min(100, p.parryMeter + 10);
    spawnParrySparkle(p.x, p.y - 24, "late");
    spawnParryWord(p.x, p.y - 38, "BLOCK", "#888");
    if (hitstopFrames < 3) hitstopFrames = 3;
  }
  // Mark this hitbox as having connected with the player so the same active
  // phase doesn't re-trigger on subsequent frames.
  if (hb.hits) hb.hits.add(p);
}

function resolveHits() {
  if (!player) return;
  // Player → enemies.
  if (player.hitboxes.length > 0 && !player.dead) {
    for (const hb of player.hitboxes) {
      for (const e of enemies) {
        if (e.dead) continue;
        if (e === player.grabbing) continue;        // can't hit what we're holding
        if (e.iframes > 0) continue;                // knockdown / getup invulnerability
        // Multi-hit: re-hit each target every hb.multiHit frames within the active
        // phase; otherwise default to the one-hit-per-attack rule.
        if (hb.multiHit) {
          if (!hb.lastHits) hb.lastHits = new Map();
          const last = hb.lastHits.get(e);
          if (last !== undefined && hb.owner.attackFrame - last < hb.multiHit) continue;
        } else {
          if (hb.hits && hb.hits.has(e)) continue;
        }
        let connected = false;
        for (const tb of e.hurtboxes) {
          if (boxOverlap(hb, tb)) { connected = true; break; }
        }
        if (connected) {
          if (hb.multiHit) {
            hb.lastHits.set(e, hb.owner.attackFrame);
          } else if (hb.hits) {
            hb.hits.add(e);
          }
          applyHit(e, hb, player);
        }
      }
    }
  }
  // Enemies → player. If the player has an active parry frame, resolve as a parry
  // (PERFECT / GOOD / LATE) instead of taking damage.
  if (player.iframes <= 0 && !player.dead && !player.dodging) {
    for (const e of enemies) {
      if (e.dead || e.hitboxes.length === 0) continue;
      for (const hb of e.hitboxes) {
        if (!hb.hits) hb.hits = new Set();
        if (hb.hits.has(player)) continue;
        let connected = false;
        for (const tb of player.hurtboxes) {
          if (boxOverlap(hb, tb)) { connected = true; break; }
        }
        if (!connected) continue;
        if (player.parryFrame >= 1 && player.parryFrame <= PARRY_ACTIVE) {
          resolveParry(player, hb, e);
        } else {
          hb.hits.add(player);
          applyHit(player, hb, e);
        }
        break;
      }
      if (player.iframes > 0 || player.hitstun > 0) break;
    }
  }
}

function cleanupEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].dead && enemies[i].deathTimer > 1.4) enemies.splice(i, 1);
  }
}

// ---------- Fixed-timestep loop ----------
const STEP = 1 / 60;          // 60Hz logical tick — combat frame counts depend on this.
const MAX_STEPS_PER_FRAME = 5; // spiral-of-death guard
let last = performance.now() / 1000;
let acc = 0;

function frame(nowMs) {
  const now = nowMs / 1000;
  let dt = now - last;
  last = now;
  if (dt > 0.25) dt = 0.25; // tab-resume / debugger pause: discard the gap
  if (!paused) acc += dt;

  let steps = 0;
  while (acc >= STEP && steps < MAX_STEPS_PER_FRAME) {
    update(STEP);
    acc -= STEP;
    steps++;
  }
  if (steps === MAX_STEPS_PER_FRAME) acc = 0;

  render();

  // FPS sampling
  fpsAccum += dt;
  fpsFrames++;
  if (fpsAccum >= 0.5) {
    fps = fpsFrames / fpsAccum;
    fpsAccum = 0;
    fpsFrames = 0;
  }
  if (DEV && debugEl.classList.contains("on")) {
    debugEl.textContent =
      "FPS " + fps.toFixed(0) +
      "\nstate " + STATE +
      "\nents " + entityCount() +
      "\nscale " + scale.toFixed(2);
  }

  requestAnimationFrame(frame);
}

// ---------- Update ----------
function update(dt) {
  stateTime += dt;
  if (STATE === "title") updateTitle(dt);
  else if (STATE === "playing") updatePlaying(dt);
  // Other states declared in the machine but not yet reachable.
}

function updateTitle(dt) {
  // Quick character toggle on the title screen (will be replaced by the proper
  // character-select panel in Phase 4.2).
  if (consumePress("Digit1")) selectedChar = "rio";
  if (consumePress("Digit2")) selectedChar = "duke";
  if (consumePress("Digit3")) selectedChar = "atlas";
  if (consumePress("Enter") || consumePress("Space") || consumePress("NumpadEnter")) {
    enterPlaying();
  }
}

// Selected character for the next run. Switches via 1/2/3 on the title screen
// or via the proper character-select panel in Phase 4.2.
let selectedChar = "rio";

function enterPlaying() {
  player = makePlayer(selectedChar, 120, 300);
  enemies = [
    makeRunner(440, 280),
    makeRunner(520, 320),
  ];
  particles = [];
  hitstopFrames = 0;
  flashFrames = 0;
  shakeFrames = 0;
  shakeMag = 0;
  setState("playing");
}

function updatePlaying(dt) {
  if (consumePress("Escape")) {
    player = null;
    enemies = [];
    particles = [];
    hitstopFrames = 0;
    flashFrames = 0;
    shakeFrames = 0;
    setState("title");
    return;
  }
  if (hitstopFrames > 0) { hitstopFrames--; return; }
  if (flashFrames > 0)  flashFrames--;
  if (shakeFrames > 0)  shakeFrames--;
  if (player) updatePlayer(player, dt);
  for (const e of enemies) updateRunner(e, dt);
  resolveHits();
  cleanupEnemies();
  updateParticles(dt);
}

// ---------- Render ----------
function render() {
  X.fillStyle = "#000";
  X.fillRect(0, 0, W, H);
  if (STATE === "title") renderTitle();
  else if (STATE === "playing") renderPlaying();
}

function renderTitle() {
  // Title block
  X.fillStyle = "#e8c04a"; // bandana yellow — Rio's signature, used as title accent
  X.fillRect(W / 2 - 140, H / 2 - 60, 280, 4);
  X.fillRect(W / 2 - 140, H / 2 + 18, 280, 4);

  X.fillStyle = "#fff";
  X.font = "bold 36px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("THE BLOCK", W / 2, H / 2 - 22);

  X.fillStyle = "#aaa";
  X.font = "12px ui-monospace, monospace";
  X.fillText("a beat-em-up", W / 2, H / 2 + 4);

  // Press-start prompt — pulses on a 1Hz sine.
  const pulse = 0.55 + 0.45 * Math.sin(stateTime * Math.PI * 2);
  X.fillStyle = "rgba(255,255,255," + pulse.toFixed(3) + ")";
  X.font = "14px ui-monospace, monospace";
  X.fillText("PRESS ENTER", W / 2, H / 2 + 56);

  // Character selection hint — temporary; full select panel arrives in 4.2.
  X.fillStyle = "#888";
  X.font = "10px ui-monospace, monospace";
  X.textAlign = "center";
  const charLabel = selectedChar.toUpperCase();
  X.fillText("[1] RIO   [2] DUKE   [3] ATLAS", W / 2, H - 30);
  X.fillStyle = "#e8c04a";
  X.fillText("> " + charLabel + " <", W / 2, H - 16);
}

function renderPlaying() {
  // Screen shake — translate the world layer (not the HUD) by a damped jitter.
  let shakeX = 0, shakeY = 0;
  if (shakeFrames > 0) {
    const t = shakeFrames;
    shakeX = (Math.sin(t * 13.1) * shakeMag) | 0;
    shakeY = (Math.cos(t * 11.7) * shakeMag * 0.6) | 0;
  }
  if (shakeX || shakeY) X.translate(shakeX, shakeY);

  drawStage1();
  // Depth-sort: deeper (lower world Y) renders first so closer entities cover them.
  const drawables = [];
  if (player) drawables.push({ y: player.y, draw: () => drawCharacter(player) });
  for (const e of enemies) drawables.push({ y: e.y, draw: () => drawRunner(e) });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();
  drawParticles();
  if (DEV && debugEl.classList.contains("on")) drawDebugBoxes();

  if (shakeX || shakeY) X.translate(-shakeX, -shakeY);

  // Screen flash sits behind HUD so HUD stays readable through the brightest moment.
  if (flashFrames > 0) {
    const a = Math.min(0.85, flashFrames / 5);
    X.fillStyle = "rgba(255,255,255," + a.toFixed(2) + ")";
    X.fillRect(0, 0, W, H);
  }

  drawHUD();

  X.fillStyle = "#888";
  X.font = "9px ui-monospace, monospace";
  X.textAlign = "right";
  X.textBaseline = "top";
  X.fillText("ESC : title", W - 6, 4);
}

// ---------- Boot ----------
requestAnimationFrame((t) => { last = t / 1000; frame(t); });
</script>
</body>
</html>
