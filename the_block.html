// Closest enemy within grab range (24 px) on the side we're facing.
function findGrabTarget(p) {
  let best = null, bestDist = 24;
  for (const e of enemies) {
    if (e.dead || e.airborne || e.grabbedBy) continue;
    const dx = e.x - p.x;
    if (Math.sign(dx || p.facing) !== p.facing) continue;
    const d = Math.hypot(dx, e.y - p.y);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  return best;
}

function startAttack(p, name) {
  p.attacking = true;
  p.attackName = name;
  p.attackFrame = 0;
  p.vx = 0; p.vy = 0;
  p.hitboxes.length = 0;
  p.attackHits = new Set();
}

function startDodge(p) {
  p.dodging = true;
  p.dodgeFrame = 0;
  p.iframes = 14;
  p.attacking = false;
  p.attackName = null;
  p.hitboxes.length = 0;
  p.vx = -p.facing * 220;
  p.vy = 0;
  p.animState = "dodge";
  p.animTime = 0;
  // Per-run / per-stage achievement counters.
  p.dodgeUsedThisStage = true;
}

function advanceAttack(p) {
  const d = ATTACK_DATA[p.char + "_" + p.attackName];
  if (!d) { p.attacking = false; p.attackName = null; return; }
  const total = d.startup + d.active + d.recovery;
  if (p.attackFrame > d.startup && p.attackFrame <= d.startup + d.active) {
    const h = d.hit;
    if (p.hitboxes.length === 0) {
      p.hitboxes.push({
        cx: 0, cy: 0,
        hw: h.hw, hd: h.hd, lo: h.lo, hi: h.hi,
        damage: d.damage,
        knockback: d.knockback,
        hitstop: d.hitstop,
        launcher: d.launcher || 0,
        multiHit: d.multiHit || 0,
        lastHits: d.multiHit ? new Map() : null,
        facing: p.facing,
        owner: p,
        hits: p.attackHits,
        backwardHit: d.backwardHit || false,
      });
    }
    const hb = p.hitboxes[0];
    hb.cx = p.x + p.facing * h.fwd;
    hb.cy = p.y;
    hb.facing = p.facing;
    // Final-frames launcher upgrade for moves that pop the victim only on the
    // last beat of a multi-hit string (Sunset Spin's uppercut).
    if (d.finalLauncher && p.attackFrame > d.startup + d.active - 3) {
      hb.launcher = d.finalLauncher;
    }
    if (d.pushSelf && p.z <= 0) p.x += p.facing * d.pushSelf * STEP;
  } else {
    p.hitboxes.length = 0;
  }
  if (p.attackFrame >= total) {
    p.attacking = false;
    p.attackName = null;
    p.hitboxes.length = 0;
    p.attackHits = null;
  }
}

function updatePlayer(p, dt) {
  if (p.iframes > 0) p.iframes--;

  // Hitstun: knocked-back movement, no input, no attack progress.
  if (p.hitstun > 0) {
    p.hitstun--;
    p.x += p.knockX * dt;
    p.y += p.knockY * dt;
    p.knockX *= 0.82; p.knockY *= 0.82;
    if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
    if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
    if (p.y < STAGE_TOP) p.y = STAGE_TOP;
    if (p.y > STAGE_BOT) p.y = STAGE_BOT;
    p.animState = "hurt";
    p.animTime += dt;
    p.hitboxes.length = 0;
    p.hurtboxes.length = 0;
    p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
    return;
  }

  const grounded = p.z <= 0;
  // Capture pre-movement facing for back-attack detection. Movement input
  // can flip facing this same tick (left held while facing right), so the
  // back-direction check must use the facing BEFORE that flip.
  const facingBeforeInput = p.facing;

  // Combo-window timer ticks down whenever no fresh hit lands this frame.
  if (p.comboTimer > 0) {
    p.comboTimer -= dt;
    if (p.comboTimer <= 0) { p.comboTimer = 0; p.comboHits = 0; }
  }

  // Parry: tick frame counter through the active window then the 18f cooldown.
  if (p.parryFrame > 0) {
    p.parryFrame++;
    if (p.parryFrame > PARRY_TOTAL) p.parryFrame = 0;
  }

  // Parry chain timeout: if no fresh parry within 1.5s, retain 60% meter.
  if (p.parryChainTimer > 0) {
    p.parryChainTimer -= dt;
    if (p.parryChainTimer <= 0) {
      p.parryChainTimer = 0;
      p.parryChain = 0;
      p.parryMeter = Math.floor(p.parryMeter * 0.6);
    }
  }

  // Counter-special at full meter: intercepts the next light/heavy press.
  if (p.parryMeter >= 100 && grounded && !p.attacking) {
    if (actionPressed("light") || actionPressed("heavy")) {
      startAttack(p, "counter");
      p.parryMeter = 0;
      p.parryChain = 0;
      p.parryChainTimer = 0;
      flashFrames = Math.max(flashFrames, 4);
      unlockAchievement("counter_special");
    }
  }

  // Parry input — independent of attacks. Gated by hitstun, dodge, in-progress
  // parry/cooldown, and grounded state.
  if (grounded && !p.attacking && !p.dodging && p.parryFrame === 0) {
    if (actionPressed("parry")) {
      p.parryFrame = 1;
    }
  }

  // Dodge: locks input and motion to a backward slide with iframes.
  if (p.dodging) {
    p.dodgeFrame++;
    p.x += p.vx * dt;
    p.vx *= 0.85;
    p.animState = "dodge";
    p.animTime += dt;
    if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
    if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
    p.hitboxes.length = 0;
    p.hurtboxes.length = 0;
    p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
    if (p.dodgeFrame >= 14) p.dodging = false;
    return;
  }

  const locked = p.attacking && grounded;

  // Movement input (suppressed during grounded attack lock).
  let ix = 0, iy = 0;
  if (!locked) {
    if (actionHeld("left"))  ix -= 1;
    if (actionHeld("right")) ix += 1;
    if (actionHeld("up"))    iy -= 1;
    if (actionHeld("down"))  iy += 1;
  }

  // Double-tap → run; releasing direction stops it.
  if (actionPressed("left")) {
    if (stateTime - lastTapLeft < DOUBLE_TAP_WINDOW) p.running = true;
    lastTapLeft = stateTime;
  }
  if (actionPressed("right")) {
    if (stateTime - lastTapRight < DOUBLE_TAP_WINDOW) p.running = true;
    lastTapRight = stateTime;
  }
  if (ix === 0) p.running = false;

  if (!locked) {
    if (ix !== 0 || iy !== 0) {
      const mag = Math.hypot(ix, iy) || 1;
      const speed = p.running ? p.runSpeed : p.walkSpeed;
      p.vx = (ix / mag) * speed;
      p.vy = (iy / mag) * speed;
      if (ix !== 0) p.facing = ix > 0 ? 1 : -1;
    } else if (p.z <= 0) {
      // Air control: preserve horizontal velocity once airborne.
      p.vx = 0; p.vy = 0;
    }
  }

  // Jump / dodge — both bound to the jump key. Down + jump = dodge.
  if (!locked && grounded && actionPressed("jump")) {
    if (actionHeld("down")) {
      startDodge(p);
      playSfx("dodge");
    } else {
      p.vz = p.jumpVel;
      playSfx("jump");
    }
  }

  // Grab — while holding an enemy, the player rides them and can throw.
  if (p.grabbing) {
    p.grabFrames++;
    const e = p.grabbing;
    // Position the grabbed enemy in front of the player.
    e.x = p.x + p.facing * 14;
    e.y = p.y;
    e.z = 4; // lifted slightly off the ground
    e.facing = -p.facing;
    e.hitboxes.length = 0;
    e.attacking = false;
    e.attackName = null;
    // Player can throw with attack inputs. Direction held = direction of throw.
    let threw = false;
    if (actionPressed("light") || actionPressed("heavy")) {
      let throwDir = p.facing;
      if (actionHeld("left"))  throwDir = -1;
      if (actionHeld("right")) throwDir = 1;
      // Up/down add a vertical component handled by resolveThrow.
      const throwVZ = actionHeld("up") ? 200 : (actionHeld("down") ? 0 : 80);
      resolveThrow(p, e, throwDir, throwVZ);
      threw = true;
    }
    // Auto-release after 60 frames.
    if (!threw && p.grabFrames > 60) {
      e.grabbedBy = null;
      e.iframes = 8;
      p.grabbing = null;
      p.grabFrames = 0;
    }
    // Build hurtboxes for both — player vulnerable, enemy not.
    p.hurtboxes.length = 0;
    p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
    e.hurtboxes.length = 0;
    if (threw) return;
    p.animState = "grab";
    p.animTime += dt;
    return;
  }

  // Detect "back direction held" relative to facing AS OF THIS TICK'S START.
  const backHeld = (facingBeforeInput === 1 && actionHeld("left")) ||
                   (facingBeforeInput === -1 && actionHeld("right"));

  // Attack inputs.
  // - airborne + light  = jump_atk
  // - grounded + back+light = back_atk
  // - grounded + light  = atk1, or chain to next light attack
  // - grounded + heavy  = heavy, or chain finisher from a light
  // - grounded + special = sunset spin (Rio); HP-costing AOE
  // - grounded + grab    = grab if adjacent enemy
  if (actionPressed("light")) {
    if (!grounded && !p.attacking) {
      startAttack(p, "jump_atk");
    } else if (grounded) {
      if (p.attacking) {
        const cur = ATTACK_DATA[p.char + "_" + p.attackName];
        if (cur && cur.chainLight && p.attackFrame >= cur.startup) {
          startAttack(p, cur.chainLight);
        }
      } else if (backHeld) {
        // Snap facing back so the elbow hits where the enemy actually was.
        p.facing = facingBeforeInput;
        startAttack(p, "back_atk");
        p.backAtkThisStage = (p.backAtkThisStage || 0) + 1;
        if (p.backAtkThisStage >= 3) unlockAchievement("back_atk_3");
      } else {
        startAttack(p, "atk1");
      }
    }
  }
  if (actionPressed("heavy") && grounded) {
    if (p.attacking) {
      const cur = ATTACK_DATA[p.char + "_" + p.attackName];
      if (cur && cur.chainHeavy && p.attackFrame >= cur.startup) {
        startAttack(p, cur.chainHeavy);
      }
    } else {
      startAttack(p, "heavy");
    }
  }
  if (actionPressed("special") && grounded && !p.attacking) {
    const sp = ATTACK_DATA[p.char + "_special"];
    if (sp && (p.hp - (sp.hpCost || 0)) > 0) {
      p.hp -= sp.hpCost || 0;
      startAttack(p, "special");
      playSfx("special");
      p.specialUsedThisStage = true;
    }
  }
  if (actionPressed("grab") && grounded && !p.attacking) {
    const target = findGrabTarget(p);
    if (target) {
      target.grabbedBy = p;
      target.iframes = 4;
      target.attacking = false;
      target.hitstun = 0;
      target.airborne = false;
      target.knockdownFrames = 0;
      p.grabbing = target;
      p.grabFrames = 0;
      p.animState = "grab";
    }
  }

  if (p.attacking) {
    p.attackFrame++;
    advanceAttack(p);
  }

  // Integrate motion. Air control: keep horizontal velocity from jump.
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.z += p.vz * dt;
  if (p.z > 0 || p.vz > 0) p.vz -= GRAVITY * dt;
  if (p.z < 0) { p.z = 0; p.vz = 0; }

  if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
  if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
  if (p.y < STAGE_TOP) p.y = STAGE_TOP;
  if (p.y > STAGE_BOT) p.y = STAGE_BOT;

  // Animation state selection.
  let next;
  if (p.attacking) next = p.attackName;
  else if (p.z > 0) next = "jump";
  else if (ix !== 0 || iy !== 0) next = p.running ? "run" : "walk";
  else next = "idle";
  if (next !== p.animState) { p.animState = next; p.animTime = 0; }
  else p.animTime += dt;

  // Rebuild hurtbox each tick (torso column, world coords).
  p.hurtboxes.length = 0;
  p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
}

// ---------- Duke: procedural fillRect rendering ----------
const DUKE_COLORS = {
  skin:       "#d4a888",
  skinDark:   "#9a785a",
  hair:       "#a08c4a",
  hairDark:   "#6e5e2c",
  jacket:     "#5a6678",
  jacketDark: "#404a5c",
  shirt:      "#cfc8b8",
  shirtDark:  "#9b9482",
  jeans:      "#2a2e3a",
  jeansDark:  "#191c26",
  boot:       "#161618",
  bootDark:   "#0a0a0a",
  cig:        "#e8e4d2",
  cigTip:     "#7a4a26",
  stubble:    "#3a2a1c",
};

function drawDuke(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const f  = p.facing;
  const t  = p.animTime;
  const k  = DUKE_COLORS;

  // Reuse Rio's specials infrastructure where possible — Duke has his own
  // signature handled in drawRollingThunder.
  if (p.attacking && p.attackName === "special") {
    drawRollingThunder(p);
    return;
  }

  if (p.dodging) {
    const groundY = Math.round(p.y);
    X.fillStyle = "rgba(80,100,140,0.30)";
    X.fillRect(sx + f * 6,  groundY - 14, 8, 12);
    X.fillStyle = "rgba(0,0,0,0.4)";
    X.beginPath(); X.ellipse(sx, groundY, 11, 3, 0, 0, Math.PI * 2); X.fill();
    X.fillStyle = k.jeans;
    X.fillRect(sx - 8, groundY - 14, 16, 12);
    X.fillStyle = k.jacket;
    X.fillRect(sx - 8, groundY - 14, 16, 6);
    X.fillStyle = k.hair;
    X.fillRect(sx - 6, groundY - 16, 12, 2);
    return;
  }
  if (p.grabbing) { drawDukeGrab(sx, sy, f, k); return; }
  if (p.parryFrame >= 1 && p.parryFrame <= PARRY_ACTIVE) {
    const r = 22 + (p.parryFrame / PARRY_ACTIVE) * 10;
    const a = 1 - (p.parryFrame / PARRY_ACTIVE) * 0.7;
    X.strokeStyle = "rgba(160,140,74," + a.toFixed(2) + ")";
    X.lineWidth = 2;
    X.beginPath(); X.arc(sx, sy - 24, r, 0, Math.PI * 2); X.stroke();
    X.lineWidth = 1;
  }

  let armSwing = 0, legSwingL = 0, legSwingR = 0, bodyBob = 0;
  if (p.animState === "walk") {
    const s = Math.sin(t * 8);
    legSwingL =  s * 1.5; legSwingR = -s * 1.5;
    armSwing  = -s * 1.2;
    bodyBob   =  Math.abs(s) * 0.6;
  } else if (p.animState === "run") {
    const s = Math.sin(t * 13);
    legSwingL =  s * 2.2; legSwingR = -s * 2.2;
    armSwing  = -s * 1.7;
    bodyBob   =  Math.abs(s) * 1.0;
  } else if (p.animState === "idle") {
    bodyBob = Math.sin(t * 1.6) * 0.5;
  } else if (p.animState === "jump") {
    legSwingL = -2; legSwingR = -2;
    armSwing = -1;
  }

  // Per-attack envelope (same shape as drawRio).
  let atkReach = 0, atkArm = "front", atkYBias = 0, atkUp = 0, atkKick = 0;
  if (p.attacking) {
    const name = p.attackName;
    if (name === "atk1") { atkReach = attackEnvelope(p, 14); }
    else if (name === "atk2") { atkReach = attackEnvelope(p, 18); atkArm = "rear"; }
    else if (name === "atk3") { atkReach = attackEnvelope(p, 20); atkYBias = 1; }
    else if (name === "heavy") {
      atkReach = attackEnvelope(p, 10);
      atkUp = attackEnvelope(p, 14);
      const d = ATTACK_DATA.duke_heavy;
      if (p.attackFrame <= d.startup) bodyBob = -(p.attackFrame / d.startup) * 3;
    } else if (name === "jump_atk") {
      atkKick = attackEnvelope(p, 14);
    } else if (name === "back_atk") {
      atkReach = attackEnvelope(p, 12);
      atkArm = "rear-back";
    } else if (name === "throw" || name === "counter") {
      atkReach = attackEnvelope(p, 18); atkArm = "front"; atkYBias = -1;
    }
  }

  // Drop shadow.
  X.fillStyle = "rgba(0,0,0,0.4)";
  X.beginPath();
  X.ellipse(sx, p.y, 11 - p.z * 0.04, 3, 0, 0, Math.PI * 2);
  X.fill();

  const bob = -bodyBob;
  const headY  = sy - 46 + bob;
  const torsoY = sy - 34 + bob;

  // Legs.
  X.fillStyle = k.jeans;
  X.fillRect(sx - 6, sy - 18, 5, 14);
  X.fillRect(sx + 1, sy - 18, 5, 14);
  X.fillStyle = k.jeansDark;
  X.fillRect(sx - 6, sy - 12 + Math.round(legSwingL), 5, 1);
  X.fillRect(sx + 1, sy - 12 + Math.round(legSwingR), 5, 1);
  // Combat boots — chunkier.
  X.fillStyle = k.boot;
  X.fillRect(sx - 7, sy - 5, 6, 5);
  X.fillRect(sx + 1, sy - 5, 6, 5);
  X.fillStyle = k.bootDark;
  X.fillRect(sx - 7, sy - 1, 6, 1);
  X.fillRect(sx + 1, sy - 1, 6, 1);
  // Belt.
  X.fillStyle = k.jeansDark;
  X.fillRect(sx - 6, sy - 19, 12, 2);

  // Torso: white tee under cut-off denim jacket. Jacket has ragged hem.
  X.fillStyle = k.shirt;
  X.fillRect(sx - 7, torsoY, 14, 15);
  X.fillStyle = k.shirtDark;
  X.fillRect(sx - 7, torsoY + 14, 14, 1);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 8, torsoY, 16, 11); // overhanging shoulders for the cut-off
  X.fillStyle = k.jacketDark;
  X.fillRect(sx - 8, torsoY + 10, 16, 1);
  X.fillRect(sx - 8, torsoY + 11, 1, 1); // ragged corner
  X.fillRect(sx + 7, torsoY + 11, 1, 1);

  // Arms — visible skin from the cut-off sleeves.
  const frontArmX = (f > 0) ? sx + 7 : sx - 10;
  const backArmX  = (f > 0) ? sx - 10 : sx + 7;

  // Rear arm.
  if (atkArm === "rear" && atkReach > 0) {
    const ay = torsoY + 5 + atkYBias;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 5, ay, atkReach + 3, 3);
    else       X.fillRect(sx - 5 - atkReach - 3, ay, atkReach + 3, 3);
    X.fillStyle = k.skinDark;
    if (f > 0) X.fillRect(sx + 5 + atkReach, ay, 3, 3);
    else       X.fillRect(sx - 5 - atkReach - 3, ay, 3, 3);
  } else if (atkArm === "rear-back" && atkReach > 0) {
    const ay = torsoY + 6;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx - 5 - atkReach - 3, ay, atkReach + 3, 3);
    else       X.fillRect(sx + 5, ay, atkReach + 3, 3);
  } else {
    X.fillStyle = k.skin;
    X.fillRect(backArmX, torsoY + 2 + Math.round(armSwing), 3, 11);
    X.fillStyle = k.skinDark;
    X.fillRect(backArmX, torsoY + 12 + Math.round(armSwing), 3, 2);
  }

  // Front arm — extends on jab/hook/heavy.
  if (atkArm === "front" && (atkReach > 0 || atkUp > 0)) {
    const reach = atkReach;
    const ay = torsoY + 5 + atkYBias - Math.round(atkUp);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 5, ay, reach + 3, 3);
    else       X.fillRect(sx - 5 - reach - 3, ay, reach + 3, 3);
    X.fillStyle = k.skinDark;
    if (f > 0) X.fillRect(sx + 5 + reach, ay, 3, 3);
    else       X.fillRect(sx - 5 - reach - 3, ay, 3, 3);
    if (atkUp > 2) {
      X.fillStyle = k.skin;
      X.fillRect((f > 0) ? sx + 5 + reach - 1 : sx - 5 - reach - 2, ay, 3, Math.round(atkUp));
    }
  } else {
    X.fillStyle = k.skin;
    X.fillRect(frontArmX, torsoY + 2 - Math.round(armSwing), 3, 11);
    X.fillStyle = k.skinDark;
    X.fillRect(frontArmX, torsoY + 12 - Math.round(armSwing), 3, 2);
  }

  // Front kick for jump_atk — knee/foot extension.
  if (atkKick > 0) {
    X.fillStyle = k.jeans;
    if (f > 0) X.fillRect(sx + 4, sy - 12, atkKick, 5);
    else       X.fillRect(sx - 4 - atkKick, sy - 12, atkKick, 5);
    X.fillStyle = k.boot;
    if (f > 0) X.fillRect(sx + 4 + atkKick - 4, sy - 12, 5, 6);
    else       X.fillRect(sx - 4 - atkKick, sy - 12, 5, 6);
  }

  // Head.
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, headY, 12, 12);
  X.fillStyle = k.skinDark;
  X.fillRect(sx - 6, headY + 6, 1, 6);
  X.fillRect(sx + 5, headY + 6, 1, 6);
  // Messy hair — uneven top.
  X.fillStyle = k.hair;
  X.fillRect(sx - 6, headY - 3, 13, 4);
  X.fillRect(sx - 5, headY - 4, 11, 1);
  X.fillRect(sx + 5, headY - 5, 2, 2);  // wayward strand
  X.fillStyle = k.hairDark;
  X.fillRect(sx - 6, headY, 13, 1);
  // Stubble — three small dark dots along the jaw.
  X.fillStyle = k.stubble;
  X.fillRect(sx - 4, headY + 9, 1, 1);
  X.fillRect(sx - 1, headY + 10, 1, 1);
  X.fillRect(sx + 2, headY + 9, 1, 1);
  // Eye.
  X.fillStyle = "#fff";
  if (f > 0) X.fillRect(sx + 1, headY + 6, 2, 1);
  else       X.fillRect(sx - 3, headY + 6, 2, 1);
  // Cigarette behind the ear (camera-side).
  X.fillStyle = k.cig;
  if (f > 0) X.fillRect(sx + 6, headY + 3, 1, 4);
  else       X.fillRect(sx - 6, headY + 3, 1, 4);
  X.fillStyle = k.cigTip;
  if (f > 0) X.fillRect(sx + 6, headY + 7, 1, 1);
  else       X.fillRect(sx - 6, headY + 7, 1, 1);
}

function drawDukeGrab(sx, sy, f, k) {
  X.fillStyle = "rgba(0,0,0,0.4)";
  X.beginPath(); X.ellipse(sx, sy, 11, 3, 0, 0, Math.PI * 2); X.fill();
  X.fillStyle = k.jeans;
  X.fillRect(sx - 7, sy - 18, 5, 14);
  X.fillRect(sx + 2, sy - 18, 5, 14);
  X.fillStyle = k.boot;
  X.fillRect(sx - 7, sy - 5, 6, 5);
  X.fillRect(sx + 1, sy - 5, 6, 5);
  X.fillStyle = k.shirt;
  X.fillRect(sx - 7, sy - 34, 14, 14);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 8, sy - 34, 16, 10);
  X.fillStyle = k.skin;
  if (f > 0) X.fillRect(sx + 4, sy - 28, 9, 3);
  else        X.fillRect(sx - 13, sy - 28, 9, 3);
  if (f > 0) X.fillRect(sx + 4, sy - 24, 9, 3);
  else        X.fillRect(sx - 13, sy - 24, 9, 3);
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, sy - 46, 12, 12);
  X.fillStyle = k.hair;
  X.fillRect(sx - 6, sy - 49, 13, 4);
}

// Rolling Thunder — Duke's three-elbow combo finishing with a haymaker.
// Procedural: forward-stomping body with three strike pulses across active.
function drawRollingThunder(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const f  = p.facing;
  const k  = DUKE_COLORS;
  const d  = ATTACK_DATA.duke_special;
  const fr = p.attackFrame;
  const inActive = fr > d.startup && fr <= d.startup + d.active;

  X.fillStyle = "rgba(0,0,0,0.4)";
  X.beginPath(); X.ellipse(sx, p.y, 12, 3.5, 0, 0, Math.PI * 2); X.fill();

  // Body — leaning into the strike.
  X.fillStyle = k.jeans;
  X.fillRect(sx - 6, sy - 18, 5, 14);
  X.fillRect(sx + 1, sy - 18, 5, 14);
  X.fillStyle = k.boot;
  X.fillRect(sx - 7, sy - 5, 6, 5);
  X.fillRect(sx + 1, sy - 5, 6, 5);
  X.fillStyle = k.shirt;
  X.fillRect(sx - 7, sy - 34, 14, 15);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 8, sy - 34, 16, 11);
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, sy - 46, 12, 12);
  X.fillStyle = k.hair;
  X.fillRect(sx - 6, sy - 49, 13, 4);

  // Strike pulses — three quick elbows then a haymaker on the last beat.
  if (inActive) {
    const localFr = fr - d.startup;
    // Three pulses of three frames each, then a 5-frame haymaker.
    const pulse = Math.floor(localFr / 3);
    const lift  = (localFr % 3) === 0 ? 0 : (localFr % 3) === 1 ? -2 : -1;
    if (pulse < 3) {
      // Elbow strike forward.
      const reach = 14 + pulse * 2;
      const ay = sy - 28 + lift;
      X.fillStyle = k.skin;
      if (f > 0) X.fillRect(sx + 4, ay, reach + 3, 4);
      else       X.fillRect(sx - 4 - reach - 3, ay, reach + 3, 4);
      X.fillStyle = k.skinDark;
      if (f > 0) X.fillRect(sx + 4 + reach, ay, 3, 3);
      else       X.fillRect(sx - 4 - reach - 3, ay, 3, 3);
      // Speedline.
      X.fillStyle = "rgba(220,220,220,0.55)";
      if (f > 0) X.fillRect(sx + 4, ay + 1, reach + 8, 1);
      else       X.fillRect(sx - 4 - reach - 8, ay + 1, reach + 8, 1);
    } else {
      // Haymaker — the wind-down. Body tilts and arm windmill.
      const tilt = (localFr - 9) * 0.5;
      const reach = 22;
      const ay = sy - 30 + Math.round(tilt);
      X.fillStyle = k.skin;
      if (f > 0) X.fillRect(sx + 4, ay, reach, 4);
      else       X.fillRect(sx - 4 - reach, ay, reach, 4);
      X.fillStyle = k.skinDark;
      if (f > 0) X.fillRect(sx + 4 + reach - 3, ay, 3, 4);
      else       X.fillRect(sx - 4 - reach, ay, 3, 4);
      // Impact crack — two diagonal slashes.
      X.fillStyle = "rgba(255,255,255,0.7)";
      if (f > 0) {
        X.fillRect(sx + 4 + reach + 2, ay - 2, 1, 2);
        X.fillRect(sx + 4 + reach + 4, ay,     1, 3);
      } else {
        X.fillRect(sx - 4 - reach - 3, ay - 2, 1, 2);
        X.fillRect(sx - 4 - reach - 5, ay,     1, 3);
      }
    }
  }
}

// ---------- Atlas: procedural fillRect rendering (taller, wider) ----------
const ATLAS_COLORS = {
  skin:       "#7a5234",
  skinDark:   "#583820",
  beard:      "#a8a4a0",
  beardDark:  "#6e6c6a",
  flannel:    "#7a3030",
  flannelDark:"#5a1c1c",
  flannelHi:  "#9a4040",
  pants:      "#3a3024",
  pantsDark:  "#221c14",
  boot:       "#1c140c",
  bootDark:   "#100a06",
  belt:       "#2a1a10",
  buckle:     "#a89060",
  silver:     "#c0c0c8",
  tattoo:     "#332016",
};

function drawAtlas(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const f  = p.facing;
  const t  = p.animTime;
  const k  = ATLAS_COLORS;

  if (p.attacking && p.attackName === "special") {
    drawFoundationStone(p);
    return;
  }

  if (p.dodging) {
    const groundY = Math.round(p.y);
    X.fillStyle = "rgba(122,48,48,0.30)";
    X.fillRect(sx + f * 7, groundY - 16, 10, 14);
    X.fillStyle = "rgba(0,0,0,0.45)";
    X.beginPath(); X.ellipse(sx, groundY, 13, 4, 0, 0, Math.PI * 2); X.fill();
    X.fillStyle = k.pants;
    X.fillRect(sx - 10, groundY - 16, 20, 14);
    X.fillStyle = k.flannel;
    X.fillRect(sx - 10, groundY - 16, 20, 7);
    return;
  }
  if (p.grabbing) { drawAtlasGrab(sx, sy, f, k); return; }
  if (p.parryFrame >= 1 && p.parryFrame <= PARRY_ACTIVE) {
    const r = 26 + (p.parryFrame / PARRY_ACTIVE) * 12;
    const a = 1 - (p.parryFrame / PARRY_ACTIVE) * 0.7;
    X.strokeStyle = "rgba(154,64,64," + a.toFixed(2) + ")";
    X.lineWidth = 2;
    X.beginPath(); X.arc(sx, sy - 28, r, 0, Math.PI * 2); X.stroke();
    X.lineWidth = 1;
  }

  let armSwing = 0, legSwingL = 0, legSwingR = 0, bodyBob = 0;
  if (p.animState === "walk") {
    const s = Math.sin(t * 6.5);
    legSwingL = s * 1.5; legSwingR = -s * 1.5;
    armSwing  = -s * 1.0;
    bodyBob   = Math.abs(s) * 0.6;
  } else if (p.animState === "run") {
    const s = Math.sin(t * 11);
    legSwingL = s * 2.2; legSwingR = -s * 2.2;
    armSwing  = -s * 1.6;
    bodyBob   = Math.abs(s) * 1.4;
  } else if (p.animState === "idle") {
    bodyBob = Math.sin(t * 1.2) * 0.6;
  } else if (p.animState === "jump") {
    legSwingL = -2; legSwingR = -2; armSwing = -1;
  }

  let atkReach = 0, atkArm = "front", atkYBias = 0, atkUp = 0, atkKick = 0;
  if (p.attacking) {
    const name = p.attackName;
    if (name === "atk1") { atkReach = attackEnvelope(p, 16); }
    else if (name === "atk2") { atkReach = attackEnvelope(p, 18); atkArm = "rear"; }
    else if (name === "atk3") { atkReach = attackEnvelope(p, 22); atkYBias = 1; }
    else if (name === "heavy") {
      atkReach = attackEnvelope(p, 12);
      atkUp = attackEnvelope(p, 18);
      const d = ATTACK_DATA.atlas_heavy;
      if (p.attackFrame <= d.startup) bodyBob = -(p.attackFrame / d.startup) * 4;
    } else if (name === "jump_atk") {
      atkKick = attackEnvelope(p, 16);
    } else if (name === "back_atk") {
      atkReach = attackEnvelope(p, 14);
      atkArm = "rear-back";
    } else if (name === "throw" || name === "counter") {
      atkReach = attackEnvelope(p, 22); atkArm = "front"; atkYBias = -1;
    }
  }

  // Drop shadow — wider for the bigger frame.
  X.fillStyle = "rgba(0,0,0,0.45)";
  X.beginPath();
  X.ellipse(sx, p.y, 13 - p.z * 0.04, 4, 0, 0, Math.PI * 2);
  X.fill();

  const bob = -bodyBob;
  const headY  = sy - 56 + bob;
  const torsoY = sy - 42 + bob;

  // Legs — heavy work pants.
  X.fillStyle = k.pants;
  X.fillRect(sx - 8, sy - 22, 7, 18);
  X.fillRect(sx + 1, sy - 22, 7, 18);
  X.fillStyle = k.pantsDark;
  X.fillRect(sx - 8, sy - 14 + Math.round(legSwingL), 7, 1);
  X.fillRect(sx + 1, sy - 14 + Math.round(legSwingR), 7, 1);
  // Steel-toed boots — slightly wider.
  X.fillStyle = k.boot;
  X.fillRect(sx - 9, sy - 5, 8, 5);
  X.fillRect(sx + 1, sy - 5, 8, 5);
  X.fillStyle = "#3a3a3a";  // steel toe
  X.fillRect(sx - 9, sy - 1, 3, 1);
  X.fillRect(sx + 6, sy - 1, 3, 1);
  // Belt + buckle.
  X.fillStyle = k.belt;
  X.fillRect(sx - 9, sy - 24, 18, 3);
  X.fillStyle = k.buckle;
  X.fillRect(sx - 2, sy - 24, 4, 3);

  // Torso — sleeveless red flannel; top three buttons undone shows skin.
  X.fillStyle = k.flannel;
  X.fillRect(sx - 9, torsoY, 18, 18);
  X.fillStyle = k.flannelDark;
  X.fillRect(sx - 9, torsoY + 17, 18, 1);
  // Plaid stripes.
  X.fillStyle = k.flannelHi;
  X.fillRect(sx - 9, torsoY + 4, 18, 1);
  X.fillRect(sx - 9, torsoY + 11, 18, 1);
  X.fillRect(sx - 1, torsoY, 1, 18);
  X.fillRect(sx + 5, torsoY, 1, 18);
  // Open V from undone buttons.
  X.fillStyle = k.skin;
  X.fillRect(sx - 2, torsoY, 5, 6);
  X.fillRect(sx - 1, torsoY + 5, 3, 2);
  // Silver chain with wedding band.
  X.fillStyle = k.silver;
  X.fillRect(sx - 3, torsoY + 1, 1, 1);
  X.fillRect(sx + 3, torsoY + 1, 1, 1);
  X.fillRect(sx - 1, torsoY + 3, 1, 1);
  X.fillRect(sx + 1, torsoY + 4, 1, 1);
  X.fillRect(sx, torsoY + 6, 2, 2); // band

  // Arms — bare, with tribal tattoo bands.
  const frontArmX = (f > 0) ? sx + 8 : sx - 12;
  const backArmX  = (f > 0) ? sx - 12 : sx + 8;

  // Rear arm.
  if (atkArm === "rear" && atkReach > 0) {
    const ay = torsoY + 6 + atkYBias;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 6, ay, atkReach + 4, 4);
    else       X.fillRect(sx - 6 - atkReach - 4, ay, atkReach + 4, 4);
    X.fillStyle = k.tattoo;
    if (f > 0) X.fillRect(sx + 12, ay, 2, 4);
    else       X.fillRect(sx - 12 - 2, ay, 2, 4);
    X.fillStyle = k.skinDark;
    if (f > 0) X.fillRect(sx + 6 + atkReach, ay, 4, 4);
    else       X.fillRect(sx - 6 - atkReach - 4, ay, 4, 4);
  } else if (atkArm === "rear-back" && atkReach > 0) {
    const ay = torsoY + 8;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx - 6 - atkReach - 4, ay, atkReach + 4, 4);
    else       X.fillRect(sx + 6, ay, atkReach + 4, 4);
  } else {
    X.fillStyle = k.skin;
    X.fillRect(backArmX, torsoY + 2 + Math.round(armSwing), 4, 14);
    X.fillStyle = k.tattoo;
    X.fillRect(backArmX, torsoY + 8 + Math.round(armSwing), 4, 1);
    X.fillRect(backArmX, torsoY + 11 + Math.round(armSwing), 4, 1);
  }

  // Front arm.
  if (atkArm === "front" && (atkReach > 0 || atkUp > 0)) {
    const reach = atkReach;
    const ay = torsoY + 6 + atkYBias - Math.round(atkUp);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 6, ay, reach + 4, 4);
    else       X.fillRect(sx - 6 - reach - 4, ay, reach + 4, 4);
    X.fillStyle = k.skinDark;
    if (f > 0) X.fillRect(sx + 6 + reach, ay, 4, 4);
    else       X.fillRect(sx - 6 - reach - 4, ay, 4, 4);
    if (atkUp > 2) {
      X.fillStyle = k.skin;
      X.fillRect((f > 0) ? sx + 6 + reach - 1 : sx - 6 - reach - 3, ay, 4, Math.round(atkUp));
    }
  } else {
    X.fillStyle = k.skin;
    X.fillRect(frontArmX, torsoY + 2 - Math.round(armSwing), 4, 14);
    X.fillStyle = k.tattoo;
    X.fillRect(frontArmX, torsoY + 8 - Math.round(armSwing), 4, 1);
    X.fillRect(frontArmX, torsoY + 11 - Math.round(armSwing), 4, 1);
  }

  if (atkKick > 0) {
    X.fillStyle = k.pants;
    if (f > 0) X.fillRect(sx + 6, sy - 14, atkKick, 6);
    else       X.fillRect(sx - 6 - atkKick, sy - 14, atkKick, 6);
    X.fillStyle = k.boot;
    if (f > 0) X.fillRect(sx + 6 + atkKick - 4, sy - 14, 5, 7);
    else       X.fillRect(sx - 6 - atkKick, sy - 14, 5, 7);
  }

  // Head — bald with full beard.
  X.fillStyle = k.skin;
  X.fillRect(sx - 7, headY, 14, 14);
  X.fillStyle = k.skinDark;
  X.fillRect(sx - 7, headY + 7, 1, 7);
  X.fillRect(sx + 6, headY + 7, 1, 7);
  // Bald — no hair on top.
  X.fillStyle = k.skinDark;
  X.fillRect(sx - 7, headY, 14, 1); // crown shadow
  // Beard — wraps lower jaw + chin.
  X.fillStyle = k.beard;
  X.fillRect(sx - 7, headY + 8, 14, 6);
  X.fillStyle = k.beardDark;
  X.fillRect(sx - 7, headY + 13, 14, 1);
  // Mustache.
  X.fillStyle = k.beard;
  X.fillRect(sx - 4, headY + 7, 8, 1);
  // Eyes.
  X.fillStyle = "#fff";
  if (f > 0) X.fillRect(sx + 1, headY + 5, 2, 1);
  else       X.fillRect(sx - 3, headY + 5, 2, 1);
}

function drawAtlasGrab(sx, sy, f, k) {
  X.fillStyle = "rgba(0,0,0,0.45)";
  X.beginPath(); X.ellipse(sx, sy, 13, 4, 0, 0, Math.PI * 2); X.fill();
  X.fillStyle = k.pants;
  X.fillRect(sx - 8, sy - 22, 7, 18);
  X.fillRect(sx + 1, sy - 22, 7, 18);
  X.fillStyle = k.boot;
  X.fillRect(sx - 9, sy - 5, 8, 5);
  X.fillRect(sx + 1, sy - 5, 8, 5);
  X.fillStyle = k.flannel;
  X.fillRect(sx - 9, sy - 42, 18, 18);
  X.fillStyle = k.skin;
  if (f > 0) X.fillRect(sx + 6, sy - 36, 12, 4);
  else        X.fillRect(sx - 18, sy - 36, 12, 4);
  if (f > 0) X.fillRect(sx + 6, sy - 30, 12, 4);
  else        X.fillRect(sx - 18, sy - 30, 12, 4);
  X.fillStyle = k.skin;
  X.fillRect(sx - 7, sy - 56, 14, 14);
  X.fillStyle = k.beard;
  X.fillRect(sx - 7, sy - 48, 14, 6);
}

// Foundation Stone — Atlas's running shoulder charge into a slam. The body
// lurches forward across active and the final 3 frames render the slam.
function drawFoundationStone(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const f  = p.facing;
  const k  = ATLAS_COLORS;
  const d  = ATTACK_DATA.atlas_special;
  const fr = p.attackFrame;
  const inSlam = fr > d.startup + d.active - 3 && fr <= d.startup + d.active;

  // Drop shadow.
  X.fillStyle = "rgba(0,0,0,0.45)";
  X.beginPath(); X.ellipse(sx, p.y, 14, 4, 0, 0, Math.PI * 2); X.fill();

  if (inSlam) {
    // Slam pose — both arms overhead, dust burst at feet.
    const yB = sy + 2;
    X.fillStyle = k.pants;
    X.fillRect(sx - 8, yB - 22, 7, 18);
    X.fillRect(sx + 1, yB - 22, 7, 18);
    X.fillStyle = k.boot;
    X.fillRect(sx - 9, yB - 5, 8, 5);
    X.fillRect(sx + 1, yB - 5, 8, 5);
    X.fillStyle = k.flannel;
    X.fillRect(sx - 9, yB - 42, 18, 18);
    // Both arms straight up.
    X.fillStyle = k.skin;
    X.fillRect(sx - 11, yB - 60, 4, 18);
    X.fillRect(sx + 7,  yB - 60, 4, 18);
    X.fillStyle = k.tattoo;
    X.fillRect(sx - 11, yB - 52, 4, 1);
    X.fillRect(sx + 7,  yB - 52, 4, 1);
    X.fillStyle = k.skin;
    X.fillRect(sx - 7, yB - 56, 14, 14);
    X.fillStyle = k.beard;
    X.fillRect(sx - 7, yB - 48, 14, 6);
    // Dust burst.
    X.fillStyle = "rgba(180,160,120,0.65)";
    X.fillRect(sx - 18, p.y - 1, 6, 3);
    X.fillRect(sx + 12, p.y - 1, 6, 3);
    X.fillRect(sx - 24, p.y, 4, 2);
    X.fillRect(sx + 20, p.y, 4, 2);
    return;
  }

  // Charge — body tilts forward, arms back.
  const tilt = Math.min(3, (fr / d.startup) * 3);
  X.fillStyle = k.pants;
  X.fillRect(sx - 8, sy - 22, 7, 18);
  X.fillRect(sx + 1, sy - 22, 7, 18);
  X.fillStyle = k.boot;
  X.fillRect(sx - 9, sy - 5, 8, 5);
  X.fillRect(sx + 1, sy - 5, 8, 5);
  X.fillStyle = k.flannel;
  X.fillRect(sx - 9, sy - 42 - tilt, 18, 18);
  // Speed lines.
  X.fillStyle = "rgba(255,220,200,0.6)";
  for (let i = 0; i < 3; i++) {
    const ly = sy - 30 - i * 6;
    if (f > 0) X.fillRect(sx - 14 - i * 2, ly, 8, 1);
    else        X.fillRect(sx + 6 + i * 2, ly, 8, 1);
  }
  // Shoulder leading.
  X.fillStyle = k.skin;
  if (f > 0) X.fillRect(sx + 7, sy - 32 - tilt, 6, 8);
  else        X.fillRect(sx - 13, sy - 32 - tilt, 6, 8);
  // Head.
  X.fillStyle = k.skin;
  X.fillRect(sx - 7, sy - 56 - tilt, 14, 14);
  X.fillStyle = k.beard;
  X.fillRect(sx - 7, sy - 48 - tilt, 14, 6);
}

// ---------- Rio: procedural fillRect rendering ----------
const RIO_COLORS = {
  skin:       "#8a5235",
  skinDark:   "#6b3f2a",
  hair:       "#1a1410",
  jacket:     "#7d8d4f",
  jacketDark: "#5a6b3a",
  tank:       "#0a0a10",
  pants:      "#1a1a22",
  pantsDark:  "#0e0e15",
  boot:       "#0a0a10",
  wraps:      "#dcd6c4",
  bandanaHi:  "#ffd76a",
  bandana:    "#e8c04a",
  bandanaDark:"#b89426",
};

// Bandana renderer: 7w x 3h block (hi / mid / shadow rows). Camera-side wrist anchor.
// During the punch arc, trails two fading ghosts behind the wrist for motion.
function drawBandana(sx, torsoY, f, atkReach, armSwing, k) {
  // Anchor wrist x in screen space, on the camera-side wrist.
  let wx, wy;
  if (atkReach > 0) {
    // Punching: ride the front-arm fist forward.
    wy = torsoY + 6;
    wx = (f > 0) ? sx + 4 + atkReach - 1 : sx - 3 - atkReach - 6;
    // Trailing ghosts (only when arm is meaningfully extended).
    if (atkReach > 4) {
      const trailDir = -f;
      X.fillStyle = "rgba(232,192,74,0.55)";
      X.fillRect(wx + trailDir * 4, wy + 1, 6, 2);
      X.fillStyle = "rgba(232,192,74,0.28)";
      X.fillRect(wx + trailDir * 8, wy + 1, 5, 2);
    }
  } else {
    // Idle/walk: bandana hangs at hip-line on the front-arm wrist.
    wy = torsoY + 11 - Math.round(armSwing);
    wx = (f > 0) ? sx + 5 : sx - 11;
  }
  // Body — 7 wide, 3 tall.
  X.fillStyle = k.bandanaHi;
  X.fillRect(wx, wy, 7, 1);
  X.fillStyle = k.bandana;
  X.fillRect(wx, wy + 1, 7, 1);
  X.fillStyle = k.bandanaDark;
  X.fillRect(wx, wy + 2, 7, 1);
  // Two-pixel knot tail dangling on the camera-out side.
  X.fillStyle = k.bandana;
  if (atkReach > 0) {
    // Pointing forward during punch.
    if (f > 0) X.fillRect(wx + 7, wy + 1, 2, 1);
    else       X.fillRect(wx - 2, wy + 1, 2, 1);
  } else {
    if (f > 0) X.fillRect(wx + 7, wy + 2, 2, 1);
    else       X.fillRect(wx - 2, wy + 2, 2, 1);
  }
}

// Sunset Spin renderer — Rio's signature special. The spin shows a sweeping
// bandana arc with phase-fading ghosts; the finish is a rising double-fist
// uppercut that plays for the last 3 active frames + recovery.
function drawSunsetSpin(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const k  = RIO_COLORS;
  const d  = ATTACK_DATA.rio_special;
  const fr = p.attackFrame;
  const inSpin    = fr > d.startup && fr <= d.startup + d.active - 3;
  const inFinish  = fr >  d.startup + d.active - 3 && fr <= d.startup + d.active;
  const inWindup  = fr <= d.startup;

  // Drop shadow.
  X.fillStyle = "rgba(0,0,0,0.4)";
  X.beginPath(); X.ellipse(sx, p.y, 12, 3.5, 0, 0, Math.PI * 2); X.fill();

  if (inSpin) {
    const t = (fr - d.startup) / (d.active - 3);
    const ang0 = t * Math.PI * 4; // two full revolutions across spin window
    // Bandana swept around in a wide arc — six fading ghosts.
    for (let i = 0; i < 6; i++) {
      const ang = ang0 - i * 0.42;
      const a = (1 - i / 6) * 0.78;
      const rx = sx + Math.cos(ang) * 18;
      const ry = sy - 22 + Math.sin(ang) * 9;
      X.fillStyle = "rgba(255,215,106," + a.toFixed(2) + ")";
      X.fillRect(Math.round(rx) - 3, Math.round(ry) - 1, 7, 2);
      X.fillStyle = "rgba(232,192,74," + (a * 0.7).toFixed(2) + ")";
      X.fillRect(Math.round(rx) - 3, Math.round(ry) + 1, 7, 1);
    }
    // Compact body — squashed silhouette mid-spin.
    X.fillStyle = k.boot;
    X.fillRect(sx - 6, sy - 4, 12, 4);
    X.fillStyle = k.pants;
    X.fillRect(sx - 6, sy - 18, 12, 14);
    X.fillStyle = k.tank;
    X.fillRect(sx - 7, sy - 32, 14, 14);
    X.fillStyle = k.jacket;
    X.fillRect(sx - 7, sy - 32, 14, 9);
    X.fillStyle = k.skin;
    X.fillRect(sx - 6, sy - 44, 12, 12);
    X.fillStyle = k.hair;
    X.fillRect(sx - 5, sy - 46, 10, 4);
    X.fillRect(sx - 4, sy - 47, 8, 1);
    return;
  }

  if (inFinish) {
    // Rising double-fist uppercut. Body lifts 3 px per frame for 3 frames.
    const rise = (fr - (d.startup + d.active - 3)) * 3;
    const yB = sy - rise;
    X.fillStyle = k.pants;
    X.fillRect(sx - 6, yB - 18, 5, 14);
    X.fillRect(sx + 1, yB - 18, 5, 14);
    X.fillStyle = k.boot;
    X.fillRect(sx - 6, yB - 4, 5, 4);
    X.fillRect(sx + 1, yB - 4, 5, 4);
    X.fillStyle = k.tank;
    X.fillRect(sx - 7, yB - 32, 14, 14);
    X.fillStyle = k.jacket;
    X.fillRect(sx - 7, yB - 32, 14, 9);
    // Both fists straight up.
    X.fillStyle = k.skin;
    X.fillRect(sx - 8, yB - 46 - rise, 3, 14 + rise);
    X.fillRect(sx + 5, yB - 46 - rise, 3, 14 + rise);
    X.fillStyle = k.wraps;
    X.fillRect(sx - 8, yB - 49 - rise, 3, 3);
    X.fillRect(sx + 5, yB - 49 - rise, 3, 3);
    // Bandana flying off the rising left wrist.
    X.fillStyle = k.bandanaHi;
    X.fillRect(sx + 5, yB - 47 - rise, 6, 1);
    X.fillStyle = k.bandana;
    X.fillRect(sx + 5, yB - 46 - rise, 6, 2);
    X.fillStyle = k.bandanaDark;
    X.fillRect(sx + 5, yB - 44 - rise, 6, 1);
    // Head.
    X.fillStyle = k.skin;
    X.fillRect(sx - 6, yB - 44, 12, 12);
    X.fillStyle = k.hair;
    X.fillRect(sx - 5, yB - 46, 10, 4);
    X.fillStyle = "#fff";
    X.fillRect(sx + 1, yB - 38, 2, 1);
    return;
  }

  // Windup: low stance with bandana drawn back.
  X.fillStyle = k.pants;
  X.fillRect(sx - 6, sy - 18, 5, 14);
  X.fillRect(sx + 1, sy - 18, 5, 14);
  X.fillStyle = k.boot;
  X.fillRect(sx - 6, sy - 4, 5, 4);
  X.fillRect(sx + 1, sy - 4, 5, 4);
  X.fillStyle = k.tank;
  X.fillRect(sx - 7, sy - 30, 14, 14);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 7, sy - 30, 14, 9);
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, sy - 42, 12, 12);
  X.fillStyle = k.hair;
  X.fillRect(sx - 5, sy - 44, 10, 4);
  // Bandana low.
  X.fillStyle = k.bandana;
  X.fillRect(sx + 5, sy - 18, 5, 2);
}

// Phase-aware envelope: ramps 0→peak through startup, holds peak through
// active, ramps peak→0 through recovery. Used by attack renderers.
function attackEnvelope(p, peak) {
  if (!p.attacking) return 0;
  const d = ATTACK_DATA[p.char + "_" + p.attackName];
  if (!d) return 0;
  const fr = p.attackFrame;
  if (fr <= d.startup) return peak * (fr / d.startup);
  if (fr <= d.startup + d.active) return peak;
  const r = (fr - d.startup - d.active) / d.recovery;
  return Math.max(0, peak * (1 - r));
}

function drawRio(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const f  = p.facing;
  const t  = p.animTime;
  const k  = RIO_COLORS;

  // ---- Sunset Spin: dedicated render — bandana sweeps in a wide arc, ending in
  //      a rising double-fist uppercut. Multi-hit AOE, costs HP.
  if (p.attacking && p.attackName === "special") {
    drawSunsetSpin(p);
    return;
  }

  // ---- Grab: holding the enemy in front of Rio. ----
  if (p.grabbing) {
    const sxG = Math.round(p.x);
    const syG = Math.round(p.y - p.z);
    const fg  = p.facing;
    // Drop shadow.
    X.fillStyle = "rgba(0,0,0,0.4)";
    X.beginPath(); X.ellipse(sxG, p.y, 11, 3, 0, 0, Math.PI * 2); X.fill();
    // Body — feet braced, arms reaching forward.
    X.fillStyle = k.pants;
    X.fillRect(sxG - 7, syG - 18, 5, 14);
    X.fillRect(sxG + 2, syG - 18, 5, 14);
    X.fillStyle = k.boot;
    X.fillRect(sxG - 7, syG - 4, 5, 4);
    X.fillRect(sxG + 2, syG - 4, 5, 4);
    X.fillStyle = k.tank;
    X.fillRect(sxG - 7, syG - 32, 14, 14);
    X.fillStyle = k.jacket;
    X.fillRect(sxG - 7, syG - 32, 14, 9);
    // Both arms forward.
    X.fillStyle = k.skin;
    if (fg > 0) X.fillRect(sxG + 4, syG - 26, 9, 3);
    else        X.fillRect(sxG - 13, syG - 26, 9, 3);
    if (fg > 0) X.fillRect(sxG + 4, syG - 22, 9, 3);
    else        X.fillRect(sxG - 13, syG - 22, 9, 3);
    X.fillStyle = k.wraps;
    if (fg > 0) X.fillRect(sxG + 11, syG - 26, 3, 3);
    else        X.fillRect(sxG - 13, syG - 26, 3, 3);
    if (fg > 0) X.fillRect(sxG + 11, syG - 22, 3, 3);
    else        X.fillRect(sxG - 13, syG - 22, 3, 3);
    // Bandana on near wrist.
    X.fillStyle = k.bandana;
    if (fg > 0) X.fillRect(sxG + 9, syG - 21, 5, 2);
    else        X.fillRect(sxG - 13, syG - 21, 5, 2);
    // Head.
    X.fillStyle = k.skin;
    X.fillRect(sxG - 6, syG - 44, 12, 12);
    X.fillStyle = k.hair;
    X.fillRect(sxG - 5, syG - 46, 10, 4);
    X.fillStyle = "#fff";
    X.fillRect(sxG + (fg > 0 ? 1 : -3), syG - 38, 2, 1);
    return;
  }

  // ---- Parry: guard pose with a glow ring on the active window. ----
  if (p.parryFrame >= 1 && p.parryFrame <= PARRY_ACTIVE) {
    const sxP = Math.round(p.x);
    const syP = Math.round(p.y - p.z);
    // Ring of bandana-yellow energy that contracts as the window closes.
    const r = 22 + (p.parryFrame / PARRY_ACTIVE) * 10;
    const a = 1 - (p.parryFrame / PARRY_ACTIVE) * 0.7;
    X.strokeStyle = "rgba(255,215,106," + a.toFixed(2) + ")";
    X.lineWidth = 2;
    X.beginPath(); X.arc(sxP, syP - 22, r, 0, Math.PI * 2); X.stroke();
    X.lineWidth = 1;
  }

  // ---- Dodge: backward roll, compact silhouette, motion trail ----
  if (p.dodging) {
    const groundY = Math.round(p.y);
    // Faint trail showing where she was.
    X.fillStyle = "rgba(125,141,79,0.30)";
    X.fillRect(sx + f * 6,  groundY - 14, 8, 12);
    X.fillStyle = "rgba(125,141,79,0.18)";
    X.fillRect(sx + f * 12, groundY - 12, 7, 10);
    // Drop shadow.
    X.fillStyle = "rgba(0,0,0,0.4)";
    X.beginPath();
    X.ellipse(sx, groundY, 11, 3, 0, 0, Math.PI * 2);
    X.fill();
    // Compact rolling ball — jacket-on-pants oval.
    X.fillStyle = k.pants;
    X.fillRect(sx - 8, groundY - 14, 16, 12);
    X.fillStyle = k.jacket;
    X.fillRect(sx - 8, groundY - 14, 16, 6);
    X.fillStyle = k.jacketDark;
    X.fillRect(sx - 8, groundY - 8, 16, 1);
    // Hair ridge on the rolled-over side.
    X.fillStyle = k.hair;
    X.fillRect(sx - 6, groundY - 16, 12, 2);
    // Bandana pip stays visible during the roll.
    X.fillStyle = k.bandana;
    X.fillRect(sx - f * 7, groundY - 9, 4, 2);
    return;
  }

  // Per-state animation deltas.
  let armSwing = 0, legSwingL = 0, legSwingR = 0, bodyBob = 0;
  if (p.animState === "walk") {
    const s = Math.sin(t * 9);
    legSwingL =  s * 1.5;
    legSwingR = -s * 1.5;
    armSwing  = -s * 1.2;
    bodyBob   =  Math.abs(s) * 0.6;
  } else if (p.animState === "run") {
    const s = Math.sin(t * 15);
    legSwingL =  s * 2.5;
    legSwingR = -s * 2.5;
    armSwing  = -s * 2;
    bodyBob   =  Math.abs(s) * 1.2;
  } else if (p.animState === "idle") {
    bodyBob = Math.sin(t * 2) * 0.5;
  } else if (p.animState === "jump") {
    legSwingL = -2; legSwingR = -2;
    armSwing  = -1;
  } else if (p.animState === "hurt") {
    bodyBob = -2;
  }

  // Per-attack visuals.
  // atkReach   pixels of forward fist extension
  // atkArm     "front" or "rear" — which side of the body extends
  // atkYBias   y-offset of the punching arm vs neutral arm height
  // atkUp      rising offset for the uppercut
  // atkKick    pixels of forward foot extension for jump_atk
  // atkSpin    extra body torque for hooking attacks
  let atkReach = 0, atkArm = "front", atkYBias = 0, atkUp = 0, atkKick = 0, atkSpin = 0;
  if (p.attacking) {
    const name = p.attackName;
    if (name === "atk1") {
      atkReach = attackEnvelope(p, 14);
      atkArm = "front"; atkYBias = 0;
    } else if (name === "atk2") {
      atkReach = attackEnvelope(p, 19);
      atkArm = "rear"; atkYBias = -1;
      atkSpin = attackEnvelope(p, 1);
    } else if (name === "atk3") {
      atkReach = attackEnvelope(p, 17);
      atkArm = "front"; atkYBias = 1;
      atkSpin = attackEnvelope(p, 2);
    } else if (name === "heavy") {
      atkReach = attackEnvelope(p, 9);
      atkArm = "front";
      atkUp = attackEnvelope(p, 14);
      // crouch during startup, rise through active.
      const d = ATTACK_DATA.rio_heavy;
      if (p.attackFrame <= d.startup) bodyBob = -(p.attackFrame / d.startup) * 3;
      else bodyBob = 0.5;
    } else if (name === "jump_atk") {
      atkKick = attackEnvelope(p, 14);
    } else if (name === "back_atk") {
      // Backward elbow — rear arm whips behind. Reach is negative-fwd in data.
      atkReach = attackEnvelope(p, 12);
      atkArm = "rear-back";
    } else if (name === "throw" || name === "counter") {
      // Throw recovery / counter-special: front arm extended hard.
      atkReach = attackEnvelope(p, 18);
      atkArm = "front";
      atkYBias = -1;
    }
  }

  // Drop shadow on the ground (always at p.y, not p.y-z).
  X.fillStyle = "rgba(0,0,0,0.4)";
  const shY = Math.round(p.y);
  X.beginPath();
  X.ellipse(sx, shY, 11 - p.z * 0.04, 3, 0, 0, Math.PI * 2);
  X.fill();

  const bob = -bodyBob;
  const headY = sy - 44 + bob;
  const torsoY = sy - 32 + bob;

  // Legs (in front of torso visually because feet are at sy).
  X.fillStyle = k.pants;
  X.fillRect(sx - 6, sy - 18, 5, 14);
  X.fillRect(sx + 1, sy - 18, 5, 14);
  X.fillStyle = k.pantsDark;
  // Suggest leg motion with a 1px shaded band.
  X.fillRect(sx - 6, sy - 12 + Math.round(legSwingL), 5, 1);
  X.fillRect(sx + 1, sy - 12 + Math.round(legSwingR), 5, 1);
  // Boots.
  X.fillStyle = k.boot;
  X.fillRect(sx - 6, sy - 4, 5, 4);
  X.fillRect(sx + 1, sy - 4, 5, 4);
  // Waistband.
  X.fillStyle = k.pantsDark;
  X.fillRect(sx - 6, sy - 19, 12, 2);

  // Torso: black tank base then olive cropped jacket on top half.
  X.fillStyle = k.tank;
  X.fillRect(sx - 7, torsoY, 14, 14);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 7, torsoY, 14, 9);
  X.fillStyle = k.jacketDark;
  X.fillRect(sx - 7, torsoY + 9, 14, 1);

  // Arms — front and back. Position keyed off body midline.
  // Front arm = camera-side. Rear arm = back.
  const frontArmX = (f > 0) ? sx + 6 : sx - 9;
  const backArmX  = (f > 0) ? sx - 9 : sx + 6;

  // Rear arm — forward extension on cross (atk2). Backward whip on back_atk.
  if (atkArm === "rear" && atkReach > 0) {
    const ay = torsoY + 4 + atkYBias;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 4, ay, atkReach + 3, 3);
    else       X.fillRect(sx - 4 - atkReach - 3, ay, atkReach + 3, 3);
    X.fillStyle = k.wraps;
    if (f > 0) X.fillRect(sx + 4 + atkReach, ay, 3, 3);
    else       X.fillRect(sx - 4 - atkReach - 3, ay, 3, 3);
  } else if (atkArm === "rear-back" && atkReach > 0) {
    // Backward elbow — extends opposite to facing.
    const ay = torsoY + 5;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx - 4 - atkReach - 3, ay, atkReach + 3, 3);
    else       X.fillRect(sx + 4, ay, atkReach + 3, 3);
    // Elbow visualised as a small block at the joint.
    X.fillStyle = k.skinDark;
    if (f > 0) X.fillRect(sx - 4 - atkReach - 3, ay + 3, 2, 2);
    else       X.fillRect(sx + 6 + atkReach, ay + 3, 2, 2);
  } else {
    X.fillStyle = k.skin;
    X.fillRect(backArmX, torsoY + 1 + Math.round(armSwing), 3, 11);
    X.fillStyle = k.wraps;
    X.fillRect(backArmX, torsoY + 12 + Math.round(armSwing), 3, 3);
  }

  // Front arm — extends on jab/hook/heavy. Heavy rises with atkUp.
  if (atkArm === "front" && (atkReach > 0 || atkUp > 0)) {
    const reach = atkReach;
    const ay = torsoY + 4 + atkYBias - Math.round(atkUp);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 4, ay, reach + 3, 3);
    else       X.fillRect(sx - 4 - reach - 3, ay, reach + 3, 3);
    X.fillStyle = k.wraps;
    if (f > 0) X.fillRect(sx + 4 + reach, ay, 3, 3);
    else       X.fillRect(sx - 4 - reach - 3, ay, 3, 3);
    // For uppercut, draw a vertical forearm rising along atkUp height.
    if (atkUp > 2) {
      X.fillStyle = k.skin;
      X.fillRect((f > 0) ? sx + 4 + reach - 1 : sx - 4 - reach - 2, ay, 3, Math.round(atkUp));
    }
  } else {
    X.fillStyle = k.skin;
    X.fillRect(frontArmX, torsoY + 1 - Math.round(armSwing), 3, 11);
    X.fillStyle = k.wraps;
    X.fillRect(frontArmX, torsoY + 12 - Math.round(armSwing), 3, 3);
  }

  // Yellow bandana on the camera-side wrist (the "front" arm). Always visible.
  // The bandana follows the punching arc; for a cross (atk2) the punching arm
  // is the rear, so the front-side bandana stays at hip-line and an extra fluttering
  // accent appears on the extending rear wrist.
  if (atkArm === "front") {
    drawBandana(sx, torsoY, f, atkReach + atkUp, armSwing, k);
  } else {
    drawBandana(sx, torsoY, f, 0, armSwing, k);
    if (atkReach > 4) {
      const ay = torsoY + 6 + atkYBias;
      X.fillStyle = k.bandana;
      if (f > 0) X.fillRect(sx + 4 + atkReach - 1, ay, 5, 2);
      else       X.fillRect(sx - 4 - atkReach - 4, ay, 5, 2);
    }
  }

  // Front kick for jump_atk — extending leg forward.
  if (atkKick > 0) {
    X.fillStyle = k.pants;
    if (f > 0) X.fillRect(sx + 4, sy - 12, atkKick, 4);
    else       X.fillRect(sx - 4 - atkKick, sy - 12, atkKick, 4);
    X.fillStyle = k.boot;
    if (f > 0) X.fillRect(sx + 4 + atkKick - 3, sy - 12, 4, 5);
    else       X.fillRect(sx - 4 - atkKick, sy - 12, 4, 5);
  }

  // Head.
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, headY, 12, 12);
  X.fillStyle = k.skinDark;
  X.fillRect(sx - 6, headY + 6, 1, 6);
  X.fillRect(sx + 5, headY + 6, 1, 6);
  // Locs on top.
  X.fillStyle = k.hair;
  X.fillRect(sx - 5, headY - 2, 10, 4);
  X.fillRect(sx - 4, headY - 3, 8, 1);
  // Eye dot, direction-indicating.
  X.fillStyle = "#fff";
  if (f > 0) X.fillRect(sx + 1, headY + 6, 2, 1);
  else       X.fillRect(sx - 3, headY + 6, 2, 1);
  // Gold hoop earring on camera-facing side.
  X.fillStyle = k.bandana;
  if (f > 0) X.fillRect(sx + 5, headY + 9, 1, 1);
  else       X.fillRect(sx - 6, headY + 9, 1, 1);
}

// Dispatch the right per-character renderer. Sprite atlas wins when present;
// otherwise falls back to the procedural renderer per character.
function drawCharacter(p) {
  if (drawSpriteCharacter(p)) return;
  if (p.char === "duke")  return drawDuke(p);
  if (p.char === "atlas") return drawAtlas(p);
  return drawRio(p);
}

// ---------- HUD ----------
function drawHUD() {
  // Top strip
  X.fillStyle = "rgba(0,0,0,0.55)";
  X.fillRect(0, 0, W, 22);

  // HP bar — colored to match the chosen character's signature tone.
  const barX = 8, barY = 6, barW = 140, barH = 10;
  X.fillStyle = "#222";
  X.fillRect(barX, barY, barW, barH);
  const pct = player ? Math.max(0, player.hp / player.hpMax) : 0;
  const tone = (player && player.char === "duke")  ? { fill: "#5a6678", rail: "#a08c4a", label: "DUKE" } :
               (player && player.char === "atlas") ? { fill: "#7a3030", rail: "#c0c0c8", label: "ATLAS" } :
                                                     { fill: "#7d8d4f", rail: "#e8c04a", label: "RIO" };
  X.fillStyle = tone.fill;
  X.fillRect(barX, barY, Math.round(barW * pct), barH);
  X.fillStyle = tone.rail;
  X.fillRect(barX, barY, barW, 1);

  // Parry meter + chain count (bottom right). Pulses "READY" at full.
  if (player) drawParryHUD();
  // Combo counter (center-top under HP).
  if (player && player.comboHits >= 2) drawComboCounter();
  // Boss HP bar across the bottom when a boss is alive.
  drawBossHpBar();
  // Mobile touch overlay — only renders when SHOW_TOUCH is true.
  drawTouchOverlay();

  X.fillStyle = tone.rail;
  X.font = "bold 9px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText(tone.label, barX, barY - 6);
}

// Parry meter + chain counter, anchored bottom-right. Pulses READY at 100%.
function drawParryHUD() {
  const p = player;
  const x0 = W - 122;
  const y0 = H - 26;
  // Frame plate.
  X.fillStyle = "rgba(0,0,0,0.55)";
  X.fillRect(x0 - 4, y0 - 2, 122, 22);
  // Label.
  X.fillStyle = "#aaa";
  X.font = "bold 8px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText("PARRY", x0, y0);
  // Chain count.
  if (p.parryChain > 0) {
    X.fillStyle = "#e8c04a";
    X.font = "bold 9px ui-monospace, monospace";
    X.textAlign = "right";
    X.fillText("x" + p.parryChain, x0 + 110, y0);
  }
  // Meter bar.
  const mx = x0, my = y0 + 10, mw = 110, mh = 6;
  X.fillStyle = "#222";
  X.fillRect(mx, my, mw, mh);
  const pct = p.parryMeter / 100;
  // Color ramps from olive to bandana yellow to white as it fills.
  const grad = pct < 0.5 ? "#5a6b3a" : (pct < 1 ? "#e8c04a" : "#fff");
  X.fillStyle = grad;
  X.fillRect(mx, my, Math.round(mw * pct), mh);
  // Tick marks at 50 / 75.
  X.fillStyle = "#000";
  X.fillRect(mx + Math.round(mw * 0.5), my, 1, mh);
  X.fillRect(mx + Math.round(mw * 0.75), my, 1, mh);
  // Top rail.
  X.fillStyle = "#e8c04a";
  X.fillRect(mx, my, mw, 1);
  // READY pulse at full.
  if (p.parryMeter >= 100) {
    const pulse = 0.55 + 0.45 * Math.sin(stateTime * Math.PI * 6);
    X.fillStyle = "rgba(255,255,255," + pulse.toFixed(2) + ")";
    X.font = "bold 9px ui-monospace, monospace";
    X.textAlign = "center";
    X.fillText("READY", mx + mw / 2, my - 1);
  }
}

// Boss health bar — wide rail across the bottom of the play strip with the
// boss's name. Draws only while a live boss is in the enemies list.
function drawBossHpBar() {
  let boss = null;
  for (const e of enemies) {
    if (e.isBoss && !e.dead) { boss = e; break; }
  }
  if (!boss) return;
  const barW = W - 80, barX = 40, barY = H - 38;
  X.fillStyle = "rgba(0,0,0,0.65)";
  X.fillRect(barX - 4, barY - 14, barW + 8, 22);
  X.fillStyle = "#1a0a0e";
  X.fillRect(barX, barY, barW, 8);
  const pct = Math.max(0, boss.hp / boss.hpMax);
  X.fillStyle = "#5a1018";
  X.fillRect(barX, barY, Math.round(barW * pct), 8);
  X.fillStyle = pct < 0.3 ? "#ff7060" : (pct < 0.6 ? "#ff9c40" : "#a83040");
  X.fillRect(barX, barY, Math.round(barW * pct), 4);
  X.fillStyle = "#e8c04a";
  X.fillRect(barX, barY, barW, 1);
  X.fillStyle = "#e8c04a";
  X.font = "bold 10px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText(boss.bossName || "BOSS", barX, barY - 12);
  X.textAlign = "right";
  X.fillText(boss.hp + " / " + boss.hpMax, barX + barW, barY - 12);
}

// Combo counter + draining meter under the HP bar. Pulses red when about to drop.
function drawComboCounter() {
  const p = player;
  const cx = W / 2;
  const cy = 30;
  const fade = Math.min(1, p.comboTimer / 0.4);
  const sizeBase = 18;
  // Larger and bolder for higher combo counts.
  const sz = sizeBase + Math.min(10, Math.floor(p.comboHits / 5) * 2);
  X.font = "bold " + sz + "px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "alphabetic";
  X.fillStyle = "rgba(0,0,0," + (0.75 * fade).toFixed(2) + ")";
  X.fillText(p.comboHits + " HIT", cx + 1, cy + 1);
  // Color shifts as combo grows: olive → bandana yellow → white-hot red on close.
  const grade =
    p.comboHits >= 20 ? "#ff6248" :
    p.comboHits >= 10 ? "#ffd76a" :
    p.comboHits >= 5  ? "#e8c04a" :
                        "#aaa";
  X.fillStyle = grade;
  X.globalAlpha = fade;
  X.fillText(p.comboHits + " HIT", cx, cy);
  X.globalAlpha = 1;

  // Combo timer meter — drains over 1.4 s. Red pulse when under 0.4 s.
  const maxT = 1.4;
  const tPct = Math.max(0, p.comboTimer / maxT);
  const mw = 60, mh = 3;
  const mx = cx - mw / 2, my = cy + 6;
  X.fillStyle = "rgba(0,0,0,0.5)";
  X.fillRect(mx - 1, my - 1, mw + 2, mh + 2);
  // Background under the bar.
  X.fillStyle = "#241010";
  X.fillRect(mx, my, mw, mh);
  // Fill — pulses red when window closing.
  if (p.comboTimer < 0.4) {
    const pulse = 0.5 + 0.5 * Math.sin(stateTime * Math.PI * 12);
    X.fillStyle = "rgba(255," + Math.round(80 + 40 * pulse) + ",80,1)";
  } else {
    X.fillStyle = grade;
  }
  X.fillRect(mx, my, Math.round(mw * tPct), mh);
}

// ---------- DEV: hitbox / hurtbox visualizer ----------
function drawDebugBoxes() {
  X.lineWidth = 1;
  function drawFootprint(b, color) {
    X.strokeStyle = color;
    X.strokeRect(Math.round(b.cx - b.hw) + 0.5,
                 Math.round(b.cy - b.hd) + 0.5,
                 b.hw * 2, b.hd * 2);
  }
  if (player) {
    for (const b of player.hurtboxes) drawFootprint(b, "rgba(0,255,128,0.85)");
    for (const b of player.hitboxes)  drawFootprint(b, "rgba(255,72,72,0.95)");
    X.fillStyle = "#fff";
    X.fillRect(Math.round(player.x), Math.round(player.y), 1, 1);
  }
  for (const e of enemies) {
    for (const b of e.hurtboxes) drawFootprint(b, "rgba(0,255,128,0.55)");
    for (const b of e.hitboxes)  drawFootprint(b, "rgba(255,160,0,0.95)");
  }
  X.strokeStyle = "rgba(120,160,255,0.5)";
  X.strokeRect(0.5, STAGE_TOP + 0.5, W - 1, STAGE_BOT - STAGE_TOP);
}

// ---------- Stage backdrops ----------
// All 10 stages get their own drawStageX() that paints into the world layer
// (transformed by screen-shake). Each is purely procedural fillRect work.

// Stage 1: THE BLOCK — neighborhood, urban night.
function drawStageBlock() {
  const t = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  // Sky.
  X.fillStyle = "#11131c";
  X.fillRect(0, 0, W, 230);
  // Far skyline (slow parallax, ~8 px every 60s).
  const skyOff = (t * 0.13) % 64;
  X.fillStyle = "#191b27";
  for (let bx = -64; bx < W + 64; bx += 64) {
    const x = bx - skyOff;
    // Tower silhouettes
    X.fillRect(x +  4, 60, 18, 30);
    X.fillRect(x + 28, 50, 22, 40);
    X.fillRect(x + 56, 70, 12, 20);
  }
  X.fillStyle = "#1a1d2a";
  X.fillRect(0, 90, W, 120);
  // Apartment windows. Some flicker on/off slowly to feel alive.
  X.fillStyle = "#3b4360";
  for (let by = 110; by < 200; by += 14) {
    for (let bx = 20; bx < W; bx += 22) {
      if (((bx * 13 + by * 7) & 7) < 3) X.fillRect(bx, by, 3, 4);
    }
  }
  // A few warm lit windows that flicker.
  X.fillStyle = "#e8c04a";
  for (let i = 0; i < 8; i++) {
    const wx = 70 + i * 84;
    const wy = 124 + ((i * 13) & 1) * 28;
    // Flicker: ~1Hz sine + per-window phase. Off some of the time.
    const phase = i * 0.7;
    const flick = 0.5 + 0.5 * Math.sin(t * 1.3 + phase);
    if (flick > 0.55) X.fillRect(wx, wy, 3, 4);
  }
  // Sidewalk + seams.
  X.fillStyle = "#2a2a36";
  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);
  X.fillStyle = "#1f1f29";
  for (let gx = 0; gx < W; gx += 80) X.fillRect(gx, STAGE_TOP, 1, STAGE_BOT - STAGE_TOP);
  X.fillRect(0, STAGE_TOP + 22, W, 1);
  X.fillRect(0, STAGE_TOP + 70, W, 1);
  // Curb.
  X.fillStyle = "#0e0e15";
  X.fillRect(0, STAGE_BOT, W, H - STAGE_BOT);
  // A couple of trash-can silhouettes for life.
  X.fillStyle = "#2a2030";
  X.fillRect(60,  240, 10, 18);
  X.fillRect(560, 234, 12, 22);
  X.fillStyle = "#0e0e15";
  X.fillRect(60,  240, 10, 1);
  X.fillRect(560, 234, 12, 1);
  // Soft drizzle — sparse, fast-falling specks across the sky region only.
  // Skipped under reduce-flash for accessibility.
  if (!save.settings.reduceFlash) {
    X.fillStyle = "rgba(150, 165, 200, 0.45)";
    for (let i = 0; i < 14; i++) {
      const seed = i * 73.13;
      const px = ((seed + t * 22) % (W + 30)) - 10;
      const py = ((seed * 1.7 + t * 180) % 230);
      X.fillRect(px, py, 1, 3);
    }
  }
}

// Stage 2: THE TUNNELS — subway / storm drain. Cold dim concrete.
function drawStageTunnels() {
  const t = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  // Dark backwall.
  X.fillStyle = "#0a0c10";
  X.fillRect(0, 0, W, 230);
  // Tunnel arch (curved-ish via two trapezoids).
  X.fillStyle = "#181b22";
  X.fillRect(0, 50, W, 180);
  // Side walls — perspective wedges.
  X.fillStyle = "#10131a";
  for (let i = 0; i < 6; i++) {
    const py = 50 + i * 30;
    X.fillRect(0, py, 22 + i * 4, 1);
    X.fillRect(W - 22 - i * 4, py, 22 + i * 4, 1);
  }
  // Approaching subway light: a far-back glow that grows then fades on a
  // 12s cycle, like a train coming and going through the next tunnel over.
  const trainCycle = (t * 0.083) % 1;          // 12 s loop
  const trainGlow = trainCycle < 0.6 ? trainCycle / 0.6 : (1 - (trainCycle - 0.6) / 0.4);
  if (trainGlow > 0.05) {
    const tg = Math.min(1, trainGlow * 1.4);
    X.fillStyle = "rgba(255,210,150," + (tg * 0.30).toFixed(2) + ")";
    X.beginPath(); X.ellipse(W - 44, 138, 70 + tg * 60, 36 + tg * 26, 0, 0, Math.PI * 2); X.fill();
    X.fillStyle = "rgba(255,235,180," + (tg * 0.6).toFixed(2) + ")";
    X.fillRect(W - 50, 134, 14, 8);
  }
  // Bare bulbs along the ceiling with subtle flicker.
  for (let bx = 60; bx < W; bx += 110) {
    const phase = bx * 0.07;
    const flick = 0.85 + 0.15 * Math.sin(t * 6 + phase);
    X.fillStyle = "rgba(255,210,150," + (0.65 * flick).toFixed(2) + ")";
    X.fillRect(bx - 4, 60, 8, 2);
    X.fillStyle = "rgba(255,180,90," + (0.95 * flick).toFixed(2) + ")";
    X.fillRect(bx - 1, 61, 2, 1);
    // Glow ellipse.
    X.fillStyle = "rgba(255,210,150," + (0.10 * flick).toFixed(2) + ")";
    X.beginPath(); X.ellipse(bx, 60, 24, 12, 0, 0, Math.PI*2); X.fill();
  }
  // Tile bands on the back wall.
  X.fillStyle = "#1a1f28";
  for (let ty = 100; ty < 220; ty += 18) X.fillRect(40, ty, W - 80, 2);
  // Distant tunnel mouth.
  X.fillStyle = "#040408";
  X.fillRect(W - 80, 100, 70, 80);
  // Subway track running along the depth strip.
  X.fillStyle = "#1a1a22";
  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);
  // Two rails — catch a thin highlight from the bulbs.
  X.fillStyle = "#2a2a36";
  X.fillRect(0, STAGE_TOP + 30, W, 2);
  X.fillRect(0, STAGE_BOT - 24, W, 2);
  X.fillStyle = "rgba(255,210,150,0.10)";
  X.fillRect(0, STAGE_TOP + 30, W, 1);
  // Sleepers.
  X.fillStyle = "#0c0c10";
  for (let sx = 0; sx < W; sx += 28) X.fillRect(sx, STAGE_TOP + 36, 14, 2);
  X.fillStyle = "#0a0a0e";
  X.fillRect(0, STAGE_BOT, W, H - STAGE_BOT);
  // Dripping water: 5 slow drips falling from ceiling at fixed columns.
  if (!save.settings.reduceFlash) {
    X.fillStyle = "rgba(140,180,220,0.5)";
    for (let i = 0; i < 5; i++) {
      const dx = 80 + i * 110;
      const period = 2.4 + i * 0.31;
      const dt = (t + i * 0.7) % period;
      const dy = 72 + (dt / period) * 100;
      if (dy < 180) X.fillRect(dx, dy, 1, 3);
      // Tiny puddle ripple when it lands.
      if (dt > period * 0.92) {
        X.fillStyle = "rgba(140,180,220,0.30)";
        X.fillRect(dx - 2, 180, 5, 1);
        X.fillStyle = "rgba(140,180,220,0.5)";
      }
    }
  }
  // Steam wafts from a vent on the floor.
  if (!save.settings.reduceFlash) {
    for (let i = 0; i < 4; i++) {
      const seed = i * 41.7;
      const sx = 110 + ((seed + t * 8) % 30);
      const sy = STAGE_BOT - 4 - ((t * 24 + seed) % 60);
      X.fillStyle = "rgba(180,190,200," + (0.25 - i * 0.05).toFixed(2) + ")";
      X.fillRect(sx, sy, 4, 4);
    }
  }
}

// Stage 3: RIVER ROW — docks, shipping containers, water hazard at bottom.

  X.fillStyle = "#1a2438";
  X.fillRect(0, 0, W, 100);
  X.fillStyle = "#262e44";
  X.fillRect(0, 100, W, 60);
  // Horizon glow band — slowly pulses warmer.
  const dawnPulse = 0.55 + 0.20 * Math.sin(t * 0.5);
  X.fillStyle = "rgba(200,120,90," + (dawnPulse * 0.35).toFixed(2) + ")";
  X.fillRect(0, 120, W, 14);
  // Distant industrial silhouettes.
  X.fillStyle = "#0e1320";
  X.fillRect(0, 130, W, 40);
  X.fillStyle = "#101522";
  for (let bx = 0; bx < W; bx += 70) {
    X.fillRect(bx, 142, 30, 28);
    X.fillRect(bx + 12, 134, 4, 20); // smokestack
    // Smoke plume — slow vertical drift from each stack.
    const off = ((t * 8 + bx * 0.3) % 24);
    X.fillStyle = "rgba(180,180,180," + (0.20 - off / 240).toFixed(2) + ")";
    X.fillRect(bx + 11, 130 - off, 6, 4);
    X.fillStyle = "#101522";
  }
  // Distant warehouse window lights blinking on the back row.
  X.fillStyle = "#e8c04a";
  for (let i = 0; i < 7; i++) {
    const wx = 60 + i * 80;
    const wy = 152 + ((i * 7) & 1) * 10;
    if ((Math.sin(t * 1.1 + i * 0.9) > 0.4)) X.fillRect(wx, wy, 2, 2);
  }
  // Two seagull silhouettes drifting across slowly.
  if (!save.settings.reduceFlash) {
    for (let g = 0; g < 2; g++) {
      const gx = ((t * 12 + g * 320) % (W + 60)) - 30;
      const gy = 70 + g * 22 + Math.sin(t * 1.5 + g) * 3;
      X.fillStyle = "rgba(180,190,200,0.85)";
      X.fillRect(gx,     gy,     3, 1);
      X.fillRect(gx - 2, gy - 1, 2, 1);
      X.fillRect(gx + 3, gy - 1, 2, 1);
    }
  }
  // Shipping containers stacked along the back of the dock.
  const containers = [
    [40,  180, "#c66b3a"],
    [110, 174, "#3a6b66"],
    [180, 178, "#a83040"],
    [260, 174, "#3a6b66"],
    [330, 180, "#c66b3a"],
    [410, 174, "#7d8d4f"],
    [490, 178, "#3a6b66"],
    [560, 180, "#a83040"],
  ];
  for (const [cx, cy, col] of containers) {
    X.fillStyle = col;
    X.fillRect(cx, cy, 60, 36);
    X.fillStyle = "rgba(0,0,0,0.4)";
    X.fillRect(cx, cy, 60, 1);
    X.fillRect(cx, cy + 35, 60, 1);
    // Corrugation lines.
    X.fillStyle = "rgba(0,0,0,0.18)";
    for (let cx2 = cx + 4; cx2 < cx + 60; cx2 += 6) X.fillRect(cx2, cy, 1, 36);
    // Decal box.
    X.fillStyle = "rgba(255,255,255,0.18)";
    X.fillRect(cx + 6, cy + 8, 14, 6);
  }
  // Dock planks.
  X.fillStyle = "#3a2a1a";
  X.fillRect(0, STAGE_TOP, W, RIVER_WATER_TOP - STAGE_TOP);
  X.fillStyle = "#241810";
  for (let dx = 0; dx < W; dx += 18) X.fillRect(dx, STAGE_TOP, 1, RIVER_WATER_TOP - STAGE_TOP);
  X.fillStyle = "#5a4030";
  X.fillRect(0, STAGE_TOP, W, 1);
  // Water — animated band of cold blue.
  X.fillStyle = "#0e2c44";
  X.fillRect(0, RIVER_WATER_TOP, W, H - RIVER_WATER_TOP);
  X.fillStyle = "#1a4060";
  for (let wx = 0; wx < W; wx += 20) {
    const off = Math.sin(stateTime * 1.6 + wx * 0.07) * 1.2;
    X.fillRect(wx, RIVER_WATER_TOP + 2 + Math.round(off), 14, 1);
    X.fillRect(wx + 8, RIVER_WATER_TOP + 6 - Math.round(off), 10, 1);
  }
  // Foam ridge on the water edge.
  X.fillStyle = "rgba(255,255,255,0.25)";
  for (let fx = 0; fx < W; fx += 6) {
    if ((fx + Math.floor(stateTime * 12)) & 4) X.fillRect(fx, RIVER_WATER_TOP, 3, 1);
  }
}

// Stage 4: LANTERN ROW — warm market street lit by paper lanterns.
function drawStageLantern() {
  const t = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  // Sky.
  X.fillStyle = "#1a0a1a";
  X.fillRect(0, 0, W, 100);
  // Far buildings — warm tones.
  X.fillStyle = "#3a1a20";
  X.fillRect(0, 100, W, 130);
  X.fillStyle = "#5a2418";
  for (let bx = 0; bx < W; bx += 90) X.fillRect(bx, 110, 70, 110);
  // Back-row warm window lights, flickering like candles.
  X.fillStyle = "#ffba60";
  for (let bx = 0; bx < W; bx += 18) {
    const phase = bx * 0.11;
    if (Math.sin(t * 4 + phase) > 0.3) {
      const wy = 130 + ((bx * 5) & 1) * 24;
      X.fillRect(bx + 6, wy, 3, 4);
    }
  }
  // Distant fireworks: occasional bright burst high in the sky.
  if (!save.settings.reduceFlash) {
    const burstCycle = (t * 0.12) % 1;
    if (burstCycle < 0.08) {
      const a = 1 - burstCycle / 0.08;
      const fx = 80 + ((Math.floor(t * 0.12) * 73) % (W - 160));
      const fy = 30 + ((Math.floor(t * 0.12) * 31) % 30);
      X.fillStyle = "rgba(255,200,120," + (a * 0.7).toFixed(2) + ")";
      X.beginPath(); X.ellipse(fx, fy, 14, 8, 0, 0, Math.PI * 2); X.fill();
      X.fillStyle = "rgba(255,240,180," + a.toFixed(2) + ")";
      X.fillRect(fx - 1, fy, 2, 1);
      // Petals.
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * Math.PI * 2;
        const r = 8 + a * 6;
        X.fillStyle = "rgba(255,180,90," + (a * 0.8).toFixed(2) + ")";
        X.fillRect(Math.round(fx + Math.cos(ang) * r), Math.round(fy + Math.sin(ang) * r * 0.5), 2, 1);
      }
    }
  }
  // Lanterns hanging across the top — yellow/orange paper bulbs.
  for (let lx = 50; lx < W; lx += 70) {
    const bob = Math.sin(stateTime * 1.2 + lx * 0.05) * 1.5;
    const ly = 26 + Math.round(bob);
    // String.
    X.fillStyle = "#3a1a08";
    X.fillRect(lx, 0, 1, ly);
    // Lantern body.
    X.fillStyle = "#c83820";
    X.fillRect(lx - 6, ly,     12, 9);
    X.fillStyle = "#e8581a";
    X.fillRect(lx - 5, ly + 1, 10, 7);
    X.fillStyle = "#ffba60";
    X.fillRect(lx - 3, ly + 2,  6, 4);
    // Glow halo.
    X.fillStyle = "rgba(255,180,100,0.10)";
    X.beginPath(); X.ellipse(lx, ly + 5, 30, 16, 0, 0, Math.PI*2); X.fill();
    // Tassel.
    X.fillStyle = "#7a2418";
    X.fillRect(lx - 1, ly + 9, 2, 3);
  }
  // Cloth banners stretched between buildings.
  X.fillStyle = "#a83040";
  X.fillRect(0, 90, W, 6);
  X.fillStyle = "#7a2030";
  X.fillRect(0, 96, W, 1);
  // Market stalls along the back.
  X.fillStyle = "#3a2812";
  X.fillRect(0,  STAGE_TOP - 10, W, 10);
  X.fillStyle = "#241810";
  for (let sx = 0; sx < W; sx += 60) X.fillRect(sx, STAGE_TOP - 10, 1, 10);
  // Lantern glow on the ground.
  X.fillStyle = "#3a1812";
  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);
  X.fillStyle = "#4a201a";
  X.fillRect(0, STAGE_TOP + 24, W, 1);
  X.fillRect(0, STAGE_TOP + 60, W, 1);
  X.fillStyle = "#1a0a0a";
  X.fillRect(0, STAGE_BOT, W, H - STAGE_BOT);
}

// Stage 5: THE CAGE — underground fight club, chain-link fence with crowd.
function drawStageCage() {
  const t = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  // Smoky low-light.
  X.fillStyle = "#0a0a0c";
  X.fillRect(0, 0, W, 230);
  // Drifting haze layer.
  if (!save.settings.reduceFlash) {
    for (let i = 0; i < 6; i++) {
      const hx = ((t * 14 + i * 110) % (W + 60)) - 30;
      const hy = 40 + (i & 1) * 24;
      X.fillStyle = "rgba(120,90,90,0.07)";
      X.beginPath(); X.ellipse(hx, hy, 60, 14, 0, 0, Math.PI * 2); X.fill();
    }
  }
  // Crowd silhouette band.
  X.fillStyle = "#1a1410";
  X.fillRect(0, 130, W, 100);
  // Crowd heads — lots of dark blobs at varying heights.
  X.fillStyle = "#0e0a08";
  for (let cx = 0; cx < W; cx += 8) {
    const ch = ((cx * 7) ^ 0x55) & 7;
    X.fillRect(cx, 200 - ch * 2, 6, 6 + ch);
  }
  // A few scattered phone screens (white dots) in the crowd that strobe.
  for (let i = 0; i < 14; i++) {
    const px = ((i * 47) % W);
    const py = 180 + ((i * 13) % 26);
    const strobe = 0.5 + 0.5 * Math.sin(t * 6 + i * 1.3);
    X.fillStyle = "rgba(255,255,255," + (0.40 + 0.30 * strobe).toFixed(2) + ")";
    X.fillRect(px, py, 1, 1);
  }
  // Sweeping spotlight — rotates back and forth across the ring.
  const spotPulse = 0.65 + 0.15 * Math.sin(stateTime * 2.4);
  const spotX = W / 2 + Math.sin(t * 0.7) * 140;
  X.fillStyle = "rgba(255,210,90," + (spotPulse * 0.18).toFixed(2) + ")";
  X.beginPath(); X.ellipse(spotX, 60, 200, 56, 0, 0, Math.PI*2); X.fill();
  // Second spotlight, counter-swinging.
  const spotX2 = W / 2 - Math.sin(t * 0.7) * 140;
  X.fillStyle = "rgba(180,200,255," + (spotPulse * 0.13).toFixed(2) + ")";
  X.beginPath(); X.ellipse(spotX2, 70, 160, 40, 0, 0, Math.PI*2); X.fill();
  // Occasional camera flash from the crowd.
  if (!save.settings.reduceFlash && ((t * 0.6) % 1) < 0.05) {
    const flashIdx = Math.floor(t * 0.6);
    const fx = (flashIdx * 113) % W;
    const fy = 175 + (flashIdx * 7) % 25;
    X.fillStyle = "rgba(255,255,255,0.85)";
    X.fillRect(fx - 1, fy - 1, 3, 3);
  }
  // Chain-link fence — diamond pattern across the front foreground.
  X.fillStyle = "#3a3030";
  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);
  X.fillStyle = "#5a5050";
  X.fillRect(0, STAGE_TOP, W, 1);
  X.fillRect(0, STAGE_BOT - 1, W, 1);
  X.fillStyle = "rgba(120,120,140,0.45)";
  for (let dx = 0; dx < W + 12; dx += 6) {
    X.fillRect(dx, STAGE_TOP, 1, STAGE_BOT - STAGE_TOP);
  }
  for (let dy = STAGE_TOP; dy < STAGE_BOT; dy += 10) {
    X.fillRect(0, dy, W, 1);
  }
  // Edge ring — yellow tape.
  X.fillStyle = "#e8c04a";
  X.fillRect(0, STAGE_TOP - 2, W, 2);
  X.fillStyle = "#0a0a0a";
  X.fillRect(0, STAGE_BOT, W, H - STAGE_BOT);
}

  for (let i = 0; i < 8; i++) {

      const silX = bx + 2 + Math.round(silPhase * 12);
      X.fillStyle = "rgba(40,30,30,0.55)";

// Stage 8: THE FREEWAY — overpass at night with passing cars as hazards.
let freewayCars = [];   // managed by hazard hook
function drawStageFreeway() {
  const t = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  // Night sky and silhouettes.
  X.fillStyle = "#0c0a18";
  X.fillRect(0, 0, W, 110);
  X.fillStyle = "#1a1828";
  X.fillRect(0, 90, W, 50);
  // Stars — distant, fixed-position, twinkling.
  for (let i = 0; i < 26; i++) {
    const sx = (i * 47) % W;
    const sy = (i * 13) % 80;
    const tw = 0.5 + 0.5 * Math.sin(t * 2 + i * 1.7);
    X.fillStyle = "rgba(220,225,255," + (0.30 + tw * 0.40).toFixed(2) + ")";
    X.fillRect(sx, sy, 1, 1);
  }
  // Skyline.
  X.fillStyle = "#080610";
  for (let bx = 0; bx < W; bx += 32) X.fillRect(bx, 100 + ((bx * 13) & 14), 24, 40);
  // Skyline window dots — some lit, slow twinkle.
  for (let bx = 0; bx < W; bx += 32) {
    const baseY = 100 + ((bx * 13) & 14);
    for (let wy = baseY + 6; wy < baseY + 38; wy += 6) {
      if (((bx + wy * 7) & 15) === 0 && Math.sin(t * 0.9 + bx * 0.1 + wy * 0.3) > 0.4) {
        X.fillStyle = "rgba(255,210,140,0.85)";
        X.fillRect(bx + 4 + ((wy * 3) % 16), wy, 2, 2);
      }
    }
  }
  // Distant headlight streaks moving along the back lane.
  if (!save.settings.reduceFlash) {
    for (let i = 0; i < 3; i++) {
      const dir = (i & 1) ? 1 : -1;
      const speed = 60 + i * 20;
      const period = (W + 80) / speed;
      const phase = (t / period + i * 0.4) % 1;
      const dx = dir > 0 ? (phase * (W + 80) - 40) : ((1 - phase) * (W + 80) - 40);
      const dy = 124 + i * 4;
      X.fillStyle = "rgba(255,240,180,0.65)";
      X.fillRect(dx, dy, 6, 1);
      X.fillStyle = "rgba(255,200,120,0.30)";
      X.fillRect(dx - dir * 12, dy, 10, 1);
    }
  }
  // Car-light haloes streaking horizontally on a guardrail band.
  X.fillStyle = "#241a30";
  X.fillRect(0, 150, W, 70);
  X.fillStyle = "#3a2848";
  X.fillRect(0, 150, W, 1);
  X.fillRect(0, 220, W, 1);
  // Lane markings far back.
  X.fillStyle = "rgba(220,220,180,0.55)";
  for (let lx = 0; lx < W; lx += 30) X.fillRect(lx, 200, 14, 1);
  // Highway road on the play strip.
  X.fillStyle = "#1a1a22";
  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);
  // Lane stripe.
  X.fillStyle = "#dcd6c4";
  for (let lx = 0; lx < W; lx += 28) X.fillRect(lx, (STAGE_TOP + STAGE_BOT) / 2 - 1, 14, 2);
  // Side rails.
  X.fillStyle = "#3a3a44";
  X.fillRect(0, STAGE_TOP, W, 2);
  X.fillRect(0, STAGE_BOT - 2, W, 2);
  // Render the live cars (their state is updated in updateFreewayHazard).
  for (const c of freewayCars) {
    const cx = c.x | 0;
    const cy = c.y | 0;
    // Body.
    X.fillStyle = c.color;
    X.fillRect(cx, cy, 56, 14);
    X.fillStyle = "rgba(0,0,0,0.4)";
    X.fillRect(cx, cy + 13, 56, 1);
    // Windows.
    X.fillStyle = "#141420";
    X.fillRect(cx + 14, cy + 2, 28, 5);
    // Headlights / tail lights.
    if (c.dir > 0) {
      X.fillStyle = "rgba(255,240,180,0.95)";
      X.fillRect(cx + 52, cy + 4, 4, 2);
      X.fillStyle = "rgba(255,80,40,0.95)";
      X.fillRect(cx, cy + 4, 2, 2);
      // Light beam ahead.
      X.fillStyle = "rgba(255,240,180,0.18)";
      X.fillRect(cx + 56, cy + 3, 22, 4);
    } else {
      X.fillStyle = "rgba(255,240,180,0.95)";
      X.fillRect(cx, cy + 4, 4, 2);
      X.fillStyle = "rgba(255,80,40,0.95)";
      X.fillRect(cx + 54, cy + 4, 2, 2);
      X.fillStyle = "rgba(255,240,180,0.18)";
      X.fillRect(cx - 22, cy + 3, 22, 4);
    }
  }
}

  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);

  X.fillStyle = "#0a0a12";
  X.fillRect(0, STAGE_BOT, W, H - STAGE_BOT);
}

// Stage 10: THE TOP — penthouse rooftop, skyline panorama.
function drawStageTop() {
  const t = (typeof performance !== "undefined" ? performance.now() : Date.now()) / 1000;
  // Deep night sky to a dawn band — dawn slowly brightens over the encounter.
  const dawnT = Math.min(1, (stateTime || 0) / 24);
  X.fillStyle = "#100618";
  X.fillRect(0, 0, W, 60);
  X.fillStyle = "#2a1830";
  X.fillRect(0, 60, W, 40);
  X.fillStyle = "rgba(140,60,60," + (0.35 + dawnT * 0.45).toFixed(2) + ")";
  X.fillRect(0, 100, W, 20);
  // Stars in the upper band, fading as dawn rises.
  for (let i = 0; i < 22; i++) {
    const sx = (i * 53) % W;
    const sy = (i * 11) % 60;
    const tw = 0.4 + 0.4 * Math.sin(t * 1.6 + i * 0.7);
    const a = (0.5 + tw * 0.4) * (1 - dawnT);
    if (a > 0.05) {
      X.fillStyle = "rgba(220,225,255," + a.toFixed(2) + ")";
      X.fillRect(sx, sy, 1, 1);
    }
  }
  // Slow searchlight beams sweeping across the sky from far buildings.
  if (!save.settings.reduceFlash) {
    for (let i = 0; i < 2; i++) {
      const cx = i ? W - 80 : 80;
      const ang = (Math.sin(t * 0.4 + i * 1.7) * 0.6) - Math.PI / 2;
      X.save();
      X.translate(cx, 100);
      X.rotate(ang);
      X.fillStyle = "rgba(255,230,180,0.10)";
      X.fillRect(0, -2, 180, 4);
      X.restore();
    }
  }
  // Far skyline.
  X.fillStyle = "#1a0a14";
  for (let bx = 0; bx < W; bx += 22) {
    const h = 16 + ((bx * 11) & 24);
    X.fillRect(bx, 130 - h, 18, h);
  }
  // Window dots in the skyline.
  X.fillStyle = "rgba(255,210,140,0.7)";
  for (let bx = 4; bx < W; bx += 22) {
    for (let by = 130 - 30; by < 130; by += 6) {
      if (((bx * 7 + by * 13) & 7) === 0) X.fillRect(bx + 2, by, 2, 2);
    }
  }
  // Aircraft warning blinks on the tallest distant towers.
  for (let i = 0; i < 3; i++) {
    const tx = 100 + i * 200;
    const ty = 96;
    if (((t * 0.6 + i * 0.3) % 1) > 0.5) {
      X.fillStyle = "rgba(255,90,90,0.9)";
      X.fillRect(tx, ty, 2, 2);
    }
  }
  // Helipad-style circle on the rooftop.
  X.fillStyle = "#22221c";
  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);
  X.fillStyle = "#1a1a14";
  X.fillRect(0, STAGE_TOP, W, 1);
  // Big white H painted on the roof.
  X.fillStyle = "rgba(255,255,255,0.18)";
  X.fillRect(W / 2 - 28, STAGE_TOP + 12, 8, 70);
  X.fillRect(W / 2 + 20, STAGE_TOP + 12, 8, 70);
  X.fillRect(W / 2 - 28, STAGE_TOP + 42, 56, 8);
  // Edge railing.
  X.fillStyle = "#3a3a44";
  X.fillRect(0, STAGE_BOT - 2, W, 2);
  X.fillStyle = "#0a0a0e";
  X.fillRect(0, STAGE_BOT, W, H - STAGE_BOT);
  // Wind-blown bandana fragments (atmospheric).
  X.fillStyle = "rgba(232,192,74,0.25)";
  for (let i = 0; i < 4; i++) {
    const fx = ((stateTime * 50 + i * 180) % (W + 60)) - 30;
    const fy = 200 + Math.sin(stateTime * 2 + i) * 6;
    X.fillRect(fx | 0, fy | 0, 4, 1);
  }
}

// Dispatch to the correct stage backdrop. Defaults to Stage 1 if out of bounds.
function drawCurrentStage() {
  const s = STAGES[currentStage];
  if (s && s.drawBg) s.drawBg(); else drawStageBlock();

  // render on top of the backdrop so they're visually consistent across states.
  if (typeof drawStageHazards === "function") drawStageHazards();
}
