<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>THE BLOCK</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    color: #ddd;
    font-family: ui-monospace, "Menlo", "Consolas", monospace;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    -ms-interpolation-mode: nearest-neighbor;
  }
  #debug {
    position: fixed;
    top: 6px;
    left: 8px;
    font-size: 11px;
    color: #6f6;
    text-shadow: 1px 1px 0 #000;
    pointer-events: none;
    white-space: pre;
    display: none;
  }
  #debug.on { display: block; }
  #orient {
    position: fixed;
    inset: 0;
    background: #000;
    color: #ddd;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    font-size: 14px;
    z-index: 10;
  }
  #orient.on { display: flex; }
</style>
</head>
<body>
  <div id="wrap"><canvas id="c" width="640" height="360"></canvas></div>
  <div id="debug"></div>
  <div id="orient">Rotate your device to landscape.</div>
<script>
"use strict";

// ---------- Build flags ----------
const DEV = true;

// ---------- Canvas / context ----------
const W = 640;
const H = 360;
const C = document.getElementById("c");
/** Global render context; named X per project convention. */
let X = C.getContext("2d", { alpha: false });
X.imageSmoothingEnabled = false;

// ---------- State machine ----------
// title | select | intro | playing | gameover | victory | credits | interlude | bonus
let STATE = "title";
let stateTime = 0;

function setState(next) {
  STATE = next;
  stateTime = 0;
}

// ---------- Input ----------
const keys = Object.create(null);
const keysPressed = Object.create(null); // edge-triggered, cleared each frame after consumption

function keyName(e) {
  // Normalize a few common ones; KeyboardEvent.code is layout-independent.
  return e.code || e.key;
}

window.addEventListener("keydown", (e) => {
  const k = keyName(e);
  if (!keys[k]) keysPressed[k] = true;
  keys[k] = true;
  if (k === "F3") { toggleDebug(); e.preventDefault(); return; }
  if (k === "Tab" || k === "F5") return; // let browser handle reload, etc.
  // Prevent page scroll on game keys
  if (k === "Space" || k.startsWith("Arrow")) e.preventDefault();
});

window.addEventListener("keyup", (e) => {
  keys[keyName(e)] = false;
});

window.addEventListener("blur", () => {
  for (const k in keys) keys[k] = false;
});

function consumePress(k) {
  if (keysPressed[k]) { keysPressed[k] = false; return true; }
  return false;
}

// ---------- Action bindings ----------
// WASD / arrows for movement; right-hand row JKLU for combat.
const KEY = {
  left:    ["KeyA", "ArrowLeft"],
  right:   ["KeyD", "ArrowRight"],
  up:      ["KeyW", "ArrowUp"],
  down:    ["KeyS", "ArrowDown"],
  jump:    ["Space"],
  light:   ["KeyJ"],
  heavy:   ["KeyK"],
  special: ["KeyL"],
  grab:    ["KeyU"],
};

function actionHeld(a) {
  const ks = KEY[a];
  for (let i = 0; i < ks.length; i++) if (keys[ks[i]]) return true;
  return false;
}
function actionPressed(a) {
  const ks = KEY[a];
  for (let i = 0; i < ks.length; i++) if (consumePress(ks[i])) return true;
  return false;
}

// Double-tap → run, tracked per side.
let lastTapLeft = -999;
let lastTapRight = -999;
const DOUBLE_TAP_WINDOW = 0.28;

// ---------- Pause / visibility ----------
let paused = false;
document.addEventListener("visibilitychange", () => {
  paused = document.hidden;
});

// ---------- Resize / scale ----------
let scale = 1;
let isMobile = (typeof matchMedia === "function") &&
               matchMedia("(pointer: coarse)").matches;

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const sx = vw / W;
  const sy = vh / H;
  let s = Math.min(sx, sy);
  if (!isMobile) s = Math.max(1, Math.floor(s)); // integer scale on desktop
  scale = s;
  C.style.width = (W * s) + "px";
  C.style.height = (H * s) + "px";
  // After CSS resize, re-disable smoothing on the (still-640x360) backing buffer.
  X.imageSmoothingEnabled = false;
  // Orientation guard on mobile only.
  const orient = document.getElementById("orient");
  if (isMobile && vw < vh) orient.classList.add("on");
  else orient.classList.remove("on");
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", resize);
resize();

// ---------- Debug overlay ----------
const debugEl = document.getElementById("debug");
function toggleDebug() {
  if (!DEV) return;
  debugEl.classList.toggle("on");
}
let fps = 0;
let fpsAccum = 0;
let fpsFrames = 0;

function entityCount() {
  return (player ? 1 : 0) + enemies.length + particles.length;
}

// ---------- Stage geometry (2.5D plane) ----------
// World X is horizontal screen pixels. World Y is depth (also pixels — lower y = back).
// Z is jump height; screen Y of a feet-anchored sprite is (worldY - z).
const STAGE_TOP = 232;     // back of play strip
const STAGE_BOT = 340;     // front of play strip
const STAGE_LEFT_PAD = 12; // sprite half-width clamp
const STAGE_RIGHT_PAD = 12;
const GRAVITY = 620;       // px / s^2

// ---------- Frame-data driven attacks ----------
// Frames are 60Hz fixed-step ticks. Hitboxes are world-space:
//   fwd  forward distance from player center along facing
//   hw   half-width on world X (horizontal)
//   hd   half-depth on world Y (depth axis)
//   lo,hi  vertical Z range above ground (for jump-over later)
const ATTACK_DATA = {
  rio_atk1: {
    startup: 4, active: 3, recovery: 9,
    damage: 5,
    knockback: 80,
    hitstop: 4,
    hit: { fwd: 18, hw: 11, hd: 7, lo: 0, hi: 36 },
  },
};

// ---------- Player ----------
let player = null;

function makePlayer(charKey, x, y) {
  return {
    char: charKey,
    x, y, z: 0,
    vx: 0, vy: 0, vz: 0,
    facing: 1,
    animState: "idle",
    animTime: 0,
    running: false,
    walkSpeed: 78,   // Rio: speed 5 of 5 in stat tier
    runSpeed: 148,
    jumpVel: 210,
    attacking: false,
    attackName: null,
    attackFrame: 0,
    hp: 100, hpMax: 100,
    iframes: 0,
    hitstun: 0,
    knockX: 0, knockY: 0,
    dead: false,
    hurtboxes: [],
    hitboxes: [],
  };
}

function startAttack(p, name) {
  p.attacking = true;
  p.attackName = name;
  p.attackFrame = 0;
  p.vx = 0; p.vy = 0;
  p.hitboxes.length = 0;
}

function advanceAttack(p) {
  const d = ATTACK_DATA[p.char + "_" + p.attackName];
  if (!d) { p.attacking = false; p.attackName = null; return; }
  const total = d.startup + d.active + d.recovery;
  p.hitboxes.length = 0;
  if (p.attackFrame > d.startup && p.attackFrame <= d.startup + d.active) {
    const h = d.hit;
    p.hitboxes.push({
      cx: p.x + p.facing * h.fwd,
      cy: p.y,
      hw: h.hw, hd: h.hd,
      lo: h.lo, hi: h.hi,
      damage: d.damage,
      knockback: d.knockback,
      hitstop: d.hitstop,
      facing: p.facing,
      owner: p,
    });
  }
  if (p.attackFrame >= total) {
    p.attacking = false;
    p.attackName = null;
    p.hitboxes.length = 0;
  }
}

function updatePlayer(p, dt) {
  if (p.iframes > 0) p.iframes--;

  // Hitstun: knocked-back movement, no input, no attack progress.
  if (p.hitstun > 0) {
    p.hitstun--;
    p.x += p.knockX * dt;
    p.y += p.knockY * dt;
    p.knockX *= 0.82; p.knockY *= 0.82;
    if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
    if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
    if (p.y < STAGE_TOP) p.y = STAGE_TOP;
    if (p.y > STAGE_BOT) p.y = STAGE_BOT;
    p.animState = "hurt";
    p.animTime += dt;
    p.hitboxes.length = 0;
    p.hurtboxes.length = 0;
    p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
    return;
  }

  const grounded = p.z <= 0;
  const locked = p.attacking && grounded;

  // Movement input (suppressed during grounded attack lock).
  let ix = 0, iy = 0;
  if (!locked) {
    if (actionHeld("left"))  ix -= 1;
    if (actionHeld("right")) ix += 1;
    if (actionHeld("up"))    iy -= 1;
    if (actionHeld("down"))  iy += 1;
  }

  // Double-tap → run; releasing stops it.
  if (actionPressed("left")) {
    if (stateTime - lastTapLeft < DOUBLE_TAP_WINDOW) p.running = true;
    lastTapLeft = stateTime;
  }
  if (actionPressed("right")) {
    if (stateTime - lastTapRight < DOUBLE_TAP_WINDOW) p.running = true;
    lastTapRight = stateTime;
  }
  if (ix === 0) p.running = false;

  if (!locked) {
    if (ix !== 0 || iy !== 0) {
      const mag = Math.hypot(ix, iy) || 1;
      const speed = p.running ? p.runSpeed : p.walkSpeed;
      p.vx = (ix / mag) * speed;
      p.vy = (iy / mag) * speed;
      if (ix !== 0) p.facing = ix > 0 ? 1 : -1;
    } else {
      p.vx = 0; p.vy = 0;
    }
  }

  if (!locked && grounded && actionPressed("jump")) {
    p.vz = p.jumpVel;
  }

  if (!locked && grounded && actionPressed("light")) {
    startAttack(p, "atk1");
  }

  if (p.attacking) {
    p.attackFrame++;
    advanceAttack(p);
  }

  // Integrate motion. Air control: keep horizontal velocity from jump.
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.z += p.vz * dt;
  if (p.z > 0 || p.vz > 0) p.vz -= GRAVITY * dt;
  if (p.z < 0) { p.z = 0; p.vz = 0; }

  if (p.x < STAGE_LEFT_PAD) p.x = STAGE_LEFT_PAD;
  if (p.x > W - STAGE_RIGHT_PAD) p.x = W - STAGE_RIGHT_PAD;
  if (p.y < STAGE_TOP) p.y = STAGE_TOP;
  if (p.y > STAGE_BOT) p.y = STAGE_BOT;

  // Animation state selection.
  let next;
  if (p.attacking) next = p.attackName;
  else if (p.z > 0) next = "jump";
  else if (ix !== 0 || iy !== 0) next = p.running ? "run" : "walk";
  else next = "idle";
  if (next !== p.animState) { p.animState = next; p.animTime = 0; }
  else p.animTime += dt;

  // Rebuild hurtbox each tick (torso column, world coords).
  p.hurtboxes.length = 0;
  p.hurtboxes.push({ cx: p.x, cy: p.y, hw: 9, hd: 5, lo: 0, hi: 36 });
}

// ---------- Rio: procedural fillRect rendering ----------
const RIO_COLORS = {
  skin:       "#8a5235",
  skinDark:   "#6b3f2a",
  hair:       "#1a1410",
  jacket:     "#7d8d4f",
  jacketDark: "#5a6b3a",
  tank:       "#0a0a10",
  pants:      "#1a1a22",
  pantsDark:  "#0e0e15",
  boot:       "#0a0a10",
  wraps:      "#dcd6c4",
  bandanaHi:  "#ffd76a",
  bandana:    "#e8c04a",
  bandanaDark:"#b89426",
};

// Bandana renderer: 7w x 3h block (hi / mid / shadow rows). Camera-side wrist anchor.
// During the punch arc, trails two fading ghosts behind the wrist for motion.
function drawBandana(sx, torsoY, f, atkReach, armSwing, k) {
  // Anchor wrist x in screen space, on the camera-side wrist.
  let wx, wy;
  if (atkReach > 0) {
    // Punching: ride the front-arm fist forward.
    wy = torsoY + 6;
    wx = (f > 0) ? sx + 4 + atkReach - 1 : sx - 3 - atkReach - 6;
    // Trailing ghosts (only when arm is meaningfully extended).
    if (atkReach > 4) {
      const trailDir = -f;
      X.fillStyle = "rgba(232,192,74,0.55)";
      X.fillRect(wx + trailDir * 4, wy + 1, 6, 2);
      X.fillStyle = "rgba(232,192,74,0.28)";
      X.fillRect(wx + trailDir * 8, wy + 1, 5, 2);
    }
  } else {
    // Idle/walk: bandana hangs at hip-line on the front-arm wrist.
    wy = torsoY + 11 - Math.round(armSwing);
    wx = (f > 0) ? sx + 5 : sx - 11;
  }
  // Body — 7 wide, 3 tall.
  X.fillStyle = k.bandanaHi;
  X.fillRect(wx, wy, 7, 1);
  X.fillStyle = k.bandana;
  X.fillRect(wx, wy + 1, 7, 1);
  X.fillStyle = k.bandanaDark;
  X.fillRect(wx, wy + 2, 7, 1);
  // Two-pixel knot tail dangling on the camera-out side.
  X.fillStyle = k.bandana;
  if (atkReach > 0) {
    // Pointing forward during punch.
    if (f > 0) X.fillRect(wx + 7, wy + 1, 2, 1);
    else       X.fillRect(wx - 2, wy + 1, 2, 1);
  } else {
    if (f > 0) X.fillRect(wx + 7, wy + 2, 2, 1);
    else       X.fillRect(wx - 2, wy + 2, 2, 1);
  }
}

function drawRio(p) {
  const sx = Math.round(p.x);
  const sy = Math.round(p.y - p.z);
  const f  = p.facing;
  const t  = p.animTime;
  const k  = RIO_COLORS;

  // Per-state animation deltas.
  let armSwing = 0, legSwingL = 0, legSwingR = 0, bodyBob = 0;
  if (p.animState === "walk") {
    const s = Math.sin(t * 9);
    legSwingL =  s * 1.5;
    legSwingR = -s * 1.5;
    armSwing  = -s * 1.2;
    bodyBob   =  Math.abs(s) * 0.6;
  } else if (p.animState === "run") {
    const s = Math.sin(t * 15);
    legSwingL =  s * 2.5;
    legSwingR = -s * 2.5;
    armSwing  = -s * 2;
    bodyBob   =  Math.abs(s) * 1.2;
  } else if (p.animState === "idle") {
    bodyBob = Math.sin(t * 2) * 0.5;
  } else if (p.animState === "jump") {
    legSwingL = -2; legSwingR = -2;
    armSwing  = -1;
  }

  // Attack arm-extension envelope (in pixels of forward reach).
  let atkReach = 0;
  if (p.attacking && p.attackName === "atk1") {
    const d = ATTACK_DATA.rio_atk1;
    if (p.attackFrame <= d.startup) {
      atkReach = (p.attackFrame / d.startup) * 14;
    } else if (p.attackFrame <= d.startup + d.active) {
      atkReach = 14;
    } else {
      const r = (p.attackFrame - d.startup - d.active) / d.recovery;
      atkReach = Math.max(0, 14 * (1 - r));
    }
  }

  // Drop shadow on the ground (always at p.y, not p.y-z).
  X.fillStyle = "rgba(0,0,0,0.4)";
  const shY = Math.round(p.y);
  X.beginPath();
  X.ellipse(sx, shY, 11 - p.z * 0.04, 3, 0, 0, Math.PI * 2);
  X.fill();

  const bob = -bodyBob;
  const headY = sy - 44 + bob;
  const torsoY = sy - 32 + bob;

  // Legs (in front of torso visually because feet are at sy).
  X.fillStyle = k.pants;
  X.fillRect(sx - 6, sy - 18, 5, 14);
  X.fillRect(sx + 1, sy - 18, 5, 14);
  X.fillStyle = k.pantsDark;
  // Suggest leg motion with a 1px shaded band.
  X.fillRect(sx - 6, sy - 12 + Math.round(legSwingL), 5, 1);
  X.fillRect(sx + 1, sy - 12 + Math.round(legSwingR), 5, 1);
  // Boots.
  X.fillStyle = k.boot;
  X.fillRect(sx - 6, sy - 4, 5, 4);
  X.fillRect(sx + 1, sy - 4, 5, 4);
  // Waistband.
  X.fillStyle = k.pantsDark;
  X.fillRect(sx - 6, sy - 19, 12, 2);

  // Torso: black tank base then olive cropped jacket on top half.
  X.fillStyle = k.tank;
  X.fillRect(sx - 7, torsoY, 14, 14);
  X.fillStyle = k.jacket;
  X.fillRect(sx - 7, torsoY, 14, 9);
  X.fillStyle = k.jacketDark;
  X.fillRect(sx - 7, torsoY + 9, 14, 1);

  // Arms — front and back.
  // Identify front arm (camera-side) vs back arm.
  const frontArmX = (f > 0) ? sx + 6 : sx - 9;
  const backArmX  = (f > 0) ? sx - 9 : sx + 6;
  const frontWristX = frontArmX;
  const backWristX  = backArmX;

  // Back arm (drawn first).
  X.fillStyle = k.skin;
  X.fillRect(backArmX, torsoY + 1 + Math.round(armSwing), 3, 11);
  X.fillStyle = k.wraps;
  X.fillRect(backWristX, torsoY + 12 + Math.round(armSwing), 3, 3);

  // Front arm — extended during attack.
  if (atkReach > 0) {
    const ay = torsoY + 4;
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 4, ay, atkReach + 3, 3);
    else       X.fillRect(sx - 3 - atkReach - 3, ay, atkReach + 3, 3);
    X.fillStyle = k.wraps;
    if (f > 0) X.fillRect(sx + 4 + atkReach, ay, 3, 3);
    else       X.fillRect(sx - 3 - atkReach - 3, ay, 3, 3);
  } else {
    X.fillStyle = k.skin;
    X.fillRect(frontArmX, torsoY + 1 - Math.round(armSwing), 3, 11);
    X.fillStyle = k.wraps;
    X.fillRect(frontWristX, torsoY + 12 - Math.round(armSwing), 3, 3);
  }

  // Yellow bandana — Rio's left wrist signature. Spec: must always be visible.
  // Drawn on the camera-side (front) wrist regardless of facing, so it never hides
  // behind the body. During the punch arc it rides the extending fist with a 2-step
  // trailing ghost so the eye tracks it.
  drawBandana(sx, torsoY, f, atkReach, armSwing, k);

  // Head.
  X.fillStyle = k.skin;
  X.fillRect(sx - 6, headY, 12, 12);
  X.fillStyle = k.skinDark;
  X.fillRect(sx - 6, headY + 6, 1, 6);
  X.fillRect(sx + 5, headY + 6, 1, 6);
  // Locs on top.
  X.fillStyle = k.hair;
  X.fillRect(sx - 5, headY - 2, 10, 4);
  X.fillRect(sx - 4, headY - 3, 8, 1);
  // Eye dot, direction-indicating.
  X.fillStyle = "#fff";
  if (f > 0) X.fillRect(sx + 1, headY + 6, 2, 1);
  else       X.fillRect(sx - 3, headY + 6, 2, 1);
  // Gold hoop earring on camera-facing side.
  X.fillStyle = k.bandana;
  if (f > 0) X.fillRect(sx + 5, headY + 9, 1, 1);
  else       X.fillRect(sx - 6, headY + 9, 1, 1);
}

// ---------- HUD ----------
function drawHUD() {
  // Top strip
  X.fillStyle = "rgba(0,0,0,0.55)";
  X.fillRect(0, 0, W, 22);

  // HP bar — Rio.
  const barX = 8, barY = 6, barW = 140, barH = 10;
  X.fillStyle = "#222";
  X.fillRect(barX, barY, barW, barH);
  const pct = player ? Math.max(0, player.hp / player.hpMax) : 0;
  X.fillStyle = "#7d8d4f";          // jacket olive
  X.fillRect(barX, barY, Math.round(barW * pct), barH);
  X.fillStyle = "#e8c04a";          // bandana yellow rail
  X.fillRect(barX, barY, barW, 1);

  X.fillStyle = "#e8c04a";
  X.font = "bold 9px ui-monospace, monospace";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText("RIO", barX, barY - 6);

  // Bottom-right HUD slot reserved for combo / parry meter (Phase 2).
}

// ---------- DEV: hitbox / hurtbox visualizer ----------
function drawDebugBoxes() {
  X.lineWidth = 1;
  function drawFootprint(b, color) {
    X.strokeStyle = color;
    X.strokeRect(Math.round(b.cx - b.hw) + 0.5,
                 Math.round(b.cy - b.hd) + 0.5,
                 b.hw * 2, b.hd * 2);
  }
  if (player) {
    for (const b of player.hurtboxes) drawFootprint(b, "rgba(0,255,128,0.85)");
    for (const b of player.hitboxes)  drawFootprint(b, "rgba(255,72,72,0.95)");
    X.fillStyle = "#fff";
    X.fillRect(Math.round(player.x), Math.round(player.y), 1, 1);
  }
  for (const e of enemies) {
    for (const b of e.hurtboxes) drawFootprint(b, "rgba(0,255,128,0.55)");
    for (const b of e.hitboxes)  drawFootprint(b, "rgba(255,160,0,0.95)");
  }
  X.strokeStyle = "rgba(120,160,255,0.5)";
  X.strokeRect(0.5, STAGE_TOP + 0.5, W - 1, STAGE_BOT - STAGE_TOP);
}

// ---------- Stage 1 placeholder backdrop ----------
function drawStage1() {
  // Sky / building strip.
  X.fillStyle = "#11131c";
  X.fillRect(0, 0, W, 230);
  // Distant building band.
  X.fillStyle = "#1a1d2a";
  X.fillRect(0, 90, W, 120);
  // Window dots — fixed pattern, not animated.
  X.fillStyle = "#3b4360";
  for (let by = 110; by < 200; by += 14) {
    for (let bx = 20; bx < W; bx += 22) {
      if (((bx * 13 + by * 7) & 7) < 3) X.fillRect(bx, by, 3, 4);
    }
  }
  // Sidewalk back edge.
  X.fillStyle = "#2a2a36";
  X.fillRect(0, STAGE_TOP, W, STAGE_BOT - STAGE_TOP);
  // Pavement seams.
  X.fillStyle = "#1f1f29";
  for (let gx = 0; gx < W; gx += 80) X.fillRect(gx, STAGE_TOP, 1, STAGE_BOT - STAGE_TOP);
  X.fillRect(0, STAGE_TOP + 22, W, 1);
  X.fillRect(0, STAGE_TOP + 70, W, 1);
  // Curb at bottom.
  X.fillStyle = "#0e0e15";
  X.fillRect(0, STAGE_BOT, W, H - STAGE_BOT);
}

// ---------- Enemies ----------
let enemies = [];

const RUNNER_ATK = {
  startup: 6, active: 4, recovery: 14,
  damage: 8,
  knockback: 70,
  hitstop: 3,
  hit: { fwd: 14, hw: 9, hd: 6, lo: 0, hi: 32 },
};

function makeRunner(x, y) {
  return {
    type: "runner",
    x, y, z: 0,
    vx: 0, vy: 0,
    facing: -1,
    animState: "idle",
    animTime: 0,
    walkSpeed: 56,
    runSpeed: 110,
    hp: 26, hpMax: 26,
    attacking: false,
    attackName: null,
    attackFrame: 0,
    iframes: 0,
    hitstun: 0,
    knockX: 0, knockY: 0,
    aiCooldown: 0.5 + Math.random() * 0.7,
    fleeing: false,
    dead: false,
    deathTimer: 0,
    hitboxes: [],
    hurtboxes: [],
  };
}

function updateRunner(e, dt) {
  if (e.dead) {
    e.deathTimer += dt;
    e.x += e.knockX * dt;
    e.knockX *= 0.86;
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
    if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
    return;
  }

  if (e.iframes > 0) e.iframes--;

  if (e.hitstun > 0) {
    e.hitstun--;
    e.x += e.knockX * dt;
    e.y += e.knockY * dt;
    e.knockX *= 0.82; e.knockY *= 0.82;
    if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
    if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
    if (e.y < STAGE_TOP) e.y = STAGE_TOP;
    if (e.y > STAGE_BOT) e.y = STAGE_BOT;
    e.animState = "hurt";
    e.animTime += dt;
    e.hitboxes.length = 0;
    e.hurtboxes.length = 0;
    e.hurtboxes.push({ cx: e.x, cy: e.y, hw: 8, hd: 5, lo: 0, hi: 30 });
    return;
  }

  e.aiCooldown -= dt;

  // "Runs at low HP" — flee threshold 30%.
  if (!e.fleeing && e.hp < e.hpMax * 0.3) e.fleeing = true;

  if (player && !player.dead) {
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.hypot(dx, dy) || 0.0001;

    if (e.attacking) {
      e.attackFrame++;
      const d = RUNNER_ATK;
      e.hitboxes.length = 0;
      if (e.attackFrame > d.startup && e.attackFrame <= d.startup + d.active) {
        e.hitboxes.push({
          cx: e.x + e.facing * d.hit.fwd,
          cy: e.y,
          hw: d.hit.hw, hd: d.hit.hd,
          lo: d.hit.lo, hi: d.hit.hi,
          damage: d.damage,
          knockback: d.knockback,
          hitstop: d.hitstop,
          facing: e.facing,
          owner: e,
        });
      }
      if (e.attackFrame >= d.startup + d.active + d.recovery) {
        e.attacking = false;
        e.attackName = null;
        e.hitboxes.length = 0;
        e.aiCooldown = 0.55 + Math.random() * 0.55;
      }
      e.animState = "atk";
    } else if (e.fleeing) {
      // Run away on the X axis at runSpeed.
      const fleeDir = (player.x > e.x) ? -1 : 1;
      e.facing = fleeDir;
      e.vx = fleeDir * e.runSpeed;
      e.vy = (e.y < STAGE_TOP + 20) ? 30 : (e.y > STAGE_BOT - 20 ? -30 : 0);
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.animState = "walk";
    } else {
      // Approach until in attack range.
      const range = 24;
      if (Math.abs(dx) > 1) e.facing = dx > 0 ? 1 : -1;
      if (dist > range) {
        const speed = e.walkSpeed;
        e.vx = (dx / dist) * speed;
        e.vy = (dy / dist) * speed;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.animState = "walk";
      } else {
        e.vx = 0; e.vy = 0;
        e.animState = "idle";
        if (e.aiCooldown <= 0) {
          e.attacking = true;
          e.attackName = "swipe";
          e.attackFrame = 0;
        }
      }
    }
    e.animTime += dt;
  } else {
    e.animState = "idle";
    e.animTime += dt;
  }

  if (e.x < STAGE_LEFT_PAD) e.x = STAGE_LEFT_PAD;
  if (e.x > W - STAGE_RIGHT_PAD) e.x = W - STAGE_RIGHT_PAD;
  if (e.y < STAGE_TOP) e.y = STAGE_TOP;
  if (e.y > STAGE_BOT) e.y = STAGE_BOT;

  e.hurtboxes.length = 0;
  e.hurtboxes.push({ cx: e.x, cy: e.y, hw: 8, hd: 5, lo: 0, hi: 30 });
}

// ---------- RUNNER renderer ----------
const RUNNER_COLORS = {
  hoodie:     "#36363f",
  hoodieDark: "#23232a",
  pants:      "#2f3a4a",
  pantsDark:  "#1f2838",
  shoe:       "#d4cfb8",
  skin:       "#caa07c",
  hoodShadow: "#0c0a12",
};

function drawRunner(e) {
  const sx = Math.round(e.x);
  const sy = Math.round(e.y - e.z);
  const f  = e.facing;
  const k  = RUNNER_COLORS;
  const t  = e.animTime;

  // Drop shadow.
  X.fillStyle = "rgba(0,0,0,0.4)";
  X.beginPath();
  X.ellipse(sx, e.y, 9, 3, 0, 0, Math.PI * 2);
  X.fill();

  if (e.dead) {
    // Lying on the ground, hood down, motionless.
    X.fillStyle = k.hoodie;
    X.fillRect(sx - 13, sy - 6, 26, 5);
    X.fillStyle = k.pants;
    X.fillRect(sx + (f > 0 ? -13 : 1), sy - 2, 12, 4);
    X.fillStyle = k.shoe;
    X.fillRect(sx + (f > 0 ? -13 : 9), sy - 1, 4, 3);
    X.fillStyle = k.hoodShadow;
    X.fillRect(sx + (f > 0 ? 7 : -13), sy - 5, 6, 4);
    return;
  }

  let armSwing = 0, legSwing = 0, bob = 0;
  if (e.animState === "walk") {
    const s = Math.sin(t * 11);
    legSwing = s * 1.5;
    armSwing = -s * 1.2;
    bob = Math.abs(s) * 0.5;
  } else if (e.animState === "hurt") {
    bob = -2;
  } else if (e.animState === "atk") {
    bob = Math.sin(t * 18) * 0.4;
  }

  const torsoY = sy - 30 - bob;
  const headY  = sy - 38 - bob;

  // Pants + shoes.
  X.fillStyle = k.pants;
  X.fillRect(sx - 5, sy - 16 + Math.round(legSwing > 0 ? 0 : 1), 4, 12);
  X.fillRect(sx + 1, sy - 16 + Math.round(legSwing > 0 ? 1 : 0), 4, 12);
  X.fillStyle = k.pantsDark;
  X.fillRect(sx - 5, sy - 12, 4, 1);
  X.fillRect(sx + 1, sy - 12, 4, 1);
  X.fillStyle = k.shoe;
  X.fillRect(sx - 5, sy - 4, 4, 4);
  X.fillRect(sx + 1, sy - 4, 4, 4);

  // Hoodie torso.
  X.fillStyle = k.hoodie;
  X.fillRect(sx - 7, torsoY, 14, 14);
  X.fillStyle = k.hoodieDark;
  X.fillRect(sx - 7, torsoY + 13, 14, 1);
  X.fillStyle = k.hoodShadow;
  X.fillRect(sx - 6, torsoY + 8, 12, 1); // hoodie pocket seam

  // Arms.
  let atkReach = 0;
  if (e.attacking) {
    const d = RUNNER_ATK;
    if (e.attackFrame <= d.startup) atkReach = (e.attackFrame / d.startup) * 10;
    else if (e.attackFrame <= d.startup + d.active) atkReach = 10;
    else atkReach = Math.max(0, 10 - (e.attackFrame - d.startup - d.active));
  }
  // Back arm.
  const backArmX = (f > 0) ? sx - 9 : sx + 7;
  X.fillStyle = k.hoodie;
  X.fillRect(backArmX, torsoY + 1 + Math.round(armSwing), 2, 11);
  // Front arm.
  if (atkReach > 0) {
    const ay = torsoY + 4;
    const armX = (f > 0) ? sx + 5 : sx - 5 - atkReach - 3;
    X.fillStyle = k.hoodie;
    X.fillRect(armX, ay, atkReach + 3, 3);
    X.fillStyle = k.skin;
    if (f > 0) X.fillRect(sx + 5 + atkReach, ay, 3, 3);
    else       X.fillRect(sx - 5 - atkReach - 3, ay, 3, 3);
  } else {
    const frontArmX = (f > 0) ? sx + 7 : sx - 9;
    X.fillStyle = k.hoodie;
    X.fillRect(frontArmX, torsoY + 1 - Math.round(armSwing), 2, 11);
  }

  // Hood — wraps the head, comes to a peak.
  X.fillStyle = k.hoodie;
  X.fillRect(sx - 6, headY, 12, 10);
  X.fillRect(sx - 4, headY - 2, 8, 2);
  X.fillRect(sx - 3, headY - 4, 6, 2);
  X.fillStyle = k.hoodieDark;
  X.fillRect(sx - 6, headY + 9, 12, 1);
  // Inside-the-hood face shadow with two pale eye dots.
  X.fillStyle = k.hoodShadow;
  X.fillRect(sx - 4, headY + 4, 8, 4);
  X.fillStyle = "#bababa";
  if (f > 0) {
    X.fillRect(sx + 1, headY + 5, 1, 1);
    X.fillRect(sx - 2, headY + 5, 1, 1);
  } else {
    X.fillRect(sx - 3, headY + 5, 1, 1);
    X.fillRect(sx,     headY + 5, 1, 1);
  }

  // Hurt flash — full white silhouette while iframes are fresh.
  if (e.iframes > 6) {
    X.fillStyle = "rgba(255,255,255,0.7)";
    X.fillRect(sx - 7, headY - 4, 14, 50);
  }

  // HP pip above head.
  if (e.hp < e.hpMax) {
    const bw = 18, bh = 2;
    const bx = sx - bw / 2;
    const by = headY - 8;
    X.fillStyle = "#000";
    X.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
    X.fillStyle = "#3a1010";
    X.fillRect(bx, by, bw, bh);
    X.fillStyle = "#e8c04a";
    X.fillRect(bx, by, Math.max(0, Math.round(bw * (e.hp / e.hpMax))), bh);
  }
}

// ---------- Particles (hit feedback) ----------
let particles = [];

function spawnSparkle(x, y) {
  particles.push({ kind: "sparkle", x, y, life: 0, max: 0.18 });
}
function spawnDmgNumber(x, y, n) {
  particles.push({ kind: "dmg", x, y, vy: -28, life: 0, max: 0.55, text: String(n) });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    if (p.kind === "dmg") {
      p.y += p.vy * dt;
      p.vy += 50 * dt;
    }
    if (p.life >= p.max) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.max;
    if (p.kind === "sparkle") {
      const r = (1 - t) * 7;
      const a = (1 - t).toFixed(2);
      X.fillStyle = "rgba(255,240,180," + a + ")";
      X.fillRect(p.x - r, p.y - 1, r * 2, 2);
      X.fillRect(p.x - 1, p.y - r, 2, r * 2);
      X.fillStyle = "rgba(255,255,255," + a + ")";
      X.fillRect(p.x - 1, p.y - 1, 2, 2);
    } else if (p.kind === "dmg") {
      const a = (1 - t).toFixed(2);
      X.fillStyle = "rgba(255,255,255," + a + ")";
      X.font = "bold 9px ui-monospace, monospace";
      X.textAlign = "center";
      X.textBaseline = "alphabetic";
      X.fillText(p.text, Math.round(p.x), Math.round(p.y));
    }
  }
}

// ---------- Hit resolution ----------
let hitstopFrames = 0;

function boxOverlap(a, b) {
  return Math.abs(a.cx - b.cx) < a.hw + b.hw &&
         Math.abs(a.cy - b.cy) < a.hd + b.hd;
}

function applyHit(target, hb) {
  if (target.dead) return;
  target.hp -= hb.damage;
  target.iframes = 12;
  // Hit cancels the victim's own attack (no trades).
  if (target.attacking) {
    target.attacking = false;
    target.attackName = null;
    target.attackFrame = 0;
  }
  if (target.hitboxes) target.hitboxes.length = 0;
  // Knockback away from the hitbox center on world X.
  const dir = (target.x < hb.cx) ? -1 : 1;
  target.knockX = dir * hb.knockback;
  target.knockY = 0;
  target.hitstun = 8;
  if (target.hp <= 0) {
    target.dead = true;
    target.deathTimer = 0;
    target.knockX = dir * (hb.knockback + 30);
    target.hitstun = 0;
  }
  if (hitstopFrames < (hb.hitstop || 3)) hitstopFrames = hb.hitstop || 3;
  // Sparkle at the contact point — midway between attacker and target.
  const sxp = (target.x + hb.cx) / 2;
  const syp = target.y - 18;
  spawnSparkle(sxp, syp);
  spawnDmgNumber(sxp, syp - 6, hb.damage);
}

function resolveHits() {
  if (!player) return;
  // Player hits enemies.
  if (player.hitboxes.length > 0 && !player.dead) {
    for (const hb of player.hitboxes) {
      // Hitbox can hit each enemy at most once per active frame.
      for (const e of enemies) {
        if (e.dead || e.iframes > 0) continue;
        let connected = false;
        for (const tb of e.hurtboxes) {
          if (boxOverlap(hb, tb)) { connected = true; break; }
        }
        if (connected) applyHit(e, hb);
      }
    }
  }
  // Enemies hit player.
  if (player.iframes <= 0 && !player.dead) {
    for (const e of enemies) {
      if (e.dead || e.hitboxes.length === 0) continue;
      for (const hb of e.hitboxes) {
        let connected = false;
        for (const tb of player.hurtboxes) {
          if (boxOverlap(hb, tb)) { connected = true; break; }
        }
        if (connected) { applyHit(player, hb); break; }
      }
      if (player.iframes > 0) break; // hit registered, stop checking other enemies this tick
    }
  }
}

function cleanupEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].dead && enemies[i].deathTimer > 1.4) enemies.splice(i, 1);
  }
}

// ---------- Fixed-timestep loop ----------
const STEP = 1 / 60;          // 60Hz logical tick — combat frame counts depend on this.
const MAX_STEPS_PER_FRAME = 5; // spiral-of-death guard
let last = performance.now() / 1000;
let acc = 0;

function frame(nowMs) {
  const now = nowMs / 1000;
  let dt = now - last;
  last = now;
  if (dt > 0.25) dt = 0.25; // tab-resume / debugger pause: discard the gap
  if (!paused) acc += dt;

  let steps = 0;
  while (acc >= STEP && steps < MAX_STEPS_PER_FRAME) {
    update(STEP);
    acc -= STEP;
    steps++;
  }
  if (steps === MAX_STEPS_PER_FRAME) acc = 0;

  render();

  // FPS sampling
  fpsAccum += dt;
  fpsFrames++;
  if (fpsAccum >= 0.5) {
    fps = fpsFrames / fpsAccum;
    fpsAccum = 0;
    fpsFrames = 0;
  }
  if (DEV && debugEl.classList.contains("on")) {
    debugEl.textContent =
      "FPS " + fps.toFixed(0) +
      "\nstate " + STATE +
      "\nents " + entityCount() +
      "\nscale " + scale.toFixed(2);
  }

  requestAnimationFrame(frame);
}

// ---------- Update ----------
function update(dt) {
  stateTime += dt;
  if (STATE === "title") updateTitle(dt);
  else if (STATE === "playing") updatePlaying(dt);
  // Other states declared in the machine but not yet reachable.
}

function updateTitle(dt) {
  if (consumePress("Enter") || consumePress("Space") || consumePress("NumpadEnter")) {
    enterPlaying();
  }
}

function enterPlaying() {
  player = makePlayer("rio", 120, 300);
  enemies = [
    makeRunner(440, 280),
    makeRunner(520, 320),
  ];
  particles = [];
  hitstopFrames = 0;
  setState("playing");
}

function updatePlaying(dt) {
  if (consumePress("Escape")) {
    player = null;
    enemies = [];
    particles = [];
    hitstopFrames = 0;
    setState("title");
    return;
  }
  if (hitstopFrames > 0) { hitstopFrames--; return; }
  if (player) updatePlayer(player, dt);
  for (const e of enemies) updateRunner(e, dt);
  resolveHits();
  cleanupEnemies();
  updateParticles(dt);
}

// ---------- Render ----------
function render() {
  X.fillStyle = "#000";
  X.fillRect(0, 0, W, H);
  if (STATE === "title") renderTitle();
  else if (STATE === "playing") renderPlaying();
}

function renderTitle() {
  // Title block
  X.fillStyle = "#e8c04a"; // bandana yellow — Rio's signature, used as title accent
  X.fillRect(W / 2 - 140, H / 2 - 60, 280, 4);
  X.fillRect(W / 2 - 140, H / 2 + 18, 280, 4);

  X.fillStyle = "#fff";
  X.font = "bold 36px ui-monospace, monospace";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("THE BLOCK", W / 2, H / 2 - 22);

  X.fillStyle = "#aaa";
  X.font = "12px ui-monospace, monospace";
  X.fillText("a beat-em-up", W / 2, H / 2 + 4);

  // Press-start prompt — pulses on a 1Hz sine.
  const pulse = 0.55 + 0.45 * Math.sin(stateTime * Math.PI * 2);
  X.fillStyle = "rgba(255,255,255," + pulse.toFixed(3) + ")";
  X.font = "14px ui-monospace, monospace";
  X.fillText("PRESS ENTER", W / 2, H / 2 + 56);
}

function renderPlaying() {
  drawStage1();
  // Depth-sort: deeper (lower world Y) renders first so closer entities cover them.
  const drawables = [];
  if (player) drawables.push({ y: player.y, draw: () => drawRio(player) });
  for (const e of enemies) drawables.push({ y: e.y, draw: () => drawRunner(e) });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();
  drawParticles();
  drawHUD();
  if (DEV && debugEl.classList.contains("on")) drawDebugBoxes();

  X.fillStyle = "#888";
  X.font = "9px ui-monospace, monospace";
  X.textAlign = "right";
  X.textBaseline = "top";
  X.fillText("ESC : title", W - 6, 4);
}

// ---------- Boot ----------
requestAnimationFrame((t) => { last = t / 1000; frame(t); });
</script>
</body>
</html>
